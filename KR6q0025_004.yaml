body:
  text: 心圓居士拈別火蓮居士集梓六祖下第三十三世常州府宜興龍池一心幻有正傳禪師溧陽李氏子年二十二投荊溪靜樂院樂菴芟染菴示以本分事師遂矢志曰若不見性明心决不將身倒睡一夕聞琉璃燈華熚𪹼聲有省舉似菴菴頷之未幾菴遷化師直造燕都謁笑巖於觀音菴巖問上座何來師曰南方巖曰來此擬需何事師曰但乞和尚印證心地工夫巖曰若果識得心地何須印證師曰雖然不得不舉似一過巖曰參堂去師珍重便出至晚入室方具述所以巖驀踢出隻履曰向者裏道一句看遂把話頭一時打斷懡㦬而出通夕不寐翌日巖出方丈見師猶立簷下驀喚上座師回顧巖翹一足作修羅障日月勢子已飛天外去呆郎莫向腳跟尋師豁然悟旨後禮舜巖乃書曹溪源流付之復贈一笠曰覆之毋露圭角師受囑徑往臺山縛茅祕魔巖居十有三載會太常唐鶴徵問道懇師南還住荊溪龍池六載復遊燕都寓普照後仍歸龍池上堂無上法王有大陀羅尼門名為圓覺驀豎拂子曰子已飛天外去呆郎猶向月邊尋上堂一切法不有一切法不無若能如是會水上按葫蘆佛誕上堂今晨四月八日是我釋迦如來示生降誕之時山僧忽然思量二千吾百餘年已來不知有多少路見不平之輩務要別尋一箇人來與我釋迦老子比勝負較優劣殊不知我釋迦如來是何等一箇面孔汝諸人還知得我釋迦如來腳跟立地處麼還曾夢見我釋迦如來頂相麼良久曰舉手扳南斗翻身倚北辰出頭天外看誰是箇般人驀豎拂子曰雲門大師來也擲拂子便下座上堂老僧者裏不問久參晚進貴要正知正見知見若正了生死如反掌自不落他斷常有無二乘偏見更有甚麼商量若有僧問作麼生是正知正見但向他道老僧在你腳下良久喝一喝下座僧問如何是祖師西來意師曰屋北鹿獨宿曰不會師曰溪西雞齊啼問如何是奇特事師曰蝦蟆捕大蟲曰恁麼則不奇特也師曰貓兒捉老鼠僧禮拜師便喝曰老和尚為甚麼放某甲不過師厲聲曰老僧有事你且去有士人舉僧問雲門如何是諸佛出身處門曰東山水上行意作麼生師曰無孔笛幾人解吹士曰弟子得否師曰得士曰如何是諸佛出身處師曰西河火裏坐士大夫從師遊師每舉門前冷落車馬稀老大嫁作商人婦二語罕有契者山居偈曰五峯雲頂古文殊盡日跏趺總笑余半點苦寒禁不得躊躇未了又躊躇師風度簡易神觀凝肅以法道為己任而機用妙密迥出常情於萬歷甲寅二月十二日示寂先一日有僧自臺山來師與劇談宿昔抵暮索浴衆察師意請遺訓師舉所著帽者三衆無語師撫膝奄然而逝世壽六十六僧臘四十四茶毗靈骨塔本山之右嘉興府天寧幻也佛慧禪師會稽史氏子母夢僧託宿而娠年十四禮天台松谷受業一日晨課至白毫宛轉五須彌處忽有悟舉呈谷谷奮挺逐之於是遍參諸方機契笑巖遂為笑巖室中子出住燕山天寧優曇苑晚南還寓天寧上堂簫吹鳳至琴奏鶴來鉢展龍降杖𢹂虎伏因緣會遇針芥相投正恁麼時莫有道底麼良久曰鐘聲徹曉雞唱黃昏若欲了知也不消得唵穆栗臨娑訶示衆西來大意乾屎橛多少人咬嚼不徹當時我悔來遲好與推他一跌管教他喫得進屙不出免使兒孫費脣舌咦日出千山曉春回大地華柳煙門外緑遊子未歸家喝一喝示衆生一乾坤死一乾坤聖一法界凡一法界何曾謾得諸人若也謾得那討甚麼是非好惡賢善才能灼然些子謾不得缺不得你遺是甚麼境界會麼滿目塵埃千聖眼一身落魄五宗心僧參師曰甚處神祇何方靈聖曰金粟師曰在彼作甚麼曰司園師曰蔬割時還呌痛麼僧作負痛聲師曰老僧刀也未下呌喚作麼曰今日親見和尚師曰盲人摸象師生平丈室翛然不廢萬行凡利物邊事靡不樂為然皆出自己緣未嘗干謁將示寂撿歷示侍僧曰過二日可侍僧驚問師曰吾將有所適侍僧涕泣固留師笑諾曰更留三日亦可至期浴出更衣跏趺榻上適報製龕工竣遂趨寂壽九十一臘七十八襄陽府大覺圓禪師漢川人儀貌豐碩聲如洪鐘參靜菴有契菴付偈曰一枝正法眼列祖遞傳來付汝待時至馨香遍九垓師受囑後隱居襄西笑巖爽菴來求依侍師曰上座錯了也老拙平生溫飽自適別無所長爽曰某等生死事大語未竟師約而笑曰老拙亦有生死何獨爾有爽曰某恨晚進多無恆志和尚豈拒人哉師曰出家兒本自無事爾何無事生事少間曰粥飯自辦始得一日室中舉外道問佛不問有言不問無言世尊良久外道大悟語曰問既不涉有無良久亦是閒名正恁麼時外道悟箇甚麼巖擬進語師以手掩其口曰猶挂脣齒在巖乃釋然曰可謂東土衲僧不及西天外道占偈曰自笑當年畫模則幾番紅了幾番黑如今謝主老還鄉那管平生得未得師稱賞之後無疾而化世壽七十三僧臘五十三嘉興府敬畏無趣如空禪師本郡秀水施氏子幼慕宗乘留心體究同法舟濟參訪數載後見野翁徹法源底啓關示衆自結元關自活埋自吾閉也自吾開一拳打破元關竅放出從前者漢來元宵示衆畫角聲中薦得觀音未是作家彩燈影裏捉得室利謾誇好手恁麼告報與諸人未免笑破虗空口諸人若也未瞥然再看鼇山顛倒走參小參衆立定師喝一喝曰禍出私門便歸方丈示衆言前薦得已天涯句下承當路轉賒一擊鐵圍如粉碎海天空闊鴈行斜除夕小參時窮何似日窮好月若窮來歲亦然三十六旬窮過了東村王老夜燒錢老漢雖無一物也要應箇時節因緣乃拈拄杖曰只者箇無窮無盡歷劫經年今夜隨時送去免教涉蔓相牽擲下拄杖曰歷劫得來今斷送拍雙空手接新年示衆佛是衆生屋裏了事人衆生是佛屋裏不了事漢誠能以佛與衆生一時放却則了與不了並為剩語卓拄杖曰但於事上通無事見色聞聲不用聾端陽示衆佳節端陽何曾訂約五月五日年年撞著風搖蒲劒碧楞楞日照榴華紅灼灼道在時節因緣豈論正法末法向來著意馳求通身是草今日信手拈來無不是藥豎拂子曰大衆且道此藥治甚麼人底病擊拂子曰不但老維摩藥王藥上也須一劑示衆豁開頂門眼照徹大千界既作法中王於法得自在便下座一日湖邊步月謂一僧曰明月與清風水天同一色人人在此中只是出不得僧曰打草驚蛇作麼師曰上座又作麼生曰看腳下師大笑曰將謂胡鬚赤更有赤鬚胡萬歷己卯仲冬謂門人性沖曰來歲仲秋十五六間吾行矣子宜知之庚辰八月十六日冲如期而至師集衆說偈曰生來死去空華死去生來一夢皮囊付與丙丁公白骨斷橋隨衆阿呵呵明月清風吟弄語畢端坐而逝世壽九十建寧府東苑晦臺元鏡禪師別號湛靈郡之建陽人幼而頴篤於孝友甲辰投虎嘯巖麗空祝髮讀楞嚴知見無見處有得遂摳衣參壽昌於寶方呈所見昌為痛呵曰墮大𡽗坑漢師驚悸失所守於是奮志參究不知味者久之一日閲維摩經至此室何以空無侍者曰諸佛國土亦復皆空處豁然大徹第覺行與解左復疑作後閲圓覺隨順覺性章而一切疑礙始得永拔是年庚戌竟趨壽昌求質曰元鏡特以此事求和尚著眼昌曰但言此事此事何憑師彈指一下昌曰猶疑你在師即呈偈曰可憐摸索幾多年識破不值半文錢宗流特煞瞞人甚剛道祖師別有禪昌復詰曰且道甚處是趙州勘破婆子處師曰和尚莫作怪昌為大笑曰衲僧家到恁田地始不受人牢籠師遂掩兩耳昌囑曰子此後宜深隱自有好時節到來若強出便可惜也因付以偈有正令相持時刻慎逢人唯勘印其心之句師拜受而歸乙卯會無異說法閩之大仰師特訪之相見次異曰禮佛著師端坐異又曰禮佛著師把住曰那箇是佛異曰者是那裏來底師拓開曰者是那裏來底異就坐師大笑出又喫茶次異曰聞師兄親見壽昌且道壽昌和尚當年命根斷在甚麼處所師劈面一掌曰且道在甚麼處所異不對師便出異曰三十棒可惜放過即日異上堂呼曰晦臺師將出衆異曰誰呌你師出震聲一喝異曰取棒來師曰宿食不必拈出且道馬祖一喝因甚百丈三日耳聾異曰金風多肅殺秋露愈加寒師拂袖歸衆異曰你只學得一箇走師不顧戊午出住書林東苑辛酉開法一枝菴上堂羽衣道道法本無多南辰貫北河祇消一箇字降盡世間魔且道是那一箇字喝一喝便下座尋歸隱武夷搆室石屏巖孤風絶侶人所難親間有衲子求見者師遽喝曰你者禿廝失了魂來者裏討甚麼碗嘗躡嶮兀坐終日來者皆望崖而退崇禎庚午示疾一日指巖下謂行者曰此處可以埋我者曰設使死了埋了又作麼生分發師大笑一聲曰恰好恰好行者再問則師已蛻去時七月十三也壽五十四臘二十六塔於師所指石巖福州府鼓山湧泉永覺元賢禪師建陽蔡氏子二十補邑庠讀書山剎聞僧唱云我爾時為現清淨光明身忽覺通身歡喜急請經閲之則又茫然莫曉乃往參壽昌於董巖昌令看乾矢橛話久之一日因僧舉南泉斬貓話有省成頌曰兩堂紛鬧太無端寶劒揮時膽盡寒幸有晚來趙州老毗盧頂上獨盤桓呈昌昌曰此事切不得於一機一境上作解會須是向百匝千重處垂手直過尚當遇人所謂心雖已在千峯上猶更將身入衆藏始是參學眼也師唯唯丁巳年四十親歿乃棄家竟投壽昌剃染一日值昌田中歸師逆問曰如何是清淨光明身昌振衣而立師曰祇此更別有昌遂行師當下豁然隨入方丈拜起將通所得昌遽連打三棒曰向後不得草草次年昌寂圓戒博山居香爐峯三載每當酬酢皆當仁不讓山嘗曰者漢生平自許他時天下人不奈渠何歸閩舟次劒津聞同行僧誦曰一時謦咳俱共彈指是二聲音遍至十方諸佛世界師忽大悟乃徹見壽昌用處作偈曰金雞破碧琉璃萬歇千休祇自知穩臥片帆天正朗前山無復雨鳩啼嗣是居金仙菴閲藏三載上堂東海龍王與日月燈明佛大相爭戰勝負不分山僧將二人各與三十烏藤趕過北單越去也諸人還委悉麼良久曰二人是非且置只如晴明陰雨外一句作麼生道咄上堂雪山老人指鹿為馬東西祖師證龜成鱉次第纍及山僧亦不免將錯就錯今當端陽佳節不可虗度將太虗空揑作箇小粽子與諸人充腸果腹乃托起香盒曰大衆還嚼得碎麼若嚼得碎行也競龍舟歌楚些一任煙波自由不用飲蒲酒挂艾旗自然妖蹤頓息如嚼不碎小粽子塞却諸人口門去也咦臨淵無限傷心事安得黃金鑄屈原上堂生從何處來鐵鋸舞三台死從何處去三台吞鐵鋸勿以明相覩勿以暗相遇坐斷兩頭關銀花開玉樹堪笑當年老凍儂不解放行只解把住山僧今日放行也諸人還會麼咦夜半石人方反側一場好夢向誰言上堂諸方浩浩競談禪老僧常抱白雲眠今朝却被人唆哄無端走向法堂前算來無計施設只得將古人葛藤為諸人拈出一上僧問古德如何是禪曰猢猻上樹尾連顛又僧問如何是禪曰猛火著油煎又僧問如何是禪曰碌磚此三轉語如駭雞犀八面玲瓏如大火聚棲泊不得如塗毒鼓聞者喪身失命諸人向者三句語透得一千七百則陳爛葛藤一捏粉碎但老僧者裏却不如此若有問如何是禪向道鳳山深處雨如煙又問如何是禪向道門前池水養新蓮又問如何是禪向道鷓鴣啼破白雲天若會得老僧底盡會得古人底會得古人底未必會得老僧底若會得老僧當別甑炊香飯供養你也老僧底老僧底在者裏在者裏小參直截根源不存知解當陽露出不費纖毫若也眨起眉毛早成蹉過才落擬議便隔千山所以睦州見僧來便掩門魯祖見僧來便面壁可謂真實相為豈似我輩屙漉漉地說三道四問妙答元祖師門下成箇甚麼雖然也須識古人誵訛始得祇如魯祖面壁羅山云我當時見好與五火抄何故為他解放不解收元沙云我當時見也與五火抄且道與羅山是同是別二大老雖則各具手眼檢點將來總是借西家燈照東家壁山僧今日將三大老各與五火抄還會麼橫身當宇宙誰是出頭人小參曲如箭直如鈎小是海大是漚蚯蚓跳過東海跛鱉飛上雲霄參示衆臨濟喝收歸後架德山棒拋向前坑不用從前殘羹餿飯斬新條令一句作麼生只把一枝無孔笛夜深吹徹紫霄穹問洞山三十年鬼神尋不見安平真人却來乞和尚戒此與古人是同是別師曰拯溺須臨水嘯月却登峯問有道之臣因甚不用師曰無渠著力處問主人不出戶如何見客師曰自有侍者在問既是無垢淨光院因甚又作浴堂師曰淨地恐迷人問牛頭未見四祖時如何師曰破驢脊上足蒼蠅曰見後如何師曰鐵牛背上無蚊蚋僧參便喝師亦喝僧亦喝師亦又喝僧復喝師曰饒你更喝八萬四千不如還我未喝前一句僧無語師曰掠虗頭漢好與三十棒師器宇峻特通內外典所著有䆿言禪餘內外集及諸法語生平慎重大法行道三十年未嘗輕易許可紹興府雲門顯聖湛然圓澄禪師別號散木會稽夏氏子生而穎悟具辨才觸事解了性不羈親沒投隱峯參念佛是誰三晝夜有省趨似峯峯叱之退覺有物礙膺脅不沾席者三年一日聞僧誦傅大士偈礙膺脫然便能記持解甚深義受具雲棲掩關寶林因憶乾峯舉一不得舉二話豁然大悟至半堂訪無念問古人道如紅爐上飛片雪相似且道還具透關眼也未念云我不見有甚麼古人師急指曰背後底聻念休去適慈舟和尚來自京師說法會稽止風塗師以所得質之舟問止風塗向青山近越王城畔滄海遙時如何師曰月穿滄海破波斯不展眉大家草裏輥舟復以洞上宗旨次序徵詰師對以偈曰五位君臣切要知箇中何必待思惟石女慣弄無絲線木偶能提化外機井底紅塵騰靄靄山頭白浪滾飛飛誕生本是無功用不覺天然得帝基舟曰子日後開兩片皮截斷天下人舌頭有分在遂命入室印以偈曰曹源一滴水佛祖相分付吾今授受時大地為甘露咄五乳峯頭無鏃箭射得南方半箇兒太史陶石簣太學張濬元請興復顯聖住持三十年在越祖庭首稱其盛師生平不為律縛脫略儀軌腸直如弦舌快如矢丙寅臘月朔作付囑語數紙四日過天華示衆罷有僧告假師曰老僧今日亦欲起程晚復為衆垂語諄諄至夜半丑時右脅而寂奉全身塔於顯聖之南山世壽六十六僧臘四十三上堂前山頭鴉鳴後山頭鵲噪祇者是沈思即不妙妙不妙啞子喫黃連有口不解道上堂喚二作三指七為八倒柄太阿佛魔盡殺却憶東村王大娘翻著西村李公襪見者聞者皆笑殺解笑者是同參拍手曰噫嘻噓阿喇喇會麼王大娘著自己鞋西村李公著自己襪從無此事晚參舉鼓山赴閩王請因緣曰一人死中得活好手手中呈好手一人半路抽身得便宜處失便宜雪峯道好隻箭射入九重城裏去早是拋鈎擲釣孚上座云待某甲勘過始得盲龜跛鱉納敗缺了也孚趁至中路歸舉似雪峯大似把髻投衙峯云他有語在須知不是好心孚云老凍膿猶有鄉情在祇知貪程不覺蹉路峯便休無齒大蟲傷人不知痛大衆經山與麼批判久參上士定知雪峯做處若是初機切不得向他三人分上著腳直須自己有箇活路始得自己若無活路爭明得他人優劣者箇公案大慧捉得賊子雲門捉得賊魁可謂各具一隻眼矣然畢竟事主分上猶少檢點在當時鼓山若是箇咬人師子待云忽遇三軍圍繞時如何劈面便與一掌且教孚老頰上並雕兩行金印看渠將甚面孔見人破戒雖然直截提持還有代孚老原罪底一語在不得錯舉僧問萬法歸一一歸何處師拈絲絛示之曰此是杭州六分銀買得底問南泉斬貓意旨如何師曰莫謗他好曰作麼生得不謗去師曰蒼天蒼天別云老僧謗了也問和尚常教人放下未審放下箇甚麼師曰優鉢羅華三千年開一度別云你無拄杖子我奪却你拄杖子問麻谷參章敬章敬道是意旨如何師曰拈一放一不是好手別云你有拄杖子我與你拄杖子僧問如何是差別一著師云當斷不斷別云是差別一著僧無語旁僧云某甲斷得師曰作麼生斷別但目視之曰咦僧云適間肚饑喫飯如今甚飽師云亦未斷得別云你得恁麼無脊骨云和尚莫瞞人好又代答云更與你一萬箇未在雲棲大師舉高峯海底泥牛話問師師將旁僧推出乃云大衆證明雲棲大師示衆亡僧遷化向甚麼處去衆下語不契師云多謝和尚念一衆改容別云將謂和尚記得僧問如何是異類中行師曰輕打我輕打我一客云我會也我會也師云你作麼會客作驢鳴師休去彩雲端裏仙人現手把芙蓉扇遮面急須著眼看仙人莫看仙人手中扇喫芋次問客天是禪地是禪且道芋頭是禪不客拈起芋頭師曰未在客云師意如何師拈起芋頭劈面擲只合自打三拳擲人作麼麥浪靈虗侍次師召麥浪靈虗有吹毛偈汝批判看麥云借吹毛劒看靈以手作斫勢麥云是白鐵靈云我適才從橋上過打碎了箇鉢盂麥云好敗缺師曰且喜靈虗腳跟穩密其如麥浪氣宇如王同陶石簣無念師向火次石簣曰無念師在阿師得力句乞為舉似師曰向火背猶寒李次公居士問老師還辨得某甲麼師云你是箇無主孤魂石簣曰他是有主底師不答次公云老師安知某甲無主別云你兩箇都好一坑埋却師曰好箇有主底麥浪舉黃中丞訪少林和尚未下轎便問世尊生下一手指天一手指地雲門大師云若被老僧看見一棒打殺餧狗我今日要一棒打殺和尚和尚還作麼生少林無對代云老僧不是世尊中丞照顧性命若問和尚作麼生道師云待中丞腳跟點地却向他道別云你要做雲門那問古人道鴛鴦繡出從君看不把金針度與人三乘十二分教一千七百公案俱是鴛鴦如何是金針師拿起淨瓶云者箇是淨瓶云者箇亦是鴛鴦不是金針師云却被汝道著六禺問和尚未到此間大衆未集法會是何境界師曰門對陶公嶺曰如何是法身師曰背倚秦望山曰如何是法身向上事師曰開口道不得曰道了也師曰好狗不逐塊問世尊拈花是敗缺和尚上堂不惟拈槌豎拂抑且說長道短是敗缺不師曰被汝勘破曰如何得無敗闕師曰喫三頓飯曰猶是敗缺師曰喫飯又恁麼去也乃曰師僧家不解息心只管於自心起種種異見若是坐得斷底佛來也三十棒魔來也三十棒進云既云坐斷為甚麼用打師曰只為喚作佛喚作魔所以不得不打師至杭城文谷師等數員知識慧聞師等數員法師及縉紳護法各命侍者持柬迎師慧聞法師柬內云今日大衆欲與和尚作家相見和尚若來已墮情識和尚不來猶缺慈悲師閲畢即將衆簡一齊扯碎厲聲云者些客作漢敢於老僧處納敗缺耶師至即升堂正立慧云和尚莫要般門弄斧師與一掌云速道速道慧面赤無語師曰死漢文谷師遂率衆作禮同達觀大師月川和尚大司成陶石簣大中丞左心源內翰黃慎軒曾仲水朱友石玩月次慎軒問馬祖玩月因緣乞師一語師曰你睡我立不得為說慎軒亟起謝過代云睡底見立底二師咸云吾下語不如此人巡漕蘇雲浦問鴛鴦繡出從君看不把金針度與人如何是金針師曰我在京都走一遭未曾遇著一箇人蘇擬進語師曰金針失也僧問禮拜是問訊是師云隨汝顛倒別云你且出去僧便喝師曰成箇甚麼僧禮拜推府黃橋海問梵志與世尊論義梵志拂袖而去中途有省約云住住你道他省箇甚麼待伊擬議劈面便掌謂弟子曰我義兩處負墮是見若受負墮處粗是見不受負墮處細約住云道道擬議便掌如何是負墮處粗負墮處細驢年去師曰連我也不會但召橋海海應諾曰是甚麼義待擬議揮曰去莫負墮黃無語兩箇死漢推府李九嶷問何故衆中無一人發問師曰他們都是佛別云放老僧自在曰何謂也師曰問即落第二門僧問曰除却門風方便外別有為人處麼師曰我不如一切人別云老僧被你勘破曰何故不如師曰他無方便進士黃石思問如何是殺人刀豎起拳頭曰道道師曰布鼓當軒誰敢擊曰如何是活人劒豎起拳頭曰道道師曰雖然後學也堪為問教中云懺者懺其前愆悔者悔其後過且如中間事作麼生師曰只可自知熟睡饒讇語福城寺山門回祿僧問盡道金剛不壞身者四箇漢那裏去了擒住云阿誰恁麼道擬議痛與一掌師曰壞者不是金剛曰者箇聻師曰不可以色相見如來海眼問和尚到城中穿得幾箇髑髏劈面掌云穿得一箇師曰兩三箇海伸手索云將來與某甲看師曰從人索者不是好手僧問某甲二六時中不念佛不參禪不看教不斷妄想不取真如約云住住莫費力但饑來喫飯困來打眠任性自在可合道不驢年夢見師曰彼圓覺性非任有故說名為病曰如此則一切皆出四病不得如何修行師曰一切衆生皆證圓覺說得道理好問有情化無情佛性甚麼處去也師曰有情化無情曰佛性聻師云甚麼處去也進云有情化有情因甚麼會變化師曰有情化有情僧不契問乍會時有賓主否師曰賓主歷然問還分別否師曰兩眼對兩眼恁麼道猶是賓問圓眼為何壳兒恁麼大核兒恁麼小師曰位高者心必小別云取核兒來看問性宗與相宗是同是別師曰翻手覆手別云山僧無兩箇舌頭問睡快活講經快活師曰都快活別云都不快活因快活在內在外師云窮則獨善其身達則兼善天下別云苦苦曰不要把我們儒書用師云我是尋常語居士自作書會問性宗緊要處乞示一二師曰性宗無甚麼緊要處問周海門相會否師曰常會曰他是道學耶是禪宗耶師曰道學曰恁麼則不合也師云在天而天在人而人張翰林問世尊幾時升座未問已前師云居士甚處見世尊士擬議過去了也師曰處尚不知要問幾時抱朴蓮問香嚴上樹話未審和尚有何方便通箇消息師曰我定是無命底蓮曰是則是只是做性命不著不算好漢僧問殃崛持佛語往告女子因何便生下師曰何曾生下曰恁麼則在腹中好沒奈何師曰生下則不復更恁麼也師歎曰處世若探湯不如歸去好僧曰到甚麼處去師曰知得底是我同參僧問此身敗壞後向甚麼處安身立命師云問者等大事更禮三拜不與你說師云止止是甚麼處安身僧不解師咄之僧跪求示師云去佛也奈何你不得火頭問灰塵滿天何時得清淨去師曰且燒火麥浪指南侍次師召指南老僧四大不和汝能療之乎劈面一掌教伊和筋活血去南云蒼天蒼天師復問麥麥云譫語作麼師云不如者箇不識字底指南新婦子麥浪老婆禪湛老破棺材且擡放一邊雪庭參禮拜起便問和尚在此作麼師云殺人別云恭候撿點雪云有者等手段龍蛇易辨衲子難瞞師云五六年不見只道你鼻孔向上了元來猶作者般去就出去中毒也不知問虎生七子第幾箇無尾巴師曰祇者箇無尾巴復頌曰問答總無差如將扇子遮來人須覿面莫看扇中花別云七子且置虎聻待伊擬議劈面便掌僧問如何是一老豎起拳頭師云昔人猶在非昔人自是兒童認不真問如何一不老豎起拳頭師云除却幻身見端的不知誰是白頭翁問如何是親人不得度豎起拳頭師云一念生心成罣礙問如何是渠不度親人豎起拳頭師云全身放下孰為親問如何是不借別人家裏物豎起拳頭師云有語還成妄無言未是真擬欲求元旨直是眼中塵五箇拳頭一箇殺一箇活一箇縱一箇奪一箇全殺全活全縱全奪有人檢點得出破戒賞伊一頓拳頭檢點不出一頓拳頭破戒自喫問德雲常住妙高峯善財如何參不見師云對面不相識進云如何別峯又見師云舉意便知有僧問如何是空手把鉏頭師云有口不能道別云空手來與你道僧問如何是本分事師云穿衣喫飯別云不是闍黎應問僧問明知生死是不生之法為甚麼却被生死之所流轉師曰只是箇數珠湛老與麼答話亦未在曰某甲不會師云不會却好別云不會已被轉卻僧舉鶴林素因僧敲門素云是誰云是僧素云非但是僧佛來也不著今問和尚為甚麼不著師云當面被瞞又云我當時若在但云謝和尚慈悲師一日作痛苦聲云吾死即死矣奈何先師事無下落處衆中有體仁云此事已有麥浪在何出此言師云他於第二門頭即得麥浪云和尚失却了也師云我失者一頂禪衣耳此事如何失却麥云一之已甚師默然居士問父母未生前請師道一句師曰不可全靠老僧別云患聾麼問如何是直下見性師曰者問也不少曰不少箇甚麼師曰問我即不得麥浪問如何是善財參遍處黑豆未生芽師曰不答曰何故不答師曰答即芽生爛已爛了說甚芽生問如何是妙性圓明離諸名相師拈拄杖云者箇喚作甚麼曰拄杖子師曰又道離諸名相互相鈍置問智不到處作麼生宗師曰切忌道著曰拈槌豎拂言談語句都是智如何是不到處師曰此是甚麼人語我不記得汝試舉看曰此是智如何是不到處師曰汝缺伶俐何不審他來歷直饒審得也是鬼家活計良久曰汝更要問那僧擬舉口師推開入室問既是師子兒為甚却被狐貍咬師云被汝一問直得口塞別云闍黎莫瞌睡曰為甚如此師曰若是師子決不逐塊湛老只曉得師子不逐塊未識得狐貍咬人在我道學人是師子只因瞌睡師家是野狐卻解惺惺師開法雲門時麥浪在雲棲大衆以書招之麥即以白紙一幅封固如回書式上寫偈一首偈曰上覆雲門衆古錐陳年故紙漫躊躇假饒透過三千則猶有雲棲一紙書衆人不憤且不知所措偌大雲門無一僧可歎即以呈師師即拈來中扯一孔云大衆證明老僧透過去也衆如言寄去麥即至明翮問亙古亙今我信無有第二人為甚麼公案透不得師曰汝有甚麼公案透不得舉來看翮擬開口師曰去去汝不是好人問頻呼小玉原無事祇要檀郎認得聲如何是聲師曰者箇不是聲別云老僧不問僧問不落生滅時如何擒住云道道擬議即打出師曰不答曰豈無方便師曰方便即生滅也好箇問頭被湛老鈍置了也問木叉和尚道道得也叉下死道不得也叉下死當時若問和尚作麼生師曰者野狐精又云我定是沒有性命底僧問無夢無想如何是某甲主人師云你名甚麼僧云大化師曰你且去僧問馬師一喝百丈三日耳聾為復明大機明大用劈頭一棒問伊是大機是大用伊若擬答連棒打出師曰一般米麵曰意旨如何師曰由人造作湛老孤負此僧去也僧問某甲昨日洗浴得箇境界祇是說不出師指童子曰是伊也知得麼曰他也知得師曰若是知得決定不隨人所轉僧問離心意識參絶聖凡路學且如心意識作麼生離師曰將心識來我為汝離曰將不得來師曰既將不得來用離作麼葛藤不了明翮問某甲看箇放下拂子因緣驀面掌云錯只是教人休去歇去莫住化城是否師曰不是你看他古人問如何是法身豎起拂子如何是法身向上事放下拂子豈可作放下論耶若真正悟明放下不放下總是閒話所以道末後一著始到牢關絶後再蘇欺君不得葛藤遍地問如何是超然不借借師云我聽不清你再問看曰學人不肯在師云者是借僧喝師云猶是借僧又喝師云三喝四喝後作麼生僧拜云推散大衆去也師曰三十棒且待別時首座問未有之言請和尚道師曰寧可截舌不犯國諱僧問如何是大用師曰打殺千萬人不名性燥漢別云間言語麥浪問如何是無住本師舉起拂子麥云無住還有本麼師云汝適才問甚麼麥云無住本師云還有本麼麥禮拜大家草裏輥麥浪問如何是三界惟心萬法惟識師云汝年多少麥云與和尚同條生不同條死師云三界惟心萬法惟識師上堂舉無縫塔話下座後素源問麥浪如何是無縫塔麥與一掌復生問麥如何是無縫塔麥云明日來向汝道湛源問麥如何是無縫塔麥云問取和尚去三人入方丈舉前話師以三人初心者曲陳其事麥云他日有人罵老和尚扯葛藤在師云你若他日罵我我即今合掌禮拜師問麥浪在菴中作甚麼麥云種田師云何不來此隨衆麥云爭似種田博飯喫師云是何田地便作此說麥云和尚是何田地師云也不可草草麥云和尚也不可草草和尚若不草草如何便說某甲草草師休去老葛藤生嫩葛藤師舉婆子燒菴話擬問麥浪劈面掌云者臭老婆麥抱住師云正恁麼時如何師云他也恁麼你也恁麼不知弄到甚麼麥云他是恁麼我是那麼不知弄到甚麼別云是你恁麼纍我恁麼便與一掌師云也不得草草更與一掌麥作女人拜云和尚萬福老騷婆養小騷婆師觀水次麥浪問天人見為琉璃魚龍見為窟宅和尚見作甚麼師云水麥云恁麼落在人見中師云好聰明師一日入園捉菜蟲一握旁僧問云是甚麼口是禍門師以蟲擦殺曰者業障者業障劈面一掌救取蟲曰和尚為甚殺生自刎不殊抱石投井師云你償命你償命到者裏還有人救得者僧麼若救不得心圓代救去也聲未絶驀拈拄杖旋風打散新到從淮上來求開示師曰汝鎮江來麼曰是又云從蘇州過麼曰是師云開示已竟別云汝莫向者裏會問兩口一無舌意旨如何師曰與汝說破了也別云老僧現有舌爭解道曰求和尚再通方便師便打瑞白問大衆濟濟燈燭煌煌請和尚指示師云有眼皆見別云闍黎不唧𠺕進云恁麼則箇箇成佛去也師云你眼不瞎別云瞎又問萬竹林中事不問石傘峯頭意旨如何師默然瑞禮拜進云祇如萬竹林中又作麼生師云三莖四莖斜七莖八莖曲進云萬竹林中與石傘峯頭是同是別師云三莖四莖斜進云如何是向上事師云七莖八莖曲瑞拜起曰佛法已蒙師指示正偏不落有無機師曰不落正偏你作麼生道瑞便問訊歸位此曹洞下四賓主法門會得便作唱導師偶録一則備員而已破山呈解曰某甲得箇小休歇師云休歇事作麼生山曰師姑元是女人做師曰者箇且置祇如白鷺下田千點雪黃鸝上樹一枝花且道明甚麼邊事山曰滾湯不養魚別云某甲斫額有分師叱之問曹源汝病中作麼生源云我祇是病無作麼生師云我即不然曰和尚又如何別云要屙別處去師云祇看不病底見他不會便與下蠱曰蝦跳不出斗師云你要藥與你一貼大黃源云蒼天蒼天師云巴豆更好湛老此處卻有點衲僧氣息僧問如何是佛法大意師默然僧云老老大大說者箇話師云你見我說箇甚麼僧便出師云你却會逃走時衰鬼弄人
