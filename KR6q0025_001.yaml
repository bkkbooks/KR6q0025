body:
  text: 心圓居士拈別火蓮居士集梓六祖下第十七世明州天童應菴曇華禪師蘄州江氏子生而奇傑年十七於東禪去髮首依水南遂染指法味因遍歷諸老門牆至雲居禮圓悟悟一見痛與提䇿及入蜀指見彰教教移虎邱師侍行未半載頓明大事去謁此菴分座連雲開法妙嚴屢遷巨剎住歸宗日大慧在梅陽有僧傳師垂示語至慧見以偈寄贈曰坐斷金輪第一峯千妖百怪盡潛踪年來又得真消息報道楊岐正脈通其歸重如此後出住天童上堂九年面壁壞却東土兒孫隻履西歸鈍置黃面老子以拄杖畫一畫曰石牛攔古路一馬生三寅火蓮拈云今日初八息菴拈云乾荔枝上堂臨濟在黃檗處三度喫棒底意旨你諸人還覷得透也未直饒一咬便斷也未是大丈夫漢三世諸佛口挂壁上天下老和尚將甚麼喫飯口咬斷滴水難消一口咬斷不得飯喫畢竟如何咄上堂德章老瞎禿從來沒滋味拈得口失却鼻者邊住不得三更二點唱巴歌無端驚起梵王睡那邊不得住喝一喝曰我行荒草裏汝又入深村有句無句如藤倚樹文殊維摩撒手歸去楊岐恁麼舉也是看錮鏴更有後語不得錯舉心圓當時若見好與攔頭一喝一任諸方檢點心圓錯舉何故不因漁父引爭得見波濤上堂十五日已前水長船高十五日已後泥多佛大正當十五日東海鯉魚打一棒雨似盆傾直得三千大千世界一切衆生悉皆歡喜謂言打者一棒不妨應時應節諸公還見麼甚處不是一棒應時應節你才涉思惟早已棒折不應時應節了也報恩不覺通身踊躍遂作詩一首舉似大衆蜻蜓許是好蜻蜓飛來飛去不曾停被我捉來摘却兩邊翼恰似一枚大鐵釘三箇孩兒抱花鼓莫來攔我毬門路心圓與你一文錢街上買糕喫去上堂若作一句商量喫粥飯阿誰不會不作一句商量屎坑裏蟲子笑殺闍黎拈拄杖云拄杖子罪犯彌天貶向二鐵圍山且道薦福還有過也無卓拄杖曰遲一刻乃至溯曠大劫窮未來際覓薦福過終不可得且道利害在甚麼處上堂明不見暗暗不見明明暗雙忘無異流俗阿師野干鳴師子吼師子吼野干鳴三家村裏臭猢猻價增十倍驪龍頷下明月珠分文不值若作衲僧巴鼻甚處得來三十年後換手捶胸未是苦在唱教門中如似粟衲僧巴鼻惟證乃知上堂飯籮邊漆桶裏相唾饒你潑水相罵饒你接嘴黃河三千年一度清蟠桃五百年一次開華鶴勒那咬定牙關朱頂王呵呵大笑歸宗五十年前一則公案今日舉似諸人且道是甚麼公案王節級失却帖子細檢點看不在漆桶裏定在飯籮邊乃云休休一回檢點一回失舊事傷心總莫提上堂三十二相八十種好從朝至暮啾啾唧唧說黃道黑不知那裏是心圓到者裏總沒會處二時上堂喫粥喫飯不覺嚼破舌頭血濺梵天四天之下霈然有餘玉皇大帝怒發追東海龍王向金輪峯頂鞫勘頃刻之間追汝諸人作證見也且各請依實供通切忌回避儻若不實喪汝性命若向未追以前一款盡招當敕龍王銷案上堂趙州喫茶我也怕他若非債主便是冤家倚牆靠壁成羣隊不知誰解辨龍蛇直驍辨得也是冤家上堂五百力士揭石義萬仞崖頭撒手行十方世界一團鐵虗空背上白毛生直饒拈却炙脂帽子脫却鶻臭布衫向報恩門下正好喫棒何故半夜起來屈膝坐毛頭星現衲僧前生時坐不臥死後臥不坐一般臭骨頭何用作功課道得一半飲官酒臥官街當處死當處埋也只一半畢竟如何咦大大一箇毛頭星上堂三世諸佛眼裏無筋六代祖師皮下無血明果咬定牙關𨁝跳也出他圈䙡不得何故南泉斬貓兒更有一人皮眼也無諸佛祖師俱未夢見何故呢上堂參禪人切忌錯用心悟明見性是錯用心成佛作祖是錯用心看經講教是錯用心行住坐臥是錯用心喫粥喫飯是錯用心屙屎送尿是錯用心一動一靜一往一來是錯用心更有一處錯用心歸宗不敢與諸人說破何故一字入公門九牛拔不出不出拽不入縮頸伸腰千萬人箇箇穿山透石壁撞得頭也破額也裂兩扇大門依然如黑漆咄虎邱忌拈香平生無興撞著者無意智老和尚做盡伎倆湊泊不得從此卸却干戈隨分著衣喫飯二十年來坐曲彔木懸羊頭賣狗肉知他有甚憑據一語將祖佛心髓和盤託出了也雖然一年一度燒香日千古令人恨轉深師於室中能鍛鍊耆艾故世稱大慧與師居處為二甘露門嘗誡徒曰衲僧家著草鞋住院何啻如蚖蛇戀窟乎隆興改元六月十三日奄然而化塔全身於本山台州國清簡堂行機禪師本郡人姓楊氏風姿挺異才壓儒林年二十五棄妻孥學出世晚見此菴密有契證出應莞山刀耕火種單丁者一十七年嘗有偈云地爐無火客囊空雪似楊花落歲窮拾得斷麻穿壞衲不知身在寂寥中每謂人曰某猶未穩在豈以住山樂吾事邪一日偶看斫樹倒地忽然大悟平昔礙膺之物泮然冰釋未幾有江州圓通之命乃曰吾道將行即欣然曳杖而去登座說法云圓通不開生藥鋪單單只賣死貓頭不知那箇無思算喫著通身冷汗流死貓頭儘多蓋天蓋地塞破虗空無思算底却似星中揀月上堂單明自己樂是苦因趣向宗乘地獄劫住五日一參三八普說自揚家醜更若問理問事問心問性克由叵耐若是英靈漢窺藩不入據鼎不嘗便於未有生佛已前轉得身却於今時大官路上捷行闊步看他舉唱何等倜儻分明終不向老鼠窟草窠裏頭出頭沒若也根性陋劣要去有滋味處咬嚼遇著義學阿師遞相錮鏴直饒說得雲興雨現也是蝦蟇化龍下梢依舊喫泥喫土堪作甚麼示衆云衲僧拄杖子不用則已用則如鴆鳥落水魚鱉皆死正按傍提風颯颯地獨步大方殺活在我所以道千人排門不如一人拔關若一人拔關千人萬人得到安樂田地一擊萬重關鎖開也還知麼鴛鴦繡出從君看不把金針度與人心圓不如你幾番磨得金針鈍懶繡鴛鴦只為忙長沙府慧通清旦禪師蓬州嚴氏子上堂說佛說祖正如好肉剜瘡舉古舉今何異殘羹餿飯一聞便悟已落第二頭一舉便行早是不著便須知箇事如天普蓋似地普擎一毛頭上現乾坤師子游行不求伴侶十字街頭挨肩擦背壯士展臂不藉他力你與我過靸鞋來佛祖拈掇不起他在裏許掉臂游行衲僧願見無門不是不知祇是不會迷悟雙忘輸他貍奴白牯聖凡路絶何妨入地升天且道從上諸聖以何法示人又來囈語喝一喝曰莫妄想是是佛性忌日上堂三腳驢子弄蹄行步步相隨不相到永劫不到樹頭驚起雙雙魚拈來一老一不老萬劫不老為憐松竹引清風其奈出門便是草根深蒂固因喚檀郎識得渠大機大用都推倒推即不倒燒香勘證見根源糞掃堆頭拾得寶好柄鉏頭叢林浩浩漫商量勸君莫謗先師好掘坑埋了彰德府磁州大明詮禪師依仁山得旨賦性瀟灑今時還有麼好詼諧談笑諸方撐眉努目劒弩張弄蛇頭騎虎頸踢倒須彌掀翻龍藏千般作用萬種神通無異牛鬼蛇神倛頭阿旁誰知二千年前被飲光尊者一笑俱已領過仁山常囑定侍者拘檢之蛙不知海鳩不知鵬師曰人生一夢而已却來觀世間猶如夢中事千餘年來具隻眼者其䒢溪乎快樂一世是好夢全身放下獨脫無依拘檢一世是惡夢富貴妻孥名聞利養我寧作好夢耳不能不作之故徒單二駙馬赴南京任道過大明入堂見一僧面壁而坐駙馬曰好箇淡漢師曰今日被駙馬著鹽醬也如何是淡夢三十年不喫鹽醬者出來說看澧州靈巖仲安禪師謁圓悟語見前録上堂參禪不究淵源觸途盡為留礙所以守其靜默病在執守澄寂虗閒墮在毒海以弱勝強病在求勝自是非他立人我量見處偏枯遂致優劣不分才有所重便成魔見照不搆用用不離窠有一絲頭光不透脫此乃學處不元盡為流俗到者裏須知有殺中透脫活處藏機臨濟不是強為法如然故佛不可知祖莫能測知得測得便不到佛祖地位何故法如然故所以道有時先照後用且要共你商量和泥合水應機利物有時先用後照你須是箇漢始得未舉已會始較些子有時照用同時你又作麼生抵當瞞黧奴白牯不得有時照用不同時你又向甚麼處湊泊老僧自亦不會還知麼穿楊箭與驚人句不是臨時學得來少賣弄台州府萬年無著道間禪師本郡洪氏子上堂全機敵勝猶在半途啐同時白雲萬里才生朕兆已落二三不露鋒鋩成何道理且道從上來事合作麼生良久曰誣人之罪以罪加之從上來事三世諸佛緘口有分寧可截舌莫教壞人家男女者箇阿師稍可鎮江府焦山或菴師體禪師台州羅氏子初參此菴舉十方同聚會箇箇學無為此是選佛場菴遽震威一喝師大悟心空二字將欲出口迎機一喝桶底捷脫有以天封勉師出世者師搖手曰我不解懸羊賣狗也蓮云許他真正羊肉行家即遁去乾道初瞎堂住國清於稠人中得師請為第一座後出住焦山上堂道生一無角鐵牛眠少室一生二祖父開田說大義二生三梁間紫燕語呢喃三生萬物男兒活計離窠窟多處添少處減大蟲怕喫生人膽有若無實若虗爭掩驪龍明月珠是則是祇如焦山坐斷諸方一句作麼生道肚無偏僻病不怕冷油拍禪牀下座以上示語皆油韲也肚有偏僻病者切忌服之僧問如何是即心即佛師曰鼎州出獰爭神曰如何是非心非佛師曰閩蜀同風曰如何是不是心不是佛不是物師曰窮坑難滿問起滅不停時如何師曰謝供養別云燒問我有沒絃琴久居在曠野不是不會彈未遇知音者知音既遇未審如何品弄師曰鐘作鐘鳴鼓作鼓響別云自誣猶可莫誣老僧曰雲門放洞山三頓棒意旨如何師曰和身倒和身攂別云你有者許多氣力曰他道飯袋子江西湖南便恁麼去又作麼生師曰淚出痛腸別云老僧剛只喫得兩碗粥曰真金須是紅爐煅白玉還他好手磨師曰添一點也難為別云要用篩子米鋪裏有室中常舉苕帚柄問學者曰依稀苕帚柄髣佛赤斑蛇衆下語皆不契代云和尚只管弄弄斷狗筋巴待他打時却接住云好箇忤逆子動手打親爹有僧請益師示以頌曰依稀苕帚柄髣佛赤斑蛇棒下無生忍臨機不識爹杭州府淨慈濟顛道濟禪師出家靈隱性不羈嘗與市井浮沈喜打筋斗不著褌形媟露人姍笑自視夷然與明顛同時師為尤甚飲酒居常為寺僧唾罵笞逐走居淨慈為人誦經下火得酒食便赴有詩曰何須林景勝瀟湘只願西湖化為酒和身臥倒西湖邊一浪來時吞一口忽然拈起西湖直倒直傾時如何代云也只得一口時從市喜息人之諍救人之死戲謔笑談神出鬼沒人罕有能測之者年七十三而沒一日與明顛偶識於朱涇明目之曰咦濟顛乃贈以詩詩曰青箬笠前天地闊碧簑衣底水雲寬不言不語知何事只把人心不自瞞好箇不自瞞爭奈瞞人好參政錢端禮居士字處和號松窗從此菴發明己事凡宗門旨趣一一極之淳熙丙申簡堂歸住平田遂與往來丁酉秋微恙修書召堂及國清瑞巖主僧訣別堂與二禪詣榻次公起趺坐言笑移時即書曰浮世虗幻本無去來四大五蘊必歸終盡雖佛祖具大威德力亦不能免者一著天下老和尚一切善知識還有跳得過者無蓋為地水火風因緣和合暫時湊泊不可錯認為己有大丈夫磊磊落落當用處把定立處皆真順風使帆上下水皆可因齊慶贊去留自在此是上來諸聖開大解脫一路涅槃門本來清淨空寂境界無為之大道也今吾如是豈不快哉塵勞外緣一時掃盡荷諸山垂顧咸願證明伏惟珍重置筆顧簡堂曰某坐去好臥去好堂曰相公去便了理會甚麼坐臥公笑曰法兄當為祖道自愛遂斂目而逝杭州府徑山別峯寶印禪師嘉州李氏子世居峨嵋之麓幼通六經厭俗從德山清素得度具戒依密印於中峯一日印舉僧問巖頭起滅不停時如何巖喝曰是誰起滅師即豁然大悟會圓悟歸昭覺印遣師往省因隨衆入室悟問從上諸聖以何接人師豎拳悟曰此是老僧用底作麼生是從上諸聖用底師以拳揮之悟亦舉拳相交大笑而止後至徑山謁大慧慧問甚處來師曰西川慧曰未出劒門關與汝三十棒了也師曰不合起動和尚你看古人眼光落處都在未舉已前慧欣然掃室延之慧南遷師乃西還連主數剎後再出陝住保寧金山雪竇徑山開堂升座曰世尊初成正覺於鹿野苑中轉四諦法輪憍陳如比邱最初悟道真淨曰今日新豐洞裏祇轉箇拄杖子遂拈拄杖著左邊曰還有最初悟道者麼若無丈夫自有衝天志莫向如來行處行遂喝一喝下座若是印上座則不然今日向鳳凰山裏初無工夫轉四諦法輪亦無氣力轉拄杖子祇教諸人行須緩步語要低聲何故欲得不招無間業莫謗如來正法輪者箇阿師略知香臭寧波府東山全菴齊己禪師卬州謝氏子蓮社會上堂漸漸雞皮鶴髮父少兒子老看看行步躘踵疑殺木上座直饒金玉滿堂照顧白拈賊豈免衰殘老病正好著精彩任汝千般快樂渠儂合自由無常終是到來歸堂喫茶去唯有徑路修行依舊打之繞但念阿彌陀佛念得不濟事一手繫鈴一手解鈴妙手空空復曰噁者條活路已被善導和尚直截指出了也是你諸人朝夕在徑路中往來因甚麼當面蹉過你若向者裏薦得不致蹉過便可除迷倒障猶豫箭截疑惑網斷癡愛河伐心稠林浣心垢濁正心諂曲絶心生死然後轉入那邊擡起腳向佛祖踐履不到處進一步開却口向佛祖言詮不到處說一句喚回善導和尚別求徑路修行其或準前捨父逃走流落他鄉撞東磕西苦哉佛陀耶覺阿上人日本國滕氏子十四得度受具習大小乘有聲二十九屬商者自中都回言禪宗之盛阿奮然拉法弟金慶航海而來袖香謁靈隱海海問其來阿輒書而對復書曰我國無禪宗唯講五宗經論國主無姓氏號金輪王以嘉應改元捨位出家名行真年四十四王子七歲令受位度僧無退納而講義高者賜之某等仰服聖朝禪師之名特遠投誠願傳心印以渡迷津且如心佛及衆生是三無差別離相離言假言顯性禪師如何開示海曰衆生虗妄見見佛見世界阿書曰無明因何而有海便打問得迂𢌞打得直截阿即命海升座決疑明年秋辭游金陵抵長蘆江岸聞鼓聲忽大悟始知佛海垂手旨趣當時若鈍置一語豈有今日旋靈隱述五偈敘所見辭海東歸偈曰航海來探教外傳要離知見脫蹄筌諸方參遍草鞋破水在澄潭月在天掃盡葛藤與知見信手拈來全體現腦後圓光徹太虗千機萬機一時轉妙處如何說向人倒地便起自分明驀然踏著故鄉地倒裹幞頭孤路行求真滅妄元非妙即妄明真都是錯堪笑靈山老古錐當陽拋下破木杓豎拳下喝少賣弄說是說非入泥水截斷千差休指注一聲歸笛囉囉哩海稱善書偈贈行歸本國住睿山寺洎通嗣法書海已入寂矣知府葛郯居士字謙問號信齊少擢上第玩意禪悅首謁無菴全菴令究即心即佛既云即心即佛又令人究箇甚麼無菴老禿好與三十棒久無所契請曰師有何方便使某得入菴曰居士太無厭生別云你幾時出底待伊擬議劈面便掌已而佛海來居劒池公因從游乃舉無菴所示之語請為衆普說海發揮之曰即心即佛眉拖地非心非佛雙眼橫蝴蝶夢中家萬里子規枝上月三更留旬日而返一日於不是心不是佛不是物話豁然頓明頌曰非心非佛亦非物五鳳樓前山突兀豔陽影裏倒翻身野狐跳入金毛窟無菴肯之即遣書頌呈佛海海報曰此事非紙筆可盡居士能過我當有所聞矣遂復至虎邱海迎之曰居士見處止可入佛不能入魔何不道金毛跳入野狐窟公乃脫然葛老被者二禿幾番鈍置直饒向者裏會得也是鬼家活計使遇心圓一掌便了嘗問諸禪曰夫婦二人相打通兒子作證且道證父即是證母即是劈面掌云者不孝子不打更待何時或菴體著語曰小出大遇孝宗淳熙六年守臨川八年感疾一夕忽索筆書偈曰大洋海裏打鼓須彌山上聞鐘業鏡忽然撲破翻身透出虗空召僚屬示之曰生之與死如晝與夜無足怪者若以道論安得生死若作死生會則去道遠矣語畢端坐而化饒州府薦福退菴休禪師上堂風動邪幡動邪風鳴邪鈴鳴邪非風鈴鳴非風幡動此土與西天一隊黑漆桶誑惑世間人看看滅胡種山僧沒奈何有人會得沒奈何三字心圓許伊是箇朋友趁後也打鬨咦瓠子曲灣灣冬瓜直儱侗頌曰瓠子曲灣灣冬瓜直儱侗勇者不必仁仁者必有勇上堂結夏時左眼半斤別云嘴闊二分解夏時右眼八兩別云鼻長三尺謾云九十日安居贏得一肚皮妄想火杖頭急殺文殊米甕裏鱉殺普賢直饒七穴八穿未免山僧拄杖倘伊道飯是米做和尚還須將錯就錯雖然如是千金之弩不為鼷鼠而發機須還他木上座始得上堂先師尋常用腦後一鎚卸却學者胸中許多屈曲當年克賓維那曾中興化此毒往往天下叢林喚作超宗異目非惟孤負興化亦乃克賓受辱若是克肖兒孫終不依草附木資福喜見同參今日傾腸倒腹遂卓拄杖喝一喝曰還知先師落處麼伎死禪和如麻似粟先師落處有甚難知上堂言發非聲是箇甚麼色前不物莫亂針錐透過禹門風波更險咄才有一絲頭過重於山嶽廣信府龜峯晦菴慧光禪師建寧人上堂數日暑氣如焚一箇渾身無處安著思量得也是煩惱人者箇未是煩惱己躬下事不明更是煩惱所以達磨大師煩惱要為諸人吞却又被咽喉小默不得要為諸人吐却又被牙齒礙說不得取不得捨不得煩惱九年若不得二祖不惜性命既都不得如何承當得去果有不惜性命者定知落處往往轉身無路煩惱教死所謂祖禰不了殃及兒孫後來蓮華峯菴主到者裏煩惱不肯住南嶽思大到者裏煩惱不肯下山更有臨濟德山用盡自己查梨煩惱盂無柄絶好一篇沒奈何注腳此世尊菩提樹下靜坐思惟本旨也龜峯今日也是為他閒事長無明為你諸人從頭點破卓拄杖一下曰一人腦後露腮一人當門無齒更有數人鼻孔沒半邊不勞再勘你諸人休向者裏立地瞌睡殊不知家中飯籮鍋子一時失却了也你若不信但歸家檢點看欲觀其父但觀其子不忝為烏巨嗣揚州府儀真長蘆且菴守仁禪師越州上虞人依雪堂於烏巨聞普說曰今之兄弟做工夫正如習射先安其足後習其法後雖無心以久習故箭發皆中喝一喝曰只今箭發也看看師不覺倒身作避箭勢忽大悟須知古人悟處不在箭頭上上堂百千三昧無量妙門今日且菴不惜窮性命祇做一句子說與諸人乃卓拄杖下座盡大地無一人不知不勞更下注腳嘗頌臺山婆話曰開箇燈心皂角鋪日求升合度朝昏只因風雨連綿久本利一空愁倚門台州府萬佛心聞曇賁禪師永嘉人上堂一見便見八角磨盤空裏轉一句是知到底恰如病眼見空花一得永得辰錦朱砂如墨黑一句是行到底折合歸來炭裏坐秋風吹渭水已落雲門三句裏若道出得無有是處落葉滿長安幾箇而今不被瞞認奴作郎者千千萬豎拂子曰瞞得瞞不得一風都攝然後轉向那邊總在萬年手裏還會麼華頂月籠招手石斷橋水落捨身巖顯出元要今人失其旨矣住江心病起上堂維摩病說盡道理龍翔病咳嗽不已咳嗽不已說盡道理說盡道理咳嗽不已汝等諸人還識得其中意旨也未本是長江喫冷水却教露柱患頭風諸公要見露柱則易要見長江則難何故萬頃碧琉璃浸破雙瞳子僧問百丈卷席意旨如何師曰賊過後張弓者裏會得誰敢鈍置伊高麗國坦然國師少嗣王位欽慕宗乘因海商方景仁抵四明録無示語歸師閲之啓悟即棄位圓顱作書以語要及四威儀偈令景仁呈無示示答曰佛祖出興於世無一法與人實使其自信自悟自證自到具大知見如所見而說如所說而行山河大地草木叢林相與證明其來久矣後復通嗣法書其略曰生死海中矌劫難渡得遇本分宗師以三要印子驗定其法實謂盲龜值浮木孔耳九江府東林卍菴道顏禪師潼州鮮于氏子上堂一葉落天下秋一塵起大地收鳥窠吹布毛便有人悟去今時學者為甚麼却不識自己良久曰莫錯怪人好上堂諸人知處良遂總知良遂知處諸人不知作麼生是良遂知處乃曰鸕語鶴上堂仲冬嚴寒三界無安富者快樂貧者饑寒不識元旨錯認定盤何也牛頭安尾上北斗面南看上堂一滴滴水一滴滴凍天寒人寒風動幡動雲門扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾不出諸人十二時中尋常受用福州府西禪此菴守淨禪師上堂談元說妙撒屎撒尿行棒行喝將鹽止渴立主立賓華擘宗乘設或總不恁麼又是鬼窟裏坐到者裏山僧已是打退鼓且道諸人尋常心憤憤口悱悱合作麼生莫將閒學解埋沒祖師心上堂道是常道心是常心汝等諸人聞山僧恁麼道便道我會也大盡三十日小盡二十九頭上是天腳下是地耳裏聞聲鼻裏出氣此今日之通病也忽若四大海水在汝頭上毒蛇穿你眼睛蝦蟇入你鼻孔又作麼生上堂閉却口時時說截却舌無間歇無間歇最奇絶最奇絶眼中屑既是奇絶為甚麼却成眼中屑了了了時無可了元元元處亦須呵有問貍奴白牯燈籠露柱還被呵也無但向伊道近來法令稍嚴不許攙奪行市上堂佛祖頂𩕳上有潑天大路未透生死關如何敢進步不進步大千沒遮護一句絶言詮那吒擎鐵柱問不施寸刃請師相見師曰逢強即弱曰何得埋兵擢鬭師曰祇為闍黎寸刃不施曰未審向上還有事也無師曰有曰如何是向上事師曰敗將不斬者僧有頭無尾處州府連雲道能禪師僧問鏡清六刮意旨如何師曰穿却你鼻孔曰學人有鼻孔即穿無鼻孔又穿箇甚麼師曰抱贓呌屈曰如何是就毛刮塵師曰筠袁虔吉頭上插筆曰如何是就皮刮毛師曰石城虔化說話廝罵曰如何是就肉刮皮師曰嘉眉果閬懷裏有狀曰如何是就骨刮肉師曰漳泉福建頭匾如扇曰如何是就髓刮骨師曰洋瀾左蠡無風浪起曰髓又如何刮師曰十八十九癡人夜走曰六刮已蒙師指示一言直截意如何師曰結舌有分且道此老東刮西刮畢竟刮著也無今日有問但云者裏不消一刮若問如何是一刮答云伸手縮手都打殺如何是不消答云箇箇猢猢會著襪杭州府靈隱最菴道印禪師漢州人上堂大雄山下虎南山鱉鼻蛇等閒撞著抱賞歸家若也不惜好手便與拔出重牙有麼有麼中秋上堂舉馬大師與西堂百丈南泉玩月話師曰馬祖垂絲千尺意在深潭西堂振𩮻百丈擺尾雖則衝波激浪未免上他鉤線南泉自謂躍過禹門誰知依前落在巨網即今莫有絶羅籠出窠臼底麼也好出來露箇消息貴知華藏門下不致寂寥其或未然此夜一輪滿清光何處無出來露箇消息道絶人荒其或未然門庭熱閙建寧府竹原宗元菴主本郡連氏子示衆若究此事如失却鎖匙相似祇管尋來尋去忽然撞著噁在者裏開箇鎖子便見自家庫藏一切受用無不具足不假外求別有甚麼事示衆諸方為人抽釘拔楔解黏去縛我者裏為人添釘著楔加繩加縛了送向深潭裏待他自去理會且道是抽語是添著語若道是添著語孤負竹原若道是抽語孤負自己要得不孤負麼問取張家打油匠去示衆主法之人氣吞宇宙為大法王若是釋迦老子達磨大師出來也教伊叉手向我背後立地直得寒毛卓豎亦未為分外垂語曰者一些子恰如撞著殺人漢相似你若不殺他他便殺了你無回避處設有問狹路相逢時如何向伊道甚處得相逢溫州府淨居尼妙道禪師延平尚書黃裳之女上堂問答罷乃曰問話且止直饒有傾湫之辨倒嶽之機衲僧門下一點用不著且佛未出世時一事全無我祖西來便有許多建立至今纍及兒孫山僧於人天衆前無風起浪語默該不盡底彌亘大方言詮說不及處遍周沙界通身是眼覿面當機電卷星馳如何湊泊你看他女子有如此丈夫氣概有時一喝生殺全威有時一喝佛祖莫辨有時一喝八面受敵有時一喝自救不了遂喝一喝曰且道者一喝是生殺全威邪是佛祖莫辨邪是八面受敵邪是自救不了邪若向者裏辨別得堪報不報之恩脫或未然山僧無夢說夢去也拈起拂子曰還見麼若見被見刺所障擊禪牀曰還聞麼若聞被聲塵所惑直饒離見絶聞正是二乘小果跳出一步蓋色騎聲全放全收主賓互換所以道欲知佛性義當觀時節因緣敢問諸人即今是甚麼時節蕩蕩仁風扶聖化熙熙和氣助升平擲拂子下座問如何是佛師曰非佛曰如何是佛法大意師曰骨底骨董問言無展事語不投機時如何師曰未屙已前墮坑落塹蘇州府資壽尼無著妙總禪師丞相蘇頌孫女也悟緣見前録上堂宗乘一唱三藏絶詮祖令當行十方坐斷二乘聞之怖走十地到此猶疑若是俊流未言而喻設使用移星換斗底手段施攙旗奪鼓底機關猶是空拳豈有實義向上一路千聖不傳學者勞形如猿捉影靈山付囑俯徇時機演唱三乘各隨根器山僧今日與此界他方乃佛乃祖山河大地草木叢林現前四衆各轉大法輪交光相羅如寶絲網若一草一木不轉法輪則不得名為轉大法輪所以道於一毫端現寶王剎坐微塵裏轉大法輪乘時於其中間作無量無邊廣大佛事周遍法界一為無量無量為一小中現大大中現小不動步游彌勒樓閣不返聞入觀音普門情與無情性相平等不是神通妙用亦非法爾如然於此倜儻分明作麼生是倜儻分明還著得語麼皇恩佛恩一時報足且道如何是報恩一句天高羣象正海闊百川朝上堂舉雲門示衆十五日已前則不問十五日已後道將一句來自代云日日是好日師曰日日是好日佛法世法盡周畢不須特地覓幽元祇管鉢盂兩度濕日日是好日佛法世法都不涉東家老兒腳底彎西家阿婆背心凸問如何是奪人不奪境師曰野花開滿路遍地是清香曰如何是奪境不奪人師曰茫茫宇宙人無數幾箇男兒是丈夫有得他嘲笑曰如何是人境俱不奪師曰處處緑楊堪繫馬家家門首透長安曰如何是人境兩俱奪師曰雪覆蘆花舟橫斷岸曰人境已蒙師指示向上宗乘事若何師便打長沙府大溈山法寶禪師福州人上堂千般言萬種喻祇要教君早回去夜來一片黑雲生莫教錯却山前路咄上堂喚作竹篦則觸不喚作竹篦則背直須師子咬人莫學韓獹逐塊呵呵呵會不會金剛腳下鐵崑崙捉得明州憨布袋鐵崑崙憨布袋引得兒童眼搭癡正好團團去逐塊德安府隨州大洪老訥祖證禪師上堂萬象之中獨露身如何說箇獨露底道理豎拂子曰到江吳地盡師家米盡柴無隔岸越山多學人自做活計僧問雲門問僧光明寂照遍河沙豈不是張拙秀才語僧云是一釣便上門曰話墮也未審那裏是者僧話墮處師曰鮎魚上竹竿別云老僧也尋不著問離却言句請師直指師豎拂子僧曰還有向上事也無師曰有別云老僧不向你道無曰如何是向上事者蠢材師曰速禮三拜權當三十棒寧波府天童長翁如淨禪師生而岐嶷不類常童長學出世法參足菴於雪竇菴令看庭前柏樹子話有省呈頌曰西來祖意庭前柏鼻孔寥寥對眼睛落地枯枝才𨁝跳松蘿亮槅笑掀騰菴頷之後出世屢遷名剎住淨慈時奉敕升天童捧敕黃示衆曰雲開九天呈起曰看彩鳳銜出且道如何委悉急急如律令敕開爐上堂召衆打圓相曰箇是天童火爐近前則燒殺退後則凍殺忽有箇漢出來道合作麼生㘞火爐動也上堂霜風號肅殺木葉墮蕭𮨱舉拂子曰看惟有玲瓏巖崔嵬望轉高所謂天童滯貨今朝短販一遭莫有酬價底麼下座巡堂上堂外不放入內不放出痛下一槌萬事了畢且道如何太白峰前令斬新內外紀綱俱委悉謝新舊兩班上堂開無間地獄現閻羅大王聚夜叉一部列牛頭兩行與其進者劒樹上猛火進用與其退者刀山裏寒冰退藏且道理會甚事叵耐飯飽弄筯判斷矢急尿牀其或未然花柳春風入戲場上堂天童鐵臭老拳頭打殺江湖水牯牛夜深忽然生箇卵天明推出大日頭且道如何曬㫰諸人蒸濕處免教行步滑如油完橋上堂去那邊去來者裏來中間絶壑斷崖且道如何相委以拂子作彎橋勢曰看依稀金磴闊倣佛彩虹彎人從橋上過又作麼生松蘿影裏開天巧翰墨光中入畫看上堂靈雲見處桃花開天童見處桃花落桃花開春風催桃花落春風惡靈雲且置莫有與天童相見者麼春風惡桃花躍浪生頭角新起妙嚴閣慶懺升座推倒多年老鼠窠掃空平地笑呵呵稜𡾓榱桷揑雲表萬億斯年蓋覆多大衆見麼今朝成就大緣千古發揮大事且道如何卓拄杖曰斫額任他門外客到家還我箇中人復舉文殊問無著近離甚處曰南方殊曰南方佛法如何主持曰末法比邱少奉戒律殊曰多少衆曰或三百或五百師曰春風鉤引鷓鴣啼曰此間佛法如何主持殊曰凡聖同居龍蛇混雜曰多少衆殊曰前三三後三三師曰平地沒瀾駕鐵船天童者兩轉語僅與諸方眉毛撕結更有兩轉語要為諸方點眼或三百或五百銅錢鐵錢省數足陌前三三後三三蘿蔔芋艿淺𫎓滿擔諸方忽然眼開決定拍手大笑且道笑箇甚麼不笑巴叉便笑杜撰雖然笑者還稀或有人問天童多少衆便向道新起妙嚴誇第一團圞都在畫圖中上堂陸修靜陶淵明文殊普賢作圓相曰咦一款具呈且道憑誰批判若是孔夫子吾無隱乎爾舉世尊初生公案頌曰無憂樹下浴嬰孩清曉薔薇帶露開轉過衲僧相見處後槽驢馬出胞胎舉初祖對武帝不識話頌曰金烏飛上玉欄干黑漆崑崙對面看畢竟者些傳不得落花流水太無端舉楊岐栗棘蓬金剛圈話頌曰肘後驀生閒落索風前忽布閙叉撐那吒八臂空惆悵夜半三更白晝行師六坐道場兩奉天旨法道之盛可想見也示寂說偈曰六十六年罪犯彌天打箇𨁝跳活陷黃泉塔全身於本山六祖下第十八世慶元天童密菴咸傑禪師閩之福州人幼頴悟出家後究心禪理遍參知識後謁應菴華和尚於衢之明果華孤硬難入屢遭訶叱一日華問如何是正法眼師遽答曰破沙盆華頷之待問如何是正法眼劈面一掌猶較些子不合置箇隱身符弄得後代兒孫箇箇在破砂盆上作活計人貧智短笑殺旁觀咦上堂牛頭橫說豎說不知有向上關棙子有般漆桶輩東西不辨南北不分便問如何是向上關棙子何異開眼尿牀華藏有一轉語待云有一轉語劈胸擒住云速道速道管教者野狐精立地現形不在向上向下千手大悲摸索不著雨寒何處曬㫰今日普請布施大衆良久曰達磨大師無當門齒押韻而已不足言詩上堂卓拄杖曰迷時祇迷者箇復卓拄杖云悟時祇悟者箇別云迷時秖者箇迷悟時秖者箇悟會麼又別云迷時不是者箇悟時不是者箇會麼直饒迷悟雙忘糞掃堆頭重添擸𢶍莫有東涌西沒全機獨脫處道得一句麼若道不得華藏自道去也拈云和尚何不道擲拄杖曰三十年後三十年後鬼爭漆桶上堂世尊不說說拗曲作直拗直作曲迦葉不聞聞望空啓告塞破耳門馬祖即心即佛懸羊頭賣狗肉更與貼稱趙州勘菴主貴買賤賣分文不值不許酬價祇如文殊是七佛之師因甚出女子定不得河天月暈魚分子槲葉風高鹿養茸適才世尊迦葉馬祖趙州已道過了也解夏上堂僧問如何是正法眼師云草鞋無𦄍進云只如和尚道破沙盆又作麼生師云老僧不曾動著舌頭進云此語已遍天下師云杓卜聽虗聲如如顏丙居士頌子湖狗話曰貧家無所有難得到此田地只養一隻狗天然利害便是佛出家其餘是甚麼茄子瓠子也須遭一口便是狗出來也須遭一口何故不見道破布袋裏盛錐子不出頭是好手寧波府天童海門師齊禪師每晨起童行捧香盒隨師各殿堂逐一行香畢還方丈望佛作回向語曰上來持誦大方廣佛華嚴經一部回向真如云云日以為常而舉寺未嘗信師乃謂衆曰華嚴經有八十一卷汝以八十一人各執一卷聽老僧一口同時誦出八十一人各聞所誦與手中一字不謬乃知為華嚴大菩薩也與笨人說法不妨笨做福州府乾元鈍菴宗頴禪師上堂卓拄杖曰性燥漢祇在一槌須知一槌便就不是性燥漢靠拄杖曰伶俐人不勞再舉已是千舉萬舉而今莫有伶俐底麼出來也是鈍漢不出來也是鈍漢諸公到此合作麼生參良久曰比擬張麟兔亦不遇和尚網小莫怪莫怪荊州公安遁菴祖珠禪師南平人也上堂不是心不是佛不是物瀝盡野狐涎躍翻山鬼窟平田淺草裏露出焦尾大蟲太虗寥廓中放出遼天俊鶻阿呵呵露風骨等閒拈出衆人前分明是何物咄咄拈不出奈何臨安北澗敬叟居簡禪師上堂識得一萬事畢了事衲僧一字不識直饒恁麼未稱全提禹力不到處河聲流向西六祖下第十九世夔州臥龍破菴祖先禪師蜀之廣安王氏子聞緣老宿住照覺往參扣語契令奉圓悟香火一日從方丈前過緣問菴頭有人麼師云無人語未竟緣劈胸與一拳云你聻師忽有省出峽依澧州德山涓公祝髮受具遍叩諸方值雪夜坐自念行腳數年未得悟徹正悶悶間忽見鐘動趨後架舉首見照堂二字疑情頓釋即見水菴一於雙林水曰師子尊者被罽賓斬却頭且置你道西天胡子為甚麼無鬚師曰非雙林不舉此話水曰作家禪客師曰心不負人面無慚色水遂以手拓開師曰勘破了也逮水菴謝事往參密菴傑和尚傑命師典客一日傑對旁僧舉不是風動不是幡動語師聞豁然大悟次日傑過寮前謂師曰總不得作伎倆試露箇消息來師應聲曰方丈裏有客傑呵呵大笑傑遷蔣山師侍行親炙凡五載盡得旨要辭還蜀傑送以偈曰萬里南來川䖃苴奔流度刃叩元關頂門戳瞎金剛眼去住還同珠走盤上堂密菴先師道有問冬來事京師出大黃貪他一粒米失却半年糧秀峯則不然有問冬來事京師出大黃只圖一糧米却得百年糧阿翁壁立千仞乃子和泥合水唱教門中放過一著若是本色鉗鎚須還我大黃來始得上堂舉東山道如何是禪閻浮樹在海南邊近則不離方寸遠則十萬八千畢竟如何禪禪師曰穹窿也有道處如何是禪閻浮樹在海南邊撐天拄地拄地撐天巧說不得只要心傳畢竟如何禪禪兩箇老漢口門窄何不問心圓上堂不是心不是佛不是物山僧忍俊不禁為諸人作箇撇脫何不用拄杖旋風打散更要鈍置在拈拄杖卓一下曰流水暗銷溪畔石勸人除却是非難師將示寂作書別交遊復書偈曰末後一句已成叨呾寫出人前千錯萬錯端坐而逝杭州府靈隱松源禪師名崇嶽龍泉吳氏子見大慧杲於徑山慧升堂稱蔣山應菴為人徑捷師聞之不待旦而行既至入室未契退愈自奮厲朝夕咨請應菴問世尊有密語迦葉不覆藏汝作麼生會師云鈍置和尚應菴厲聲一喝師有省應菴大喜以為法器說偈勸使祝髮自是遍參諸大老罕當其意者乃入閩見乾元木菴永公永舉有句無句如藤倚樹師云裂破永云琅琊道好一堆爛柴聻師曰矢上加尖永曰吾兄下語老僧不能過其如未在他日拂柄在手為人不得驗人不得師曰為人者使博地凡夫一超入聖域固難矣驗人者打向面前過不待開口已知渠骨髓何難之有永舉手曰明明向汝道開口不在舌頭上後當自知明年見密菴於衢之西山隨問即答密菴微笑而已師切於究竟至忘寢食一日密菴挂牌為衆入室次問僧不是心不是佛不是物師侍側豁然大悟乃曰今日方會木菴和尚道開口不在舌頭上上堂大凡扶豎宗乘須具頂門正眼懸肘后靈符舉保壽開堂三聖推僧公案乃云二尊宿等閒一挨一拶發明臨濟心髓殊不知性命總在者僧手裏還有撿點得出者麼昔年覓火和煙得今日擔泉帶月歸諺云賭場上沒閒人者僧本是箇看戲小矮及被推出恰又似撞露柱瞎漢不打何待示衆舉臨濟如蒿枝拂公案雪竇拈曰臨濟放處太危收來太速師拈拄杖曰臨濟據令而行不知孤負黃檗雪竇盡力擔荷也只見得一邊且道薦福節文在甚麼處擲下拄杖擲下拄杖便許你畢竟節文在甚麼處夢也夢不見上堂舉保寧勇上堂大方無外大圓無內無內無外聖凡普會瓦礫生光須彌粉碎無量法門百千三昧拈拄杖曰總向者裏會去蘇盧蘇盧悉利悉利師曰大小保寧業識茫茫不奈船何打破戽斗衲僧箇箇口拄壁心圓拍掌笑呵呵且道笑箇甚麼破戒破戒示衆古者道拈起也天回地轉放下也草偃風行冶父則不然拈起也乾坤黯黑放下也瓦礫生光忽有一箇半箇驀然戳瞎頂門眼達磨一宗未至寂寥示衆明眼衲僧因甚打失鼻孔有賊無贓辭世日示衆久參兄弟正路行者有只不能用黑豆法難以荷負正宗臨濟佛法到此平沈痛哉痛哉復書偈曰來無所來去無所去瞥轉元關佛祖罔措跏趺而寂太平隱靜致柔禪師上堂飢荒老鼠咬葫蘆巧計猢猻倒上樹要透報恩向上關直須一步低一步既是向上關因甚却要一步低一步待你踏著却向你道踏著時自然有人向你道臨安徑山藏叟善珍禪師泉州南菴呂氏子也據室顧衆云者裏是你立地底所在麼你自鈍置猶可莫來鈍置老僧上堂春雪寒春宵短古佛心破燈盞正法眼乾紙撚抖擻精神只管看看到北斗西移南斗東轉上元依舊正月半示衆云古者道知之一字衆妙之門又有道知之一字衆禍之門只者二門入得更須出得三世諸佛出不得六代祖師出不得天下老和尚出不得何故變鐵成金易變金成鐵難別云牛頭覓角易龜背刮毛難自題其像曰參禪無悟識字有數眼三角似燕山愁胡面百摺如趙婆呷酢一著高出諸方敢道飯是米做若如此道未見高出諸方若要高出諸方飯不道是米做恁麼道也未高出諸方若要高出諸方良久云駝子伸腰總未見得吉安龍濟友雲宗鍪禪師廬陵王氏子歲暮僧問臘月三十日到來時如何師曰門無索債人會麼從來不缺他臨安淨慈偃溪廣聞禪師侯官林氏子十八得度受具參浙翁於天童針芥雖投自知未穩及再參於雙徑翁笑而問曰汝來耶一夕坐簷間聞更三轉入堂曳履而蹶忽省翌朝造室翁舉趙州是盂話師將啓吻翁遽以拳止之疑情當下冰釋如此容易為甚麼特地艱難去會麼不因霜雪盡容易坐春風上堂雲門放洞山三頓棒嚼飯餧嬰兒黃檗打臨濟三頓棒按牛頭喫草只今不犯絲毫有箇方便良久曰大事為你不得小事自家擔當真善知識上堂趙州喫茶去金牛喫飯來龍門多上客有人續得末後句許你入阿字法門拈云續末後句易入阿字法門却難蘇州府虎邱東山道源禪師題蜆子像曰紙錢堆裏可憐生臭口才開便葛藤蕩盡鬼家窮活計至今古廟絶人行待問西來意劈面便掌猶較些子引得華嚴者廝更道甚麼同根生真好一坑埋却饒州薦福無文燦禪師上堂雲門放洞山三頓棒黃檗打臨濟三頓棒減竈添兵傷鹽費醬一不成單二不成兩多少蘆花對蓼紅時人只看絲綸上妙語可參上堂百不知百不會饑喫飯暖打睡要得尅期取證須證如是三昧大難大難吾捨從寬禪師臨終謂其次兄曰佛祖父母我今一箭射殺二哥以為何如隨整襟坐脫焉慈悲之故有落草之談長沙府石霜竹巖妙印禪師謁月林林問如何是祖師西來意師曰老鼠咬破燈盞林頷之對月看經偈曰未動舌頭文彩露更進前一步五千餘卷一時周再多著些子若言待月重開卷開卷亦不惡敢保驢年未徹頭徹頭作甚麼六祖下第二十世臨安徑山無準師範禪師梓潼雍氏子九歲出家長遊成都坐夏請益坐禪之法於老宿堯首座座曰禪是何物坐底是誰師晝夜體究一日如廁提前話有省明年往謁佛照光於育王光問曰何處人師曰劒州光曰帶得劒來麼師隨聲便喝光笑曰者烏頭子也亂做貧甚無資剃髮人皆以烏頭子呼之久之復至靈隱時破菴居第一座同遊石筍菴菴之道者請益曰胡孫子捉不住願垂開示光曰用捉他作甚麼如風吹水自然成紋師聞之大悟待云胡孫子捉不住攔頭便喝猶較些子上堂靈山指月曹溪話月遞代相傳證龜成鱉範上座尋常一張口掛在壁上今日無端入者行戶未免拈出多年歷日說似諸人且要郭大李二鄧四張三知得江南兩浙春寒秋熱和尚恁麼道大似憂鱉無裙愁龜少壳靈山曹溪的旨如是然正眼觀來依舊證龜成鱉淳祐戊申秋師築室明月池上榜曰退耕乞老於朝而舊病適作三月旦日升堂示衆曰山僧既老且病無力得與諸人東語西語令日勉強出來將從前所說不到底盡情向諸人面前抖擻去也遂起身抖衣曰是多少三面貍奴腳踏月兩頭白牯手拏烟薦薦便歸方丈十五日集兩序區畫後事親書遺表言笑如平時其徒以遺偈為請乃執筆疾書曰來時空索索去也赤條條更要問端的天台有石橋移頃而逝臨安徑山元叟行端禪師臨海何氏子世業儒母陳氏師生而秀拔幼不茹葷十二出家十八受具一切文字不由師授初參藏叟珍於徑山珍問甚處人師曰台州珍便喝師展坐具珍又喝師收坐具珍曰放汝三十棒參堂去師於言下豁然頓悟可惜元叟少一轉語一日侍立次珍曰吾泉南無僧師曰和尚聻那箇是和尚莫錯會好珍便棒師接住曰莫道無僧好和尚來也珍頷之命入侍司洎珍告寂乃至淨慈嘗自稱寒拾里人見雪巖欽於仰山欽問何處來師曰兩浙欽曰因甚語音不同師曰合取臭口欽曰獺徑橋高集雲峯峻未識闍黎在師拍手曰鴨吞螺螄眼睛突出欽笑顧侍者點好茶茶師曰也不消得欽寂乃還浙徑山請居第一座僧問如何是正法眼師曰十字街頭石敢當曰只者便是麼師曰月似彎弓少雨多風師嘗勘一新到曰何方聖者甚處靈祇僧曰臨朕砧師曰杜撰禪和如麻似粟參堂去心圓不避口業說破三世諸佛歷代祖師古今善知識無有一箇不杜撰者諸公要見不杜撰底麼試伸手腳跟下摸一摸看摸得著時早又杜撰了也又勘一僧曰劈開華嶽連天秀放出黃河徹底清即且置平實地上道將一句來你看杜撰僧擬開口師便打鉤子鉤得你沒腳跑錐子錐得你沒處藏莫道鈍置漢翻不得身便是唧漢也出不得門所以道佛法如狼毒砒霜不是別人與你都是你自己無始劫來帶得底遇緣即發奉勸諸公盡情放下絲毫不盡明朝後日大有事在問僧棋盤石斫破你腦門盂池浸爛你腳板僧擬答師便喝擬答則者僧多了一句不擬答時元叟又多了一句敢問諸仁作麼生得恰好去若不會心圓為你說破元叟已是騎虎頭收虎尾了也第一句在甚麼處師以訶叱怒罵為慈誘之誨利他之事皆陰為之沒齒不言上堂邊戍朝鳴角空山夜答鐘人人皆共聽何處不圓通說時便不圓通不說時圓通在甚麼處離心意識參示微疾問侍者曰呼之曾已休吸之尚未捨寄語諸苦源來者不來者如何是來者不來者侍無語死漢師曰後五日看劈面便掌說甚麼後五日看至期沐浴更衣書偈示衆曰本無生滅焉有去來冰河發𦦨鐵樹花開投筆垂一足而化留龕七日顏色如生明州奉化嶽林栯堂益禪師上堂五千四十八卷只作一句道却牙根猶帶生澀在遂起身曰立地待諸人搆取下座狼藉潑撒一場特地杭州府放牛余居士參無門凡有問門皆劈面截曰不是不是及見臭菴問曰吾師何所見敢對人天顛倒是非耶菴曰我在無門處無法可得無道可傳只得兩箇字士曰是甚兩字菴曰不是不是士大悟雲門一棒臨濟一掌馬祖一喝巖頭一噓六祖知非龐公好殺子湖狗楊岐驢雪峯毬鼓山劒石鞏箭祕魔叉上來一隊老古錐未夢見兩箇字在忽有箇伶俐衲僧出來問趙州勘破臺山婆子時又如何心圓即與攔腮一掌劈面一唾罵道你者不知香臭漢溫州府華藏瞎驢無見禪師舉興化打克賓話頌曰興化打克賓言親語亦親克賓自待不薄興化成人之美棒頭如雨點敲出玉麒麟諸公還知棒頭落處麼直饒知得倜儻分明未許你是玉麒麟在順天府大慶壽寺中和璋禪師室中示徒或握木劒或執錦蛇海雲簡參入門便問某甲不來而來師作麼生相見師曰參須實參悟須實悟莫打野榸簡曰某甲因擊石火光迸散乃知眉橫鼻直師曰吾此處別曰如何表信師曰吾牙是一口骨耳乃兩片皮別攔頭與一棒曰將謂別有師曰錯簡喝曰草賊大敗果然師便休次日師舉臨濟兩堂首座齊下喝至賓主歷然話問簡如何會簡曰打破秦時鏡磨尖上古錐龍飛霄漢外何必更針錐若在今時師家學人便道賓則始終賓主則始終主矣古人入處不亷纖如此師曰汝只得其機不得其用若在尋常師家非稱善則頷之矣簡便掀倒禪牀師曰途路之樂終未到家簡與一掌曰精靈千載野狐窟看破如今不值錢師打一拂曰汝只得其用不得其體簡進前曰青山聳寒色月照一溪春師曰汝只得其體不得其智簡曰流水自東西落花無向背師曰汝雖善語言三昧要且沒交涉師亦弓箭折盡徒亦弓箭折盡爭奈有一人不肯可謂為衆竭力禍出私門簡豎拳拍一拍直得丈室震動師曰如是如是簡拂袖便出可謂證驗到十成無滲漏矣然子細檢點仍是十成滲漏明眼宗師如何為人參杭州府護國臭菴宗禪師上堂舉豐干謂寒山拾得曰你與我去遊五臺便是我同流山曰你去遊五臺作麼干曰禮拜文殊山曰你不是我同流師曰豐干開口不在舌頭上寒山同坑無異土檢點將來兩箇駝子廝撞著世上由來無直人兩箇駝子胸貼胸從來背背不相見上堂舉嶽林振示衆布袋口開還有買底麼僧曰有林曰不作賤不作貴你作麼生買僧無語火蓮代云不買者箇破草鞋拂袖便行息菴代云疾與一掌懶儂代云了歇齊代云咦拙菴代云貓湄菴代云㘞覺非代云屈某甲林曰老僧失利別云且喜不折本師曰嶽林設箇問端也甚奇特及至被人道箇有字直得東遮西掩囊藏不迭護國今日布袋口開還有買底麼良久曰闌干雖共倚山色不同觀別云同坑無異土
