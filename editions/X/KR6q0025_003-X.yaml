body:
  text: 心圓居士拈別火蓮居士集梓六祖下第二十五世蘇州府鄧尉萬峯時蔚禪師溫州樂清金氏子參虎跑止巖巖令參不是心不是佛不是物話抵明州達蓬山佛趾寺側卓菴晝夜力參一日聞寺主舉溈山踢倒淨瓶話驀地觸發說偈曰顛顛倒倒老南泉累我工夫費半年當日有人親在側如何不進劈胸拳遂往謁無見於華頂見囑師住山仍返達蓬單丁十載後造千巖巖曰將甚麼來與老僧相見師豎起拳曰者裏與和尚相見巖曰死了燒了向何處安身立命師曰漚生漚滅水還在風息波平月印潭念言語漢巖曰莫要請益受戒麼師掩耳而出明日普請砍松次師拈圓石作獻珠狀放下了我與你商量曰請和尚酬價巖曰不值半文錢師曰瞎巖曰我也瞎你也瞎師曰瞎瞎即呈偈曰龍宮女子將珠獻價值三千與大千却被傍觀人抉破誰知不值半文錢巖謂左右曰蔚山主頗有衲僧氣息遂命居第一座一日巖陞座舉無風荷葉動決定有魚行語師出眾震聲一喝拂袖便出乃卓菴於蘭溪之嵩山凡九載巖寄以偈曰黃華滿目秋白雲端坐碧峯頭無賓主句輕拈出一喝千江水逆流三為手書招之愛重彌至旋𢌿以法衣頂相僧問如何是嵩山境師曰四面好山擎日月一湖秋水浸青天曰如何是境中人師曰三仙描不就終不與君傳問如何是目前事師曰眉毛眼上橫曰莫是他安身立命處也無師曰錯認定盤星二僧參師問那裏來僧曰隴西師曰我聞隴西有鸚鵡是否僧曰是師曰還會吟詩作賦麼僧曰會師曰會吟甚麼詩試道看僧無對詩不會做難道屁也放不出一箇師便打曰妄語漢汝不從隴西來第二位道看僧作舞勢師曰似即似爭奈口不同隴侗禪和如似粟所以道門裏出身則易身裏出門則難自代曰上大人邱乙己上堂舒兩手曰大開方便門便從者裏入復握拳曰閉却牢關說家裏話且道不開不閉一句又作麼生斂僧伽黎便下座直饒恁麼未稱全提上堂三世諸佛如是說歷代祖師如是說天下老和尚如是說嵩山亦如是說若有不如是說者與他三十棒若有如是說者亦與他三十棒何故卓拄杖曰嵩山門下令不虗行上堂月頭是初一光明漸漸出月尾是三十光明何處覓假饒老釋迦也道拈不出拈得出萬事畢有人道得出來道看如無嵩山與諸人露箇消息展兩手曰我見燈明佛本光瑞如此依舊拈不出後遊姑蘇鄧尉喜其山水盤結遂駐錫焉未幾四眾咸集成大伽藍名曰聖恩明洪武辛酉正月二十九日集眾曰老僧時節至矣即說偈曰七十九年一味杜田懸崖撒手杲日當天語畢泊然而寂奉全身於院西岡塔曰永光世壽七十九僧臘六十宋濂金華人母夢一異僧手寫華嚴經謂母曰吾乃永明延壽願假一室終此卷覺已濂即生因名曰壽後更名濂字景濂別號無相居士六歲日記二千餘言九歲能詩入青蘿山三閱大藏嘗往謁千巖元長長吐言如奔雷士欲屈之相與詰難數千言不契而退越二年又謁長長曰聞君閱盡一大藏教有諸曰然曰君耳閱乎抑目觀也曰亦目觀耳曰使目之能觀者君謂誰耶士揚眉向之於是相視一笑又嘗參見楚石琦相與談元因出賸語一編求正琦亟歎賞囑善護持嘗作永明贊云我與導師有宿因般若光中無去來今觀遺像重作禮忽悟三世了如幻靈山一會猶儼然願證如如大圓智松江府華亭松隱唯菴德然禪師里之張氏子幼從無用貴祝髮徧叩諸方未有所契後於千巖會中聞上堂語豁然悟入石屋珙謂師曰子緣當在華亭因書松隱二字授之於是歸里築室於郭滙之陽遂名松隱足不踰閫者三載嘗刺血書華嚴有天華滿庭之異感居民為建寶坊洎千巖遷化眾請繼席開堂日僧問遠離松水來據龍峯海眾臨筵請師祝聖師曰萬年松在祝融峯曰祝聖已蒙師指示列祖家風事若何師曰冬到寒食一百五曰莫便是和尚為人處也無師曰斧頭是鐵作曰恁麼則龍門無宿客也師曰早已點額曰若不登樓望焉知滄海深師曰你道老僧眉毛有幾莖曰一堂風冷澹千古意分明師曰蹉過不少問承古有言向上一路千聖不傳還端的也無師曰那裏得者消息來曰賣金須遇買金人師便喝曰金屑雖貴落眼成翳又作麼生師曰好向繡湖湖上看月明夜夜散金波曰三十年後此話大行師曰杜撰禪和如蔴似粟曰大眾證明學人禮拜師乃曰第一義諦已被東白和尚一槌擊碎了也未免向第二義門露箇消息山僧數年搓得一條龜毛索子今日拈來將三世諸佛西天四七東土二三天下老和尚鼻孔一串穿却且道山河大地草木叢林森羅萬象有情無情甚處得來良久曰莫將閒學解埋沒祖師心復舉三聖道我逢人則不出出則便為人興化道我逢人則出出則不為人師曰者兩箇老漢同門出入宿世冤家一人向孤峯頂上臥月眠雲一人向十字街頭揚塵簸土點檢將來二俱漏逗各與三十拄杖且道新龍峯與麼提持是賞渠是罰渠驀拈拄杖卓一卓曰天上有星皆拱北世間無水不朝東上堂日可冷月可熱眾魔不能壞真說有來由無途轍六月炎炎撒冰雪文殊無處著渾身普賢特地呈醜拙是真說非真說若無閒事挂心頭便是人間好時節喝一喝謝藏主維那上堂天無門地無戶俊快衲僧一任來去藏裏摩尼照徹十方洞裏桃花千葩競吐假劫外之春風應今時之律呂海禪夜半看鮫珠眼光挂在扶桑樹喝一喝結制上堂蠟人為驗始於今日九十日中推功辨的黃面老瞿曇結住布袋頭百萬人天咸皆受屈松隱結制總不恁麼以手作搖櫓勢曰山僧即今駕無底鐵船普請大眾同入大圓覺海遊戲去也喝一喝曰看取定南鍼遊戲不無看取即瞎臘八上堂明星一見出山來剛道孃生兩眼開不是髑髏乾得盡爭知春色上桃腮上堂德山棒臨濟喝拈放一邊諸人脚跟下道將一句來以拄杖畫一畫曰毗婆尸佛早留心直到如今不得妙示醫士話頭一則耆婆藥大藏諸經和劑方抹過二途開口笑不勞鍼砭起膏肓洪武初以有道徵未幾以病還嘗曰學佛法人無徒恃見地一知半解濟得何事顧力行何如耳戊辰四月十四示寂塔全身於松隱河南府嵩山俱空契斌禪師晉毫邑王氏子從重興院無相薙染永樂丙申參凝然求示心要然曰你向達磨未西來時道一句看師窘無以對於是疑之不知飲食之為何味者久之一日覩秦封槐豁然契悟上丈室擬呈似然遽曰契斌參得禪也師便喝然曰作麼師曰和尚何得贓誣平人自是愈加鍛鍊日新日益一日然問趙州勘破婆子婆子敗缺在甚麼處師曰一對無孔鐵錘曰趙州意又作麼生師曰荊棘林中重加陷穽曰石頭道書亦不達信亦不通是何意旨師曰千里同風曰青原垂足又作麼生師曰禍事禍事拈花敗缺垂足禍事龍女獻珠分文不值丈夫氣宇如王爭肯受人鈍置然為點首曰洞上一宗在汝躬矣六祖下第二十六世蘇州鄧尉寶藏普持禪師參萬峯蔚和尚徹證大法蔚付以偈曰大愚肋下痛還拳三要三元絕正偏臨濟窟中獅子子燈燈續焰古今傳峯臨入滅有人問曰和尚會中幾箇得法弟子峯示偈曰慈悲無念花開果熟因地分明慧實致囑僧慧旵參具述悟由師斥之曰佛法如大海相似轉入轉深那得泊在者裏一日室中慧旵侍立師問心不是佛智不是道汝云何會旵向前問訊叉手而立師呵曰汝在此許多時猶作者般見解人必自誣也而後人誣之亦必人誣也而已乃自誣旵遂發憤力參至第二夜驀然徹證作偈曰一拳打破太虗空百億須彌不露踪借問箇中誰是主扶桑湧出一輪紅詣呈方丈師視而笑曰雖然如是也須善自護持時節若至其理自彰旵既受囑師以偈送之住山偈曰見得分明不是禪竿頭進步絕言詮發揚祖道吾宗旨更入山中二十年揚州素菴田居士世為江都名族以弟子員屢試不第遂一意空宗猛力參究時何密菴太守唱道東南士為入室高弟鉗錘久之頓付心印士乃手握竹篦勘驗僧徒四方來學無不仰素菴為現在古佛通國稱田大士而不名示眾近來篤志參禪者少纔提箇話頭便被昏散二魔纏縛殊不知昏散與疑情正相對治信心重則疑情必重疑情重則昏散自無示眾大海不宿死屍虗空不著五色火聚不藏蚊蚋無住法中不立迷悟如今參禪底將光影門頭自相覆却入地獄如箭射僧誦經次士問誦甚麼經僧云法華經士曰六萬字那箇字有眼僧罔措士便打僧入門便拜士喝快走僧再拜士云你討甚麼盌僧喝士便掌高亭和尚曾行此令士居城之田家巷以宅為菴四方參叩之士日擁座下一日與眾禪人茶話忽然擲盞合掌別眾而逝六祖下第二十七世杭州府東明虗白慧旵禪師楚王氏子父為丹陽稅課司遂家焉幼頴悟年十四從妙覺湛然受業適作務次然問汝在此作甚麼師曰切蘿蔔然曰你只會切蘿蔔師曰也會殺人然引頸師曰降將不斬然異之會然遷撫之疎山師聞唯菴唱道松隱將往見至一小菴自誓曰此行若不徹證決不復回一定六日忽舉首睹松豁然有省遂返晝夜危坐端如鐵幢諸方因號旵鐵脊後抵姑蘇鄧尉謁果林林指令參寶藏證徹在寶藏傳中於天目之平山堂結侶坐千日長期後遊安溪古師山峯巒秀拔遂有終焉之志一住三十餘載影不出山宿衲爭趨成大精藍宣德乙卯敕額東明禪寺嗣領眾重修淨慈大殿正統辛酉六月廿七忽集眾敘謝訣別眾請偈師曰一大藏教無人看著爭用得者幾句閒言語廿九辰刻跏趺而逝茶毗舍利無算塔於本山東塢壽七十臘五十有五安慶府桐城投子楚山幻叟荊璧紹琦禪師蜀之安唐雷氏子幼從元極通受業首參無際一日聞板聲有省復參壞空有賊不打貧家一段語正統癸亥再參無際際問數年以來在甚麼處住師曰廓然無定際曰有何所得師曰本自無失何得之有際曰者是學得來底師曰一法不有學自何來際曰莫落空耶師曰我尚非我誰落誰空際曰畢竟事作麼生師曰水落石出雨霽雲收際曰莫亂道只如佛祖來也不許縱你橫吞藏海理百千神通到者裏更是不許師曰和尚雖則把住要津其奈勞神不少際拍膝一下師便喝際曰克家須是破家兒恁麼幹蠱也省力師掩耳而出至晚復召師詰曰汝將平昔次第發明處說來看師從實具對際曰還我無字義來師呈偈曰者僧問處偏多事趙老何曾涉所思信口一言都吐露翻成特地使人疑際曰如何是汝不疑處師曰青山綠水燕語鶯啼歷歷分明更疑何事際曰未在更道師曰頭頂虗空脚踏實地際乃記莂焉壬申抵金陵訪月溪海舟住後僧問如何是天柱境師曰㵎闊雲歸晚山高日出遲曰如何是境中人師曰額下眉遮眼腮邊耳搭肩曰如何是天柱家風師曰雲甑炊松粉冰鐺煑月團問如何是祖師西來意師曰海神撒出夜明珠曰學人不會師曰文殊失却玻璃盞問如何是佛師曰生鐵秤鎚曰如何是法師曰石頭土塊曰如何是僧師曰黑漆拄杖景泰乙亥遷投子上堂僧問遠離皖山來據投子海眾臨筵請師祝聖師曰鼎內長生篆峯頭不老松曰祝聖已蒙師的旨投子家風事若何師曰提瓶穿市過不是賣油翁曰只如祖師道不許夜行投明須到還端的也無師曰雖然眼裏有筋爭奈舌頭無骨曰趙州道我早猴白渠更猴黑意作麼生師曰不因弓矢盡未肯豎降旗問和尚今日陞座說法未審有何祥瑞師曰麒麟步驟丹霄外優鉢華開烈焰中曰如何是祖師西來意師曰雪消山頂露風過樹頭搖問寶劒未出匣時如何師曰神號鬼哭曰出匣後如何師曰佛祖吞聲曰出與未出時如何師曰無鬚鎻子兩頭搖僧提起坐具師便喝僧擬議師便打乃曰毒蛇頭上揩癢猛虎口裏橫身也須是恁般人始得適來者僧大似一員戰將敢來者裏奪鼓攙旗惜乎龍頭蛇尾死在棒下若解轉身活路自然不犯鋒鋩所以道弄蛇須是弄蛇手不會弄蛇蛇齩殺上堂拈拄杖曰祇者些子誵譌多少師僧到者裏開口不得思量不及舉揚不出即今落在山僧手裏橫也由我豎也由我提起放下卷舒殺活總由我以拄杖空中點一點曰正當恁麼時從上佛祖天下老和尚到者裏只得乞命有分眾中莫有為佛祖出氣者麼良久卓拄杖一下曰𭣟瞎金剛正眼靠倒空王寶座汝等諸人討甚麼盌便下座上堂眾集師斂衣就座良久曰大眾分明記取便下座師到園見冬瓜問園頭者箇無口因甚長得如許大頭曰某甲不曾怠惰一時師曰主人公還替你出些力氣也無頭曰全承渠力師曰請來與老僧相見頭便禮拜師曰者猶是奴兒婢子在頭轉身拈篾縛架師乃呵呵大笑回顧侍者曰菜園裏有蟲性空首座請益蒙山三關語曰蟭螟蟲吸乾滄海魚龍蝦蠏向何處安身立命師曰長安路上金毛臥曰水母飛上色究竟天入摩醯眼裏作舞因甚不見師曰五鳳樓前鐵馬嘶曰蓮湖橋為一切人直指明眼人因甚落井師曰明月照見夜行人曰請師頌出師曰好與痛棒曰棒則甘領頌則乞師不吝師乃大笑頌曰當機把斷聖凡津擬議知渠屈未伸欲識蒙山端的旨垂鉤意在釣金鱗成化癸巳三月中示微疾眾請末後句師展兩手曰會麼復曰今年今日推車撞壁撞破虗空青天霹𮦷呵呵呵泥牛吞却老龍珠澄澄性海漚華息泊然而逝世壽七十僧臘六十一建塔天成六祖下第二十八世松州東明海舟普慈禪師常熟錢氏子出家於破山讀楞嚴至凡有言說都無實義尋思不得日益憔悴有居士問曰師顏色有病師曰佛法不明故耳非病也士曰佛法不明何不往府中鄧尉山問取萬峯蔚和尚去師聞欣然便詣鄧尉見萬峯峯問曰沙彌何來師禮拜起曰常熟峯曰到彼何為師舉前話再拜求示峯便劈頭兩棒攔背一踏以脚兩踢曰只者實義口是禍門師有省起曰好只好大費和尚心力峯笑而許之付以偈曰龜毛付囑與兒孫兔角拈來要問津一喝耳聾三日去箇中消息許誰親又曰子當匿跡護持莫輕為人師範師自以為得乃結廬於洞庭山塢二十九年一日僧至師問曰上座何處來曰安溪曰安溪有人麼曰虗白和尚說法不異高峯曰是誰弟子曰寶藏曰有甚言句僧舉室中驗人語云心不是佛智不是道三藏不是法是甚麼下語者皆不契舉畢復問師曰參寶藏否師曰我與寶藏同參萬峯僧曰當日有何所見遂隱於此就再不參人去師曰問但有言說都無實義峯便打我從此得悟僧曰請言得之所以師曰但要人知痛癢的是實義是妙心言說盡屬皮毛僧笑曰若據此見解生死尚未了何得云悟未在未在不見道心不是佛智不是道耶師遂有疑曰彼處眾中有真大徹者麼僧云無師即棄菴渡湖往安溪詣東明適有人設齋師至關前問明曰今日齋是甚滋味明曰到口方知說即遠矣師曰如何是到口味明即打滅燈曰識得燈光何處著落味即到口當面被他鈍置可憐師無語次日黎明遣侍者請師師即至明問曰曾見人否師笑曰見只見一人說出恐驚人明曰假使親見釋迦依然是箇俗漢但說何妨師曰萬峯明曰為敘先後耶為佛法耶若敘先後萬峯會下有千人若論佛法老闍黎佛法未夢見在何驚之有若親見萬峯萬峯即今在甚麼處師面赤惘然識羞人難得明曰若如此不曾見萬峯師歸客寮三晝夜寢食俱忘偶值香燈繩斷墮地忽然大悟詣關前呈悟由明曰老闍黎承嗣萬峯去師曰公為我打徹豈得承嗣萬峯明乃笑遂集眾出關陞座曰瞿曇有意向誰傳迦葉無端開笑顏到此豈容七佛長文殊面赤也茫然今朝好笑東明事千古令人費唾涎幸得海公忘我我濟宗一脈續緜緜乃擲下拄杖云千觔擔子方全付元要如今拄杖談以拂子擊三下下座師即入方丈禮拜明曰老僧不出月去也至二十七日辭眾二十九日示寂師仍欲遁歸洞庭四眾苦留乃繼其席嘗舉興化問克賓維那你不久為唱導之師賓云不入者保社化云會了不入不會不入賓云總不與麼化便打云克賓維那法戰不勝罰錢五貫充設堂飯至來日齋飯時興化自白椎云克賓維那法戰不勝不得喫飯即便趁出院師拈云若為濟宗兒孫必要明他家裏事予昔蒙萬峯老人付我偈便以為得直至今日始知我錯萬峯不錯一遇東明和尚乃明棒頭賞罰棒頭罰易知棒頭賞難識識得棒頭賞始能的破的言句亦然果然悟在己而法藉師豈曰一悟即為了當如以一悟靈通不求師法正謂威音以前無師可也威音以後師師相受者此也所以克賓識得父師苦心䇿發己明向上關棙子洞達閨閾中事不在言宣骨碎身粉也難酬報興化萬一況打罰出院乎海長老今日所以不嗣萬峯而嗣東明者亦此也古諺云養女方知娘受苦生子乃識父辛勤誠哉是言也實有箇中大事豈容草草若與人抽釘披楔坐獅子座為人天師抉人眼翳紹佛祖位者必須一一透過切莫以悟為是將綱宗抹殺置而勿究何異天魔外道莽蕩招殃悔乎萬峯忌日師拈香指真曰我幾淹殺你甕裏幸是普慈若是別人不可救也爇此瓣香堪酬接引喝一喝云只笑你護短沒投師佛法當人情展坐具禮拜又拈香云此一瓣香供養東明長老一片赤心鞭䇿令余洞達宗源連喝兩喝云一言豈盡普慈心千古兒孫替報恩又拈香云此瓣香供養昔日師僧指南之力若不蒙師何有今日他日到來拄杖三十喫有分堪報不報之恩喝一喝云受恩深處便為家有乳方知是阿娘禮拜起說偈曰源頭只在喝中存三要三元四主賓五棒當人言下會四料還須句裏明末後真機死活句箇中消息在師承碎形粉骨酬師德將此深心報佛恩慟哭歸方丈臨示寂說偈曰九十六年於世七十四載為僧中間多少誵訛一見東明消殞以拂子打圓相云釋迦至我六十二世有不可數老和尚又打圓相云多向者裏安身咄乃投筆而逝景泰元年全身塔於東明左側得法十二人金陵東山翼善海舟永慈禪師按東山行實載師為蜀之成都余氏子生於洪武二十七年甲戌齠齔時見僧輒喜一日聞說生死事遂發志棄俗趨彭縣大惰山影德寺投禮住持獨照月師剃染後入西山住靜八載發志參方行脚首謁太初和尚開示父母未生前話做工夫一日初問師曰父母未生前那箇是本來面目師即從東過西叉手而立初曰未在更道師曰兩眼相對有甚相瞞初大悅制解起單復參東普無際和尚不契乃出峽赴京得度宣德二年復還金陵靈谷挂搭雪峯和尚請師充首座制解即詣古道山參東明旵禪師一見便問無相福田衣甚麼人得披旵下座摑一掌師曰四大本空五蘊非有汝作麼生掌旵又一掌師曰一掌不作一掌用速道旵又一掌師神色不變曰老和尚名不虗播復展具三拜而立旵曰我居古道山三十載今日只見者僧乃留旬日欲付袈袈師曰某甲不為衣來堅不受下山今時師僧看榜樣自此聲譽叢林金陵牛首請師領眾三載退隱天界山居太監袁誠欽師道德請往翼善寺開山說法正統五年庚申六月二十八日旵和尚留囑白明菴曰吾有衣法二物待十年後送至金陵東山海舟和尚受納付囑曰字付慈海舟訪我我無酬明年之明日西風笑點頭明年如期果寂白菴不違遺囑限滿日請首座法薦於景泰二年八月二十三日持衣賷至東山師祝香而受訪我我無酬只受者箇六祖下第二十九世江寧府高峯寶峯明瑄禪師吳江范氏子俗業斵因海舟令造塔院足傷索酒舟曰幸傷足若斫去頭雖千埕汝能喫不師怵然遂求為僧一日燒火搬柴次舟曰是甚麼師曰是柴舟曰是柴將去燒師致疑通夕不寐忽為火燎去眉毛面如刀刈以鏡照之大悟趨見舟舟拈棒師奪棒曰者條六尺竿多時不用今日又要重拈舟大笑師呈偈有笑裏藏刀子細看句舟曰即此偈可紹吾宗遂以偈付之有臨濟兒孫獅子子之句後住金陵高峯寺天奇瑞參師問甚處來奇曰北京師曰只在北京為復別有去處曰隨方瀟灑師曰曾到四川麼曰曾到師曰四川境界與此間何如曰江山雖異雲月一般師舉拳問四川還有者箇麼曰無師曰因甚却無曰非我境界師曰如何是汝境界曰諸佛不能識誰敢強安名師曰汝豈不是著空曰本瑞終不向鬼窟裏作活計師曰西天九十六種外道汝是第一奇拂袖便出師喜為克家種草堪支吾道遂書偈付之曰濟山棒喝怒如霆殺活臨機手眼親聖解凡情俱坐斷曇華放出一枝新師於成化辛卯臘月九日示寂塔全身於東明寺左六祖下第三十世安陸府荊門州天奇本瑞禪師南昌鍾陵人父江堂母徐氏年廿二棄家遠投荊門無說能薙髮能示萬法歸一一歸何處話令參後遇高郵全首座同往襄陽途中偶聞婦人呼豬聲全曰阿娘牆裏喚哪哪途路師僧會也麼拶破者些關棙子娘娘依舊是婆婆師瞿然汗下一日病甚有暉禪者勉師曰病中工夫切不可放過因舉大慧在徑山患背瘡晝夜呌喚或問慧還有不痛底麼慧曰有曰作麼生是不痛底慧曰痛殺人痛殺人師於言下豁然透得娘娘依舊是婆婆意旨又一日聞山鹿呌喚會得日用之中無不是底道理遂往蜀中謁楚山問某甲閒時看來了然明白及至臨機因甚茫然山曰毫釐有差天地懸隔後遊金陵路次忽然如從夢覺從前所得一場懡㦬遂參寶峯於高峯鍼芥相契遂蒙印證語具寶峯章中住後上堂祖師西來不立文字直指人心見性成佛更無別法若向者裏知箇落處定也有分慧也有分宗也有分教也有分佛法世法無可不可腰纏十萬貫騎鶴上揚州其或不然定也不是慧也不是宗也不是教也不是葢為不識本心名為狂妄經云虗妄浮心多諸巧見不能成就圓覺方便諸佛諸祖惟傳一心不傳別法汝等不達本心便向外求於妄心中起妄功用如邀空華欲結空果縱經塵劫只名有為須知所謂見性成佛者見性不是見他人之性成佛不是成他人之佛決定是汝諸人本有之性與十方法界秋毫不昧人人本具箇箇不無但向二六時中一切處回光返照看是阿誰不得執定一處須是於一切處大起疑情將高就下將錯就錯一絲一毫毋令放過行住坐臥時便看者行住坐臥底是誰見色聞聲時便看者見底聞底是誰覺一觸時便看者覺底是誰知一法時便看者知底是誰乃至語默動靜周旋往返一一返看晝夜無疲倘若一念忘了便看者忘了底是誰妄想起時便看者妄想底是誰你道不會只者不會底又是阿誰現今疑慮你看者疑慮底又是阿誰如是看來看去萬境不能侵諸緣不能入得失是非都無縫罅明暗色空了無彼此山河大地日月星辰盡聖盡凡都盧祇是一箇誰字更無雜念上下無路進退無門山盡水窮情消見絕豁然𪹼地一聲方知非假他求咄示眾閒花野草露真機劒號巨闕蛺蝶穿園拍板扉珠稱夜光兩岸蘆花齊點首雲騰致雨一條江水伴鷗飛露結為霜山僧於此盡情吐露更有一句尚未曾道會麼那邊不坐空王殿爭肯耘苗向日輪寂後門人於宏治十一年戊午建塔於衛輝府輝縣白鹿山之白雲寺左六祖下第三十一世德安府隨州關子嶺龍泉無聞絕學明聰禪師邵武奚氏子母吳十七出家二十受具習止觀唯識論一日有宿衲相詰曰大通智勝佛十劫坐道場佛法不現前不得成佛道其意如何師依文而答宿譏訶之師從此疑情頓發坐臥不安經六載一日聞馬嘶大悟遂往見天奇奇可之住後上堂僧問雲門如何是一代時教門曰對一說龍泉則不然若有問如何是一代時教劈脊便打曰合取狗口僧問如何是本來面目師曰石香亭曰便恁麼去時如何師曰喪却了也問今朝四月八日天下叢林皆慶如來聖誕未審如來何處降生師於几畫圓相示之三世諸佛盡由者箇惟有一人不由者箇且道此人具何面目笑巖寶侍師圍爐次師曰人人有箇本來父母子之父母今在何處巖曰一火焚之師曰恁麼則子無父母耶巖曰有則有佛眼不見師曰子還見不巖曰不見師曰為甚不見巖曰若見即非真父母師曰善哉巖復以偈呈曰本來真父母歷劫不曾離起坐承他力寒溫亦共知相逢不相見相見不相識為問今何在分明呈似師師遂付以偈曰汝心即吾心吾心本無心無心同佛心佛心非吾心復囑曰汝當護持緣熟智愚皆度後示微疾訣眾說偈趺坐而逝全身塔於寺右漢陽府古巖禪師中年雙目失明笑巖參師問何所來巖曰親從關子嶺來師曰無聞老兄好麼巖曰好師曰如何見得好巖曰老來康健師曰爭見得康健巖曰著衣喫飯坐臥經行師曰與麼則不出常情巖曰要且常情莫測師仰面大笑翌日巖入室師曰嶺頭老兄先師嘗許他悟處見骨只是太樸無博學巖曰和尚博學乎師曰老僧亦非博學巖曰恁麼則一同也師曰亦有不同處巖曰如何是不同處師曰他有眼我無眼巖曰和尚若無眼爭見得渠無博學師又大笑囑曰子器非凡深根固蔕廣作利益非汝而誰惜吾衰老不及見矣巖拜謝而去河南府嵩縣伏牛濟菴大休實禪師新鄭李氏子幼投寶珠受業年二十訪老宿古心心示萬法歸一一歸何處話令參尋入火場打三有省述偈曰法身本無相法相本來空會得者消息處處顯家風後往謁天奇途遇天真月印二禪客同至關子嶺奇問你三人一路麼師曰雖然一路來處不同奇曰如何是你本來面目師便珍重奇曰未在更道師便喝奇曰父母未生前喝箇甚麼師無語而出自後數呈伎倆奇皆不諾一日侍奇於承天奇問藏身處沒蹤蹟沒蹤蹟處莫藏身你作麼生會師曰當堂不正坐那赴兩頭機奇為助喜住後陞座須彌作舞海水騰波龍象交參人天共聚大地山河同宣妙句三賢十聖共證菩提眉藏寶劒起寒光袖隱金鎚行正令明殺活顯全機舉拂子曰還有明眼衲僧不顧危亡向前一肩擔荷得麼便下座笑巖參問如何是祖師西來意師豎起拂子巖曰此外更有指示也無師擲下拂子巖便禮拜復敘參關子嶺話師曰怪道親見作家來巖便喝少頃師又問無聞別來四十年未知近日鼻孔如何巖曰與和尚鼻孔一般師曰上座還見老僧鼻孔麼巖曰見師曰向甚麼處見巖曰兩眼下口門上師曰有秘密句曾向上座道麼巖曰曾道師曰試舉看巖曰合取臭口師拈拂子巖便拂袖而出建昌府廩山蘊空常忠禪師從鶴林老宿剃落參少林小山值山外出乃前問曰達磨面壁石何在山指那青青黯黯處師曰指東畫西作麼山曰杜撰禪和如麻似粟師曰者老漢在者裏魔魅人那山便打侍山遷宗鏡師服勤三載受囑還吁江隱從姑山日唯趺坐有問者師但搖手曰汝不會我語曰試說看師曰南城城外水滔滔向北流問者目瞪師曰向道汝不會我語後縛茅廩山二十年不與世接縉紳過謁唯默坐而已羅近溪輩相與論理學師則以向上語直掃之僧有以經論旨趣見難者師呵曰宗眼不明非為究竟僧便問如何是宗眼師振衣而起無明參呈所得師曰悟則不無更須受用得著始得不然祇是箇汞銀禪遂舉南泉打破鍋因緣問曰古人意在甚處明曰拂袖便行鉤有餌鍋兒打破玉無瑕師曰去牧牛場上待汝久在萬歷戊子忽一日告眾曰我有件要了底大事汝等須知眾茫然豎拳曰會麼眾無對乃揮案一下曰吽吽為汝了去遂趨寂塔於本山之麓壽七十五臘五十生平言行縝密非有真心為法者概不輕示六祖下第三十二世北京月心笑巖德寶禪師金臺世族也父吳門母丁氏早失恃怙弱冠偶之講席聽華嚴大疏至十地品云世尊因中曾作轉輪王時有乞者來求國城妻子頭目手足內外布施王作念言我今若不施與向後百年一旦空廢全無少益反招慳恡過失不若施與空我所有益我功德師聞之不覺身心廓然歎曰古今同一幻夢中遂決志出家歲餘就於本境廣惠寺禮大寂能和尚披緇祝髮明年受具朝參夕叩徧謁大川月舟古春古拙諸老宿後至關子嶺參無聞聰和尚問十聖三賢已全聖智如何道不明斯旨聰乃厲聲曰十聖三賢汝已知如何是斯旨速道速道師連下十數轉語斯旨豈可以轉語盡也皆不契遂發憤寢食俱廢一日𢹂籃到㵎邊洗菜一莖菜葉墮水旋轉捉不住忽有省提籃喜躍而歸聰立簷下問是甚麼師曰一籃菜聰曰何不別道師曰請和尚別問來至晚入室聰舉元沙敢保老兄未徹話師曰賊入空室聰曰者則公案不得草草師喝一喝拂袖便出復往見濟菴古巖大覺諸尊宿皆器重之後上關子嶺再參聰和尚乃受記莂復親炙年餘辭去回翔襄漢間後抵金陵寓淨海牛首高座等處還里居圓通次遷南寺鹿苑慈光善果諸剎晚年退居京城柳巷於萬歷辛巳正月十六日示寂奉全身塔於小西門外世壽七十僧臘四十八上堂舉古宿云第一句薦得與佛祖為師第二句薦得與人天為師第三句薦得自救不了又老宿倒云第三句薦得可與佛祖為師云云師乃云若總恁麼去達磨單傳之旨撲地了也山僧今日也隨𣯫㲣道取一句貴要與諸人同箇受用乃曰第一句薦得飲水著噎第二句薦得看孔著楔第三句薦得證龜成鼈復拈拄杖云第一句薦得漆光晃晃第二句薦得強名拄杖第三句薦得泛應曲當時有僧出云未審和尚是第幾句薦得師乃劈脊棒云天下榜樣上堂男兒固奮冲天志莫若從頭放下來直把髑髏枯死盡仍教死眼豁然開上堂拈拄杖曰有麼有麼時有僧出作禮師劈脊便打曰多口作麼曰某甲一言未舉何為多口師復打曰再犯不容拄杖揚聲喚有麼三世諸佛縮頭去者僧棒下再橫屍果然不識塗毒鼓僧參問從上千七百老凍膿某甲今日一串穿來獻與和尚伏請判斷時門外忽聞犬吠師遽顧侍者看是甚麼客來侍者出問話僧四顧索斷也師曰上座適來問甚麼僧擬重舉師連棒打出上堂舉趙州無賓主話師云好箇無賓主話幸是無人舉著若要舉出直教諸人箇箇飽齁齁地若要舉出賓主歷然箇箇口飽肚中饑舌短眼睛大上堂舉楊岐和尚問僧云栗棘逢你作麼生吞師云百雜碎還我栗子來金剛圈你作麼生跳師云過也也好與三十棒復拈拄杖卓一下云大眾適纔栗棘蓬已為汝等吞却金剛圈已為汝等跳過老漢面皮厚多少汝等還識楊岐老漢麼不識不識若能識得便與楊岐握腕並行同箇受用未為分外慈悲踰於先古若未能識得且聽山僧一偈栗棘蓬吞甘露美金剛圈跳作家歡何緣拋擲諸人面百計千方過者難上堂當門一隻箭來者看方便折也擬進問如何穿過髑髏面斷也不奪饑人食不牽耕夫牛甚處下手惟行一本分買帽須相頭把錢來看上堂舉百丈再參馬祖話師云馬祖震喝知子時節百丈耳聾命根方斷奮獅子之全威得無師之大用直得黃檗吐舌臨濟解痛詎知千百年巴鼻落在笑巖手裏遂喝一喝云汝等諸人還聞麼若道聞則為室外之庸僧若道不聞則汝諸人生來耳重自屁不覺臭更來塗汙人以拄杖卓一下云還端的麼為甚麼而今天下寂無蹤眼花則不見不眼花見箇甚麼是他獅子將兒絕後共不值得大驚小怪上堂舉馬祖一日問藥山惟儼禪師子近日見處作麼生山云皮膚脫落盡唯有一真實祖云子之所得可謂協於心體布於四肢汝既如是可將三條篾束取肚皮隨處住山去山云某甲復是何人敢言住山祖云未有長行而不住未有常住而不行欲益無所益欲為無所為宜作舟航無久住此師云有無涯之淵海可以容千里之神鯨有萬重之峯巒可以產莫大之巨獸所謂源遠流長師真子勝者原見於斯矣眾兄弟試看他藥山到此田地尚不肯容易住山去如今學佛之徒如往千里之都擬纔行數步便住止輒自甘休未審是何心行上堂舉傅大士云夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止纖毫不相離如形影相似欲識佛去處祇者語聲是師云此是當來龍華樹下語吾此娑婆界內釋迦會中使未著在復拈拄杖云諸仁者山僧與麼批判還有能緇素者也未若有能緇素者可與拄杖子同參如未有緇素得者拄杖子夜來遶萬億四天下萬億須彌頂向諸人眉毛眼睫上高聲唱言士曠人稀相逢者小傅大士作死語笑巖寶說夢話諸仁向未上堂已前會去猶較些子心圓瀝膽傾肝終是指鹿為馬上堂舉子湖和尚夜半在僧堂中忽呌云有賊有賊眾皆驚起有一僧立在僻處被子湖攔胸搊住云捉得也捉得也僧急呼云不是某甲果然不是湖拓開云是即是只是你不肯承當承當即禍事不承當又是死漢諸仁者合作麼生師云試看古人為人得恁麼老婆深入虎穴者僧若是夥裏人纔被捉住自有相通分縱饒通得已是賊過後張弓可謂駕與青龍不解騎師拈拄杖左右顧視云如今者裏還有肯承當者麼自云有有復云逐隊串來填溝塞壑上堂舉僧問趙州如何是祖師西來意州云庭前柏樹子僧云和尚何得將境示人州云我不將境示汝僧云既不將境示人畢竟如何是祖師西來意州云庭前柏樹子師召云諸道者試觀此箇公案成成現現只是要一箇肚裏沒一星禪底漢兩肩擔荷去不妨盡善盡美你若才以名言義路注解他直待彌勒下生再下生也未識老趙州在復云如今眾中可有擔荷者麼若無擔荷者山僧更有箇頌子令汝等與老趙州石火光中相見一面頌曰西來祖意庭前柏更謂不能誠自畫熟睡之夫夢忽醒撞頭磕額乾坤窄猶在半途上堂舉雲門問僧近離甚處僧云南嶽門云我不曾與人葛藤近前來僧近前門云去師云雲門今日勘者僧雖呼遣自在止是平地上推人者僧雖去其心不了若據殺活杖子又且不然但呼僧云近前來僧近前劈脊便棒教伊直下別有生涯乃云去猛虎不食伏肉若爾非獨不辜南嶽而來管教伊直下別有生涯忽若被伊劈面一掌和尚須別立生涯始得上堂舉圓覺經居一切時不起妄念語師告眾曰山僧每一段下箇諾字世尊以四段開示山僧以四諾領來土上加泥貴要與現前諸佛子等同箇受用而今還有共力擔荷者麼若能擔荷可謂龍得水時增意氣虎逢山勢長威獰又曰今復翻案去也易四諾為四喝向伊道貓若人會得者四喝落處非但只教一箇老釋迦開口不得管取坐斷百億釋迦舌頭時有首座出云和尚今日把斷要津大眾無措畢竟還有趨向分也無不知香臭漢有甚共語處師云一任七縱八橫滑口阿師座云與麼則官不容鍼私通車馬去也隨邪逐惡師云拄杖乍開封略且放過汝和尚先喫首座始甘上堂舉馬祖三十年不少鹽醬話師曰馬大師三十年不曾少鹽醬方可聚徒說法山僧者裏三十年不曾見箇鹽醬汝等偎傍住此畢竟圖箇甚麼以拄杖一時趁散和尚既不曾見鹽醬者些瓶罐甚處得來待云你甚處見我瓶罐來但掩鼻云醬氣難聞師寓終南山有清長老來參問曰吾師居此甚孤寂師曰妙德疎慵恒我伴普賢潦倒頗隨宜口是禍門清曰恁麼則萬象恒談無晝夜靈山一會古今存念言語漢師曰今日本八何不早恁麼道清曰老師從此不答話去也太惹厭生師曰若是克家聞便了野干之類轉疑猜清遂作禮曰已知老師慈悲不淺道絕古今冬烘老有甚共語處師震聲一喝一日有二尼參禮拜起左右各立師曰女子如來前入定有錢不解使臺山婆子驀直去解使却無錢你道者兩箇老婆禪如何得恰好去尼左者過右邊右者過左邊合掌相向各噓一聲師曰與麼非但解老婆禪更會鼓粥飯氣尼曰和尚惜取眉毛好師曰山僧眉毛且置周金剛買油餈點心食到口邊被婆子奪却劉鐵磨請溈山往臺山大會齋溈山不赴等是者箇時節你道為甚麼取舍不同二尼作禮曰某等若不來禮拜和尚爭得見古人神通大用師曰好各與三十棒恰值拄杖不在且歸堂喫茶兩條牸牛沒鼻一頭牯牛無尾盡力耕了三春依前一片白地有兩官人遊山入門哦曰茂松修竹回顧見師便問如何是道人家風師曰茂松修竹曰有何旨趣師曰自家觀不足留與客來看呵呵倘被者兩箇擔板漢致問一聲便恁麼去時如何笑翁又只得打鼓轉船頭所以道世間相常住黃鸝啼綠樹真箇可憐生動著便飛去有士人閱師淨土偈乃問佛說是經則有六方諸佛出廣長舌相作證吾師說偈有何人證師曰居士舌頭亦不短但引舌向上左右舐云為何總舐不著鼻頭又問何為不思議功德師曰前街人喚犬後巷罵貓兒者是功德甚處是不思議又問老師高壽師曰論年不見箇葷腥作麼不槁瘦了僧問處處入法界念念見遮那如何是遮那師曰淨地不須屙頌投子不許夜行投明須到話三十六物都灰燼只遺一雙枯眼睛置向九衢深夜後無光明處作光明舉經題字頌曰黑白未分已墮偏那堪擬議費鑽研西乾此土諸賢聖鼻孔撩天總被穿別云裂三折半缺中邊鼻孔鍼筒話未圓別有一人穿不得道道一齋和尚問如何是文殊普見三昧師曰死人眼云如何是觀音普聞三昧師曰死人耳云古云一言道盡如何是一言師曰死人口云如何是如來喫粥時師曰平旦寅師過潼關至熊耳山禮祖塔寺僧叱云汝憨拜空塔奚為師以手指石塔問僧曰此是空塔乎僧云然師曰祖師聻僧云祖師𢹂履西歸久矣師曰蒼天蒼天者僧脚快笑巖趕不上僧問元沙不過嶺保壽不渡河落第幾機曰總落第二機僧云如何是第一機師曰元沙不過嶺保壽不渡河別云闍黎不過嶺老僧不渡河僧問如何是世間法師曰天地日月國土山河云如何是出世間法師曰天地日月國土山河云與麼則世間法出世間法不二也師曰你喚甚麼作天地日月國土山河別云與麼則二也僧問如何是和尚昔年獲益事師以拂子倒懸視僧曰會麼僧云某甲已識得和尚做處也師曰你道荊州黃四娘禮佛求箇甚麼僧無對代云今日捉敗者賊師乃打出座主問祖意教意端的為同為別師曰柳影橫塘魚上樹槐陰地馬登枝主云與麼則形影兩分曲直自顯去也師曰未嘗飽食廬陵米徒把蒲團認作天主禮拜云蒙師大悲拔我茅塞師曰爭奈更有須彌山子在主逡巡而退師入堂見一僧在禪牀上昏沈師呼僧僧舉首者僧若是師子待笑巖呼醒跳起身來劈面一掌仍復熟睡管教笑巖不敢正眼覰著他師曰你幾時離伏牛山云二月初七師曰東西兩𥐞朵夜來相毆嚇得娑竭老龍王現細身潛入眾禪和子鼻孔裏和尚子為甚麼都不覺不知云和尚莫惑人好干他𥐞朵娑竭龍王甚麼事師曰你恁麼也只是箇長連牀上喫粥飯漢僧問如何是祖師西來意師曰萬里黃河徹底清云直指單傳未審傳箇甚麼師曰一片餬餅九人餐云神光速禮三拜意旨如何師曰三足蝦蟆當路坐云如何是和尚親傳底意旨師打一摑云六耳不同謀師禮佛次僧問不於佛求不於法求不於眾求和尚禮拜當何所求師曰汝適來見我禮佛否云和尚現禮拜爭得不見師曰若見吾禮佛汝與佛同下地獄僧無語又僧云某甲一總不見和尚禮佛師曰若不見吾禮拜汝自己下地獄師又一日拜佛次人問老師既都無所求用拜奚為師指像顧人曰為伊作佛故禮渠三拜一日眾禪者勸云和尚若不度生則為獨善有乏大悲豈道人之究竟乎師總不顧眾復苦勸師遂喝曰莫亂統復以偈答曰大悲不是等閒圖枯木花開絕後甦塵佛法門經幾寂於今度盡也還無僧問大死底人却活時如何師曰與伊一盞茶喫僧問何為奪人不奪境師曰黑漆拄杖長七尺何為奪境不奪人師曰突出人前若活龍何為人境兩俱奪師曰夜深倚立漆牀頭鐵眼銅睛無處覓何為人境俱不奪師曰有時扶過斷橋水幾度伴歸明月村合併一句作麼生道僧問如何是和尚大人相師曰無邊身菩薩祇曾見得半身云如何是和尚全身師和聲便打復一僧問久聞和尚大人相乞請隨喜師乃縮項作蹲勢僧罔措僧問婆子燒菴意旨如何曰不奈船何打破戽斗云此僧還有過也無師曰此僧有過婆子合喫三十棒古人出語如百煉金開口如老吏斷獄後人費盡氣力趕渠脚後跟不上者古人證處劈實故也師偶堂前瞑目而坐一僧潛詣師邊立師開目云會麼云不會師曰今日暖如昨日云某甲未識佛性乞師指示師曰幸得此去不遠一官人問佛道元曠冲奧弟子擬欲求進未知還有分否師曰人皆為堯舜云如何契入師曰我欲仁斯至仁矣云一切時中云何履踐師曰進則過之退則不及云倘不進不退可適中否師曰易開終始口難保歲寒心師於漢楚間寓夏時當季秋偶於金沙灘陽濵地坐有兩子隨侍師側忽見一沙門執錫沿濵而來貌甚奇古近前卓立朗聲問云仁者可識從上相承密論密義否師曰仁者密則非論論則非義彼乃退後一步以錫橫肩上翹足獨立云是甚麼義師於地上書一更字彼以錫畫地一畫闊兩脛立上復以錫橫按腹上亞身而視云是甚麼義師於地上書一嘉字彼即卓錫地上以兩手叉腰懸翹一足切齒怒目作降魔勢云是甚麼義師於地上書一之字彼復分手指天地以身周旋一匝云是甚麼義師於地上書一尤字彼復進一步叉手作女人拜復分手指兩衲子云者箇是甚麼義師於地上書一蚕字彼繞師三匝於前作禮立於師右師於地上書此字示之曰會麼彼擬進語師復曰設到此地更須知有者箇時節始得彼歡喜合爪歎云咦真摩訶衍薩婆若上士也仍作禮浩然而去時兩衲子皆驚喜罔測請問云彼是何所沙門所為復何義耶師良久乃曰還識此人否兩衲子俱云不識師曰此是應真賢聖所呈乃是金剛王變相三昧及三昧王三昧用來勘吾然彼亦將有新證師寓慈光寺手持如意廊下徐行一僧欲借看師即度與僧擬接師乃打一如意云日本國人不識火種田之夫常患饑僧問那吒太子析骨還父析肉還母那箇是正那吒師曰山高那礙白雲飛別云若是正不問人僧問和尚參見許多尊宿未審拈香的嗣何人師曰頭挨周嶺雪衣挂楚山雲云恁麼則已知絕學之嫡子中峯之遠孫也師曰有甚麼交涉一僧聞風吹角鈴喜躍云某甲今日始識破觀音老漢了也即入室求證纔禮拜師乃劈脊打一棒云速將你識破底觀音來看僧纔以手作搖鈴勢師直打出方丈者僧祇會搖鈴僧問何等是文殊境界師曰手長衫袖短何等是普賢境界師曰脚瘦草鞋寬何等是觀音境界師曰頭大尾小何等是和尚境界師劈脊便打靈谷問古人云打破鏡來相見既打破鏡擬向甚麼處相見師曰慙惶殺人谷有省師舉四祖優波毱多尊者偈問侍者祖云心自本來心本心非有法我道已是抱贓呌屈又云有法有本心我道將來恰好填溝塞壑又云非心非本法我道又是泥裏洗土塊分疎不下我總與麼道汝作麼生會侍者云和尚連祖師也不回互師曰優波毱多尊者適來鑽入你鼻孔裏鼓掌呵呵大笑你為甚麼總都不覺不知者云某甲無鼻孔師曰與麼則一場氣悶耶者作打噴嚏勢師打一拂子云是你連祖師也不回互耶者作禮喜躍而出畢竟如何方是回互參師問僧纔入思惟便成剩法你作麼生會僧擬議師喝出一箇不唧𠺕一箇被鈍置煞是好笑師見一僧來隨畫一圓相示之僧即作禮師便打僧云某甲話在師震聲喝出又見一僧來師亦畫一圓相示之僧見即作禮師合掌云善哉舉巖頭作渡子時有一老婆抱一孩兒至問云呈橈舉棹即不問且道婆手中兒甚處得來頭便打婆云婆生七子六箇不遇知音祇者一箇也不消得遂拋向水中頭乃吐舌師乃呵呵笑云此婆子圖箇甚麼巖頭當時待他纔拋便劈脊一棹俱打入水中始較些子何故不見道祇者一箇也不消得笑巖盡法無民巖頭現大人相心圓雖則據欵結案諸公切莫矮子看戲舉南泉因陸亘大夫云肇法師也甚奇怪解道天地同根萬物一體泉指庭前牡丹花云大夫時人見此一株花如夢相似師云南泉老漢被大夫將箇墼子一磕直得無窮寶藏罄囊倒出舉六祖能大師風幡話師云善則甚善美則未美當時見二僧紛紜不已但出前云仁者也不是幡動也不是風動便乃休去非只令二僧知恩有地直使天下兒孫感戴祖師無有休日還知麼萬機雖不思春力時到只數花自開心圓當時若見二僧紛紜不已但出前云夜靜更深歇息去好非只令二僧懡㦬散去直使天下兒孫啗不入舉乾峯示眾云舉一不得舉二放過一著落在第二雲門出眾云昨日有人從天台來却往徑山去峯云來日不得普請便下座師云拾得酒酣寒山醉倒相扶相攙和泥臥草天明𢹂手出松門直至如今無處討示眾真得道人心常閒曠寂寞無為質直無偽如崖如壁實塌塌地如太虗空無有限礙難以圖摸𠯗啖無味求覓無方十二時中隨緣舉措方便施為無不分明了了如初生孩子六用閒閒底無實分別教中有喻須彌山頂上輥一粒芥子至山底投置一鍼鋒上誠為難極佛云猶易唯於六道之中得生人道更難過此而今於此極難之中已獲具足品貌明知身中有聖道而不自究明甘自輕棄為愚為慧仁者審諸師謂眾大夫曰予嘗笑昔儒毀佛闢佛大似不究佛是何物而礙毀之闢之彼云佛此云覺彼佛云者乘大願輪示迹人中於三界長夜而獨醒故稱大覺世尊誠悟心得道大聖之異稱耳辭恩愛棄榮貴慈悲喜捨為心不畜不取能施能濟不畜云者非惟金玉等實空癡貪煩惱之餘習全真淨無漏之功德也能施云者豈止財穀等直示無上正真之道覺悟有情令人人獲自本心而成佛也近而言之佛者即人人本具大體大用渾全之真心耳而人自顛倒背真覺合妄塵反迷而不自信也既不自信自己本具湻全之真心則莫得其受用也由是於他大聖則異而疑之疑之不釋則又厭而惡之厭惡之不已則毀之闢之自謂有大才佛氏已被吾闢倒了也吾胸中已足痛快了也且語言文義權衡一方之機擬向甚麼處識佛乎毀佛闢佛又安知自心毀自心自心闢自心乎如犢觝影正不知影是何物自何而有擬欲觝之一人傳虗萬人傳實一人為之多人効之以至展轉効者無窮獨不悟此妄作徒苦其精神耳又不止徒苦精神唯恐他時或有不測之餘殃耳於戲仁人君子寧不為之寒心者歟嘉興府天寧法舟道濟禪師郡之思賢里張氏子年二十一投天寧為行者時默堂宣受寶月記歸自繁昌師往謁服勤久之復詣東禪從昂祝髮參吉菴菴門庭孤峻師能朝夕咨叩一日聞磬聲豁然洞徹尋趨方丈菴曰子著賊也師曰賊已收下曰贜在甚處師振坐具曰狼藉狼藉曰者掠虗漢狼藉箇甚麼師一喝好喝歸眾菴可之未幾長安覺王寺請居第一座室中秉拂機用莫能湊泊嘉靖初住金陵安隱僧問如何是安隱境師曰三山半落青天外二水中分白鷺洲曰如何是安隱家風師曰石虎山前鬬泥牛水底眠曰不會師曰用會作麼精巖寺晚參精巖寺裏撞鐘府譙樓上擂鼓同時顯大神通穿透千門萬戶大眾還聞麼若道不聞爭奈鐘鼓分明人人有耳若道聞將甚麼聞即今鼓絕鐘消聞底事又作麼生試道看卓拄杖曰黃金自有黃金價終不和沙賣與人陸五臺問畫前元有易不師曰若無伏羲將甚麼畫臺曰畫後如何師曰元無一畫臺曰現有六十四卦何得言無師曰莫著文字臺曰請和尚離文字發一爻看師召居士臺應諾師曰者一爻從何處起又問至人無夢何也師曰常人於現前虗幻分別境界不知全體是夢認為實有而以昏昧想心繫念神識紛飛境界為夢所謂寤寐俱夢夢中復作夢也至人於自心境界如實而知故於現前虗幻境界妙用泠然通徹無礙而睡夢亦自明明而知歷歷而覺所謂寤寐一如者也故至人無夢之說非有無之無乃是無夢無非夢夢與非夢一而已矣又問夢裏須臾何以歷涉萬里師彈指一下曰千里萬里只在者裏問聖人有妄念不師曰無曰既無妄念何用兢兢業業師曰兢兢業業故無妄也問為政如何得無倦師曰榮辱得喪毀譽是非一切不管但虗其心行其所無事則無倦矣問終日喫飯何故不曾咬著一粒米師曰喫飯底人居士還曾見不問四方上下有窮盡不師曰居士試返觀自己心量有窮盡不士良久曰實無窮盡師曰世界亦然又問地獄實有不師曰人作了惡歷歷自知雖經久遠憶持不忘便是業鏡自心明知自惡不能自釋便是法王心地不空地獄實有心若空了地獄隨空示禪人偈曰工夫不間四威儀聽板聞鐘好下疑打破未生時面目好來爐畔愛鉗鎚道本無為豈屬修有修頭上更安頭虗空若使重加柄野草閒華正好愁將謂衣中有寶珠衣穿方信寶珠無前年尚有無珠說今日無珠說也無內不尋思外不求大千沙界一毫收塵塵剎剎蓮華藏認著依然是外頭後遷弁山晚退歸天寧嘉靖庚申秋示寂壽七十四臘五十二茶毗塔禪悅堂順天府大覺寺慈舟方念禪師別號清涼古唐楊氏子十歲失父投京廣德大慈義為師十五剃染登具廿一遊講肆知文字非究竟法乃參幻休於少林休問甚處來師曰北方休曰北方法道何似此間師曰水分千派流出一源休曰恁麼何用到此師曰流出一源水分千派休可之命典維那一日遊初祖面壁處忽然大悟乃曰五乳峯前好箇消息大小石頭塊塊著地呈休休知為克家種草遂囑曰從上佛祖以自己所證遞相承襲欲令一切人知有此事余得之小山先師今授於汝汝當體佛祖心紹續慧命然尚宜晦跡林泉乘時而出付以偈曰無上涅槃心佛祖相分付吾今授受時雲淨峯頭露時年二十八既而以差別智不可不明遂徧參諸方備行苦行精厲過分雙目失明乃思惟曰幻身非有病從何來身心一齊放下端坐七晝夜眼仍平復如常尋入吳渡江歷補陀辛卯說法越之止風塗廣濟蘭若有澄鐵𭪿者以所得來見師勘驗間知為法門樑棟乃出休所授囑累焉有五乳峯前無鏃箭射得南方半箇兒之句師以大法肩承得人可謂無事乃遊吳抵秀州福城整飭東塔次走江西雲居匡廬赴將臺山請而越中緇白力挽之主寶林當萬歷甲午也未幾示寂嗣子迎遺骨塔於顯聖之南山先是師在越以寶林眷眷於懷汰如何公以為必清涼後身乃載之高僧傳焉建昌府新城壽昌無明慧經禪師撫之崇仁裴氏子生而頴異性無嗜好九歲入鄉校便問浩然之氣為何物塾師異之長依廩山常疑金剛四句為必有指據偶閱傅大士錄有若論四句偈應當不離身之句不覺灑然時年二十四知有此事遂辭山結廬峩峯閱燈錄於興善章僧問如何是道善曰大好山有疑日夜提究至忘寢食一日因搬石正極力推次忽然有得走呈山山詰之應對有緒遂與剃染受具自是二十年不出山有偈曰野獅不噉人間食十二巫峯得自由養就縱橫無礙力崑崙翻轉作瀛洲偶一僧問曾見甚麼人來便住此山師以總未行脚對僧曰豈可以一隅而小天下乎師然其言急擔囊首謁少室會無言主席與論旦夕言喜師出語奇特因與當道尚父熊公請就寺示眾一時緇白歎未曾有尋入五臺訪瑞峯通南還受閩建董巖結制請一香為廩山拈出也後遷壽昌寶坊峩峯三剎三剎得師唱道皆煥然一新上堂諸佛常時說法不須擬議猜詳且道說的是甚麼法天地元黃宇宙洪荒不論通宗透教祇貴直下承當承當箇甚麼雲騰致雨露結為霜蛟龍不宿死水猛虎肯行道旁透得者些關棙何須願往西方不問先佛後祖鼻孔一樣放光作麼生放光化被草木賴及萬方釋迦不肯漏泄達磨九載覆藏峩峯不惜口業直下為你宣揚且作麼生宣揚罔談彼短靡恃己長上堂拍案一下曰向上一宗難為措置大用大機怎容擬議等閒垂一句如太阿鋒離匣觸之者死不移時似塗毒鼓受撾聞之者喪不旋踵所以道妙峯峻峙異獸難藏寶樹晶光靈禽莫泊其用也單趁金毛歸野窟直追鐵額入深山掃天下之攙搶拂世間之孽屑提墮阬落壍之類揭迷封滯殻之流其功也使法界世界虗空界一體同觀俾佛道人道地獄道萬法融會雖然猶未是向上事須知更有出格限量外一句且作麼生是量外一句正令未施先斬首大機纔展佛魔悲上堂南泉道三世諸佛不知有黧奴白牯却知有恁麼則三世諸佛齊立下風且道黧奴白牯有甚長處首座曰為他金烹大冶玉出藍田師曰寶坊者裏總與趁出何故秉綱立紀振叢林海晏河清正令行好漢盡驅歸寶所化城推倒不留人座曰某甲則不然師曰汝作麼生座曰閒擔布袋渾無事笑等街頭一箇人師曰也是閒絃子師問僧趙州道臺山婆子為汝勘破了也畢竟勘破在甚麼處僧曰和尚今日敗缺了也師曰老僧一生也不奈何好教你知若實會舉似看僧擬進語師打一棒云者掠虗漢師登古希尚混勞侶耕鑿不息丈室翛然唯作具而已嘗有偈曰冒雨衝風去披星戴月歸不知身有苦唯慮行門虧益王嚮師道德屢加襃敬嘗曰去聖時遙幸遺此老萬歷丁巳臘八前一日自田中歸謂眾曰吾自此不復砌石矣眾莫諭其旨除夕示眾曰今年只有茲時在試問諸人知也無那事未曾親磕著切須痛下死工夫云云末復曰此是老僧最後分付切宜珍重明正三日示微恙遂不食其教誡諄諄倍常時眾環侍不懌師諭以偈曰人生有受必償莫為老病死慌拈却無生法忍自然業識消亡一時雲淨常光發佛祖皆安此道場十四作書辭道俗十六書舉火偈次晨盥潄拭身已索筆大書曰今日分明指示擲筆端坐而逝七眾為失依茶毗頂骨牙齒不壞塔方丈後世壽七十一僧臘四十四憨山清云師不唯法眼圓明一振頺綱而峻節孤風誠足以起末俗葢實錄也
