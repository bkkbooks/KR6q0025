別云逢人不得錯舉師在法堂前當路坐衆僧出堂見師作禮師問去不得時如何衆擬議代上前踏倒便行師拈竹篦便打一僧云也要和尚頂門具眼師又打云我只是盲錐瞎棒問古人入門便棒意旨如何師云鈍置人師單上燕坐侍者佛事回整衣作禮師拈數珠問云喚者箇作甚麼侍答不契師自代云某甲不曾人事和尚何用免禮衆僧參師拍案云被人一拍粉碎時如何一僧禮拜而立師云死一僧展兩手師云了一僧作禮云何幸如此師云盡力道只道得一半進云請和尚道師云父母所生口終不為子道一僧云道過了也一僧云謝師指示師云盡力領話也只領得一半蓮代僧云和尚看手痛問僧如何是呌不應底山谷進云今日被和尚呌著了別云諾師便打僧問如何是本分事師曰管人家煙沖大小僧問撾鼓鳴鐘所為何事師曰換人眼睛師問僧元沙是汝虎話你如何會僧舒五指云牙爪齊露畫虎不成反類犬師便打復示偈云生平不出嶺一語古今傳明眼人難會君須向上看師問僧向父母未生前道將一句來僧云八角磨盤空裏走別云惡情悰師指香盒云者是甚麼僧擬議師便打僧無語師云真誠莫作小兒嬉問行堂云飯桶裏多少達磨眼睛堂罔措問火頭三世諸佛向火𦦨裏説法還端的也未頭亦罔措師指旁立一僧云惟有者箇師僧解答話他亦未在便歸方丈園頭問和尚病好了麼師云我從來不病有何好不好進云某甲不能親近得和尚頭語藏鋒師云我日日在你園中別云我今日卻到你師一日入庫房指團子問庫頭吸盡西江即不問你試吞却者箇籮團子看進云吞却了也師云大衆喫箇甚麼頭答不契師自代云樂則同歡僧問不與萬法為侶底是誰師云桌子板凳更須道始得會麼師從龍淵歸問侍司云你十二時中還見念起處麼進云念頭了不可得更覓甚麼起處蓮別云今日捉敗和尚息別云某甲不間不欲祇對師云適來見一塊石有九十九條縫修殿公務作禮師云釋迦老子向灰瓦上轉大法輪甚麼人得聞欲得不招無間業莫謗如來正法輪衆無語師云好生看取壁侍司作禮云請和尚答一轉語師云問來進云聞底事作麼生到處尋人屎橛咬不是好狗師云逼塞虗空無縫殿東西南北月輪紅説得道理好江上歸師問衆云大地無寸土是甚麼人境界甚麼人不是者箇境界一僧進云和尚家風師云如何大地無寸土是山僧家風莫攙行奪市僧不能答師代云常州湖州杭州蘇州為甚麼不道僧問大地山河即不問一毛頭上事如何師云吞取七箇八箇別云張家鑷子用得進云不會師云吐却兩箇三箇別云眼睛頭鼻孔裏僧問如何是萬法歸一師云天圓地方別云你去借箇算盤來進云一歸何處師云地方天圓別云不會大歸除且學小九九僧問百千法門無量妙義如何是第一義師云橫七豎八拈云不是橫七豎八問如何是本來面目師舉扇示云不得喚作扇僧禮拜師云伶俐衲僧卻似和尚伶俐問前不得後不得時如何是出身處師云前去佛殿後去東司為甚不得別云莫進法堂問僧父母未生前道來僧以手外拱云遍界不曾藏師云遍界不曾藏因甚偏向那邊僧無語代云又恁麼去也師云何不道某甲指東畫西僧參師云承你遠來無可供養將五間禪堂與你一口吞却進云大地無寸土吞箇甚麼師云多少人恁麼道苕帚柄也要打三十師問圓證堂寮主云香爐幾時成佛進云成佛久矣師云昨夜被虗空壓碎你還知麼僧擬議師云脫空妄語漢親言出親口師雲覆菴歸侍司中路接師云你來得遲將前面遠山與你作點心侍擬議代云恁麼道爭消得某甲遠接拂袖便回師以拄杖驀面劃一劃云再加一分嚫錢進云也不得將別人家物作人情師云不但嚫錢點心也消受不起客問士大夫可學道乎曰噫難言之矣士大夫不可學道乎曰噫是何言歟客驚異曰師半肯半不肯何也曰吾明語子世之言道者不一教子問道於我豈非了生脫死見性成佛之道乎此道不可以有心得不可以無心求離婁無以用其明師曠無以用其聰公輸子無以用其巧寧武子無以用其愚不能忘身不可以學道不能忘心不可以學道不能忘世不可以學道名不能忘不可以學道利不能忘不可以學道妻拏眷屬不忘不可以學道家園事業不忘不可以學道知見不忘不可以學道記習不忘不可以學道喜有靠傍不可以學道貪易畏難不可以學道而士大夫果能如是乎然而舜何人也豫何人也況佛稱兩足尊士大夫非福慧具有之人乎倘把智慧不向他處唐喪猛看破此身虗幻一息不來即便敗壞此身尚爾無可把捉身外更有何可留戀努力向天地未成人物未立自己身心亦無之前一回證自廣大性體方知自性本自清淨本自具足本自不生滅自天子以至於庶人無一不宜為無一不可到豈士大夫而云不可學道哉客問何等士大夫易於學道曰具足三事者易於學道何等三事一知有三世若不知有過現未來則上者勉為聖賢而不高遠下者尋常修省尚未必能況可與言出世之道二者知畏三世知而不畏與不知者相去無幾三者知了三世畏而不了終被三世之所籠絡所言知者灼見性滅論之謬眼見耳聞多過現未來之感應不可不信今生所處之順逆由於前生所為之善惡今生所為之善惡關乎後生所處之順逆一當安分順受二當防微杜漸何以云安分順受今生仁而夭貞而厲皆係前生之因無可怨尤今生富而貪壽而忍皆感後世之果無可僥幸如是知者具有學道氣分所言畏者猛念三際輪回相續不斷一念之差升沈頓異且不獨惡可畏而善亦未足恃縱今生修為盡美安知來生處順境而不迷乎知此而不坐臥不安飲食無味者未之有也如是畏者具有學道階梯所言了者三世之妄本於一迷由前世迷自本性認物為己以四大為身以對境而生者為心增長妄想妄業故感今生妄身妄世今世復迷自本性認物為己不知四大虗假心本無生則現在復多妄想妄業而成來世妄身妄世若欣慕從上佛祖無量劫來喫盡千辛萬苦覓得捷徑底法門教人於身心世界未有以前識自本性則便本自無生何滅之有現在尚不可得何過去未來之有方知也無人也無物十方世界海中漚一切聖賢如電拂然後不妨乘自願輪於無生死中示有生死於無身世中示有身世於無三際中示有三際出沒卷舒如同夢幻求如是了者方可以學道官問學道如何不蹉路曰善哉斯問世之不參涅槃堂裏禪者難乎其不蹉路矣雖然當今傳法者遍界方等行慈不擇淨穢開闡無遮度諸疑謗先進者以廣接為心後進者以易入為事知名盛而實衰辨名似而實非者難道全無敢謂罕有吾言之安足為人重而可與子深言之也哉客固請曰如子之不以人廢言吾姑與子漫言之學道欲無首越之燕之歎第一須發心諦當或志小見近圖作世間善人只消讀治世聖賢之書行治世聖賢之事或遵行如來權教法門助其修省亦有益無損若欲究竟出世無上妙道當顓為生死始得顓為生死則博聞強記如慶喜一問十答如香嚴百鳥銜華如牛頭千指繞座如夾山尚須捨己從人況降斯而下者乎不為生死必尚知見此道不屬知見不為生死必務功能此道不屬功能不為生死必慕豪放此道不屬豪放一尚知見務功能慕豪放則非愚即狂成魔落外善因而招惡果多自不顓為生死學道者而成豈不一蹉永蹉哉第二須工夫諦當既為生死發心學道可不返躬自省果能具大根器一聞千悟也未若也未能須參一句話頭一日不透一日參一月不透一月參一年不透一年參一生不透一生參今生不透來生參永無退失永無改變方謂之諦當工夫參定一句話頭便是斬知見稠林之利刃渡生死苦海之慈航解雜毒入心之聖藥指萬古迷津之導師不集善而自集不斷惡而自斷不持戒而自戒不習定而自定不修慧而自慧不課佛而自課不誦經而即誦不求生勝處而自生勝處不求多善友而自多善友本不求譽亦莫可毀如是顓一如是精進如是久遠縱未發明亦現在可為後學規模將來必得佛祖心髓儻名色為生死學道而起傍疑求別助生異見多外鶩憚艱辛喜快便管教百妄交集其蹉可勝言哉第三須悟處諦當既顓為生死純一參究必待工窮力極時至理彰命根斷本來面目現不疑生死不疑古今不墮坑落塹不強作主宰不認識神不陷空豁不涉矯亂不入邪師圈繢不犯明眼料簡儻魚目為珠瞌睡當死以鹵莽承當為有力量以硬差排為不疑以粗放狂亂為大機大用以顢頇為透脫無餘竿頭宜進而不進言句應參而不參不煩穿鑿而穿鑿不可抹殺而抹殺入門一蹉異解雜陳所謂可痛哭流涕長太息者非此類乎第四須師承諦當非但無真傳杜撰阿師不可承虗接響即沿流不斷者亦須察其行實不擔條斷貫索謬自主張蹉過師家相為處否不孤負師家腦後深錐否洞明從上綱宗否不施為偏重瞎人眼目否若無真正作家宗師為之打瞎頂門眼奪却肘後符則雖有實悟自了則可為人則禍生儻若己見既偏投人又謬自方空豁復向瞎棒瞎喝下似水合水如空合空謬執金剛寶劒斬盡一切為實不知我王庫內無如是刀盲引衆生江河日下或自入處廉纖沾著邪知惡解家滋味邪毒入心如油入麵更或不知錯認漫云自肯不受人究竟謂之不被他轉却又或云我見處是底只要行履了此等何足挂之齒頰第五須末後諦當末後一句始到牢關靈龜負圖自取喪身之兆不透末後牢關而言得大機大用不透末後牢關而言具本分草料其不為粗惡狂徒者鮮矣不透此關有正悟者猶可謂一時唱導之師如無正悟不知有此關者其於古人參悟與悟後重疑不移前作後指悟為迷者鮮矣謗先聖誤後人皆由不知向上一關可不畏懼乎自利不全利人不足皆由不知向上一關可不惕厲乎第六須修道諦當雖發心諦當工夫諦當悟處諦當師承諦當末後透脫諦當更須自己覺察是頓悟頓修根器否是果地善知識否打成一片速於香林否不走作過涌泉否現業流識淨盡否事事無礙否行解相應名之為祖試看先宗是何標格第七須為人諦當不可實法與人不可騙人云有方便助汝易入不可教人不參死話頭決要人真參決要人實悟決要人悟後達向上關棙決以見性謂之悟不可輕意牢籠人於人認識之謬哄云有省於人向念未生時認妄為真印云有入圖一時門庭熱鬧不顧展轉誤賺邪法縱橫病發於此寧絶嗣不亂傳方謂之為人諦當前六種不諦當則自錯後一種不諦當則錯人良藥苦口忠言逆耳憐子請之誠而示之甚弗輕以語人示𡿄侍司在堂中不要學佛學法辨古明今當毒眼孤瞪無佛無祖無人無己放出蓋天蓋地志氣來東拂於逮橫身西瞿耶尼展腳南贍部洲啜飯北單越撒溺語默超越常情動止迥殊舊習天神捧華無路人鬼捕無門果能如是不變不雜等間舉起鈍刀子也能殺也能活也能照人肝膽也能稱人伎倆把從上千七百老古錐遺下一言半句或是作家相見或是出格提持或嚴密或危險或泥中有刺或沙裏無油或人目為誵訛或人目為奇特千岐萬別駭狀奇音逢著箇鈍刀子自然如庖丁之解牛由基之繞樹豈他穿窬擔板亂統支離者可同年而語哉然猶未也并知山僧與麼庭訓亦是憐兒不覺醜方是有氣性衲子祖師云行解相應名之曰祖又曰明道者多行道者少如斯料簡豈是等間今時有等無忌憚者擬為佛祖苗裔得些見地全不修省難免道力不勝業力又安望其透末後句向上關哉戒之勉之康熙十四年八月初十日命沐浴澡身昧明時説偈曰本自無生今亦不滅此是正説餘為魔説端坐而逝塔於半山之東塢菴世壽六十二臘四十京口夾山林臯本豫禪師晚號晦夫崑山陳氏子十九脫白於姑蘇之堯峯誦金剛經應無所住而生其心句有省初參博山來來曰未入金籠貯誰家野鳥兒師曰鶴有九臯翀碧漢馬無千里不追風來曰運斤非郢未免傷痕師曰祇如諸方豎拂揚眉又得恁麼邊事來曰片雲橫海嶽樵子盡思歸師曰怪來巖下虎特地暗驚人次參密雲悟和尚其日已晚便問夜宿投人時如何悟云者裏歇不得師曰豈無方便悟拈拄杖師接住一送云看破也便出後參磬山修和尚修問那裏來師云武林修云怎知我者裏師云臭名難瞞修云汙汝耳師便喝修云喝後何如師云猶是不知修云老僧不知汝知箇甚麼師擬掌修云猶弄虗在相罵饒你接嘴師禮拜一日修云今時學人著實用心所以法門寥落師云雖然如是大約過在知識如黃龍南公不得慈明和尚痛折云何得知道出常情修云豈口傳耳授之所得耶師吐舌又一日入室修云我疑你不會廓侍者與華嚴相會因緣師云不但和尚疑某甲盡大地人疑某甲修曰盡大地人疑你則可莫使老僧疑你師曰恁麼則某甲罪過修曰只如興化與旻德賓主四喝化曰適才若是別人三十棒一棒也饒不得何故為他會一喝不作一喝用那裏是他會一喝不作一喝用處師曰放某甲別通箇消息修曰不要下語師遂頌曰賓主相逢縱奪家喝下從雲見活蛇棒頭突出通無犯豈作親承解撒沙修然之師開法中山石湫乃過報恩謝法修將如意付曰此是老僧四十年用不盡底將去揩磨不得有忘如何是不忘師秉如意入堂曰者箇是堂上老人為豫上座作用不盡底公案敢問有同相證用者麼良久擊板頭一下便出雖然無人也要板頭證明上堂若論此事心不可求智不可學揑斷百匝千重於中下機一時揚却突出孤危方教峻峭都盧收拾將來非心非色非如非異要用即用要舍即舍要行即行要藏即藏擬思一毫地便落生死關頭到者裏作麼生相救得復曰五蘊山頭自在身了然物物應天真頓教直下無思議元要全分見本人卓拄杖一喝示衆十五日已前汝諸人放出山水十五日已後汝諸人坐斷柴頭正當十五日山僧看破汝諸人一著要出出不得要入入不得出不得入不得火裏眉毛烏歷歷自家鼻孔急須參碧眼胡僧恆面壁師一日開山次握枯藤於手謂僧云此是曹家女僧云却少箇謝家郎在師曰但得有女何愁不郎僧云也要全完始得師度藤與僧擬接師即擲下云却不相當老眼無花僧問三更月落後古殿燈殘有一箇沒面目人來如何相見師曰笑殺人笑殺人曰和尚笑箇甚麼師咄云問頭也不識僧問如何是諸佛出身處師云須彌倒卓半虗空曰如何是透法身事師云猢猻吞大象僧問如何是虗空師云你亦在裏許僧云某甲不見虗空師云者瞎漢好與三十棒為伊見有虗空示衆石裏壓油水中取火不是動轉勞人祇貴當陽吐露趙州老子太惺惺切忌道青州布衫重七斤僧問明月堂前花開枯木是賓家句主家句師云石女哭蒼天僧問天不蓋地不載甚處安身立命師打出方丈次日又問某甲昨日喫棒今日和尚痛否師復打出不負來機順治丙戌冬預計逝日説偈辭衆窆全身於山門之右天童忞禪師銘其塔著有宗門誠範四卷并語録行世杭州南澗理安箬菴問禪師吳江俞氏子幼失恃病甚飲酒不自好年十六始自驚曰奈何使身心無措足之地哉奮志讀書一日偶過山寺見楞嚴經云此身及心外洎虗空山河大地咸是妙明真心中物有疑特走謁磬山修教看父母未生前本來面目話一日修與客立澗邊提金剛經師開口修驀劄云如何是其心當時不覺自失二十四歲姻事苦逼竟宵遁至武林脫白嘗夜跪佛燈下單提父母未生前本來面目話不契決計參方聞金粟悟和尚在北禪腰包趕入吳中得蒙痛棒垂示復上磬山又遇山茨際公同在山中五更聞得一陳風聲疑情頓釋目前淨裸裸地了無一法當情直是通身慶快作偈云千元萬妙隔重重箇裏無私總不容一種沒絃琴上曲寒崖吹落五更風呈似修修云元妙即不問如何是不隔底句擬對被棒者裏却又去不得修見師疑滯示一頌云千波萬浪隔重重識得源源處處通根境脫然全體用拈來物物始從容看頌亦自了了却是臨機不得活脫自由一日頌百丈併却咽喉脣吻云併却咽喉脣吻三人口闊一尺夜半露柱相逢橫吹無孔鐵笛呈似修修云露柱還有口麼師云熾然説修云道得一半夢也未夢見在説甚一半師云和尚又如何修云此問復何來當時被者一撥直下如團熱鐵火相似次日呈似修修云不得燒却眉毛師便喝修云燒却了也師轉身云看者老漢一場敗闕方才不受人瞞上堂望剎竿便橫趨而過猶是不唧𠺕漢電影裏穿針弓絃上走馬也須是箇衲僧始得匙挑不上底如稻麻竹葦千劄不回底亦如稻麻竹葦截斷天下舌頭即不問如何是汝諸人全身獨脫句舉拂子云漫天網子百千重上堂我者裏禪無你諸人歇足處無你諸人依傍處無你諸人計較搏量處直下如一團熱鐵火𦦨相似你才擬歇足燒却腳跟了也才擬依傍燎却眉毛了也才擬計較搏量自己早打失眼睛鼻孔了也你若總不恁麼又有甚麼氣息湊泊也湊泊他不得躲避也躲避他不得除是你猛烈提取始得道箇猛烈提取已是蹉過多時也到者裏你諸人作麼生顧左右擲杖歸方丈雪嶠信和尚至問你是那邊為甚麼又在者邊師曰一點墨水兩處成龍念話社家有甚麼氣息信曰不會興雲作霧在師曰今日放大師過茶次信曰我平日只教人誦金剛經師曰多少人錯會大師意信曰直饒不錯會大遠在師曰大師莫瞞人好山門前行次見狗子吠信曰者無佛性底東西師曰却搔著大師癢處信大笑師亦大笑大衆作禮次信左右顧視衆佇立信曰都是老實頭師曰大師面前誰敢出手山茨禪師問釋迦掩室淨名默然盡屬化門邊事不落今時請師道一句師曰未問已前答了也曰阿誰證明師曰十字街頭廖胡子又問先師不了事你我共知作麼生與先師了却師曰蒼天中更添冤苦曰非兄不委師曰逢人切忌錯舉又問十年同學唱拍板不相離此去理安兄還見我否師曰無人處斫額相望曰渠無面目望箇甚麼師曰草賊大敗問拈椎豎拂即且置斬新條令道將來師曰一掌一握血曰須老兄始得師曰是我罪過又問談元説妙先哲所訶瞬目揚眉今時禪弊去此二途如何是兄的的為人處師曰我不教壞人家男女曰忒煞婆心師曰龍蛇易辨衲子難瞞僧問大悲千手眼那隻是正眼師云急水灘頭下釣絲僧問對面不識時如何師云刀斧斫不開問如何是法身三種病師曰灸瘡瘢曰如何二種光師曰著則瞎天童和尚至師領衆出迎云遠離太白來到錢塘道路炎蒸請師暫駐尚劈脊棒云者裏是甚麼所在師云恁麼則千峯勢到嶽邊止萬派聲歸海上消尚又打一棒師約住拄杖云請和尚尊重尚收拄杖師云大衆禮拜衆禮拜師近前人事者兩棒不愧臨濟兒孫黃司理海岸居士相訪云幾時到者裏師云臘月二十士云曾在那裏相會來師云忘却了那士云曾在磬山相會報恩相會師云當面蹉過茶次士舉五祖演因緣問如何是下載清風師云知音者少別云更不説他士云非師不委師云且請喫茶別云莫相帶纍士云作家師云逢人切忌錯舉別云屎臭氣吳宏度居士相訪云弟子根鈍師云若鈍爭得到者裏別云將出鈍底來看士云求和尚開示師云今日新到放居士三十棒唐祈遠居士問心不負人時如何師劈面一掌士禮拜師云若到諸方切忌錯舉一日因火起士問大地火起時如何師云看取眉毛士云還有燒不著底麼師掇轉身云你不會我語周臺公居士問承教亦深明此事奈日用打失處多師云還知日用有打失處麼士云知師云何曾打失苦瓠云打失了也不見道知之一字衆禍之根甜瓜云何曾打失不見道知之一字衆妙之門葫蘆子曰你兩箇未識根蒂在馮鎮臺孫明府請齋次馮問達磨西歸因甚猶遺隻履師云也要留箇榜樣蓮別云不妨疑著馮為點首孫云祖師滅度了麼師云若滅度爭得今日鎮臺點首蓮別云阿誰恁麼問僧問如何是娘生褲師垂一足別云天陰沒處曬進云娘未生時如何師收起足別云問爺去僧問一貧徹骨寒時如何師云我有一件破衲頭要便與你別云脫下破衲頭僧擬議師云穿不著非干我事別云褦襶子古石侍次師問你做甚麼工夫石云參三不是師云作麼生參石佇思師與劈面掌少頃進方丈云適來承和尚提挈分明是箇賊師云劍去久矣汝猶刻舟石擬議師趁出僧問薰風自南來殿閣生微涼意旨如何師曰好箇消息僧擬議師以茶驀面潑僧參師問那裏來僧云天台師云寒山逢拾得拍手笑呵呵是天台語不是天台語蓮便喝息云向下文長付在來日僧擬對師便喝僧亦喝師云你看者瞎漢僧擬議師云諸方頭破腦裂者裏自領出去師上法堂舉臨濟一喝不作一喝用衆下語不契自代云請和尚歸方丈昱上座云可笑今時人都作喝會師云你作麼生會昱云看者老漢一場敗缺便出師呵呵大笑七僧參師云更有一箇因甚不來蓮便喝僧擬進語師便喝僧擬議師打出僧參師云那裏來云五臺來師云文殊騎底獅子如今還在麼僧云在師云在甚麼處蓮便掌僧擬議師與劈面掌僧參師云一向在甚麼處撞頭磕額僧無語師云無繩自縛去死十分僧參師云那箇是師子兒僧便喝師作怕勢僧拂袖便出師云看腳下僧又喝師云不信道僧問白雲出在青山裏因甚青山却被白雲遮師云山僧不曾眼花問真金不怕火因甚入火便鎔師云瞎別云須是我打你始得問冤有頭債有主因甚桑樹著箭柳樹出汁師云納盡敗闕別云老僧切疑著問如風吹水自然成紋祇如風未生時紋在甚麼處師云露也問大用現前不存規則因甚方木不投圓竅師云你是甚麼心行別云莫存規則問一切衆生皆順孝道因甚土梟食母師云冤家路狹掌云我與你一彈子問啞子不説話因甚吹笛又有字音師云切忌錯流傳問春到人間無硬土因甚枯木不開花師云手忙腳亂作麼問冬至一陽生因甚天道愈寒師曰不許夜行別云皮毛見解問菩提本無樹因甚一花開五葉師云你那裏得者消息別云不道無樹祇是無根二僧參師問那裏來僧云金粟師云我問你那裏來僧云金粟息代云和尚何不領話師便打問第二位云同路麼云不同師云十方薄伽梵一路涅槃門為甚不同僧禮拜息代云道甚麼師亦打僧參師云你喚甚麼僧云初吐師云是日是月僧擬議代云非日非月師云有名無實漢僧參問不歷階級請師相見師便打僧云不虗枉見者員尊宿師又打僧禮拜師云前一棒且置後一棒你作麼生僧擬對大好不落階級師直打出二僧參一僧問從上宗乘即不問主賓相見事如何師便打僧云人居大國方知貴水到瀟湘一樣清師又打云你且領者棒僧云和尚得恁老婆心切師復打僧云若不登樓望焉知滄海深師擲拄杖云勘你不破勘破了也又問第二位同行麼僧云是師云也放過不得僧云知音不在頻頻舉師云你試道箇知音底句看僧禮拜云今日親見和尚師云恁麼則放過面皮多厚少問猛虎入室時如何師曰冤家路狹進云擺尾搖頭去也師云者畜生性命也不顧師一日舉古德垂語我三十年前曾斷一人命根而今日夜憂愁如何免得一僧下語云射虎不真徒勞沒羽師問如何是真虎僧作虎聲師便打僧云賊過後張弓師笑云祇道得一半首座云某甲亦有一語心圓亦有一語師云如何座云洎合放過問僧既是師子因甚被文殊騎僧云祇知文殊騎却師子不知師子騎却文殊師云文殊騎却師子人人盡知師子騎却文殊你向那裏見得僧將傍僧抱住云看看別云者畜生更𨁝跳師