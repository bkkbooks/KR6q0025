body:
  text: 心圓居士拈別火蓮居士集梓六祖下第三十五世湖州報恩玉林通琇禪師蓉城楊氏子童子時一長者令諸晚學各閉目一回反觀念起衆童子各言起念畢師良久云某甲反觀無念可得彼時長者若疾與一掌桶底脫也未可知參天隱修和尚於磬山命充侍司隨堂坐香一夕未開靜即進方丈修見云今日香完何早師云自是我不去坐香修云見甚道理不去坐師云即今亦無不坐修驀拈案上石屋録問云者箇是甚麼著賊也師云却請和尚道跕起來了修云你不道教老僧道見他跕起便抽踏板師云情知和尚不敢道跌倒了修云石屋録我為甚不敢道賊賊師云隨他去也被賊殺了修云贓誣老僧殺了人還要問死者底罪惡毒師者裏透不過直得大淚如雨一晚目不交睫立修單側竟忘入寮至五鼓修呼云不用急我為你舉則古話當初有箇龐居士初見人時也似你一般孤孤迥迥開口便問人不與萬法為侶者是誰馬祖當時為甚踏向前一步云待法一口吸盡西江水即與汝道師云某有一頌修云汝頌云何師呈頌云不侶萬法的為誰誰亦不立始親渠有意馳求轉暌隔無心識得不相違修云不問你不侶萬法要你會一口吸盡西江水師於言下大悟乃拂袖而出自後凡有徵詰皆當機不讓修深肯之師掩關蓉城江干修遷武康報恩連書促師云老僧在報恩精神日不如前當知我必不久人世得書即來有最要語分付師得書破關詣修不作禮近前叉手云狂兒國土父不容過者箇峯頭還是老漢住處麼修云你且跕下腳與你道師驀掀倒香案而出修高聲云將拄杖來師遙應云劒去久矣次日修上堂維那擬白椎師喝住云待我問了話白椎便問云昔日大唐國裏無禪師而今國裏還有麼修拈拄杖作打勢云看棒師便喝修亦喝師復喝一喝轉身云不是狂兒多意氣祇因曾透上頭關便出修喝一喝師亦喝遙聞維那重白椎師乃高聲云歎死氣宜興衆檀越入磬山請老和尚小參尚驀豎拄杖云大衆急著眼看卓一下云天得之以覆育地得之以生成君王得之恩被萬物羣臣得之報國祐民且道衲僧家得之又如何施設師時侍側驀掀倒香案云截斷天下人舌頭便出堂尚擲下拄杖擎兩手作修羅勢振威一喝便下座顧視兩旁一衆失色尚復轉身召云大衆便歸方丈師隨後禮拜云適來觸怒和尚尚云好與三十拄杖隨聲拈棒師迎上掌云即今便打説甚好與尚亦打師約住拄杖尚注視師即聳拄杖云須還者老漢始得竟休去尚擲下拄杖大衆作禮至晚尚與玉峯洪師焚香對坐喚師云今夜洪師叔在此為汝證明我且問你譬如大將出征自家副將可好衝陳底更與一掌師云和尚作者箇語話掉臂竟退尚笑呼曰來老僧亦要説些老婆禪峯云他驟然一來四衆無不驚張底師兄下了座都還照顧不來不出禮送尚云當初黃檗起來打維那我今日轉身召大衆你道是同是別峯唯唯尚乃謂師云你一向要坐關我今許你也翌日侍尚飯畢擬收碗出尚舉拂子語師云此拂收放自繇隨處用得特付與你師收碗竟出尚乃懸拂禪牀角師後有出山意乃白尚云某他去結廬求賜一扁尚大書報恩堂三字與之師復作禮云昔者師執龜毛拂謂某云此拂收放自由隨處用得特付與你某時放之公所一任大衆觀瞻今思事無一向作偈收之尚云偈聻師拈拂便打尚笑云兒大欺爺聲未絶師云不勞讚和連打兩拂而退報恩庫房有二貓師攜至方丈問老和尚云那一箇好劈頭打出尚指左手底云者箇好知而故犯師驀擲下而去還我真面目便得大便宜二貓皆幾死尚問旁人云死了耶知而故問移時師復入不了事漢好與三十棒尚云你又來乃趁出師云老漢真箇無殺心至後尚出貓猶在地師入更與一踏貓亂輥殺人須見血尚趕進賊過後張弓師已從別路出尚拈棒直趁至門外打且作死馬醫衆皆集師轉身云和尚也掙命尚便打不奈船何只打戽斗師約住作掌勢尚復抽杖打師拗折拄杖用不著者條斷貫索擲地歸寮尚復至寮外高聲云重宣此義你不知鼠底害只欲行祖師門下事誣人之罪以罪加之師云説甚麼祖師不祖師尚云與麼為甚踏殺貓喫屎見解師云和尚作者箇説話入地獄如箭射真真不通懺悔者矣尚低頭入方丈至晚特特小參為人須為徹舉前因緣至低頭入方丈處云老僧到者裏罪深孽重性命幾合不存衆中有人代得一轉語相救老僧麼箬菴禪師出衆云又是一箇入泥入水不惜性命底大衆和尚今日普請拂袖出從空伸出拏雲手提起天羅地網人雖然如此也只救得一半尚云過去了也師亦厲聲云箭去西天十萬里猶在大明國裏擬議便退尚卓拄杖云雖然如是不因漁父力爭得見波濤一僧驚倒欲遁去師乃呵呵大笑箬菴救取一半心圓今日也救取一半舉了拈拄杖卓一卓召大衆云休懊惱直下回頭莫更討復卓一卓系以頌曰插標賣首者帶水復拖泥磨洗人間劒霜鋒的未虧住報恩上堂拈拄杖曰奇特因緣須奇特人拈出驚羣句子於驚羣處舉揚今日既遇奇特人有奇特緣真是驚羣處舉驚羣句且道驚羣句作麼生舉驀召大衆曰吳中石佛大可謂雷聲浩大雨點全無示衆舉道吾每執木劒因緣云吠虗逐塊韓盧咬著半醒半醉漢子終不免大家草裏輥道吾若於者僧才欲取劒便一腳踏翻儻其知非不惟令彼頓易皮毛自亦頭正尾正那堪不示本分草料木劒竟成戲具示衆透脫末後牢關雲菴正罵洞達歷祖綱宗妙喜猶呵汝等諸人趣向者箇法門大須仔細前溪水急魚行澀後嶺風高鳥泊難近來佛法不如此前溪水緩魚行駛後嶺風低鳥泊多示衆舉殃崛摩羅産難因緣云且道世尊者兩語是箇甚麼道理得恁麼靈驗救得人家産難驀喝一喝云莫做夢山僧為汝諸人説箇譬喻恰似人來買生薑世尊乃與他一大把人參其時將去竟作生薑受用帶纍人亂咬嚼吞了吐不得吐了吞不得如今者裏有不亂咬嚼底出來山僧與汝三十拄杖何故世尊當年折本山僧今日與他上利拈云爭奈世尊當年無本可折致令心圓今日有利難上示衆舉唐州大乘遵禪師上堂云上來又不問下去又不疑不知是不是是即也大奇師云其時無量大衆一時成道別云上來只管問下去只管疑雖然都不是不是也大奇擬教無量大衆甚處成道師問僧樹凋葉落時如何僧云不隔一絲毫蓮別云青皮光棍打秋風圓呵呵云今日不宴客師云機不離位墮在毒海僧喝師便打居士問明知日用不離者箇為甚麼道不得師云知之一字衆禍之門僧問昔日高祖道海底泥牛銜月走巖前石虎抱兒眠鐵蛇鑽入金剛眼崑崙騎象鷺鷥牽意旨如何師曰好兒終不使爺錢示衆山僧説得一篇好佛法懸在雨花橋上大衆各自看取良久曰伯樂曾三顧千金誰解增贈君君不納完璧倚枯藤示衆舉世尊才生下一手指天一手指地周行七步目顧四方云天上天下惟我獨尊雲門偃云我當時若見一棒打殺與狗子喫貴圖天下太平雪竇顯云便與掀倒禪牀琅琊覺云雲門可謂將此身心奉塵剎是則名為報佛恩天童華云雲門此語雖行未免落他陷穽黃面老子末上賣俏正是依草附木二俱不了以左手拍禪牀云過者邊著汝諸人還知明果落處麼珊瑚枕上兩行淚半是思君半恨君師云激揚酬唱須是其人高山流水老釋迦何期得知音於異世雲門如九轉靈丹若非雪竇琅琊誰能著價然而一椎百當須還應菴好手古人評書云如華嶽三峯卓立參昴雖造化之罏錘不自知其妙也此言雖俗可以喻道示衆舉雪峯一日普請自負一束藤路逢一僧峯便拋下僧方擬取峯便踏倒歸舉似長生乃云我今日踏者僧快生云和尚替者僧入涅槃堂始得峯便休去師於峯便拋下代僧便就藤邊臥又於便踏倒下代僧云好心不得好報有僧自負久參無明重師鳴鼓集衆示云你無明從自負來我且問你盡大地是箇火坑得何三昧不被燒却代掀倒禪牀便行進云何處不稱尊師云者樣逐塊何得放肆痛與十棒擲棒令別下語僧進云通身在裏許師驀拈棒僧無語師云頭破作七分僧又無語師云你者鈍漢與人爭競間氣作麼於山僧驀拈棒別下語來僧無語師打云者裏何不道奪却棒打和尚莫言不道汝既不能我便放過一著你向頭破作七分下一語來僧又無語師云者鈍漢放肆作麼死於機下正是死漢乃問旁僧云者僧犯何約進云破口約乃焚衣擯出舉森首座立僧小參師拈拄杖云山僧有時一句子在諸人日用中諸人若向日用處會未免觸途成滯山僧有時一句子無你諸人用心處諸人若向無用心處會未免當面蹉却山僧有時一句子八角磨盤空裏走諸人若作八角磨盤空裏走會轉見白雲萬里所以道一句中具三元一元中具三要有權有實有照有用千日並照不足喻其明千雷並吼不足喻其威第一句中薦得方可與佛祖為師且道如何是第一句卓拄杖云問取堂中森首座小參師云趙州勘婆子婆子燒菴巖頭末後句者三則語都道是淆訛公案料掉沒交涉淆訛在人公案有何淆訛又道是向上關出格機道聽塗説識甚好惡山僧不惜眉毛如實告報諸方者三箇老古錐一人祇做得箇筋節巡照一人祇做得箇奢遮鋪堂一人祇做得箇伶俐行者用得者三箇執事底任你住叢林住靜室在在高臥羲皇若用不得者三箇執事則便是流俗長者碌碌一生他時銜鐵負鞍莫言無人道過卓拄杖云劒為不平離寶匣藥因救病出金瓶問為甚要者箇巡照師云籬門倩誰關進云為甚要者箇鋪堂師云飯後濃斟一盞茶須是恁麼進云為甚要者箇行者師云傾溺壺執浴巾少他不得和尚被他三箇使了也晚參僧問面目現在為甚摸索不著師云你為甚麼粧呆師語未竟僧喝便行師云你為甚麼又粧伶俐僧無語師召出責令進語進云和尚莫瞞盰師連夜趁出初秋檀越請小參問有中説無無中説有不從外有不從內得作麼生薦取師云西江豎立廬山倒卓師乃云一夏來不肯用心底三十棒肯用心底也三十棒有見處底也三十棒無見處底也三十棒久親近底也三十棒不久親近底也三十棒卓拄杖召衆云常將折筯攪滄溟要汝魚龍知性命和尚棒折也早參師云昨夜六僧參內一未受戒老僧問云頭腦相似為甚有搭衣底有不搭衣底或云來路不同或云出處有異皆不契老僧意大衆代一語看代云謝和尚重重相為良久師乃云學者於尋常事事看得容易被人拶著每去不得還知麼只為分明極翻令所得遲晚參師云屏却咽喉脣吻道將來衆擬議師便喝一僧云和尚何得知而故犯師云將謂停囚長智一僧指露柱云者漢死中得活師云已放過衆作禮退峯頂掩室蘧夫一自竹林來關前作禮云久慕和尚特來作禮恭惟起居萬福師云山路崎嶇遠陟不易一又作禮師云盡大地是箇火坑得何三昧不被燒却一提坐具畫相師指東偏云喫茶去僧舉問穩坐家堂主人公因甚不識師云幸是大人別云你坐了我與你道進云掀翻大海摑碎須彌平地上因甚擡腳不起師云曾問幾人來別云過者邊來進云眼光爍破四天下自己眉毛落盡因甚不見師隨聲便喝僧參師便喝僧亦喝師云我喝你亦喝僧無語代云自誣誣人師叱出僧問如何道廓然無聖師云爍破面皮別云重言不當喫進云如何又道不識師云頭正尾正別云土上加泥更一重僧問無夢無想無見無聞主人公在甚處安身立命師云枕子撲落地打破常住磚僧問無夢無想無見無聞主人公在甚處師云高聲問將來別云看你夢想進云恁麼則承師指示去也師云你不要哄我代僧云某甲慣行險道一僧禮拜師以書示云者是甚麼進云書師云入地獄如箭射僧擬議代云某甲被和尚帶纍師打云更要第二杓僧才入