持高峯六問乞師置答師接得云此乃高峯置得底你既將他問來問何不與他同來士無語蓮代云某甲是他專使師直打出衆侍立次師以拄杖攛面前云道道一僧喝了出師云一釣便上一僧云覿面相呈師云錯認定盤星一僧拾來安舊處師云者僧倒伶俐僧禮拜退出至晚師喚其僧至室中問據你適來做處不道無見你那裏得者三昧來僧擬議代與一掌師云元來掠虗在劈脊打出僧參人事件件數云此是金華底供養和尚師驀豎拳云且道者箇是那裏底僧擬議師云且坐喫茶少間僧進云和尚除此外還有麼師擲下拄杖僧拾安舊處顛倒漢師便掌穿山僧參師問山重重水重重你穿那箇山來僧云某甲不會乞和尚指示師打云與你直頭穿却問如何是某甲安身立命處師云三條椽下七尺單前僧云死了燒了又向甚麼處安立師云却好僧呈偈師徵云當頭一棒即不問如何是你永無疑處僧喝師云好喝復演一齣看僧彈指師云再演一齣看僧頓足師云不妨更演一齣看僧無語師直打趁出問弟子行行可了得生死不師云你行底是甚麼行僧云推礱踏碓師云你還知碓嘴生花麼僧無語師云恁麼却了生死不得師一晚至僧堂云還有開得隻眼底麼試出來通箇消息看一僧便出作禮師打云早被我擦沙在你眼裏了也代僧進語云不是某甲洎被和尚鈍置問如何是諸佛出身處師拈棒便打僧禮拜師云還出得身也未僧無語代云若出得和尚還有拈棒分也無僧參師問高駕何來云徽州來師云來時過錢塘江麼云過師云錢塘江水深多少僧擬議師喝出師出方丈次僧問如何是天童境師云無你跕立處如何是境中人師與一掌云還見麼如何是人中意師推開云速退速退妨我東行西行師一晚入堂大呌云適來闌中不見了牛普請大衆把火上山尋牛去衆愕然一僧才出師便低頭歸方丈虧他逃走得快若被此僧驀鼻扭住痛拳一頓成何體面問諸緣併盡一念不生還了得生死麼師云不得云作麼生了得師云生也生也有二僧至室中問如何是某甲本來面目師掀髯云幾時不剃須較長了次僧復問如何是某甲本來面目師云甎瓦土塊僧參師問那裏來云河南師云我不問河南問你那裏來僧擬議代云和尚若不問某甲實從河南來師揖坐僧乃問達磨西來意旨如何師云你從河南來續云擬謾老僧那一日舉倩女離魂話問衆兩女合為一媳婦祇如未合已前且道那箇是真倩女有一化士出衆云隨身處處安別云瞞和尚去也師休去至次日粥罷命士近前今日有四人居士從永嘉來道你賣却常住三包米你好好依實供通著士愕然師云不勞再勘拈棒趁退師問僧師子窟中無異獸你是狐狼野干來者裏作麼僧擬進語師云咦早見臊氣熏人無語代云恰是師喝退又問一僧你還夢見臨濟大師麼僧云某甲五年前不作是夢矣代云和尚醒也未師云恁麼則衲衣在空間假名阿練若去也僧擬議師便打又如前問一僧僧趨前云今日親見和尚師云你道山僧生緣甚麼處僧云劄師云臨濟大師來也僧擬議師云元來不是連棒打出又問一僧你甚麼處安單僧云前堂左邊師云你枕子昨夜被人移過東海新羅去也代僧疾與一掌云在者裏因甚向琉球國裏東摸西摸無語師喝退問如何是同生不同死師云白首如新如何是同死不同生師云傾蓋如故如何是同生復同死師云伯牙與子期不是間相識如何是生死俱不同師云君向瀟湘我向秦僧禮拜云向後作麼生師便打問如何是承言者喪滯句者迷師云不快漆桶更是阿誰僧擬議師云承言者喪滯句者迷問達磨西來因甚不立文字師云問取達磨云還許學人説道理也無師云許云金屑雖貴落眼成翳師云若是達磨眼睛著得幾百億須彌山俗士問弟子終日在夢何時得醒師云我者裏惺亦著不得夢自何來云爭奈即今見夢何師與一推云惺惺著問問著便打是何道理師云你且禮拜著僧禮拜師曰是何道理僧參師問那裏來云佛日來師云春日溫夏日熱且道佛日如何僧擬議代僧呵呵云某甲有箇頌子待問汝頌云何便與一掌師便喝僧參師問那裏來云宜興來師云長橋下蛟周處斬後近日如何僧罔措蓮代云某甲收得劒在此師笑云參堂去問冬至一陽生因甚天道愈寒師云活人須用殺人刀大用見前不存軌則為甚方木不透圜竅師云白雪陽春和者希相看兩不厭只有敬亭山且道敬亭山具甚麼眼師云萬古常青碧毒鼓當軒擊者為甚麼不死師云因渠置得一晚問衆臨濟德山是佛祖兒孫因甚麼佛來也打祖來也打一僧云鐵牛撞破祖師機師喝退一僧云大用現前無佛祖師云你帶纍臨濟德山入地獄作麼連棒打趁歸方丈一僧隨入云知恩報恩師搖手云不是不是僧禮拜云請和尚代語師拱手云莫怪空疏伏惟珍重僧云那拂袖便出師休去至來朝袖金十兩詣僧堂前白衆云山僧生平伏善蓋為知得利害不見前百丈錯祇對一僧話五百生墮野狐身愈賊愈醜大慈大悲昨晚山僧室中亦偶錯下一轉語致某甲上座簡點一夜不安乃出金云將此辦齋對衆懺悔就今告退院子復指座云便請某甲上座坐者曲彔木牀僧愕然代踢倒便行師云那元來元來又無語師便掌乃據座告衆云恁麼則大須審諦你還知麼祖師門下會與不會總須喪身失命自後不得草草匆匆師晚號夢隱道人乞歸金粟投老於會稽化鹿山之陽明洞天乃自相山擇吉兆塔於黃龍峯下康熙甲寅六月二十七日示寂世壽七十九著有九會録行世寧波府天童牧雲通門禪師病起上堂山僧病百來日不曾與大衆説一元字腳汝等還知真實相為麼癡兒刻意止啼錢便下座上堂安居過半月眉毛共廝結護生須是殺棒棒要見血住山家事忙幹辦及時節面門無位人趕得忙不徹但喜山路深紅塵都隔絶普請出箇坡大家生喜悅緑樹黃鶯飛青峯白雲曳聒聒語林間山禽未反舌坐坐隱蓋亭看看玲瓏穴歸來身正汗浴水又燒熱浴了放腳眠受用極親切大衆天童禪只得如此恁麼提唱十萬八千未是遠在若要商量公案提究工夫朝呪暮呪如教百家姓相似自有無眼阿師在山僧衰邁無暇説得示衆雲門云此事若在言語上三乘十二分教豈是無言跛腳阿師大似病後驗方藥山云若也無言啓蒙何名達者我今為汝説者箇語顯無語底大小藥山誘人犯法永嘉云默時説説時默大施門開無壅塞合水和泥不是好手香嚴云語是誑寂是謗語默向上有事在久嚮香嚴原來偷心未息此四古錐雖則老婆心切簡點將來總在葛藤裏舒縮且道那箇親師云山僧有一句極現成佛法向你們道去乃指云簷前雨滴與麼指點瞎卻人眼僧問石火電光事如何師云謝子一拜僧喝師云者一喝落在甚麼處僧擬議師便打僧問和尚尊候如何師拈餅度與僧云百雜碎師云蹉過了也師坐次有僧忽舉拳云請和尚為某甲説破師云我不識他僧云和尚何不為某甲説師云説了也僧云爭奈某甲氣宇如王師云已收下了僧問離四句絶百非請師直指西來意師云打了普梆要拖柴僧云不與萬法為侶是甚麼人師厲聲云教你拖柴不去只管問甚麼僧罔措而退師誕辰有僧封一緘寄正師啓視見畫一圓相師遂於圓相中書曰猶作恁麼見解即封還師納涼次一僧作禮辭行便問如何是正法眼藏師以羽扇拂其面僧云錯師云錯錯太史蔣虎臣謁師茶次太史問老師還結夏否師云病廢久矣太史曰子如不言小子何述焉師云鴉鳴鵲噪大好消息蔣太史同方曰江居士又來參方云弟子嘗看如何是佛乾矢橛話時中雖解提撕不能透脫未審有何方便師持扇度與云我者裏也不見佛也不見乾矢橛方接扇師云適來是甚話頭方云乾矢橛師云猶戀舊時窠方云不敢放手師云祇要公入手方云如何入手師云蹉過也不知有頃太史云弟子在此適才聞梆聲未審是誰師云須向未聞梆聲已前薦取好一僧出衆作禮云某甲是箇生牛不知東轉西轉師即向右指云過者邊著僧云不得上路師復向左云過者邊來僧便過師云上路了也那邊明白了卻來者邊行履夜參次一僧禮拜起拍手師云作甚麼僧云擦去地上塵師遂對衆拍手云我手中無塵且道擦箇甚麼衆無對師云者一隊漢如生盲人相似到此間來只管相我口皮動殊不知我與者僧已作一場佛事了也師云參禪人須具正見不可作外道見解何故即如而今人不肯修行底日用隨聲逐色業識茫茫固不必論出來參學聞知識開示箇本來人即便執四大五蘊中有箇本來人此便是外道見了且未嘗見得本來人如何面目即便計四大是有壞底本來人是無壞底四大是假底本來人是真底四大不能動用本來人能動轉四大此病莫道新學即久在叢林十箇有五雙如是殊不知執真底不壞底即是常見執假底壞底即是斷見斷常二見蘊於胸次即是生死根本此見不消要出生死又何能得所以永嘉云修行恐落斷常坑又有底畢竟要見此本來人逐日捫空捕影撑眉努目如渴鹿趁陽𦦨走到老死本來人畢竟無你獲處你若要去此等見解此等病痛須向大棒下討箇倒斷則佛病祖病禪病生死病四百四苦病八萬四千毛病乃至外道家種種惡見自無地可寄方才胸次得安樂
