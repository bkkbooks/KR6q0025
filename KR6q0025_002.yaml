body:
  text: 心圓居士拈別火蓮居士集梓六祖下第二十一世袁州府仰山雪巖祖欽禪師一字慧朗閩漳州人五歲出家十六薙染十八行脚初參雙林洎妙峰善石田薰諸老無所發明聞滅翁住淨慈懷香請益翁示臨濟三頓痛棒話亦無所入遂上徑山謁無準銳志咨參封被脇不至席者數載一日上蒲團忽然面前豁開如地陷時中淨倮倮地靜悄悄地浮逼逼地動相不生者半月餘自茲坐定礙膺十年尋常入室遇舉主人公話便可打𨁝跳若教舉起衲僧巴鼻佛祖爪牙更無下口處後同忠石梁過天目擡眸見古柏觸著向來所得境界和底一時颺下礙膺之物始𪹼然而散從此不疑生不疑死不疑佛不疑祖徹見徑山老人立地處上堂一見便見一得永得展手曰撒開兩手大家看畢竟明明是何物潭州內外有一十八座城門白日行人千千萬萬往往來來一任東西南北不得動著動著即頭角生上堂石門𡾟嶮玉峽潺湲未到此間此間是甚麼所在不見道一十八座城門白日行人千萬徃來一任東西南北不妨疑著到則到矣不動步者平展一句又作麼生古路鐵蛇橫擬議則喪身失命上堂水不洗水金不博金青天白日自古自今山僧到者裏直是插手不入汝等諸人還肯信自己是仰山麼曹谿波浪如相似一人一曹谿如何得相似無限平人被陸沈曹谿元是陸地波無限平人水浸殺上堂海水不可斗量虗空不可尺度淨地不可撒沙爛泥不可著脚者四轉語轉轉有落處且道落在甚麼處劈面便掌何故要使芭蕉長怒雷東京大相國寺裏有樹芭焦風吹雨打一似破袈裟上堂有句無句如藤倚樹白鷺下田千點雪黃鸝上樹一枝華三千里外賣却布單不遠而來因甚放下泥盤呵呵大笑毗婆尸佛早留心直至如今不得妙瞞潭州城裏人不得潭州城裏人亦瞞心圓不得心圓亦瞞大眾不得會麼留心不得妙得妙不留心上堂箇事本成現覓則不可見白圭本無瑕出得陰界纔是白圭琢磨翻成玷執之以實法陰界不出空中生閃電視之為等閒未出陰界脚下添紅綫珍重學道人好好看方便但識病莫執藥作麼生急須著眼看仙人莫看仙人手中扇打殺仙人裂破扇要見仙人還隔面嘉興府天寧楚石梵琦禪師明州象山朱氏子母夢日墜懷而生方襁褓有神僧摩師頂曰此兒佛日也他日當振揚佛法燭照昏衢因以曇曜字之早失怙恃九歲入永祚寺受業十六受具戒一日閱楞嚴至緣見因明暗成無見不明自發則諸暗相永不能昏處有省歷覽羣籍恍如宿契時元叟唱道雙徑師往參之問如何是言發非聲色前不物叟遽曰言發非聲色前不物明明道出矣却沒交涉在速道師擬進語叟震威一喝師錯愕而退如今師家多是被學人問著跟著學人轉倒像他來考驗師家一般直饒雲興缾瀉答到彌勒下生關甚痛癢若是真正宗師剛待學人進箇問頭便奪却轉問待伊擬答即棒出喝出何等披肝露膽痛切相為所以痛棒到三頓為汝得徹困也更須知與麼提持得與麼承當得檢點本分已是白雲萬里遍地葛藤何况聚集一班念話社家開張一箇往來飯鋪向十字街頭鼓弄男女羅致衣冠以盲贊盲以瞎印瞎謬為佛法在是豈非邪師過謬非弟子咎乎會英宗召高衲金書大藏師應詔入京一夕睡起聞彩樓鼓聲豁然大悟拊几笑曰徑山敗缺處為我識破了也恁麼撇脫猶是病眼見空花有般不知香臭漢便問如何便不是病眼見空花拄杖打折未放伊在因成偈曰崇天門外鼓騰騰驀劄虗空就地崩拾得紅爐一點雪却是黃河六月冰打破徑山柄子元來是箇野狐精後歸徑山叟迎笑曰西來密意喜子已得之矣處以第二座泰定中出世海鹽福臻天歷戊辰遷天寧至元乙亥遷杭報國僧問如何是山裏禪師云猢猻上樹尾連顛曰如何是城裏禪師云十字街頭一片甎曰如何是村裏禪師曰扶桑人種陝西田曰謝師答話師云蒼天蒼天一日索麵次有僧來參師引麵示之僧珍重便去師召大德僧應諾回首師曰有口不得喫麵者多我說箇譬喻有人見一毒蛇疾走避之蛇忽化女呼與狎暱其人不覺直前接吻毒氣攻腹即便命終此猶為護惜性命者言之若亡命之徒十二時中無不死時也上堂通身是眼為甚麼看不見通身是耳為甚麼聽不聞通身是口為甚麼說不到通身是心為甚麼鑑不出報恩有一道聰明神呪布施諸人去也便下座琦公者一道聰明神呪如一塊堅石毫無縫罅有人能於堅石上栽得入花去者不許犯著絲毫心意識道理陰界依通鬼家活計宗門窠臼出來下箇注脚能令學者立地桶底脫去琦公不是作家三世諸佛歷代祖師一齊讓位心圓捨四大以為牀座供養此人有麼有麼請出來著語看一日座主參師問講甚麼經主曰法華師曰經中道是真精進是名真法供養如來是否曰是師曰供養即不無如何是真法曰具在藥王品師曰將謂是金毛師子元來是野犴眷屬主却問如何是真法師曰汝豈不從天台來主曰是師曰天台山高一萬八千丈頂上著得幾人坐琦公被者擔板漢一問直得左支右吾滿口分疎不下主無對師曰喫茶去自知錯謬上堂僧問不愁念起惟恐覺遲如何是覺師曰牛角馬角曰如何是念過去了也師曰四五二十也不識問一大藏教是箇切脚未審切箇甚麼字師曰切箇不字曰只如不字又切箇甚麼字師曰莫錯舉似人曰謝師指示師曰石羊頭子向東看問佛祖因緣即不問君臣慶會事如何師曰瑞草生嘉運靈華結早春曰如何是君師曰莫觸龍顏曰如何是臣師曰量材補職曰如何是臣向君師曰赤心片片曰如何是君視臣師曰如月入水曰如何是君臣道合師曰俱琦公處錄君臣語一則及公處錄賓主語一則備員而已大法若明便都會得不見圜悟請益五祖演臨濟四料揀語演曰也祇是箇程限是甚麼閒我者裏如馬前相撲倒便休至言也問運推移日南長至阿那箇是常住法師曰冬不寒臘後看曰教學人如何履踐師曰獨木橋子問西天以蠟人為驗未審此間以何為驗師曰驗甚麼盌曰和尚豈無方便師曰子過新羅問一年將盡夜萬里未歸人還許歸去也無師曰十里長亭五里短亭曰與麼則不歸去也師曰直須歸去曰作麼生是到家一句師曰天寒日短兩人共一盌問日從東上月向西沒作麼生是不遷義師曰柳絮隨風自西自東曰年年是好年日日是好日師曰瞎老婆吹火問護明大士未降王宮釋迦老子在甚麼處師曰眨上眉毛曰謝師答話師曰恰值拄杖不在問盡大地是箇佛身向甚麼處安居禁足師曰錦上鋪華又一重曰竹密不妨流水過山高豈礙白雲飛師曰劈開華嶽連天色放出黃河到海聲曰如何是先用後照師曰劒為不平離寶匣藥因救病出金缾曰如何是照用同時師曰定光金地遙招手智者江陵暗點頭曰如何是照用不同時師曰三月懶游華下路一家愁閉雨中門僧禮拜師曰更問一轉豈不好問大悲菩薩用許多手眼作甚麼師曰春風不褁頭修佛殿次師問掌事僧者殿是甚麼年中蓋造僧摑露柱曰何不祇對和尚師曰克繇尀耐倒來者裏捋虎鬚三十棒一棒也不恕曰容某甲伸說便禮拜師曰且放過一著芟草次僧問有根草任和尚芟無根草作麼生芟師鋤地一下僧便放身倒釣得半箇鰍失卻一雙鯉師曰諸方火葬我者裏活埋諸方斬草除根我者裏土也須拈卻僧起走師呵呵大笑上堂未離兜率已降皇宮未出母胎度人已畢三世諸佛歷代祖師天下老和尚說心說性舉古舉今總是無風匝匝之波實情好與二十拄杖新福臻今日不是盡法無民打頭不遇作家到底翻成骨董若相委悉拈却炙脂帽子脫却鶻臭布衫其或未然明朝後日大有事在陰界中道理盡是骨董直饒說箇超佛超祖骨董不少甚麼處是拄杖打不著底所在於斯薦得便見諸佛祖師立地處正好與二十拄杖心圓恁麼道也好與二十拄杖上堂巖頭道須是一一從自己胸中流出與我蓋天蓋地去恁麼道被他掘窖深埋了也茫茫宇宙人無數那箇男兒是丈夫男兒丈夫相去多少待你出窖來却向你道上堂彌勒真彌勒分身千百億時時示時人時人自不識拈拄杖曰衝開碧落松千尺截斷紅塵水一谿上堂米裏有蟲麥裏有麵廚庫僧堂山門佛殿盞子撲落地楪子成七片上堂若論生佛未具以前一段大事只在諸人脚跟下動便踏著只是不知起處你道從甚麼處起掀翻四大海踢倒五須彌正覓起處不得豈不見東山演祖道山僧昨夜入城見一棚傀儡不免近前看或見端嚴奇特或見醜陋不堪動轉行坐青黃赤白一一見了仔細看來元來青布幕裏有人眼花了也山僧忍俊不禁乃問長史高姓他道老和尚看便了問甚麼姓師曰誰家別館池塘裏一對鴛鴦畫不成莫動著動著便飛去上堂眉毛雖長不礙眼鼻孔雖高不礙面諸佛雖悟無二心眾生雖迷無二見見不見倒騎牛兮入佛殿上堂兔角不用無牛角不用有兩兩不成雙三三亦非九夜來空手把鋤頭天明面南看北斗上堂大樹大皮褁小樹小皮纏若不同牀睡焉知被底穿上堂驢事未去馬事到來貓兒上露柱鐵鋸舞三臺大唐天子呵呵笑移取眉毛眼上栽上堂舉祖師道在胎名身處世名人在眼曰見在耳曰聞在鼻齅香在舌談論在手執捉在足運奔徧現俱該法界收攝在一微塵識者知是佛性不識喚作精魂師曰書頭教孃勤作息書尾教孃莫瞌睡還識孃面𭪿麼玉容寂寞淚闌干棃華一枝春帶雨上窮碧落下黃泉兩處茫茫皆不見喝一喝上堂一道圓光阿誰無分貓兒若無分為甚麼解捉老鼠若有分為甚麼做貓兒千年田八百主浴佛上堂清淨法身簸土揚塵圓滿報身倚富欺貧千百億化身弄假像真三身中浴那一身謝三孃秤銀上堂頭上是天脚下是地青山是青山白雲是白雲你若會得有馬騎馬無馬步行若不會夜行莫踏白不是水便是石上堂無手人行拳無舌人解語忽若無手人打無舌人無舌人連忙道箇不必良久曰只箇不必天下衲僧跳不出上堂箇箇抱荊山之璧人人懷滄海之珠斡旋佛祖樞機提掇衲僧巴鼻盡謂頂門眼正肘後符靈殊不知靈龜負圖自取喪身之兆出格一句作麼生朝霞不出市暮霞行千里拈云和尚閉卻嘴某甲懶得聽上堂黃檗手中棒剜肉作瘡大愚肋下拳喫鹽救渴速則易改久則難追選佛若無如是眼假饒千載亦奚為喝一喝上堂拈却盂匙箸喫飯不得屏却咽喉脣吻出氣不得色身安法身不可不安法身色身是一是二華須連夜發莫待曉風吹上堂俱胝豎一箇指頭雪峰輥三箇木毬石鞏張弓架箭華亭短棹孤舟鳳山無法可說不妨坐斷杭州就中却有箇好處好在甚麼處四五百條華柳巷二三千所管絃樓和尚恁麼道爭奈有一人不肯上堂大事未明如喪考妣大事已明如喪考妣你道有成褫無成褫常因送客處憶得別家時貧兒思舊債上堂聞聲悟道塞却你耳根見色明心換却你眼睛蒲團上端坐鍼眼裏穿綫西風一陣來落葉兩三片至正甲申遷禾之本覺丁亥帝師錫號佛日普照慧辯禪師適符昔日神僧之言後自光孝退歸天寧上堂一毫吞却山河大地則易山河大地吞却一毫則難也不難也不易鋪箇破席日裏睡料想上方兜率宮也無如此日炙背築西齋為終老計自號西齋老人洪武戊申秋九月詔江南大浮屠十餘人於蔣山建大法會命師陞座說法上悅己酉春復召師說法賜齋文樓下親承顧問暨行出內府白金以賜庚戌秋上以鬼神情狀幽微難測召問僧中博通三藏者師與夢堂噩行中仁等應詔至京館大天界寺師援經據論成書將進忽示微疾越四日沐浴更衣索筆書偈曰真性圓明本無生滅木馬夜鳴西方日出書畢謂夢堂曰我去矣堂曰何處去師曰西方去堂曰西方有佛東方無佛耶瞎漢好痛與三十棒可惜放過師乃震聲一喝而逝時辛亥七月二十六日也上聞嗟悼久之時禁火葬以師故特從闍維例火餘齒舌數珠不壞舍利五色紛綴遺骼弟子文晟奉骼及諸不壞者歸西齋塔焉計世壽七十五僧臘六十三杭州府徑山愚菴智及禪師字以中別號西麓蘇之吳縣顧氏子幼出家穹窿海雲院受具聽賢首法師講法界觀未終篇輒笑曰一真法界圓同太虗但涉言詞即成賸法縱獲天雨寶華於我奚益哉遂謁笑隱於建業隱文章道德傾動一時師微露文彩得交相延譽有嶼上人訶曰子才若此不思擔荷正法乃甘作騷壇奴隸乎師舌噤不能答旋歸海雲胸襟礙塞目不交睫者踰月忽一日見秋葉墜庭豁然有省走雙徑謁寂照呈所證照可之至正壬午出世昌國之隆教尋領普慈戊戌遷淨慈後領徑山僧問不與萬法為侶者是甚麼人師曰十字街頭石敢當僧擬再問師曰更要第二杓惡水在問如何是賓中賓師曰君向瀟湘我向秦曰如何是賓中主師曰常在途中不離家舍曰如何是主中賓師曰常在家舍不離途中曰如何是主中主師曰橫按鏌鎁全正令太平寰宇斬癡頑曰賓主已蒙師指示向上宗乘事若何師曰三年一閏九日重陽與麼道即不可問眾生為解礙菩薩未離覺和尚作麼生師曰天寒日短兩人共一盌問釋迦已滅彌勒未生正當今日佛法委付何人師曰老僧打退鼓曰前迦釋無後無彌勒還有參學分也無師曰風不來樹不動問佛法禪道相去多少師舉手曰展則成掌握則成拳僧禮拜師曰狂狗趁塊問如何是毗盧師師曰斷跟草鞋曰如何是法身主師曰尖簷席帽曰學人不會師曰現成行貨有甚麼不會僧擬議師便喝問至道無難唯嫌揀擇不揀擇時如何師曰遇飯即飯遇茶即茶僧禮拜師曰放汝三十棒問蓮華未出水時如何師曰寒則普天普地寒曰出水後如何師曰熱則普天普地熱曰如何是佛法大意師曰門前一湖水問心佛及眾生是三無差別還端的也無師曰的曰不是心不是佛不是物是箇甚麼師曰不識問佛身無為不墮諸數因甚有千百億化身師豎拂子曰你道者箇是第幾身僧擬進語師便喝問如何是本身盧舍那師曰不離闍黎所問曰如何保任師曰彼自無瘡勿傷之也問不起一念時如何師曰道者合如是曰與麼則依而行之師曰虗生浪死漢問如何是一句中具三元師曰萬仞峯頭駕鐵船曰如何是一元中具三要師曰眼裏瞳人吹木呌問牛頭未見四祖時如何師曰深山藏毒虎曰見後如何師曰淺草露羣蛇曰見與未見時如何師曰日出東方夜落西問三世諸佛不知有貍奴白牯却知有未審知有箇甚麼師曰師姑元是女人做拈云師姑易見女人難見問聲聞見性如夜見月菩薩見性如晝見日和尚見性如箇甚麼師曰黃河九曲水出崑崙曰直指人心見性成佛還端的也無師曰問取達磨大師僧擬議師曰子過新羅問達磨未來時如何師曰眼在鼻上曰來後如何師曰脚在肚下問如何是學人自己師曰脚板大如手掌曰如何是衲僧行脚事師曰緊峭草鞋上堂冬至月頭賣被買牛冬至月尾賣牛買被一年三百六旬有六日以閏月定四時成歲移易一絲毫不得東頭買貴西頭買賤三十年後破草鞋向甚處著即今宜挂向壁角頭上堂時維三月節屆清明不寒不暖半陰半晴落華啼鳥一聲聲驀拈拄杖曰穿却解空鼻孔戳瞎達磨眼睛踏破草鞋赤脚走好山猶在最高層佛成道日上堂舉趙州問南泉如何是道泉曰平常心是道州曰還假趨向否泉曰擬向即乖州曰不擬爭知是道泉曰道不屬知不屬不知知是妄覺不知是無記若真達不疑之地廓如太虗豈可強是非耶師曰王老師過犯彌天將釋迦世尊六年雪山千苦萬辛所得無上大道等閒華劈殆盡合與二十拄杖當時趙州眼光爍破四天下面被熱瞞則且置今日眾中莫有為世尊拔本底麼如無隆教不是為他閒事長無明忝為遺教遠孫未免出隻手去也拽拄杖下座一時打散愚菴恁麼道亦被世尊熱瞞不少咄上堂世尊三昧迦葉不知迦葉三昧阿難不知阿難三昧商那和修不知普慈三昧諸人不知諸人三昧各各不知所以道譬如河中水川流競奔逝各各不相知諸法亦如是喝一喝曰將謂合有與麼說話上堂舉東山演示眾曰祖師說不著諸佛看不見四面老婆心為君通一綫師曰若教頻下淚滄海也須乾盧州府無為州天寧無能教禪師門懸一牌云謹防惡犬竺源參纔跨門便曰老和尚為我趕狗師便入去閉却門智首座出迎同坐少時方丈會茶智起白曰此上人得得來見和尚師曰已相見了也舉問歇齋云和尚是看狗奴畢竟如何是狗歇與一掌圓云也是狗奴歇又掌圓休去六祖下第二十二世杭州天目高峯原妙禪師蘇之吳江人姓徐氏母夢僧投宿而生甫離襁褓輒喜趺坐遇僧入門便愛戀欲從之年十五懇請父母出家於嘉禾密印寺十六薙染二十受具翼歲習天台教復入淨慈立三年死限工夫及後請益斷橋倫和尚令參生從何來死從何去話於是意分兩路心不歸一又不曾得聞說做工夫處分曉看看躭擱至一年有餘每日只如箇迷路人相似每遇同參告言雪巖和尚常問你做工夫何不去一轉於是欣然懷香往謁方問訊插香即被打出盡力接不上閉却門一路垂淚再往始得親近即問已前做處沒奈何只得層層鈍置矣師一一供吐當下便蒙剿除日前所積之病却令看箇無字從頭開發做工夫一遍自此參叩無虗日後見師說得工夫有緒竟不問做處凡入門欽便問阿誰與你拖者箇死屍來聲未絕便打稍遲則禍生總不契其機後值欽赴南明師上雙徑參堂方半月偶夢中忽憶斷橋室內所舉萬法歸一一歸何處話疑情頓發三晝夜目不交睫值少林忌隨眾詣三塔諷經次擡頭忽覩五祖演和尚像讚曰百年三萬六千朝反覆元來是者漢山河大地及虗空畐塞元來是者漢驀然打破拖死屍之疑時年二十四矣解夏詣南明欽一見便問阿誰與你拖箇死屍到者裏來師便喝欽拈棒師把住曰今日打某甲不得欽曰為甚麼打不得師拂袖便出翼日欽問萬法歸一一歸何處師曰狗䑛熱油鐺欽曰你那裏學得者虗頭來師曰正要和尚疑著欽休去自是機鋒不讓次年江心度夏過雪竇見希叟曇曇問曰那裏來師拋下蒲團曇曰狗子無佛性上座作麼生師曰拋出大家看曇乃自送歸堂師自此於古今公案明得不受人瞞然於日用中尚不得自由瞞得別人瞞不得自己到者裏公案全用不著奈何暨欽開法於天寧師又隨侍服勞一日欽問日間浩浩時還作得主麼師曰作得主又問睡夢中作得主麼師曰作得主復問正睡著時無夢無想無見無聞主在甚麼處師無語欽囑曰從今日去也不要你學佛學法也不要你窮古窮今但只饑來喫困來打睡纔眠覺來却抖擻精神我者一覺主人公畢竟在甚麻處安身立命師遂奮志入臨安龍鬚自誓曰一生做箇癡獃漢決要者一著子明白越五載因同宿道友推枕墮地作聲廓然大徹自謂如往泗洲見大聖遠客還故鄉元來只是舊時人不改舊時行履處住龍鬚九年縛柴為龕風穿日炙冬夏一衲不扇不爐日搗松和糜延息而已德祐丙子春大兵至雙髻師掩關危坐自若事定戶履紛至師腰包宵遁直入西天目之獅子巖拔地千仞崖石林立師即洞營小室丈許榜曰死關悉屏給侍服用破甕為鐺併日一食洞梯山以升雖弟子亦罕得見共築師子院請師開堂上堂談元談妙說性說心攢花簇錦巧妙尖新如蔴似粟從古至今莫不皆是乘虗接響底漢倚草附木精靈山僧雖是他家種草決定不向者裏藏身既然如是且道今日為眾開堂斬新條令一句又作麼生喝一喝云符到奉行只者四字衲僧家會不得參學人作麼生會不惜眉毛下箇注解普示眾有一物明歷歷佛祖不破大地無人識常在舌頭尖盡力吐不出吐得出也是胡餅裏呷汁示眾三世諸佛說不到開口道著歷代祖師行不到動步踏著行說俱到時如何正好行脚示眾百千諸佛歷代祖師乃至天下老和尚以拂子擊禪牀一下云總向者裏墮坑落塹還有跳得出者麼又擊一下云三生六十劫有麼有麼無無忽有人呌云何不放下拂子別通箇消息向伊云且喜癩兒得伴示眾以拄杖橫肩顧左右云大眾會麼楖𣗖橫肩不顧人直入千峰萬峰去上堂萬法歸一一歸何處乃顧視左右下座大用不揚眉高峰作恁般手脚遠之遠矣又云好箇箭垛無人飲羽結制上堂大限九旬小限七日麤中有細細中有密密密無間纖塵不立正恁麼時銀山鐵壁進則無門退之則失如墮萬丈深坑四面懸崖荊棘切須猛力英雄直要翻身跳出若還一念遲疑佛亦救你不得此是最上元門普請大家著力山僧雖則不管閒非越例與諸人通箇消息好箇消息人從揚州來不得湖州信即今通也分明河北人卻說山東話上堂昨夜夢中作得一偈舉似大眾良久云忘却了也驀拈拄杖云拄杖子還記得麼良久云同坑無異土畢竟拄杖子記得上堂以拂子云四十五日前薦得非特日消萬兩黃金亦乃能應四天下供養四十五日後薦得寸絲滴水也當牽犁拽耙還他以拂子擊禪牀一下云曾經巴峽猿啼處不是愁人也斷腸那裏是四十五日前喝一喝云驢年去上堂海底泥牛銜月走巖前石虎抱兒眠鐵蛇鑽入金剛眼崑崙騎象鷺鷥牽此四句內有一句能殺能活能縱能奪若撿點得出許汝一生參學事畢撿點得出更買草鞋行脚三十年撿點不出參學事畢乃云我為汝撿出了也中夏上堂豎拂子召大眾云到者裏進前一步也不得退後一步也不得總不恁麼也不得畢竟如何不得不得進前一步也不得恰好退後一步也不得恰好總不恁麼也不得恰好畢竟如何不得不得恰好恰好召大眾云既到者裏須猛著精彩始得又云者裏是甚麼所在參上堂喫粥了也洗鉢盂去矢上加尖一場敗露西峰今日忍俊不禁却要向鷺鷥腿上割股良久云便恁麼去大小祖師龍頭蛇尾心圓今日擬向鷺鷥腿上割股良久云鷺鷥聻開爐上堂豎起拂子云者些火種謾語謾語自靈山傳至西峰不然不然已得二千二百三十餘載錯記錯記今日幸遇開爐沒事沒事特為諸人拈出不能不能以拂子吹一吹作麼作麼乃擲下云幾乎幾乎照顧燒却眉毛果然果然臘八上堂黃面瞿曇夜半成道正是喚奴作郎贏得一場好笑山僧恁麼告報也是細姑賺嫂知即得冬至上堂世間動不動法皆屬陰陽遷變驀拈拄杖云惟有山僧木上座能為萬象主不逐四時淍乃靠拄杖云無形本寂寥上堂低頭覓天仰面尋地波波挈挈遠之遠矣驀然撞著徐十三郎嗄元來只在者裏以手拍膝一下云在者裏臘月三十日到來也是開眼見鬼上堂舉百丈和尚問溈山云併却咽喉脣吻道將一句來向他道柴荒米貴忍饑無暇祇對晚參身貧道貧無法可親一味盲枷瞎棒見者莫不生瞋卓拄杖云黃金自有黃金價終不和沙賣與人雪巖和尚忌日拈香巴陵設忌三轉語西峰單單只一句且道是那一句聻遂插香逢人切忌錯舉心長老今日錯舉了也大眾側耳佛誕上堂指天指地一棒打殺鴆屎砒霜合造毒藥颺在三千世界中不知那箇親遭著卓拄杖一下晚參萬法歸一一歸何處狹路相逢兩手分付逴得便行黃河三千年一度清逴得便行跳下黃河洗不清上堂意句不到宗說不通盲龜跛鼈意句俱到宗說俱通盲龜跛鼈西峰恁麼告報莫有離此之外別有生涯底麼盲龜跛鼈薌林居士至上堂此事如欲登天目大山相似未到山時不免蘊一座山於八識田中洎至一到所蘊之山恍焉消殞因甚如此豎拂子云只緣身在此山中高峰話墮既是身在此山中說甚未到洎到上堂舉雲門大師到乾峰云請師答話含血噴人先汙其口峰云到老僧也未赤眼撞著火柴頭門云與麼那與麼那河裏失錢河裏摝峰云將謂候白更有候黑好手手中呈好手紅心心裏中紅心上堂舉僧問長慶眾手掏金誰是得者慶云有伎倆者得僧云學人還得也無慶云大遠在西峰則不然今日忽有人問眾手掏金誰是得者只向他道阿誰無分又云學人還得也無猶嫌少在復舉芙蓉一日告辭馬祖祖云裝却包了來與你說一上佛法芙蓉於次日至方丈侍立少頃祖云時寒善為道路芙蓉至法堂上忽然有省師拈云馬祖佛法恁麼流布拈花微笑命若懸絲今日凡有人來告辭總與草鞋一緉上堂今朝八月一行脚禪和出不識自家珍却向途中覓直饒走遍一百一十城參見五十三善知識功超十地三乘位等釋迦彌勒若還來到西峰未免一棒打折你驢脊示眾若論此事如大火聚烈焰亘天曾無少間世間所有之物悉皆投至猶如片雪點著便消爭容毫末若能恁麼提持尅日之功萬不失一儻不然者縱經塵劫徒受勞矣若論此一段奇特之事人人本具箇箇圓成如握拳展掌渾不犯纖毫之力祇為心猿擾擾意馬喧喧恣縱三毒無明妄執人我等相如水澆冰愈加濃厚障却自己靈光決定無由得現若是生鐵鑄就底漢的實要明亦非造次直須發大志立大願殺却心猿意馬斷除妄想塵勞如在急水灘頭泊舟相似不顧危亡得失人我是非忘寢忘餐絕思絕慮晝三夜三心心相次念念相續劄定脚頭咬定牙關牢牢把定繩頭更不容絲毫走作假使有人取你頭除你手足剜你心肝乃至命終誠不可捨到這裏方有少分做工夫氣味嗟乎末法去聖時遙多有一等泛泛之流竟不信有悟門但只向遮邊穿鑿那邊計較直饒計較得成穿鑿得就眼光落地時還用得著也無若用得著世尊雪山六年達磨少林九載長慶坐破七箇蒲團香林四十年方成一片趙州三十年不雜用心何須討許多生受喫更有一等成十年二十年用工不曾有箇入處者只為他宿無靈骨志不堅固半信半疑或起或倒弄來弄去世情轉轉純熟道念漸漸生疎十二時中難有一箇時辰把捉得定打成一片似遮般底直饒弄到彌勒下生也有甚麼交涉若是真正本色行脚高士不肯胡亂打頭便要尋箇作家纔聞舉著一言半句更不擬議直下便恁麼信得及作得主把得定孤迥迥峭巍巍凈躶躶赤洒洒更不問危亡得失只恁麼捱將去驀然繩斷喫攧絕後再甦看他本地風光何處更覓佛矣又有一偈舉似大眾急水灘頭泊小舟切須牢把遮繩頭驀然繩斷難迴避直得通身血迸流兄弟家成十年二十年撥草瞻風不見佛性往往皆謂被昏沈掉舉之所籠殊不知只遮昏沈掉舉四字當體即是佛性堪嗟迷人不了妄自執法為病以病攻病致使佛性愈求愈遠轉急轉遲設使一箇半箇回光返照直下知非廓然藥病兩忘眼睛露出洞明達磨單傳徹見本來佛性若據西峰點檢將來猶是生死岸頭事若曰向上一路須知更在青山外若論此事如萬丈深潭中投一塊石相似透頂透底了無絲毫間隔誠能如是用工如是無間一七日中若無倒斷妙上座永墮阿鼻地獄十二時中四威儀內寶劒全提如臨大陣纔有絲毫念起當急剉之一斷永斷莫令再續若能如是用工管取干戈永息天下太平有志之士思之避之夜後參前遞相警勵師自雙峰而至死關風勵學者入室不以時每見一期將終上堂誨示諄諄甚至繼以悲泣平居誨人世出世法皆懇懇切至軟語咄咄和易如坐春風中使人醉心悅服咸自謂得師意及室中握三尺黑蛇鞭笞四海龍象則絲毫無少容借來者如登萬仞山而躋冰崖雪磴進無所依退無所據莫不凜然失其所執設有不顧性命強爭鋒者師必據其案欵盡底搜詰破石驗璞刮骨見髓勘其深淺真偽定其是非與奪卸僧伽黎痛決烏藤以明正其賞罰嘗語學者曰今人負一知半解所以不能了徹此事者病在甚處只為坐在不疑之地自謂千七百則公案不消一喝及乎坐却曲彔牀子被參徒下一喝則不能辯其邪正往往一句來一句去如小兒相撲伎倆蓋是從前得處莽鹵故也直須參到大徹之地親見親證明得差別智方能勘辨得人方能殺活得人此是喫折脚鐺中飯底工夫做到未易以口舌爭勝負也假如兩人從門外來未見其面同時下一喝且道那一箇有眼那一箇無眼那一箇深那一箇淺還辨得出麼師之機用不可湊泊下語少所許可其門戶險絕如此復念今時學者不能以戒自律縱有妙語亦難取信於人乃有毗尼方便之說焉師寓南竺日嘗誤踏一筍取而食之其後賣衣告償㭊薪擘果見蟲復全而置之濾水囊終身不廢師之細行涅南山之竹莫能殫姑舉是數端以識其梗概使後之欲見師而不可得者亦足以景仰遺風於萬一云耳師患胃疾已久適雍來省師囑以後事元貞乙未十二月朔黎明陞座辭眾曰西峰三十年妄談般若罪犯彌天未後有一句子不敢累及諸人自領去也眾中還有知落處者麼良久曰毫釐有差天地懸隔辰巳間復說偈曰來不入死關去不出死關鐵蛇鑽入海撞倒須彌山泊然而寂遺命塔全身於死關壽五十八臘四十三杭州府徑山南石文琇禪師崑山李氏子上堂今朝七月初一門前金風淅瀝特地打鼓陞堂一字也道不出露柱禮拜釋迦燈籠問訊智積獨有無事衲僧依然眼橫鼻直敢問大眾那箇是無事衲僧良久曰𭪿長三尺徑山上堂森羅及萬象一法之所印前面是盂峰後面是凌霄峰中間是佛殿喚甚麼作一法良久曰國一祖師元是崑山人上堂馬大師道自從胡亂後三十年不少鹽醬此地無金二兩俗人沽酒三升傷鹽費醬上堂但參活句莫參死句頭頭上顯物物上明是死句舉步踏著南辰轉身觸翻北斗是死句作麼生是活句蘇州街雨過著繡鞵眾擬議可惜一雙鳳頭鞵子被泥涴了擲拂子下座見僧庭中過師厲聲曰屋簷㘱下來也僧仰望髑髏打得粉碎師曰子過新羅見僧入門便曰你者踏州縣漢脚跟下好與三十棒曰某甲話也未問便蒙賜棒師曰待你開口堪作甚麼僧擬議師便喝出卻不道和尚三十棒堪作甚麼乃呵呵云仁義道中且放過一著上堂一句子墨漆黑無把柄有準則良久曰會麼碓搗東南磨推西北蘇州府邱徑閒極雲禪師久依虗堂於徑山居第一座一日寶葉源請益虗堂德山末後句曰若謂之有德山焉得不會若謂之無巖頭又道德山未會乞和尚慈悲指示堂曰我不會汝去問首座源詣師值師遊山歸索水濯足源亟進水復委身為師摩捋因仰面舉前話叩之師乃掬水澆潑曰有甚麼末後句源不契復上見堂堂曰首座如何向汝道源舉似前話堂曰那那我向你道他會得源於是釋然領旨有底道寶葉無端被雲老澆一杓惡水有底道堂公更向虗空裏添箇楔子恁麼會去心圓更不說伊不是只向伊道喫別人底洗脚水有甚滋味西白虗谷希陵禪師嘗垂三語以驗來學曰三乘十二分教拈向一邊蝦蟇口裏道將一句來狗子聞蛙聲因甚咬破庫堂前露柱獺徑橋吞却集雲峰是第幾機鐵關樞行脚時嘗叩師值冬至小參師舉雲門餬餅因緣關呈四偈以進師問你是誰關曰樞上座師曰從那裏來關曰雲門師曰你是顛是狂關曰和尚眼在甚麼處師便喝關亦喝師揮一拳關進前迎住曰打即且置雲門餬餅意作麼生師奮手掠去關帽關曰錯師連揮數拳關曰拳頭無眼向後遭人檢點在師去關七條踏翻在地攔腰數棒曰教你知我手段關曰屈棒屈棒師高聲喚直歲鎻者漢送庫司著瑞巖方山寶禪師一日為眾挂牌入室垂語曰南泉斬却貓兒時如何眾下語皆不契適有一僕在旁曰老鼠做大諸公要見貓兒則易要見老鼠却難師曰好一轉語只是不合從你口裏出袁州府慈化鐵山瓊禪師謁蒙山屢入室呈解山但曰只是欠在一日忽觸著欠字身心豁然徹骨徹髓乃跳下禪牀擒住山曰我欠少箇甚麼山打三掌師禮拜猶欠在山然之南陽府鄧州香嚴淳䂐文材禪師上堂滿盤打算了只有者一著最便宜敢問諸人且道是那一著卓拄杖曰切忌卜度六祖下第二十三世杭州府天目中峯明本禪師錢塘孫氏子從高峯薙染觀流泉有省詣峯求證峯為打趁出既而民間譌傳官選童男女師因問忽有人來問和尚討童男女時如何峯曰我但度竹篦子與他師於言下洞然徹法源底將謂高峯有多少奇特拈云中峯語錄近二十萬言皆從者一句流出諸公聽得破戒與麼道未免三三兩兩競聚頭來向竹篦子上啗乃震聲一喝曰莫妄想一日問歇齋高峯度竹篦子話意旨如何歇曰賣死貓頭圓曰你端的得一回汗出也歇曰一度被蛇咬怕見斷井索又舉問湄菴湄曰鈍置中峯圓曰你又作麼生湄曰向伊道素手難見親家面又一日覺非至圓舉前問覺拈起茶碗劈面擲圓曰好好借問惡發作麼覺拂袖曰好心不得好報便出圓乃吐舌蘇州府靈巖南堂了菴清欲禪師台州臨海朱氏子問曹溪流非止水一滴忽來千波競起時如何師曰退後退後曰平生不解藏人善到處逢人說項斯師曰莫謗山僧好問單傳直指已涉離微坐斷千差請師答話師曰破鏡不重照落華難上枝曰便恁麼去時如何師曰烏龜鑽敗壁曰即色明心附物顯理時如何師曰癩馬繫枯樁曰三九二十七牛頭南馬頭北如何是接手句師曰百花深處鷓鴣啼問一不做二不休時如何師曰水底撈明月曰退一步又作麼生師曰相逢盡道休官去林下何曾見一人問如何是佛師曰面前案山子曰法即不問如何是僧師曰三頭兩面得人憎僧禮拜師却問曰如何是法僧曰明年更有新條在惱亂春風卒未休師曰洎不問過問陰極陽生則不問祖師門下事如何師曰石筍抽條長丈二曰牛頭未見四祖時如何師曰華陰山前百尺井曰見後如何師曰祝融峯頂萬年松曰去此二途願聞法要師曰休將閒學解埋沒祖師心問舉一不得舉二放過一著落在第二時如何師曰懷州牛喫禾益州馬腹脹曰雲門扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾又作麼生師曰西川斬畫像陝府人頭落問說法不應機總是非時語作麼生得應機去師曰夜半起來失却牛天明起來失却火問如何是通宗通途師曰東去西去曰如何是叶帶叶路師曰南來北來問蟭螟蟲吞却虎時如何師曰賞你大膽曰恁麼則退身三步師曰漳泉福建頭匾如扇僧擬議師便打曰一任舉似諸方問如何是德山棒師曰義出豐年曰如何是臨濟喝師曰儉生不孝問蠟人冰鐵彈子即且置如何是金剛圈栗棘蓬師曰我早知你吞透不下曰豈無方便師喝曰棒上不成龍問佛未出世時如何師曰釋迦自釋迦曰出世後如何師曰彌勒自彌勒曰承師有言釋迦不受然燈記畢竟受甚麼人記師曰自家肚皮自家畫問離四句絕百非請師直指西來意師曰拈燈籠來佛殿裏將山門安燈籠上曰還有為人處也無師曰若無舉鼎拔山力千里烏騅不易騎問雲門放洞山三頓棒意旨如何師曰沙裏無油曰鳥窠吹起布毛又作麼生師曰石中有髓上堂夜來州中琴堂上般雜劇也有端嚴奇特也有醜陋不堪鬼面神頭亦自好笑且道笑箇甚麼我觀世間人是箇大雜劇所謂文武醫卜士農工商各逞己能互相欺誑逗到臘月盡頭不覺一場敗闕具眼旁觀掩口不暇喝一喝曰元正啟祚萬物咸新岸柳搖金梅破玉萬一氣轉洪鈞下座巡堂喫茶清明上堂冬至寒食一百五今朝正是三月六山又青水又綠一聲欵乃漁家曲山僧昨日偶爾郊行作得一偈舉似大眾華冠不整舍那衣禿帚還隨破畚箕五箇老婆三箇醜一雙紅杏換消棃下座上堂春日晴黃鶯鳴大藏小藏鼻孔眼睛木馬嘶泥牛舞壽山不打者破鼓便下座上堂一大藏教束之高閣長期短期無繩自縛莫更紛紛紜紜直須灑灑落落楊岐一頭驢只有三隻脚潘閬倒騎歸攧殺黃番綽五味拈來饡秤錘別有香風滿寥廓喝一喝杭州府天目正宗斷崖了義禪師湖州德清湯氏子能食不茹葷盡六歲始能言但從其母誦法華經於人世事懵無所知姿貌巍然志若有所待年十七有禪者過之誦高峯上堂語曰欲窮千里目更上一層樓師忽言曰此大善知識必能為人拔釘去楔爾能與我往見之乎母驚異之各具衣裝與之行見高峯於天目山師子巖之死關為童峯謂之曰汝所持何多為師曰以待寒暑峯曰學佛者不如是師即刻盡以散諸人乃令提萬法歸一一歸何處話因名之曰從一他日峯為僧舉牛過窗櫺話師聞之忽生疑參究不倦一日告峯曰上極天宮下窮水際盡大地一琉璃瓶峯曰莫作聖解他日過鉢盂塘見松上雪墜有省即詣峯呈頌曰不問南北與東西大地山河一片雪聲未絕峯痛棒之眼高於頂者視眉下眼皆可憐憫故此痛棒真大慈悲父也不覺隕身崖下懸崖壁立人意其必死同學明通捫蘿接磴以救之則師已出半山無所苦也謂通曰我往江西見欽公去也通曰汝孤負老漢棒矣力挽之還即與通還山之西禪菴自誓曰七日不證則決去矣遂端直堅壁忘廢寢食夜則攀樹露立達旦未至所期豁然大悟馳至死關呼曰老和尚今日謾我不得也呈頌曰大地山河一片雪太陽一照便無蹤錯下名言三十棒一棒也較不得自此不疑諸佛祖更無南北與東西峯上堂云我布縵天大網打鳳羅龍不曾遇得一鰕一蠏今日有蟭螟蟲撞入三十年後向孤峯絕頂揚聲大呌且道呌箇甚麼舉拂子云大地山河一片雪是他太陽一照無踪呌出若呌太陽一照無踪便不是了也師便奪峯拂子為眾舉揚訶勵同學辭不少遜復曰盡大地有一人發真歸元從一皆知之峯歎其俊快僧有參峯次峯令見師師曰驀直去其出言大抵如此久參者愧之幾有命若懸絲之慮遂歸德清其母為賣簪珥同入武康上柏山結茅以居人見其混俗罔測其意越五年還山峯云大有人道你拖泥帶水師曰兩眼對兩眼遂薙落峯改其名曰了義元貞乙未高峯示寂師亦韜晦或遊禪林頹然居下板孤峭嚴峻不假借人辭色或觸其機鋒發言如奔雷諸方宿衲莫不驚歎居不擇地隨寓而休而律範大閑凜如冰雪所至四眾歸重公侯貴人爭相迎奉無虗日師子正宗禪寺累請住持師若不聞亦未嘗受請立僧而咸尊之曰義首座云中峯本公大揚高峯之道烜赫昭著法席之盛中外罕及至治癸亥棄眾而化同門布衲雍公見地明白提唱超卓而去世更久後太定三年師勉徇眾請歸坐祖庭者一載所謂正宗禪寺者也參學之眾輻輳而至或示眾曰除却語默動靜道將一句來又嘗曰一息不來向何處安身立命然或嬉笑怒罵觕言穢語人所不堪或不因勸請自肆談說或作偈頌不待思維應機而發人所莫測元統元年歲除日師忽謂從者曰有一件事天來大你還委悉麼良久云明日是年期正月六日乙未詣法雲塔西指空地曰更好立箇無縫塔其晚與禪者談笑至夜分乃曰老僧明日天台去也禪者曰某甲隨師去師曰你走馬也趁我不及翌午跏趺而化世壽七十二僧臘四十有九後七日藏其全身於師子巖之後雲深菴化之日雷砰雨射白晝晦暝葬之日雪花繽紛林木縞素送葬者數千人悲痛哀戀聲撼山谷初本公示寂會葬齋次笑謂眾曰後十二年更為老僧一會至是十二年矣日本國南禪夢窗智曤國師本國勢州源氏宇多天王九世孫九歲出家十八為僧每夢遊中國疎山石頭二剎一老僧授以達磨像遂名疎石乃決志參方初謁無隱範次見一山寧備陳求法之誠山曰我宗無語句亦無一法與人師曰豈無方便乎山曰本來廓然是大方便師疑悶不輟復謁高峰峰曰一山有何指示師述前語峰厲聲喝曰何不道和尚漏逗不少師於言下有省益自奮勵一夕坐久忽倚壁身踣豁然大悟作偈有等閒擊破虗空骨之句呈似峯峯為印可乃出無學元公淵源以𢌿之後於本國大宏宗教賜號普濟國師師志在煙霞聘至皆力辭之其國主起師主南禪入見引坐求退王曰吾非有他欲期朝夕問道耳復強師入天龍錫師號手書後於兜率內院示寂世壽七十九僧臘六十全身塔於院之後存日所翦爪髮瘞雲居者髮中累累生舍利太原府五臺山靈鷲碧峯寶金禪師乾州永壽石氏子為邑名胄父母崇善有桑門授以觀音像未幾生師誕時白光盈室甫六歲即命出家薙染後徧歷講肆忽歎為非遂更衣謁如海真於縉雲晝夜精勤偶𢹂筐擷蔬忽凝坐不動歷三時方寤真曰入定耶師曰然真曰何所見師曰有所悟真曰悟處如何師舉筐示之真曰不是師置筐於地拱手而立真又曰不是師便喝真攔胸擒住曰道道師揑拳便築真曰未在此塵勞暫息耳必使心路絕祖關透然後大法始明師由是脅不沾席者三年一日聞伐木聲汗下如雨乃曰古人道大悟一十八遍小悟無數豈欺我哉未生前事今日方知亟見真真不諾師掀倒禪牀而出翌日復見真真於地上畫一圓相師以袖拂去真復畫一圓相師於圓相中畫一畫又拂去真再畫一圓相師於圓相中畫十字又拂去真復畫如前師於十字隅作卍字又拂去真大笑曰參學悟者世豈無之能明大機用寧復幾人遂授記莂命往朔方道當大行先是師嘗於定中見一山秀麗重樓傑閣金碧絢爛諸菩薩行道其中有招師者曰此秘魔巖也爾修道其中何遽忘之後師遊臺山道逢蓬首女子身被五彩弊衣赤足徐行一黑獒隨後師問何之答曰入山師曰入山何為答曰一切不為言訖而沒叩同行者皆不見知為文殊化身也師因就山建靈鷲菴以待方來僧俗聞風趨赴常至萬指至正戊子冬召入內廷值大雪夜有紅光自師室中直透霄漢上驚歎賜金襴伽黎明年禱雨輒應敕賜寂照圓明大禪師號詔住海印寺洪武初詔師至京住天界問法稱旨辛亥設普濟會於鍾山命師涖其事賜伊蒲饌上親幸臨御翰賜詩壬子六月沐浴更衣集眾言別弟子請偈師曰三藏十二部尚為故紙吾言何為端坐遂瞑目世壽六十五僧臘五十九茶毗舍利成五色汝州香嚴無聞思聰禪師香山人初參獨峯令看不是心不是佛不是物話同雲峯月山等六人立盟互相究竟次見淮西無能教教示無字話令參一日晤同參敬上座敬問你六七年來有甚見處師曰每日只是目前無一物敬曰你者一絡索從甚處來師罔然乃問畢竟明此大事應作麼生敬曰不見道要知端的意北斗面南看說了更去師被一拶直得不知行坐者七日偶到淨頭寮疑情不解食頃乃覺胸次輕清目前人物一切不見直是通身汗流遂見敬敬舉扇曰速道速道師遽曰舉起分明也妙哉清風匝匝透人懷箇中消息無多子直得通身歡喜來自此下語作頌都無滯礙及至向上一路又不得灑落乃入香嚴山過夏復謁無方普普問萬法歸一一歸何處師曰鼻豎眼橫普曰者是學得底師曰雞寒上樹鴨寒下水普曰不問者箇如何是你父母未生前面目師豎起拳曰看普曰好與三十拄杖師拂袖便出適值鐵山從高麗回至石霜師往見山問仙府何處師曰汝州山曰風穴面目如何師將二十年工夫通說一遍山把定咽喉問如何是無字師曰近從潭州來不得湖北信山曰未在更道師曰和尚幾時離高麗山曰未在更道師喝一喝拂袖便出山曰者兄弟都好只一件大病道我發明了師聞而感激復入光州山中十七年方得頴脫常示眾曰法無定相遇緣即宗秉金剛劒吞栗棘蓬截斷衲僧舌頭坐却毗盧頂𩕳拈一莖草作丈六金身將丈六金身作一莖草直教寸絲不挂月冷秋空寒灰發𦦨到者裏喚作佛法入地獄如箭射不喚作佛法入地獄如箭射諸仁者畢竟作麼生會不見船子道藏身處沒蹤跡沒蹤跡處莫藏身雖然恁麼正眼觀來盡是閒家具衲僧分上料掉沒交涉六祖下第二十四世金華府義烏伏龍無明千巖元長禪師蕭山董氏子年七歲從諸父比邱曇芳於富陽法門院十九薙髮受具戒學律於靈芝會行丞相府飯僧中峰適在座遙見師呼而問曰汝日用如何師曰念佛峰曰佛今何在師擬議峰厲聲叱之師作禮求示法要峰以狗子無佛性話授之縛茅靈隱脇不沾席者三年一日聞聲有省亟往見峰峰復叱之師憤然歸夜靜忽鼠翻貓食器墮地作聲恍然開悟復往質峰峰曰趙州何故云無師曰鼠餐貓飯峰曰未也師曰飯器破矣峰曰破後如何師曰築碎方甓峰乃微笑囑曰善自護持時節若至其理自彰師受囑隱天龍之東菴笑隱主中竺力薦起之宣政院脫歡亦遣使見迫師皆不諾居無何諸山爭相勸請師度不為時所容遂杖錫踰濤江東至義烏之伏龍山山如青蓮華乃卓錫巖際曰山有水吾將止焉俄山泉溢出作白乳色師遂依大樹以居時泰定丁卯十月也初山有禪寺名聖壽久荒廢師入山鄉民咸夢異僧來遂相率為伐木構精廬尋因舊號成大伽藍朝廷三遣重臣降香錫號佛慧圓鑒普濟禪師并賜金襴法衣僧問如何是祖師西來意師曰野馬入牛欄問如何是佛師曰今日好雨曰如何是道師曰此去義烏不遠鈍置煞人問如何是賓中賓師曰當胸叉手問他人曰如何是賓中主師曰堂上坐來日正午曰如何是主中賓師曰有時歡喜有時瞋曰如何是主中主師曰橫按鏌鎁無佛祖但總答云貓問如何是露地白牛師曰草裏臥曰甚麼人騎得師曰無髭鬚鬍子曰三身中那身說法師曰賣油婆子水梳頭曰德山棒臨濟喝意旨如何師曰惡人先做大問如何是和尚家風師曰無力豎拳頭連臂墮落也問達磨面壁意旨如何師曰有口開不得舌頭已拖地問浩浩塵中如何辨主師舉拳示之莫鈍置曰辨後如何師曰你主在甚麼處問釋迦彌勒猶是他奴未審他是阿誰師曰糞掃堆頭破苕帚曰學人不會師曰問取淨頭問取簸箕上堂僧問如何是第一句師曰有口如啞曰如何是第二句師曰有眼如盲曰如何是第三句師曰棒折也未放你在乃擲下拂子曰此是老僧第二句如何是第一句便下座上堂僧問如何是奪人不奪境師曰日照山河影動搖曰如何是奪境不奪人師曰背水陣圓增勇健曰如何是人境俱奪師曰任是鋒刀常坦坦假饒毒藥也閒閒曰如何是人境俱不奪師曰野老不知堯舜力鼕鼕打鼓祭江神僧禮拜師曰有麝自然香何用當風立乃曰轉山河國土歸自己則易轉自己歸山河國土則難拈了也父母未生前道將一句來道了也拈出看示眾今朝初一上殿已畢喝囉怛那西方日出今朝初一上殿已畢一字入公門九牛不出示眾舉德山托因緣拈曰末後句子德山巖頭雪峰總跳不出乃喝一喝曰大丈夫當作真王何以假為示眾良久曰大眾會麼會則事同一家不會則萬別千差臨濟道我在黃檗喫六十痛棒如蒿枝拂相似如今更思量一頓誰為下手時有僧出曰某甲下手濟度杖於僧僧擬接濟便打看他的的顯示者些子無你近傍處豈常情所能測老僧尋常痛口罵你痛棒打你你不作無明會便作佛法會又何曾夢見我先祖門風所以古人云臨濟之道將墜於地痛哉正與麼時合作麼生超羣須是英靈漢敵勝還他師子兒示眾傅大士曰夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止分毫不相離如形影相似欲識佛去處只者語聲是元沙曰大小傅大士祇認得箇昭昭靈靈洞山聰曰且道衲僧家日裏還曾睡也無保寧勇曰要眠時即眠要起時即起水洗面皮光啜茶濕却𭪿大海紅塵生平地波濤起呵呵阿呵呵哩哩哩囉哩三尊宿大似徐六擔板傅大士又俗氣不除若論向上宗乘總欠悟在且道無明具甚麼眼目不見道直須揮劒若不揮劒漁父棲巢切實指示不用窠臼語佳則佳矣敢問大眾劒在甚麼處莫孤負好示眾舉瑯琊覺有句無句如藤倚樹樹倒藤枯好一堆爛柴大慧曰作賊人心虗雖然如是恩大難酬師曰一人作佛法商量一人作世諦流布撿點將來總欠悟在無明見處也要諸人共知有句無句如藤倚樹樹倒藤枯響示眾江月照松風吹面面青山展笑眉經有經師論有論師莫怪老僧無法說勞汝諸人立片時面皮厚多少示眾一喝分賓主照用一時行要會箇中意日午打三更諸禪德與麼說話四稜塌地了也乃喝一喝曰且道是賓是主是照是用又喝一喝曰只者是賓只者是主只者是照只者是用又喝一喝曰且不是賓且不是主且不是照且不是用是箇甚麼又喝一喝曰進前求解會特地斬精靈費盡娘生氣力要且沒交涉示眾龍門水急一句截流茅屋風高千山起浪三世諸佛望風結舌六代祖師斫額有分天下老和尚仰羨不及是汝諸人到者裏作麼生與無明相見驀拈拄杖曰與麼與麼人境俱奪不與麼不與麼照用同時卓一下曰龍生金鳳子衝破碧瑠璃喝一喝示眾世尊拈華眼裏撒沙迦葉微笑全身落草達磨面壁皇天苦屈二祖安心老鼠居金德山行棒莽莽蕩蕩臨濟下喝喫鹽止渴溈山水牯泥裏洗土仰山插鍬性命難逃俱胝豎指是何道理雪峰輥毬老不知羞石鞏張弓誑謼盲聾趙州勘婆大有誵譌元沙未徹話作兩橛者一隊不唧𠺕老凍儂生前鹵莽死後顢頇罪犯彌天髑髏徧野無明忍俊不禁與渠一坑埋却拈拄杖卓一下曰直得十方世界風凜凜地法堂前何止草深一丈汝諸人向甚麼處出氣良久曰擬心湊泊二鐵圍山放之自然七穿八穴復卓一下出盡別人醜自羞遮不得心圓今日忍俊不禁待欲上前相救乃云休休客至上堂披衣登法座道者是高僧將謂多奇特元來百不能西風吹細雨落葉滿空庭有客來相訪青山自送迎日本國請法衣上堂舉石門聰曰西天二十八祖盡得傳衣付法東土六祖之後得道者多只傳其法不傳其衣無明則不然衣以表法故謂之法衣人能宏道故謂之法身無處不徧無處不明故謂之法眼高峯老祖法衣一頂今日對眾請與高麗國金剛山供養去也幻住先師法衣一頂我得來三十年矣如今大拙首座又要請歸供養雖然如是從上諸祖各各有三十棒分無明亦有三十棒分眾中莫有下得者般毒手者麼有則出來如無他時後日不得向背地裏呌苦呌屈擊拂下座大似作賊人自首爭奈事主不鑒至正丁酉六月十四日示微疾沐浴更衣集眾說偈曰平生饒舌今日敗闕一句轟天正法眼滅奄然而逝平生敗闕今日遮羞正法眼滅臨濟出頭師世壽七十四僧臘五十六弟子用陶龕奉全身瘞於青松菴諡佛慧鑑禪師蘇州府師子林天如惟則禪師吉安廬陵譚氏子受業禾山得法中峰住後僧問佛佛授手祖祖相傳畢竟傳箇甚麼師曰脚未跨門與你三十棒了也問達磨不來東土二祖不往西天還有為人處也無師曰有曰如何是為人處師曰浴院裏燈籠笑破半邊口曰莫便是學人轉身處麼師曰上天無路入地無門曰今日多幸得聞師子吼也師便喝僧禮拜師曰拜則任你拜者一喝不曾倒地在既不倒地用扶作麼問如來一音演說法眾生隨類各得解未審和尚如何為人曰蝦蟆𨁝跳上天蚯蚓驀過東海曰恁麼則超佛越祖去也師曰你向那裏見得曰今古應無墜分明在目前師曰杜撰禪和華嚴會僧問無邊剎境自他不隔於毫端既有自他如何不隔師曰懷州牛喫禾益州馬腹脹曰十世古今始終不離於當念既有始終如何不離師曰天下覓醫人灸豬左膊上曰此會翻宣教典毋勞說禪且望和尚直譚教文師曰山僧無兩箇舌頭曰一真法界十種元門還有自他終始也無師喝曰那得許多骨董來曰既無許多骨董畢竟華嚴所說何義師曰說華嚴曰離却法界元門華嚴經在甚處師曰在你諸人手裏曰與麼則信受奉行去也師曰贈你三文買草鞋問德山小參不答話問話者三十棒意作麼生師曰我者裏不打有問即答曰無法可說是名說法又作麼生師拈棒僧便走師曰作賊人心虗問禪門一派分為五宗其間還有優劣也無師曰五五二十五曰臨濟一宗兒孫徧地他有何長處師曰細魚齩斷鸕脚白鷺驚飛上樹梢曰涅槃心易曉差別知難明五宗異同請師開示師曰退後三步示眾趙州道箇無字開口見心肝因甚諸人自生障礙有僧請益曰蠢動含靈皆有佛性為甚狗子獨無師曰莫說狗子直饒你問他釋迦彌勒還有佛性也無他也道無僧曰趙州禪在口脣邊因甚只會道箇無字師曰趙州見處只到者裏僧曰和尚不肯趙州那師曰是僧曰趙州是古佛因甚不肯他師曰趙州在那裏隨後便喝示眾諸方有海蠡禪海蚌禪鐵剗禪老僧者裏却似水上葫蘆觸著便動捺著便轉活鱍鱍地無你奈何處昨日一陽來復見說生根了也諸人為我提起看示眾有時伸出佛手有時放出驢脚錯有時拍禪牀有時擊香桌錯有時舌生毛脣生醭拄杖長年靠壁角臨濟德山鼻孔一時穿却錯諸禪德向者三箇錯處認得老僧請你喫無麵䬪飥眼裏少瞳腦後沒骨剮之無皮殺之無血只有者張臭嘴左看也看不得右看也看不得商量沒處安放他送到寶珠巷口朱三益家雜貨作坊架子下壁角落頭做箇徒弟老師撒急尿底大瓦鼈示眾臨濟大師道我者裏是活祖師西來意一切臨時要用便用遂拈拂子搖曳曰我者裏也是活底要用便用一切臨時且道與臨濟底是同是別擊一擊擲下曰臨濟大師猶欠者一著在者者者心圓今日何故口門窄示眾佛祖行不到處行取一步佛祖說不到處說取一句召眾曰一鋪是九里三鋪廿七里者箇是佛祖行不到處老僧行到今日初三明日初四後日初五者箇是佛祖說不到處老僧說到喝一喝曰寧與有智人廝罵莫與無智人說話示眾跛者命在杖渡者命在舟有來由沒來由一身還有一身愁衲僧門下奪食驅牛擬著眼看便與閉却戶牖擬開口道便與塞却咽喉夜廊無月不點火露柱從教撞破頭示眾慈悲不是佛忿怒不是魔明州布袋橫拖豎拖人人自屎不覺臭淨潔地上正好放屙金窠草窠相去幾何歲寒落葉無人掃一任門前堆積多示眾天如老漢一箇獃僧爭奈諸人認他不著道他卓卓巍巍他却藞藞䕢䕢道他藞藞䕢䕢他又卓卓巍巍或時做善知識模樣談元說妙或時現三頭六臂發瞋發惡如是等處一一認他不著殊不知老漢不在諸人眼睛裏却在諸人鼻孔裏諸人不信伸手摸看總饒摸他不著也摸著自家鼻孔示眾舉臨濟道我在黃檗先師處喫六十痛棒如蒿枝拂相似師曰好箇頑皮癩骨不知痛癢底麤漢何似近代兒孫箇箇皮下有血動著他絲毫不得也奇哉示眾舉百丈野狐因緣師曰前云不落後云不昧引得野狐隨羣逐隊當時若下得者一喝前後五百生一時粉碎示眾釋迦老子推不開達磨大師趕不出引得一畮之田三蛇九鼠盡道呼蛇易遣蛇難拍膝曰有甚麼難家有白澤之圖必無如是妖怪示眾女子臨出嫁時治家作活之法一一請教父母惟有生子養子不待教而自能所以俗書曰未有學養子而後嫁者也誠哉近代宗門衲子則不然先學說法然後學做佛寧可不做得佛不可不會說法怪哉師不領院事居恒隨機開導行省平章咸稽顙執弟子禮屢起浙江諸名山堅却不赴遁跡吳淞間弟子就吳中構地結屋如叢林規制名師子林居十有三年道價日振至正甲午帝師錫以佛心普濟文慧大辨禪師號兼賜金襴法衣示寂後塔於水西原杭州府徑山呆菴敬中普莊禪師台之仙居袁氏子依天童左菴芟染久之不契出遊參了堂於天寧堂問何來師曰天童堂曰冒雨衝寒著甚死急師曰正為生死事急堂曰如何是生死事師以坐具作摵勢堂曰敢來者裏捋虎鬚參堂去一日室中舉庭前柏樹子話師擬開口堂劈口便掌從此悟入初出世撫州北禪後遷雲居問新到我者裏虎狼塞路荊棘參天上人到來有何忙事曰特來禮拜和尚師曰入門一句則不問脚跟下草鞋甚處得來僧擬議師便喝又問昨離何處曰廬山師曰不勞再勘師嘗勘僧曰近奉公文務要打點上座僧曰某甲不是奸細師曰也須勘過始得曰和尚莫倚勢欺人師展手曰把將公驗來僧擬議師便掌一僧曰久聞和尚有此機要師曰山僧失利一僧問承聞和尚有打點之機是否師熟視曰汝來自首那曰學人掀倒禪牀去也師曰汝是甚處人曰高著眼師曰者依草附木底精靈鏟草次僧問者片田地幾時鉏得乾淨師舉起鋤頭曰未審上座喚作甚麼僧無語師拋下鋤頭曰者片田地幾時剗得乾淨問騎虎頭收虎尾中間事作麼生師曰渠儂得自由曰只如古人道我也弄不出意旨如何師曰入水見長人僧請益師曰汝自己分上少箇甚麼却來請益僧擬對師曰盂口向天曰此是古人底師曰老僧用得恰好曰如何是奇特事師曰千年田八百主曰學人不會師曰至今將不去留與老農耕問如何是道師曰木落崖石出曰只如先德云山上有鯉魚井底有蓬塵意作麼生師曰見之不取思之千里示眾宗師家不得已一言半句無非為學者抽釘拔楔解粘去縛如善舞太阿自然不傷其手近代據師位訓學徒記持文字崇飾語言誇耀後來增長惡習不知有自己出身路如衣壞絮行棘林中不能自由少林直指之宗於此墜地良可痛傷汝輩行脚各須帶眼莫教墮他網中出頭不得只如古人道入此門來莫存知解若約山僧見處直饒知解頓忘猶是門外漢到者裏須辨緇素始得珍重上堂老僧開荒時於法堂基上掘得一箇鈯斧子久聚兄弟若用得著者兩手分付若是荷負不去老僧收得來著甚死急不如颺向擸𢶍堆頭從他日炙風吹去也驀拈拄杖卓一下曰鞭起鐵牛耕大地誰能井底種林檎上堂舉盤山示眾心月孤圓光吞萬象光非照境境亦非存光境俱忘復是何物洞山曰光境未忘復是何物師曰二尊宿弄物不知名各與二十拄杖不見道見義不為何勇之有永樂癸未十月二十三日示寂於不動軒世壽五十八僧臘四十五闍維煙焰所至舍利如貫珠塔於凌霄
