寺一人在宗會庵不得道相見了也試道看僧云人天善知識作者箇去就師云問你相見證甚麼去就僧禮拜師便打儀侍者云某甲看忘却用心時是箇甚麼兩年無所契入乞師指示師云堂裏開靜也未侍云未師展兩手云忘却用心時師問云除却抽釘拔楔外還有甚麼事也無衆下語皆不契宣侍者云蒼天中更添冤苦師喚宣侍者至云是你下底語麼侍云是師拈竹篦云錯下轉語該打三十侍云蒼天蒼天師打一竹篦云蒼天中更添冤苦復代云枷上更著杻師入堂一僧云昨日有箇僧到方丈裏未開口和尚便打還是賞伊罰伊師豎拳云會麼僧擬議師便打云雲門者裏賞罰分明問僧云道箇如如早已變了如何免得無過僧云動即不動師伸手云我與你打箇拳僧擬議師便打師恥禪者空腹高心不明一經故時及講演應機接物有古雲門風即動止諧謔一皆密義康熙乙巳十月十一辭世壽六十七臘四十五塔全身於顯聖前山之陰杭州府寶壽石雨明方禪師別號斷拂嘉興武塘陳氏子慧業生知靈根夙種年二十二偶遊雙塔寺觸昔緣遂辭親棄室出家一日課佛號次忽擲魚曰不惟西方東方亦可生矣獨於南泉三不是語礙膺如塊往參雲門呈所得門無他示但以俚言熱罵之而向所礙膺忽消落嗣閲棱嚴至我真文殊無是文殊若有是者則二文殊不覺身心世界打成一片然冷地拶著未免吞吐不下復走見門門示以本色鉗鎚不少假借次參博山憨山納戒辭門住山饑寒毗佛洞風雨西方庵者久之心灰智泯如大死人却恨死了活不得復下西峯再參雲門一日門上堂曰放下著師乃豁然通身慶快呈偈曰平空一擲絶躊躇轉眼風波徹太虗會得竿頭舒卷意放生原是釣來魚門閲畢佯為叱之經行次聞僧舉大慧語禮侍者淨剝荔枝話忽軒渠一笑首座搊住曰道道師曰恰直某甲持不語戒座異之時有僧問話而身甚抖戰門曰問話且置把者抖戰底去了著師出衆曰和尚何得以貌取人示同腐塊學戴頭巾門擬答師却作抖戰勢突出獅兒萬人辟易門曰賊師曰賊賊自是機鋒人莫敢犯一日入室門問如何是一口道不盡底句師曰晨昏禮拜和尚也是尋常事別云待老漢瞥地了再說門曰趙州道無意作麼生師曰和尚喜著棋某甲粗知別云合取屎孔門曰他道有又作麼生但掩鼻而出師矢口頌曰家家有幅遮羞布何不遮卻放下便能當雨露何不放下獨怪當年老趙州兩重公案擲却頭巾頂却褲更賣弄在門大喜付以斷拂一枝頭頂破褲手拏斷拂有甚體面故自號斷拂上堂四十九年三百餘會決定不是第一義摩竭掩室毗耶默然決定不是第一義九載面壁千七百則決定不是第一義畢竟如何是第一義良久曰心不負人面無慚色上堂夜半金烏突出難辨日中玉兔覿面猶迷齊彭殤一死生儒宗之妙唱即生滅非生滅釋氏之元提露柱懷胎㹀牛生子且道是妙唱是元提咄無將送客風翻為留客雨不因送客處爭憶別家時上堂智人一言快馬一鞭便恁會去猶涉廉纖驀拈拄杖曰看看松篁橋水逆流也你輩要點鐵成金轉凡為聖喝一喝曰消得龍王多少風上堂在日用中錯過穿衣喫飯向筵席上去覓酸棗甜梨貪觀天上月矢却手中橈深為可憫大衆且喚甚麼作手中橈癡人面前不得說夢上堂寶壽山高突兀中有人不相識中有境取不得欲擬心身命失奇花幽木不知年古塔新開舊石田此日為君重說破寶龍橋下水連天喝一喝小參識得破意不過不知把住要津即是私通一路隨爾顛倒以緇為素帶纍三世諸佛也要在草裏坐不在草裏何處有三世諸佛耶驀豎拂子曰者是草還有出得三世諸佛者麼看他說夢良久擲下拂子曰令人長憶李將軍萬里天邊飛一鶚直饒金翅鳥王來也是籬邊啅野雀象田上堂者片田地人人都有只是不會料理致使荒却所以勞他上古象為之耕鳥為之耘梵鄉禪師為之灌蔭念首座為之扶耒靈禪者為之總耕今日衆中若有能向前承賃善於料理者驀拈拄杖曰山僧有全紙契書兩手分付有麼有麼腦後見腮莫與往來良久衆無語乃度拄杖與侍者曰且收著問那吒析骨還父折肉還母未審將何說法師曰冬不寒臘後看問凡有言句盡屬染汙如何得不染汙師曰巡人犯夜問不是心不是佛不是物畢竟是箇甚麼師曰老鼠吞大象別云不是老僧答你者話不得問馬祖道藏頭白海頭黑是何意旨師曰惺惺自古惜惺惺別云老僧無髮問一悟永悟因甚却有大法未明師曰無米熟熬油問併却咽喉唇吻請師答話師曰此問不答曰為甚不答師曰恐犯咽喉唇吻問此土無佛向那裏描畫師曰賊身已露問佛祖談不及處請和尚下一轉語師曰沒有者閒工夫曰和尚舌頭長也師曰你那裏見得曰學人把臂共高歌師曰且緩緩兩箇草裏漢徒屈師師屈徒石車乘同師坐次黃元公問兩石相磕時如何師曰只可自怡悅不堪持贈君別云磕不著南昌府葉曇茂居士參雲門有省值浪杖人說法上藍士過訪覺問雲門得力句還記得麼士曰當時恨不唧𠺕覺云如今又作麼生士曰却放過和尚一著覺曰咦開府大成余集生居士桐城人參博山覩法堂聯坐斷十方猶點額密移一步看飛龍之句有省雪關誾問閉門作活為何事公曰出賣𨍏轢鑽曰補網張風成何用公曰添箇黑撈波曰八卦正位如何排公曰切忌當頭別云畫前領取曰路逢猛虎如何避公曰一任𨁝跳別云喪盡殘生也不知曰一條直路如何入公曰巍巍堂堂別云縮轉去曰斜街曲巷如何通公曰婆婆和和別云驀直去曰中心樹子如何斫公曰亞父空勞樽俎計曰關津把斷如何過公曰蘇卿原是漢朝臣曰如何是透頂底人公曰腳跟點地曰如何是透底底人公曰鼻孔撩天卻把住問伊如何是未開口前明白底人便與一掌推出斷拂老人住雪峯時公問當年真覺大師所遺三箇毬子和尚還是一時用次第用總不用斷拂答以偈曰雪峯毬子總不用死爛蛇頭能活弄次第拈來舉向人眉毛與眼一齊動一時拋出大家看波斯乞命無門縫三轉語酬余石頭莫教磕破人間夢公於是竭力雪峯者無倦容問固佳矣答亦美矣惜未與𠞰絶去致使祖禰不了殃及兒孫有問如何得剿絶去和聲便掌江寧府天界覺浪道盛禪師閩柘浦張氏子幼聰慧聞大父坐化輒疑曰此箇靈明向何處去一日街行聞猫聲有省年二十出家掩關夢筆默默參究一日閲百丈再參因緣有悟往博山求具戒且問從上佛祖如何行履山曰須從工夫透脫始得別云佛祖不問人師曰佛祖行履豈因工夫耶山曰子且去做到那田地著師辭擬參壽昌道經書林見東苑苑問曾聞博山提唱維摩經否師曰曾聞苑曰彌勒得一生授記作麼生師曰大有人疑著苑曰你又恁麼去師異之圍爐次師舉僧問古德劫火洞然大千俱壞未審者箇壞不壞有云壞有云不壞此意如何苑曰你又恁麼來師遂折節過冬因呈生平所見苑喜以偈付之次年隨苑禮壽昌昌勘驗奇之師因問東苑當時答一語和尚便滿口見許若是道盛決不輕易放過昌曰祇如他道和尚莫作怪你又作麼生師才啓口昌便劈面一掌師曰也是賊過後張弓昌曰且喜有人喫掌在一掌打得一箇亦是快事嗣以臨濟趙州元沙諸公案詰之師以六頌發明昌頷之師因事繫獄陳太宰命吏省師索偈師書問余何事捿碧山笑而不答心自閒桃花流水杳然去別有天地非人間詩遺之宰嘉甚會操江李公雪其事師出亦無異色李顧當事曰禁之無慍釋之無喜非真道人而何師坐道場五十餘處語録如之內集三十三種外集三十一種師為人機雖孤峻而性實溫和凡示誨人不豁然則不已故士大夫多出其門海內尊為宗匠上堂雙輪合璧泥牛入海如神五曜經天石馬回途自妙微雲淡河漢秋雨滴梧桐路逢達道人不將語默對若有箇漢向者裏發得一笑許他親見歇祖八字打開別施手眼衣被萬化乳育羣英使箇箇遮天蓋地去發得一笑更那有許多注腳來還會麼夜排月戶清光遠秋拭山稜秀色多上堂十字街頭結制惟有石橛子自肯承當莫謗石橛子急水灘上白椎祇許竹篙兒全機活脫未白椎時還活脫否杖人恁麼舉忽有箇出來捲却席子也好與三十棒且道是賞伊罰伊檢點得出自喫三十黃頭碧眼剜肉成瘡檢點不出互相鈍置白牯黧奴開眼作夢祇如今日與衆造箇欵端又作麼生巨靈擡手無多子劈破華山千萬重上堂人從賢溪來請擊臯亭鼓䇿杖獨登堂一喝驚今古是誰直下耳聾又誰當央舌吐不勞象骨更拋毬且看元沙是甚虎巢知風穴知雨動植飛潛各有主電卷星馳龍驤鳳翥者些兒須自許太平一曲韻深長流水高山何足譜此等提唱易資套襲覺浪門下大率如此故不選録問僧甚處來僧曰和尚試定當看更要商量在師曰野狐精𨁝跳作麼曰情知和尚有此一機不但皮下無血直是眼內無珠師曰苦不是新羅僧便拜磕得一萬頭有什麼用處師曰村夫喫橄欖閩僧參師曰你是延平來底麼曰是師曰交劍潭兩條龍還在否曰不知師曰蚯蚓穿過東海蝦蟇撞倒須彌伎死禪和打瞌睡未曾醒在諸公看覺浪一場敗缺問如何是常住三寶師曰兩粥一飯曰如何奉持師曰朝看東南晚觀西北問有問石頭如何是道頭曰木頭如何是禪頭曰㼾磚此意如何師曰藝壓當行曰或問和尚如何是道師曰好皮不染皂曰如何是禪師曰好人不借錢曰此與石頭同別師曰石馬廟前有傘鋪曰不會師曰木屐店在對門開
