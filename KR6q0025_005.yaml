body:
  text: 心圓居士拈別火蓮居士集梓六祖下第三十四世天童密雲禪師諱圓悟常州宜興蔣氏子八歲知念佛春陽遊嬉輒動世間無常想十五能躬耕養親二十六閲壇經歡喜誦習知有向上事負薪入市釋肩立橫術竟日不知有人三十安置妻孥依禹門傳和尚脫白執爨賃春負米百里外時以己事𧥣傳瞪目直視雜以詢罵慚悶成病二七日汗下乃蘇服勞四載始納僧服掩關千日矢明此事傳屢加勘驗終不許可師亦自審一似有物昭昭靈靈卒未泯懷如是者六載秋日過銅棺山頂豁然大悟忽覺情與無情煥然等現大端說似人不得正大地平沈境界從前礙膺渙然氷釋與其師往復縱辨箭鋒相觸傳入京參侍二載歸而上雙徑禮天台探禹穴海門周汝登唱道東南師與之水乳相契祭酒陶望齡司空王舜鼎交參𧥣擊師之法道盈於海東自三公始也傳歸龍池且老撾鼓集衆以衣拂付師傳入滅心喪三年始徇衆請升堂開法明年移海鹽之金粟明州司李黃端伯迎主鄮山阿育寺住三月復遷天童自是一住十一年師六坐道場於金粟天童最久應緣甫畢曳杖入通元萬衆挽之不可居六月示微疾晨起按行工築停午臥榻少選趺坐頻申而逝崇禎十五年七月七日也壽七十七夏四十四明年癸未弟子建塔天童迎全身窆幻智庵之右隴上堂舉高峯和尚云清底泥牛銜月走巖前石虎抱兒眠鐵蛇鑽入金剛眼崑崙騎象鷺絲牽此四句內有一句能縱能奪能殺能活簡點得出者參學事畢師云高峯之句不妨奇怪只是不經簡點今日禹門亦有四句四句者何饑餐渴飲閒坐困眠此四句內亦有一句能縱能奪能殺能活簡點得出者來方丈通箇消息火蓮云兩箇老漢費許多氣力作麼我者裏只有一句能縱能奪能殺能活莫道高峯圓悟未曾夢見便是三世諸佛歷代祖師也簡點不出上堂四月十五日已過去六月十五日猶未來過去與未來以拄杖云都從者裏剖復以拄杖云若於此識得根源朝打三千暮打八百若識不得是不知痛癢底死漢莫怪悟上座造口業壓良為賤擲下拄杖復舉德山初出蜀於澧陽路上見一婆子賣餅息肩買餅點心婆指擔曰甚麼文字曰青龍疏鈔曰講何經曰金剛經曰我有一問你若答得施與點心若答不得且別處去金剛經道過去心不可得現在心不可得未來心不可得未審上座點那箇心德山當時無語師云我若作德山只向道山僧肚饑揀大者快搬來使者婆子直得手忙腳亂打發不迭及至搬來時肩擔便行管教者婆子疑殺行腳衲僧別有長處火蓮云別無長處圓舉問息菴別無長處意旨如何息便出去圓曰不消一問匿影逃形次問湄菴湄曰五五二十五圓曰未夢見衲僧汗臭氣在次問覺非覺上前擒住曰速道速道圓劈面一掌覺拓開曰小鬼頭胡打亂打作麼圓喝曰瞎眼漢教你曉得惡人先做大湄曰當斷不斷反被他算覺與一掌曰那裡落節者裏本湄大笑上堂𥩟立座前云老僧氣喘不能說話遂咳嗽吐痰於地云衆兄弟試道看良久無有出者師以腳抹却歸方丈上堂若論此事描也描不成畫也畫不就喝下鐵圍山倒走一句當天八萬門句句自然絶滲漏趙州關雲門普雪峯輥毬禾山打鼓上來一隊老古錐看來未解師子㖃汝諸人須抖擻轉身路子若能行處處莫著隨人後拶著翻身便咬伊始可人前開大口且道禹門者裏用箇什麼驀拈拄杖云一條拄杖黑如漆是聖是凡劈脊摟喝一喝下座上堂舉韶國師偈通元峯頂師云大家在者裏不是人間師云錯下注腳心外無法師云畐塞殺人滿目青山師云有眼如盲大衆還識韶國師麼若也識昔日韶國師今日老僧不成話墮若不識且道是誰之過下座云參火蓮云一坑埋卻猶較些子圓云我不恁麼道因雪上堂昨日青山今朝白雪衆兄弟好消息野鹿行人步步成迹惟有挂角羚羊絶氣息從來獵犬難尋覓高著眼始得上堂人人本具箇箇不無不是聖賢了事凡夫且事又作麼生了舉起拂子云不喚作拂子便了取好不喚作拂子便了又喚什麼作事以拂子擊香几云惺惺底惺惺瞌睡底瞌睡然喚作惺惺瞌睡依舊無本可據喝一喝云老僧據本去也便下座上堂今朝正是正月七世上相傳是人日可憐大夢未醒人却見陰晴起瞋說令人轉憶雲門老解道日日是好日衆兄弟還知雲門老子落處麼良久云只是不分皂白底漆桶復云日日好日當下心息本無孔竅寧容情測各各珍重不煩久立開爐上堂烹佛烹祖大爐鞴煅生煅死惡鉗鎚驀拈拄杖云若是超佛越祖出生逾死者不用如何若何便請單刀直入與通元拄杖子相見諸方提唱多用此語且作麼生說箇相見底道理莫是向前一喝拂袖便行謂之相見麼莫是接住拄杖送倒老和尚謂之相見麼莫是奪卻拗卻擲向別處燒謂之相見麼要且不是者箇道理既不是者箇道理只者相見二字早剩了也作麼生是單刀直入法門咦三十年後莫謗心圓去好上堂當頭一著坐斷要津才然側耳喪却家珍從來佛法不順人情所以道出羣須是英靈漢勝敵還他師子兒上堂通元峯頂好箇消息若人識得參學事畢喝一喝云不煩久立便下座上堂二月初十好箇消息盡大地人𨁝跳不出喝一喝云百年三萬六千場反覆原來是者賊上堂舉僧問雲門如何是透法身句門云北斗裡藏身大慧道雲門老人恁麼道只答得法身句未答得透法身句今日或有人問徑山如何是透法身句向他道蟭螟眼裡放夜市大蟲舌上打鞦韆通元又且不然有問如何是透法身句劈脊便棒縱使不會管教永劫不忘蓮別云縱使不會通元話在開爐上堂般若如大火聚擬之則燎却面門驀拈拄杖連卓云當爐不避火者與拄杖子相見蓮云燋頭爛額堪作甚麼息云畏刀避劍堪作甚麼圓乃震聲一喝問正偏兼帶即不問臨濟家風事若何師便打僧擬進語師復打云再犯不容乃云火𦦨為三世諸佛說法照顧眉毛多少莖三世諸佛立地聽歷歷分明赤骨惺死柴頭發渾身𦦨始可聯輝繼祖燈善信求開示師云汝為何來云弟子不為別事師云何為不別事云為修行故來乞開示師云修行也是別事做買做賣也是別事乃至虗空大地日月星辰森羅萬象以至父母兄弟妻子皆是別事如何是你不別底事云弟子不會師云汝去會不會底來問月明簾外如何轉身師云你但進門來云如何是門裏事師便打云請師不用棒不用喝將轉身事盡情道一句師起云我倦要睡去問如何是三元三要師云你者一問聻云某甲不會請和尚明示師云你且放下著問某甲一向做工夫沒箇入處師云誰教你來僧擬開口師直打出問古人道亡僧誦一部佛法語未絶師云亡僧甚處去也僧擬議師便打僧云乞和尚開示師云汝道亡僧還開得口麼僧無語師云既開口不得佛法合作麼誦問如何是佛法大意師偶搔頭云老僧頭癢云還有奇特也無師展兩手別云老僧頭破血出問大事未明乞師開示師云你喚甚麼作大事云豈無方便師便打問琅琊覺讚初祖末句云師心兮戴大慧杲云戴之一字不得動著動著即禍生師拈棒指云直須動著動著從教東擲西拋琅琊新婦子大慧老婆禪圓悟者漢略較些子問不會做工夫求師開示師云不干老僧事云求箇明白路頭師云但向暗處走別云我不明白問諸法從心生未審心從甚處生師云老僧正疑著居士問弟子揚州來為大事不明師云汝既不明將甚麼來士無語問還是念佛好還是做工夫好師云總不好僧擬議師打云向者裏會得却好問如何是乾屎橛師云田塍上看別云速吐卻問工夫散亂不成片時如何師打云我道棒打不開問乞師指箇修行路師云我從來不會修行云更冀慈悲師云一事無成兩𩯭絲問古人道老僧無法與人祇解識病時有僧出作禮古人便歸方丈意旨如何師云汝且出去僧擬再問師云你未知病在云如何是某甲未知病處師舉手搔頭僧罔措者僧渾身是蠱惹得老漢遍體毒癢沒著搔處問衆生即佛弟子信不過師云信不過且做衆生云佛又作麼樣師云但肯作衆生佛即在其中問清水洗塵塵水歸何處師云茅廁裡云某甲不會師云問取淨頭去問生滅不停如何降伏師攔胸搊住云停不停云不會師放云恁麼即降伏了也僧擬進語師乃叱出問如何是五眼圓明師曰老僧止兩隻問未舉念時意旨如何師良久僧擬再舉師云去問黑漆皮燈籠還有亮時也無師打云老僧要打破問如何得出生死師云如何是生死云學人不會乞和尚慈悲師云老僧無奈汝何問某甲一字不識乞師開示師云我正要一字不識底還你一字不識底去處來僧無語師乃打俗士問我輩修行不知從那步起師云從你未動腳者一步起又問此心如何定得師云定即且置如何是心士無語師云汝且會會心看問大修行人為甚擔枷帶鎖師云自作自受無人救云萬丈嵒前作揖百尺竿頭拱手師云自拈自弄得人憎蘊虗講主參問未到金粟時如何把住云道道擬議便推出云你未到在師曰雲岫菴中曰到後如何師云喫茶已畢曰釋迦未出世祖師不西來喚甚麼作正法眼藏師正身云見麼別云正要闍黎恁麼舉曰有見則不堪師云未夢見在又問古人道喚作一物即不中如何又喚作無位真人師云你即今是一物是無位真人別云座主莫被人瞞好曰若說作兩橛師云還我一橛來云猶是第二門師云怪你做座主所以會講雲怡蔡居士問渴鹿趁𦦨如何歇得師云摸取腳跟摩尼珠云久埋塵土中如何急切覓得師云滿面羞慚別云不要亂摸云一斬一切斷如何得此利劍師云照顧汝頭云等是水味有品為第一泉有品為第二泉作何剖分師云飲者自生分別別云一二且置水作何味云黑夜中認賊為子認子為賊作何判斷師云各打三十棒別云戳瞎己眼云家親作祟如何處置師云家無二主別云此事問不得家親云的的主人翁如何得覿面一見師云攔腮與汝掌別云莫說夢云堪輿家羅經縱橫移動針必指南是誰作主師云且向羅經後看云家宅是諸人生身活計見得甚麼便肯破家蕩宅師云春色滿園關不住一枝紅杏出牆來別云破蕩是活計云電光中良驥瞬息千里如何得一往追上欖轡入手師云好箇驢前馬後漢別云騎驢更覓驢云大慧云將八識一刀憑甚麼安身立命師云還我刀子來云胡來胡現漢來漢現是鏡體是鏡光師云打破鏡來好相見別云早不是了也云未開口已前為甚便棒便喝師云為汝不薦別云老僧只恨手慢云日升月沈雷轟電掣山靜雲閒水流花開莫非是者箇迸現如何拈得向腳跟下要用便用師云魚行水濁蓮云迷頭認影云修行人多怕去後黑漫漫地不知現前黑漫漫地更苦盡說生死事大不知現前剎那死死生生更切此際重關一擊如何下手師云好與三十棒別云真箇黑漫漫地云高峯言大徹底人未脫生死為甚命根不斷命根既未斷呌做大徹徹底何事師云汝喚甚作命根別云莫錯會高峯語云一句當天八萬門永絶生死者一句得恁有力師云坐斷乾坤是甚麼句別云者箇不是人傳授底你莫妄想問己事未明乞師指示時值板響師云打板了喫粥去別云喫粥後向你道問雲門餅趙州茶和尚者裏有麼師云一頓大拳頭問衆中操履好靜中操履好師曰分身兩處看別云莫管他問乞師指截徑處師云汝是甚處人云江西師把住云江西到者裏多少路僧擬議師推出問古人一言之下為甚麼便曉得雲門兒孫師打云你是甚麼人別云雲門是兒孫僧禮拜師又打問如何是祕密藏師云八萬四千別云瞞人不得問搬石挑沙明甚麼邊事師云來日再去挑行者問吞不進吐不出時如何師云問取舌頭比丘尼問如何是本地風光師云嘗在汝面門出入別云淨地莫放尿尼欣然禮拜