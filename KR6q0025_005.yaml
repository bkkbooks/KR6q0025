淨裸裸赤灑灑上洞然契證明見得徹諦信得及與從上佛祖握臂共行無有差忒更須一念萬年萬年一念純一無雜才有纖豪起滅便是生死因緣無有超脫之期務使如鳥出籠無欲無依舉動施為常在本分中真踐實履無虗弃工夫趙州二十年不雜用心涌泉四十年尚自走作香林四十年方成一片信知從上古人皆自尋常日用中密密體驗始能臨末稍頭不怕甕中走鱉耳復清都史居士居士越要蓋天蓋地自繇自在終不能得乃與隱隱陰魔對敵故有恁麼也不得不恁麼也不得恁麼不恁麼總不得直須堅豎脊梁全身翻轉猛著精彩把世出世閒一口吞盡不用蓋天蓋地而自蓋天蓋地赤條條去也若胸次中一豪治不盡要了生死無有是處故曰豪釐繫念三途業因非虗語也復子元劉居士來書一發願二程途三醒悟四工夫足見居士立志真實骨器不凡聰明靈利異於常人然細玩之悟境未實現相非真現相急須撥採悟境著實參期若不期悟發願枉發程途枉行工夫枉為何也未悟時期悟為工夫不悟不休為程途不悟不休為發願如悟則乘其悟力以茲利己以茲利人則工夫程途發願皆在其間不假別發願別程途別工夫耳且果悟則一一不著問人而自明矣復紀常陳居士學道當先期悟以悟力充至頭頭無間則無昧悟力而平時熟習自無地矣要言不煩復元怙張居士蓋與此事相應則世緣不待拋而自拋知見不待離而自離語言不待忘而自忘總之世出世間語言知見都來與道人分上無干涉者無他因與此事相應故也復似孫江居士手諭認得言思路絶一著又云於古德言句有彼此乖忤不能無疑者總之未真證得言思路絶故也若果證得則自然一心不生一心不生則妄情不起妄情不起則無現業流識無現業流識則曠劫習氣頓淨矣然則試問居士如何是言思路絶底一著切莫學恁麼說便當了也復吳道婆五宗差別之語言亦無非明人人本分一著若離人人本分一著別有差別之智則隨名相展轉生差別之情識依舊無自繇分當知涅槃妙心是大海差別智是雨滴滴雖不同總歸大海自無差別所謂唯此一事實餘二則非真是正宗正旨若有差別之智勝過涅槃者是為魔說紹興府雲門雪嶠圓信禪師鄞縣朱氏子年九歲聞僧誦水鳥樹林皆悉念佛念法念僧語遂知信向佛乘二十九棄家訪秦望禎山主禎舉昔有他心通僧住山有僧造訪心已預知遂躬往溪邊候迎且負渡之至中流問僧曰汝是甚處來僧答天竺心曰我聞有三天竺你從那一竺來速道速道僧無對心復負回擲於地曰且教汝岸上死明明指出矣爭奈者僧不會僧歸病發遂死師聞舉疑情頓發徹夜參究次日拽杖入山見危石高聳棄而登奮躍上下高聲提曰從那一竺來速道速道復自誓曰悟不悟性命只在今日了狠提至日午忽然前後際斷如空中迸出日輪相似乃衝口說偈曰石貼背脊骨翻身脅肋骨子細看將來動也動不得復喝曰張三殺人李四償命次往天台擡頭見古雲門三字豁然大悟述偈曰一上天台雲更深腳跟踏斷草鞋繩比丘五百無蹤影若見他時打斷筋往參雲棲問如何得成佛作祖去家富小兒驕棲云問道於盲恰是師云道豈盲耶猶挂唇齒在棲云我盲也不得一向師打相云昔時氣息爭解忘得總在者裏莫錯認棲指相云盲蝦蟇窟裏果沒蛟龍師云見婦不須重下淚還他原是箇中人棲云不是箇中人相罵饒你接嘴相唾饒你潑水師云恰好棲云好好師禮拜呈偈云不解西方不學禪棲著語云低聲低聲偶來塵世却隨緣棲云解也學也三間茅屋傍溪住棲云溪深路滑兩扇竹窗關月眠棲云春色滿園關不住碎盡衲衣那有結棲云爭似寸絲不挂養長頭髮欲成顛棲云成顛亦不惡自從會得吾師意棲云胡餅裏討汁白雪飄飄六月天棲云夏行冬令寒暑不正參龍池一見便把住曰佛不見身知是佛且置如何是若實有知別無佛池曰有了你沒有我師拓開池云雪嶠不得老僧道師禮拜次年復參池池豎一指師云喚作甚麼別云得恁麼無意智池休去一日著草鞋入方丈池云你草鞋猶未脫也師云何處見我草鞋來別云特來方丈池微笑師呈偈云數載龍池三度登重重問話舌生冰草鞋分付虎狼去雙髻峯頭一箇僧順治丁亥八月十九日師示微疾次日封鐘板親書一紙示衆云小兒曹生死路上須逍遙皎月冰霜曉喫杯茶坐脫去了至二十六日酉時果索茶飲口唱雪花飛之句奄然坐逝壽七十八塔於雲門之右麓上堂雲門宗旨絶商量函蓋乾坤不覆藏觸著頂門便顛棒頭指出好兒郎僧問一口吸盡西江水時如何師曰露出野狐精僧擬議師便打上堂亘古開先風景異此山何似紫袈裟無言童子分明說那箇男兒先到家喝云易復易難復難何人施大臂斬斷祖師關上堂四十年來恁麼行斬開碧落血腥腥其中果有希奇事師子遊行不問程稽首燈王如來普願微塵國土衆生同入般若波羅蜜門且道作麼生入舉拂子云鑒升座怒雷擊碎須彌石化作大洋海底雪泥牛吼木馬嘶拔出波斯眼中楔春晴桃李盡風流在處緑楊黃鳥擲惟有住山人打眠平生佛祖無交涉無交涉山花處處流鮮血拍膝一下云咦顓愚師切菜次師曰作麼生切愚云刀刀到底師曰用許多氣力作麼愚云你作麼生師曰一刀到底用許多氣力作麼黃端伯入山久聞雪嶠及至到來不見一點師曰日頭大黃云雪溶後如何師曰春水滿溪流黃云大師曾見甚麼人來師點胸曰雪老黃禮拜黃問既是出家人何不剃髮師云與居士一般黃云要做官那師作扶翅勢黃大笑師曰當時龐公也甚利害黃云當面蹉過師目視之黃云咦程季清問一庭月色如何收拾得起師曰且待明早看別云滿盛黑漆桶程問心字中作麼生加者一撇師曰漏別云越途越黑僧問有殺人刀活人劍便請用師曰不是時別云劍去久矣僧云借看得麼師曰鈍僧云有石頭在師擊拂子三下僧禮拜錯認定盤星僧問常言生死事大無常迅速還是幻身受法身受若幻身受幻身無體何可受恁麼即不消問得也若法身受法身同虗空是伊虛空不解恁麼問畢竟生死在何處迷悶可憐師曰汝今年多少僧云三十九歲師云汝三十九歲前在何處僧無語師曰者箇便是生死僧云要見在何處迷起師舉茶曰者箇喚作甚麼僧曰茶杯師曰向者裏迷起鈍置可憐駱沆瀣問某心緒常亂作麼生師曰正亂時是看甚麼物駱云是主人公師曰若說是主人公轉轉亂起來也師與蔡五嶽過放生池師曰許多魚何不放些去蔡曰我者裏飛去底別云在水裏師以扇打云還在者裏我若見伊問便將雪老推入池中陸文虎請齊師曰風雲際會時如何陸云原是箇文虎師曰只道得八成陸曰風雲際會時如何師曰虎生角也道開問近今佛法如何師云拄杖長一丈開問清淨雪山還有狗子也無師曰不消得開曰背後底聻師曰兩箇開擬議師便打開把住拄杖師曰侍者點茶來開放手師曰多少伎倆一杯茶冰消瓦解兩箇漢一場懡㦬師捫蝨次聞谷師向背後拍肩一下云和尚慈悲些聞谷被眼瞞了也師曰箇箇見血聞谷血滴滴也雪老慈悲故有落草之談聞谷問大悲千手眼那一隻是正眼師曰露天石臼子曰意旨如何師曰瞎唐祈遠問破屋將倒時主人如何料理師豎手曰撐唐云古人省力處便是得力處兩手撐時莫費力麼師曰屋倒也唐問冤家忽到時作何相待師曰裏頭底人聻唐禮拜師曰諸佛諸祖便認得者箇人喚作大事已畢唐云學人亦覺裏頭有人緣何常似隔一壁是你築一壁師曰不是者箇人俞彥直問祖祖相傳傳箇甚麼師豎一指俞云人人有者箇何必要傳師云你只認得指頭師坐次蔡五嶽指旁僧云者邱荒田怎麼好師曰直待春到蔡云春到來時如何師曰犁耙一齊出僧問急水灘頭下一篙時如何師曰你還打濕腳也未僧無語不但濕腳沒頭浸殺師喝出郭黎眉問如何是無地地主人師曰不居陰界別云老僧不識伊郭云菩薩向地獄觀化一巡誰是同伴師曰眼中無珠腳下無指別云黎眉問老僧郭云盡三界是箇圜扉誰人出得師曰向三界外問將來別云居士隨喜那郭將白紙作一相問云是甚麼師曰起動居士別云莫要老僧下語麼僧問路逢獅子時如何師震威一喝別作怕勢僧罔措不會咬人狗不如師直打出師一日問侍者曰一切說得出到此為甚麼說不出者云嗄師曰不關口事僧問雲生月際時如何師曰甚麼時節進云樹凋葉落時如何師曰鳥不宿僧問如何是休糧方師曰兩粥一飯別云休糧圖箇甚麼曰此理如何師曰不曾嚼著一粒米云若然一切人皆相似也師曰不墮諸數僧云望大師慈悲佛法布施些師曰窮云大師用不盡底師曰慳僧無語師拈布毛吹之僧云者箇是鳥窠底師曰鈍根奴明明示汝又道是鳥窠底別云向你道窮你不信僧問如何是雲門餅師曰官巷口曰如何是趙州茶師曰不濕嘴曰如何是祖師西來意師曰六月火燒山曰意旨如何師曰好下蘿蔔僧參次師將拂子擊案一下曰者一擊五家宗是那一家僧擬答師喝曰一擊三千里果然人不知師曰既是陳尊宿為甚身子只得半截衆下語不契代云那半截在學人手裏待雪老再問劈面便掌師云前人置得又云埋沒他不得別云我也弄不出又云莫錯怪老僧僧問四大分離時向甚麼處去師曰棺材裏去別云酒缸裏去云意旨如何師曰埋在泥裏別云葫蘆架上懸僧禮拜師喝出僧問如何是第一元師曰蝦蟇吞大蟲頭動尾巴顛云如何是第二元師曰赤土畫簸箕是甚祖師意云如何是第三元師曰悔殺當年句鮎魚上竹竿云如何是第一要師曰乞我一文錢十字街頭討云如何是第二要師曰五更侵早起終歲茫茫了云如何是第三要師曰月落不成眠書聲秋閣曉代僧云學人肚裏凑不出者些言句時如何答云你只消道箇猫何芝嶽方坦菴方孩未參次師曰昔日僧問雲門如何是一切智通無障礙門云掃地潑水相公來今日靜明者裏也不掃地也不潑水相公來也請下一轉語下官難消何云荒田不揀草瞎漢師大笑何云者一笑是賞是罰轉見敗闕師復笑何罔措若我在彼要教渠哭僧問不是心不是佛不是物是箇甚麼師曰正好著力別云誰教你來問僧問如何是本來面目師曰參僧云作麼生參師曰如何是本來面目僧問萬法歸一一歸何處師曰你做幾年工夫了僧云四五年師曰再做四五年始得別云在何處僧問無夢無想主人翁在甚麼處看你夢想師云在無夢無想處僧喝師曰可惜許師問僧大悲菩薩用許多手眼作麼僧無語代與一掌師曰應接不下別云好鈍置你僧問如何是不涉廉纖一句師曰不答僧云敗了也師曰沒人領會僧進方丈云會得者箇便禮拜師曰者箇是甚麼僧無語代云原來不會師直打出方丈葉開生問覿面相逢如何指示驀與一掌師曰你姓甚麼葉云與大師同姓師曰你道老僧姓甚麼葉擬議代云和尚年尊忘前失後師喝出祁德公頌佛號師曰念佛作麼祁云成佛師云有一人不念佛亦成佛祁云念佛亦成佛別云莫是和尚麼待伊云老僧不是者箇人却向伊云念佛亦成佛師曰佛之一字吾不喜聞兩箇沒鼻孔漢互相鈍置祁季超指亭前樹問者樹幾時成佛師曰成佛久矣別云待季超成時即成祁云為甚才長出來師曰異見衆生侍者問一僧還做工夫不師代曰早起三碗粥日中兩碗飯者云恁麼則不必做工夫了師曰飯裏有砂者云或遇無齒人又如何師曰天然別云牙根猶硬在師在階下曝背見徹崖至忽作跪勢曰意旨如何崖云揑怪不少師驟步歸方丈僧問牛頭未見四祖時如何師曰水長船高別云曲彎彎兩隻角云見後如何師曰泥多佛大別云也只是箇牛頭侍者問如何是向上事師曰方塔云如何是向下事師曰塔影者云水乾塔倒又如何師曰一堆磚圍爐次侍者指火云還雕琢得麼師云灰別云添炭來者云忽然回𦦨時如何師曰火別云烹茶喫師問侍者如何是人者曰不逢不愧雪翁侍者師曰不逢時如何者云落日照青山師曰一場懡㦬師至佛殿指阿難云者一位為甚麼合掌者云見尊者來別云也知和尚為人心切師曰施者難消別云老僧罪過僧問天童和尚師曰雖是弟兄向未往來僧曰既是弟兄為甚麼不往來師曰骨肉疏冷侍者問燈盡油乾時如何師曰昧不得別云睡覺好師問僧你參甚麼話頭僧云一歸何處師曰一歸何處僧無語代云老漢耳背那師曰一歸不須歸其法故不立不須歸早立了也師問僧見甚麼人來僧云不曾見人師曰當面妄語師入堂問維摩默然意旨如何衆無語代云如法問來師曰樹高千尺葉落歸根未是歸根在示禪人志同孤鶴遠鉢響亂雲流夜宿石橋下曉行黃葉秋古人云未跨船舷好與三十拄杖若向者裏會得百城煙水一場逗漏伸腳打眠度人已畢思之示禪人此事不必向外尋討但辦一箇乾淨肚皮無事不辦做工夫人盡是說工夫者他會做工夫人默默十二時中只有一箇不了底心肝橫於胸次更無第二物也古人云那箇拖你死尸來但向者裏看不須持呪念經求人不如求己誠哉是言也者箇事要真真實實念茲在茲虗言浪語一些來不得示張服卿雲生黑暗定知有雨人生在世豈不知末後有一堆黃土青茅冷冷春秋不管寒影疏疏而今人只是一箇膽大自己一段靈明佛性丟向腦後終日只是受用五欲貪瞋癡外別無所知因果輪回亦不肯信皮頑竟有一丈思之答金太史已分中事只在舉足掉臂間無勞遠覓若將道理語言湊泊他轉疏轉遠矣何以故他無滋味無道理寂泊無為道理加之如何使得西來大師教外別傳者正為此方人泥於道理文字弄得嘴頭水漉漉地不得見性勞他得得過來掃除葛藤有直指人心見性之一宗也今時士大夫做工夫不得力偏喜解說不知一切解說他不著何以故他無自性無知解非佛非衆生你作麼生解直饒文殊普賢快口利辭與麼與麼不與麼不與麼那事毫沒交涉若有所得心欲證西來大意十萬八千未是遠在畢竟如何須要辦箇冰冷心腸和前所知所覺道理非道理乃至世諦習氣一齊掃却掃不去命掃忽然掃破釋迦頂相諸代祖師鼻孔一時穿却豈不快哉古人云但辦肯心決不相賺示聞孝廉禪宗如黃金布地在在處處皆作金色拾得一塊生生受用不盡雖然且未要歡喜更向深山窮谷裏一二十年灰頭土面忍饑吞餓撞著咬猪狗手腳爛槌一頓方成金器不然喚作無用物又示一重一重造業如𧏙螂推糞丸相似長日在裏許推直待推殺在裏許方休他也不怕死在糞堆裏心心只恨推不出饒他推得出只是箇臭糞丸古往今來推殺萬萬千千恆河沙𧏙螂蟲也倘有一箇㘞地望空飛去倘有伶俐學人問飛向甚處去心圓即對他言你向甚處來還向甚處去永不回頭我說閻羅王亦怕是蟲與管乾三居士十二時中念念在天台教上作活計想汝智者再來也肯承當麼若不如是且依本分向是名真精進真法供養如來處看不然天台教無根無本飲人殘液不是丈夫老漢長日在大歇石上斫額望汝看你鑽故紙直鑽到彌勒下生只是箇管乾三呵呵答李夢白冢宰近今末法衰替要箇真參實悟底人萬中無一此事大不容易達磨大師云行解相應是名曰祖而今人總之不論意識卜度生死結根總得十分相似皮毛而已便向人前亂做宗門掃地矣或豎指或喝或打相或拂袖便行或作女人拜此等滅胡種類皆魔子也可悲可痛杜撰長老稻麻竹葦然朽到開先原非本意自念福薄德淺蒙叟云風之積也不厚則其負大翼也無力德不並曹溪緣不儕馬祖毋寧藏拙有志者勉之言語不重何能似古人匡宗行道丈夫自量語非欺人也只可深埋山谷茅屋石鐺挨一日是一日有何道可悟衆生可度哉示宋居士人命無常莫作久計古云六道中人最靈你若不明本命元辰靈從何來不過多集五欲貪瞋癡耳肯向喉嚨下割得一刀方許你稱靈稱聖居六道中為師為範要來要去如脫臭衫不然總被他拘管無自由分要學佛法還須真參實悟十二時中提箇話頭看來看去日久歲深自然桶底脫落腦門豁開常州府磬山天隱圓修禪師本郡宜興閔氏子依龍池剃染參父母未生前話一日讀棱嚴至佛叱阿難此非汝心處有省但於乾峯一路涅槃門話有疑後聞驢鳴豁然大悟一日入室問歷歷孤明時如何池曰待你到者田地與你道師便喝池曰汝還起緣心麼師拂袖便出久之受印可池遷化師縛茆磬山後住報恩示衆山僧住箇破院子不能為汝等提持佛法賴土木瓦石為諸人轉大法輪發大機用諸人切不得當面蹉過若蹉過只知事逐眼前過不覺老從頭上來一日驀地入堂一喝衆駭然無語見怪不怪其怪自壞師四顧而出次晚乃召衆曰兩重公案山僧昨晚為汝等立在萬仞崖頭命如懸絲好人不肯做要去屎裏臥今晚為汝等用老婆禪亦命如懸絲自作自受復喝一喝曰且道今日者一喝與昨日一喝是同是別轉見不堪會得者出衆道看溺鬼水底招人一僧出竟有不要命底大奇才禮拜師拈棒劈脊便打如潑水救火只恨手腳慢僧起師曰速道速道猶要作死馬醫在僧擬議師復打一居士家壁上貼戒殺二字下豎刀杖有僧問士云既戒殺何故又畜殺生之具士云此非殺生之具殺人之具也其僧不肯士乞師代一轉語師云喚作殺生之具入地獄如箭射士喜躍稽首僧問生死不明乞師開示師云我也不明云願和尚慈悲師云你將生死來我為你開示云生不知來處死不知去處豈非生死師云又道不明僧禮拜慧生居士問如何是格物師拈香爐云會麼士云不會師云昔日