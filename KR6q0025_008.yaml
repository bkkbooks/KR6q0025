作麼生師云腦門著地僧問堆堆坐禪圖箇甚麼師掩鼻云出去僧茫然師云走來僧近前師云三黃丸好僧問從上宗乘如何接續師云日東上月西下僧云與麼則人人有分也師云知章騎馬似乘船同參問如何是首座家風師云沒籬沒壁參云忽遇賊來時作麼生師云憑你摸索僧問畢竟如何是佛師云撞不破便燒僧問如何是梵音相師云鋪堂不細行僧問箭鋒相拄時如何師云過者邊立僧喝師便笑僧擬議師云大好箭鋒相拄僧問作麼生轉得自己歸山河大地去師云昨夜好秋雨僧問如何是和尚為人處師云呆子呆子進云不落古今句作麼生道師云官久必富進云七佛未出世時向甚處行履師云疑人莫用僧入室請益心經云揭諦揭諦意旨如何師云孔子産山東文才今古通大夫天下有白屋出三公僧云學人不知落處師云自衛返魯僧問一人發真歸元十方虗空悉皆消殞為甚麼方丈後泥挑不盡師云鬼喫餿饅頭僧問既是報恩人因甚不識金車山師云看你打之繞僧喝師云有甚了期僧擬議師云還怪得我麼便打僧問山河大地還有過也無師云缺嘴打鑼僧問乍起乍滅時如何師云不是鬼燈便是螢火僧問如何是觀音三昧師云夜來孩子哭僧云如何是文殊三昧師云日裏踢繡毬僧云如何是普賢三昧師云包公廟裏失氈包僧問心佛俱忘時如何師云誰與麼道僧擬議師喝出僧問浩浩塵中如何辨主師云飯裏沙多僧云謝師指示師云莫亂嚼僧問無夢無想時主人公在甚麼處師云大衆笑你師問僧仙鄉那裏僧答合浦縣師云明珠拈出看僧無對師云想是新戒師問座主金剛且止喚甚麼作經主擬議師便笑主問如何是經師召云法師主應諾師云好箇座主主指茶鍾云者裏有趙州也無師云匙挑不上師問一切葛藤敲門瓦子如今門開也瓦子在甚麼處僧茫然師云可惜七間僧堂僧問一字不著畫是甚麼字師云鼻大心無毒僧問未生之前即不問如何是趙州勘破婆子處師云飯飽弄筯進云某甲即不然師云要屙那邊去僧無語師云急歸堂僧問如何是有拄杖子與拄杖子師云伶俐好僧云如何是無拄杖子奪拄杖子師云懵懂漢僧問目前蕩盡時如何師云更夢見甚麼僧作禮師問汝名甚麼僧云南山師云南山起雲為甚北山下雨僧無對師云春無三日晴僧問百尺竿頭進步時如何師云三月三僧云學人不知落處師云起席不謝坐僧云從今得箇安樂地師云義冢淚痕多師問僧抑而為之可謂貴人多忘擬向那邊施設僧無對師問傍僧若也鑑不出落地作金聲你道作麼生僧擬作禮師便打僧問萬法歸一即不問畢竟一歸何處師云昨日典座來今朝柴頭去僧問髑髏粉碎時如何師云僧排夏臘俗列耆年僧問供養百千諸佛不如供養一無心道人諸佛有何過無心道人有何德師云打鼓轉船頭僧問王索仙陀婆意作麼生師云聽事不真僧云古人點鐵成金乞師直捷指示師云淮北鼓師問打稻僧禾熟不臨場且置作麼生耕人田不種僧無對師云賀家湖上天華寺僧問不是風動不是幡動是甚麼動師云禪和走入漆桶僧云和尚作麼生師云䒢溪號做慈翁僧問樹凋葉落時如何師云大好從頭起僧云體露金風又作麼生師云歌於斯哭於斯僧喝師云汝命何短僧擬議師打退僧問至道無難唯嫌揀擇是否師云雙陸盤開大喝彩進云如何是至道師云不差不差進云學人今日得遇和尚師云禪客昨晚在那裏歇僧問如何是大通智勝佛師云古家橋下進云為甚麼佛法不現前師云臨平腐乾入室僧問臨濟的的意作麼生師云官打現在進云學人不識宗旨時如何師云我是天溪主人進云道眼如何得明師云禮防君子進云乞師方便師云你問甚麼僧惘然師云近前來僧近前師大笑云金風落落洗芳菲瘦盡千峯鴈始飛南海一波長不定西山半面莫疑非僧問燕子善談實相如何是實相師云韓獹韓獹僧問撩起便行時如何師云泥作頭僧問如何是古佛心師云橋流紅樹僧云如何是物不遷師云葉泛霜波僧問禪客相逢祇彈指此心能有幾人知如何是此心師云闍黎鼻頭黑僧問如何是道師云好日多同僧云如何是道中人師云再過一家僧問作麼生是禪師云日裏不點燈僧問牛頭未見四祖時如何師云初七清明僧云見後如何師云念二穀雨僧又問上木下鐵意旨如何師云逢凶化吉僧擬議師大笑僧再問師云近日工夫太殺閒師問僧無根樹子作麼生種僧無對師云巡山稍暇僧請益舉元沙問光侍者打鐵船也未光無對請師代師云今日好風問進門一句作麼生道師云猢猻騎鱉背問既是大雄山因甚麼又道雲覆菴師云你是瓶窑來底僧云是師云扣冰去黴天連雨師落堂云大衆因甚麼迷癡許久不晴衆無對師云知之為知之不知為不知天上雷公呌地下走蟛蜞呵呵好場熱亂以拄杖畫云湄衆茫然師喝云聾牛瞎驢一齊打散解制師問僧云秋風清秋月明百城煙水任君行只有一事撞見勝熱婆羅門時莫道在者裏起程何故呢彭良久云你道老祖意在甚麼處黎家蠻子腦後見腮師問僧語是謗默是誑語默向上有事在甚麼事呵呵不到死牛邊不缺死牛錢我與麼道你又作麼生僧問如何是學人親切處師云火燒烏龜進云如何是本身盧舍那師云受戒也未僧云如何是清淨法身師云鬬打相爭僧問如何是大通智勝佛師云東廊西廊僧云為甚十劫坐道場師云看你顛僧云作麼生佛法不現前師笑云酒鬼子僧云何故不得成佛道師咄云癡蟲師問柴頭無根樹子斫斷也未頭無對次早云昨夜看無根樹子聞鑼聲忽然斷去師指花云因甚麼喚作海棠頭擬議師便掌僧問清淨本然云何忽生山河大地師云你尋衣單麼進云學人請問佛法師云天旱棉花少僧呈懷州牛食禾頌師笑云蠻婆哈醋嘴三尺村老聞酸面百摺引得乞兒聳膊寒儼然一幅吳生筆師垂問云祖師西來籬邊山菜帶泥挑滋味新鮮好諸增上慢者聞必不敬信侍者答云甘草甜黃連苦師云向去莫言今日事觀音自在放毫光誰不忍者說答深山藏猛虎師云風燈動夜幃大棒打老鼠為甚麼窗敲碎玉聲偏細答明月堂前風冷淡師云太平時節桑麻話不用兵符佩絳紗錯過也答雲從龍風從虎師云蛟翻波作雪鼉吼氣蒸雲金色頭陀供麥飯還知否答曲不藏直師云畢陵伽呵叱河神梅花倒影插人頭是否答樓閣裏善財師云一鈎新月魚吞影雙峯雲外瞑是何病答碧波生水面師云月上女出城舍利弗入城布袋和尚何故如今笑不止答辰屬龍卯屬兔師云東西南北水灑不著潑墨飛毫莫浪題你能搆得麼答雨過看長虹師云禪和子親舍每疑雲外近長安翻覺日邊遙呢侍者答不契師遂遣出問簷前水滴當下心息學人無席帽乞師蓋覆師云你該結識沈華國進云不憐鵝護雪且喜臘人冰師云你曾當衣單麼問此事楞嚴常露布而今忘却來時路乞師指示師云肉麻進云鍾馗醉裏唱揚州大家拍手上高樓師云難消菩薩問明堂瓦插簷且止因甚道無量大病源師云一箇兵丁一條鎗進云學人久立請師珍重師云你快拏船板走問停鉏傾麥飯臥草不抬頭果然是許他知音句麼師云你這條命再生的了進云也是海晏河清行人避路師云父母單養你一箇麼問法久成弊如何醫得師云兵兵梆梆竈上響進云適來錯相問千里却同風師云定是老鼠問朝到西天暮歸東土意旨如何師云客寮裏誰哭進云放火殺人可有四無量心否師云葛仰橋慌慌慞慞進來作甚麼進云因風吹火用力不多師云你快裹著被坐問不坐孤峯頂常與白雲齊莫是和尚境界麼師云你羯磨師甚麼病進云風吹柳絮毛毬走直至如今笑不休師云引禮師燒辣湯問千日斫柴一日燒因甚道如龜𪹼文師云又是江北人進云三十年後此話大行師云莫進廚房問月裏塔高十二層天外星纏五百杪果是西來祖意否師云啞子嚇老鼠進云春風觸目百花開如何是格外提持句師云鬼張鬼勢嘴面罵盡天下老和尚問三歲獅子吼十方沒狐種因甚又有跛鱉出頭行師云你也該讀句書才好進云貓有歃血之功虎有起尸之德師云殿主夜裏還打坐麼問十字街頭望空啓告不知是何公案師云毛銀匠弔紙進云蕩盡則且置穿青那一人是阿誰師云你且餵生口去買石灰問一箭遍十方落處無人見學人今日舉似和尚師云蔡家莊火燒屋進云日間迷路者幸自得安寧師云松頂上翻車問三世諸佛因甚麼不知有師云你會算命麼進云請問和尚大了當人還有事也無師云說你改惡從善了進云定州磁器似鐘鳴師云你道奇也不奇問千鈞之弩不為鼷鼠發機猛虎入門時如何師云你曾做過清唱麼進云銅頭鐵額鳥嘴魚腮不為分外師云投在那箇旗下問弟子昨日不知舌頭生箇甚麼乞師相救師云婁羅進云酪本一齊拋時如何受用師云做官底做宮做賊底做賊客僧問古帆未掛時因甚道後園驢喫草師云夜長進云從門入者不是家珍作麼生師云腳冷僧作禮師云顧水自憐湖水碧高吟贏得四山青券內者行乎無名券外者志乎期費物之始也傾傾至其有也録録至其成形端端王王豈是天用莫如龍地用莫如馬又何必五明囊盛百草露洗眼祖堂寮元問大用現前不存軌則和尚還肯放過也無師云羊死薑爛進云一人因說得悟一人因喚得悟一人聞舉便回去那箇親切師云剔耳莫搖頭知藏問振縮一任和尚葉落不知秋人來如何接待師云話得是進云通身體不圓繁興不布彩門前殿後意作麼生師云天理陰隲僧問昔日鵝湖孚不出方丈因甚道在床上食油糍師云你昨晚在客房做甚麼進云老祖後山五百里師云莫走這條路進云因甚道九世剎那分師云見笑識者問無鹽無醋有飯有粥為何又拗直作曲師云張思存鞋店進云白雲三片四片黃鳥一聲兩聲請問是境不是師云河東草紙進云總不恁麼時如何師云軍器不入門問父母所生口不能為學人說未審將甚麼說師云你吹也吹得好唱也唱得好進云學人也曾在人家屋簷下過來師云所以令弟隨處告訴人問東家點火西家暗坐祖師的旨乞慈道破師云除下左邊竈門來進云到頭霜夜月任運落前溪師云可曉得漢陽鹽商姓麼問欲識歸源處趙州東院西是甚麼語話師云你為何到喬孟真家裏進云有語須道却無言鬼也瞋如何是末後句師云料你不是這樣人問梟首甑人擕劒去如何是衲僧真活計師云難怪知隨著急進云五鳳樓前則不問城隍廟裏事作麼生師云山上不曾寄棺材問古人道五九盡日又逢春果是佛法大意麼師云你不該怕冷進云透網金鱗猶滯水回途石馬出紗籠師云衫子做得精巧問白雲銷散紅日東升別傳的事作麼生師云收起文書曬豆豉進云道泰不須天子令行人盡唱太平歌師云山東路難走問三界無法何處求心師云李正春中秋榜進云龍行虎步拋在千峯崖下師云金華知縣氣成病問護法持符命請師赴應機正令當行時羣迷如何指師云你又像白兔山時進云緊著離水靴踏破澄潭月師云門前十九箇大字客僧問少室山前無異路因甚又道差別智難明師云噯㖿人無廉恥不若狗彘進云閙市裏打靜槌西方日出卯師云苦哉撞在者箇網裏問道人活計只如此留與人間作見聞不知是箇甚麼師云作揖老師兄磕頭小師叔進云學人洞徹無窮底踏倒須彌第一峯師云糞坑邊生棗子問明明超主伴了了徹真空可是無諍三昧也未師云蕭居士罵城隍進云船子風高千百年一曲漁歌少人和師云不信便問鄰單問塵埋牀下履風動架頭巾時如何師云像蛇三箇眼進云聲前薦得孤負平生師云非痰亦非血進云為何師僧頂上戴冠子師云你道像箇甚麼進云燒盡魚龍違負則積師云禮拜須虔誠僧問三身中那身不說法師云街裏人為甚麼相罵進云莫是法華鋒前陳涅槃句後收麼師云打得不亦樂乎進云古人道前日遭賊意旨如何師云黃啞子哭外婆游蕪湖僧問如何是本來面目師指漁舟僧茫然師便掌良久云會麼江水生江月起青簾白舫江風駛江頭老翁披短蓑獨泛江心羡魚美大張一網羅羣魚羣魚湧出江心裏勇者傷於鈎貪者傷於餌起者如浮瓜落者如沈李入者困而怒出者躍而喜大者三尺五尺長小者七寸八寸止老翁一縱仍一擒網大魚多莫能紀須臾捲盡千傾雪勢及馮夷也披靡禪和子本來面目在那裏問雪上加霜眼中添屑若也不會北鬱單越和尚家風如何施設師云你却會𭺗旱船進云七凹八凸無人見百手千頭祇自知師云飲水皺眉行弔哭進云軒昂獅子首牛足馬身材師云皮穿骨出問杭州蘇州浩浩何者是諸佛真道師云打石客人喫菜盤進云六十二見本妄立虗假名何為真實義師云你聲口有些蹺蹊問無著菩薩發一念心清淨為何不見真文殊師云再去單下摸一陳看進云惺惺直言惺惺歷歷直言歷歷師云只恐是破瓶破缸進云障蔽魔王一千年覓金剛齊菩薩起處不得未審在何處住師云你今早曾進廚房麼師問侍僧三世諸佛因甚麼不知有僧答不契師云記得江西鐵樹宮麼進云記得師云黧奴白牯却知有僧茫然師云大好河南歸德府僧求開示師云清晨寺裏鐘黃昏祭鬼鼓吾欲觀於轉附朝舞問小鍋煮飯上蒸菜飯正香時人正饑此是甚麼人境界師云肚痛換眠牀進云但知隨例餐䭔子也得三文買草鞋作麼生師云摩利支天大煩惱問枯木無花幾度春斷雲猶挂樹梢頭是何意旨師云黃昏不看病進云日月盈昃秋收冬藏可是衲僧家風耶師云周駝子偷瓜問庭前花發庭後見上界鐘聲下界聞極則事又作麼生師云魁星頭中舉進云天旱萬民愁無風浪也起師云入門看右手問穿楊箭與人驚句不是臨時學得來是麼師云酒能誤事進云為甚麼十字街頭窮乞兒腰間挂箇風流袋師云老鼠恨貓兒進云升元閣前且止洛陽峯畔作麼生師云你又戴孝帽拜壽問不是見聞生滅法葉落歸根露遠山時如何師云一五一十進云不脫麻衣拳作枕幾生夢在緑蘿菴師云山下人盡知你做事問演若何曾認影善財不往南方甚麼意旨師云莫怕進云可是紅爐𪹼出鐵烏龜麼師云牛屎進云大風吹落楞伽山時如何師云捧起看問憍陳如尊者甚麼年中行道師云你帖子皮上如何寫阜字進云雪內牡丹花師云咄二郎神問尺頭有寸鑑者還稀稱尾無星如何分曉師云過房抱養進云三處不成一亦非有和尚向那裏答學人師云你屬牛底問借問通元士何人不到家枯樁笑石人何得口吧吧還有指示處也無師云後架裏打點看僧喝師云火燒帽子麼問怛薩舒光泥沙匿曜如何是向上事師云多災多難進云掌鉢盂向香積世界喫飯者為何出身無路師云蔣家廟好燒香進云單著布衫穿市過且道是阿誰師云你道該打不該問陝府灌鐵牛嘉州打大象是何語話師云你莫準提閣鋪單恐害擺子進云黑黑黑道道道得得得師云觀門朱扁額問到處逢言不識言三春不樂止林泉學人權借一問乞師方便師云張缺嘴彈棉花進云雨滋山草秀東風不裹頭今日偶然失利師云上座算計甚好進云幾乎一場特地師云落瓦打奴頭問長亭良夜月多為客舒鋪如何是到家句子師云土地公土地婆進云從前有箇無生曲且喜今朝調已成師云曹直歲箬帽進云金色光明雲銀色光明雲落在甚麼處師云走得你屁出僧問如何是應無所住而生其心師云硯山亭僧再問師云饒州客送亡僧歸僧問亡僧遷化向甚麼去師召云闍黎僧應諾師云那裏來僧茫然師云再打鼓僧問馬祖一喝百丈三日耳聾意旨如何師云非公境界僧擬議師便喝僧禮拜師却問迷中有悟且止還知悟中有迷麼僧茫然師大笑僧求指示師云少避老賤避貴僧問如何是一句中具三元師云戈溪扇子進云如何是一元中具三要師云紙骨鮮明舉南泉示衆云三十年來牧一頭水牯牛擬向東邊牧不免犯他國王水草擬向西邊牧不免犯他國王水草不如隨分納些些師拈云和和和東西幾何南北幾何歸去歸去免風免雨耕耨以時實我倉庾舉僧問資福古人拈槌豎拂意旨如何福曰古人與麼那僧復問拈槌豎拂意旨如何福便喝出師云資福善擒虎兕者僧不解轉身當時見資福道古人與麼那便云學人今日錯舉看他如何施設舉雪峯於法堂前坐衆集峯拈拄杖云者箇為中下僧問忽遇上上人來時如何峯拈起拄杖雲門云我不似雪峯打破狼籍僧問未審和尚如何門便打師云雪峯拈起拄杖雲門問著便打圓照即不然忽遇上上人來時如何但云去汝非其人舉僧問元沙盡十方是一顆明珠因甚學人不會沙云用會作麼師別云曾問幾人來舉湖南報慈云我有一句子遍大地僧問如何是遍大地句子慈曰無空缺師別云出得還你好手頌世尊初生并雲門琅琊拈語月上山城征馬急雨過新水芰荷香自此洞庭秋正好煙波聲裏鬬漁郎示徒云末法陵遲行腳後賢失本邇來惑世邪禪雜謆日盛生奸興世情借佛祖緒餘以緣飾語誕而行𤜤貌似而心非自謂續先德之禪沿引俗習迷昧後學誘以知識善名使學者憧憧趣外惙惙隨流喪其根本而不自知其邪咸共相述其業而寵狎汩亂道眼譸張正法斯乃宗乘大害視而難見聽而難聞世莫能辨結俗以自旌託名疾固曲求以好合託名恆順枉直以取舉託名作家屈道以弭謗託名游戲多攀市井俗流粗誦古人陳語託名豪傑飾非而張無綸而詞穢託名博通居必談詩遊必俗舍託名無礙聾瞽世人貫以𢟵術託名傳道其大抵苟可以沽名射利知非正道仍不捨雖知正道而不能射利沽名必不取心妄於內形勞於外其伶俐足以將此便巧足以莊嚴稱託比類足以充欲檀護聲勢足以恃橫是以奸而稱善亂而稱靜暗而稱明邪而稱正斯乃外道羣𧳍裨販魔匠中下根僧皆合掌而欽羡揚聲以同好至死尚習其餘污被害猶恨已所不及悲夫後學陷溺蓋如此何可救也以其泉不自中湧而注之者皆魔外遺毒莫不忘本趣末紛紛擾擾馳騖不已至於上亂下喜左狐右豺同體相詒師友相詐大壞宗風故沽名射利者四字括盡先祖至禁夫參禪學道救世大善然而行者不以其正則不免其大惡吾徒慎之示徒云慧命相繼始於正悟而終於宗旨繁文不與焉後賢雖有根本而不加之眼明則必惑毋謂拈頌易學旨脈難識世皆知浸水及物則生其所不及則死不知日月之所照功莫大焉禪流受法蔭甚遠莫識其由來者可笑示徒云凡說法務胸中流出先有眼目而後發之宗旨則縱放自如不落常套若就事說理承言接語一有留滯雖甚工巧終屬死格昔人論易曰易簡而天下之理得又曰不易乎世又曰變動不居周流六虗惟變所適至簡故易不易故深變易故神咄咄窗敲竹睡醒茶熟天水鸚𪃿緑示徒云禪莫大於淨德道莫大於智眼昔日初祖至少林面九年壁演拈花旨寂若無開示意漠若無知見路而佛法興二祖單傳心印續佛慧命大唱宗乘規矩不設餘煩法懸四海之內供奉諸方禪衲來覲是故淨德乃能利生今世禪者專為門庭以斂奸邪攀外護於宰宦以備疏虞營大欺小風震天下法子橫行以彰市肆門人雜亂於內學者結識於外事逾煩叢席逾亂謀逾滋奸邪逾熾門庭益設魔患逾侵彼非不欲為興然失者乃舉措暴昧虗妄門庭故祖師尚淨德以苞身開智眼以傳遠人信其真從其化懷其正宗其旨美其示不敢違其言僧不罰而畏罪不賞而歡悅漸漬道德大行法化如近水地濕近火土燥以類相及山川出雲雨邱阜出蒸氣四瀆百川無不從源小者從大後者從先選佛場中南面主人人天眼目雖一舉措動作不可失於正法吾徒識之示衆云每聞學者云昂溪和尚不喜人做詩文拈頌是何言歟點鐵成金轉凡為聖無過此道致妙揚芬振藻宣詞吐臆述事陳理抑揚今古則斯道最勝故汾州頌出而洪都寢議雲門遺偈而越主遙拜曹山三問金吾謝過雪竇示拈中丞悟心枯木以善言得義死心以頌詞保德溈山警䇿而外道伏湛堂折柬而內翰從先德宗旨代有能言忠國師致答於肅宗興化酬偈於唐帝丹霞題石橋周太守施金於北寺祖師讚鐵塔張總帥舍宅於南溟明教録奏於金闕投子布引於歐陽浮山九帶動警禁掖法眼戲吟吐秀宮庭以至仰橋垂元君篇東禪著僧史什風穴有玉牒遺文保寧投水府佳章是知此道為貴上重侯王下及士庶通天達人際明徹幽用廣機神胡可廢也昔我濟祖高提心印指後學於頂門開眼法道大闡源還流長德肩諸佛功施曠劫而諸祖承之醞釀鴻化故賓主語脈磅亶厚河嶽英靈會為法器跨越季世籠前古遞代傑出法語非周漢子史所能比綴偈頌非晉魏盛唐得擬伊吾諸祖徵別拈頌亦往往超於上世縱橫收放清聲古色大都斐然但老宿稟材不同示人靡一故其發機或閎大而肆或簡省而深或清言而綺或莊語而峭邇來叢林更盛僧倫益秀競好拈頌偈文多所述作業遍海內老祖博搜羣録暇日披閲乃知器以材成語緣志異體視斯時意生於境烏能大同然花發以根物貴在質姝色自然粉黛為假正法眼藏翦綵非真即諸爛然而索諸無味者虗也假也今人學大慧步者字模句倣非不儼然徐視而形色雖具神氣都絶何者古宗匠有其眼而言諸今時禪者無其眼而亦學諸故辭雖肖而悟非真也乃順朱藻繪雖像無正眼鎔鑄者皆假也優孟之誚可無懼乎昔大慧不擬圓悟圓悟不擬演祖演祖不擬白雲華祖不擬虎邱中峯不擬高祖而皆卓然為後世宗則各極其至也苟極其至何世不傳而必曰吾學某體過矣示徒云上古師僧行腳時品高韻逸氣靜神閒而意致幽深語味不盡故稱僧中絶倫末法堪嗟學游談而稱悟道及乎付法住持施施佛祖容貌胸胸市井汙行多方營求盛利盛利至則隨積敗德尤者何也不能知恥知過而附集者不正恣情縱欲則翼佐者邪羣故法道存亡於是乎在諦審先宗哲匠高蹈獨往以法自任身寄五濁波流心越三界之表道全於內物遺於外豈與俗輩競門庭而飾侫世媚容耶如上林喋喋嗇梟春蜩夏蠅聒耳德業不足以相涉聰明不足以相資蓋魔外黨隊見稱波旬迦葉苦行謂為法王則衲僧不在於聲色也今叢林稄稄知識茀茀誰念祖宗正法傷哉人入豺狐狼伍方思獅子智明處於不德惡族始信高操不渝咦法道凌遲須當竹柏其行雖歲寒而無改峩然卓確爾不移莫蓬轉以循俗莫易志以趨流然而任法道者不能免羣惡不生憎不能使魔外不侵害故苦且難而多貧順世情者樂且易而皆富是以俗流莫不委此而就彼秉操孤立者志定計決勸沮不能回知足知止憂患不能入困頓而彌堅窮獨而不悔嗚呼處此者可謂長吟甚於痛哭示衆云凡看語録須深探其義味不為誦佛祖空言乃有益猶宜依卷帙始終字字詳玩久久得前人作用參錯在胸中乃為不負所見耳佛法雖均機捷為上宗乘或同遲緩為下句能發意以切為貴眼能決擇以捷為奇善應機者若救火拯溺得其妙者若驥飛矢射若烈焰熛室必急馳灌潑若待穿井而救則基灰棟焚矣驥所以見珍者以其日行千里若延旬而至則與駑䮓均矣箭所以殺人者以其應弦而倒若窮日而至則與擲樹者等矣眼所以為貴者以其見機而捷若過後而方明則與無眼者齊矣眼不早明敗而始悟可謂有眼者歟故有眼而不捷見非正眼也能明而不能大用者非宗匠也句貴潔意貴切始稱宗門大匠示徒云宗乘接人意因時用句適時變時有賓主用有隱顯根有小大施有險易識時知變可得而用隨機知宜可得而行是故法無常格事無定軌動靜屈伸唯變所適須知眼之明昧從其類識其根則動靜應機見句以觀其心術因語以探其虗實則正法藏者由斯明矣相應者主賓同道元要所施之的承乘奪縱之令理事抑揚之旨雖彼暗來而可以照用得其真縱奪互換而可以料揀得其實弱而不懼於敵者得所據也失而不懼於亂者得所變也柔而不憂於敗者得所御也雖後而敢為之先者應其始賓競而主得安於靜者要其終故觀變現者存乎道辨逆順者存乎眼察虗實者存乎旨乘明出處者存乎理事賓主終始各存其會峻捷尚元痛快貴要賓昧好先剛壯惡首主明讓後退變光大收放有宜而不可貪縱奪有時而不可濫犯貪之語過不在大失濫之句害不在深演真乘辨語脈取種草也立宗旨慎考究豈容易乎料揀照用有時意句不可忽略臨機殺活之際纖芥不可假借觀時識用用無窮矣示徒云道不屬修不屬不修然而行解相應名之曰祖上僧忘名中僧立名下僧竊名忘名者體道合德享人天之福祐立名者修身慎行歡榮觀之達顯竊名者厚貌深奸揚浮華之俗態足之所履不過數寸然而咫尺之途顛於崖岸拱抱之梁沈溺於川谷者為其立無正地衲子學道抑亦如之學道者自揣何等便如鏡照面妍醜并然示衆云老祖常住者乃寶掌千歲和尚開山也寶掌和尚中印土婆羅門子示生於周威烈王之十二年丁卯歲七月七日午時也師生多瑞應骨氣不常目大鼻長耳垂眉高緊握左拳不展父母知非凡器甫九歲即以投佛陀精舍為沙彌當祝髮際怡然開掌出珠呈本師遂合十頂禮見聞者奇之故命名寶掌師既符願離塵如嵩頂蟠松肅然卓於霜雪中雖八風競拂莫能易所操也每歎去佛時遙未及親承慈誨輒忘寒暑廢寢食竭力於如來三藏精練殆盡猶期有教外別傳以是遊五天竺博問聖賢歷數百年始遷震旦時正漢末桓帝之初趣蜀偕賓頭盧尊者登峩嵋禮普賢大士止於大慈寺十餘夏嘗兼旬一食持誦不輟丞相何進奇而贊曰勞勞玉齒寒似迸巖泉急有時中夜坐階前神鬼泣師嘗曰吾有夙願住世千歲今六百二十有六矣由是人咸目為千歲和尚嗣至五臺禮文殊大士於金剛窟正值三國紛紜南北各據時有李道元麻衣子達真人等易衣侍師遊古義豐郡即今黃梅縣伏羲畫卦場漢謂雲臺山者師見其峻險𡸗𡸗雙嶦嶫嶫乃歌曰憑高遠眺見萬里雲無留跡屾峮如畫風煙寂歷破翠數聲牛笛桂魄飛來光射處冷浸一天秋碧須繫履撩衣乘雲同去細玩清涼國遂即那羅延窟雙峯下古佛基支撐以棲奄百十秋人少知者偶聞佛圖澄隱於終南山因肩笻往訊澄見而問曰庸庸斯世人賢奸欲測叵師應曰吾道一陽生葭灰動方妥時已晉綱不整五馬渡江師辭澄仍歸雙峯感雷虎隨護雖兵燹縱橫而雲中鐘鼓未嘗廢也嘗示衆曰一簾霞影搖虗榻十里松陰要緑苔莫打子規啼竹裏恐驚雷虎動林隈有偓佺仙人來自海島同師上南嶽為羣仙說戒於祝融峯感白猿進果黑彪守戶神龜獻芝紫鸞伏座安居數十夏過匡廬訪耶舍尊者於五老峯尊者一見而詰曰路深猿哭虬松舞石臥雲流牧子歌老大德從甚處來師笑曰蘿萬古而挂木土何日而生薺者曰藥苗初茁竹母才移遂相將上金輪峯禮佛舍利塔經宿復下南康聞達磨自嶺南來建鄴遂與尊者別往白下見達磨咨決心要磨震聲召曰老闍黎師應諾磨大笑師於言下大悟七百年中珍惜直下泮然冰解歸述偈曰梁城遇導師參禪了心地飄零二浙遊更盡佳山水逡巡泗洲與智者大師順流東下由千頃達琴溪至今赤鯉古潭有唐裴休所書寶掌石存焉詣延陵邀紫髯道士同陟天台過石梁登赤城訪曇猷尊者師指麥問曰如海斯湧滿車汗邪者振錫云折楊皇華之語缸面甕頭之詞果報如斯功德如斯師遂辭上華頂禮長耳定光古佛航南海禮觀音大士旋四明挈竺歷法師進蜀謁二祖神光和尚踰棉竹山過白帝城書旅亭壁曰日出東邊雨又飄棧前棧後草蕭蕭不知良友居何處山徑雲深數問樵遂離蜀復遍遊鴈宕磅翠峯七十二菴憩大龍湫友博具那尊者榜菴曰觀不足額天柱巖以忘歸隱士陶宏景因立忘歸觀不足之二亭焉銘詩曰天下名山曾過目就中此景難圖録山前千歲白頭翁猶道一生觀不足師聞傅大士法化雙林特往而參之問如何是佛正法眼藏士叉手曰空手把鉏頭步行騎水牛人從橋上過橋流水不流師復詰曰莫便是教外別傳耶士曰碧水映孤峯寒潭迎皎月你我不知宗須彌足底越師從遊數載適魚浦跨赤符大巖等諸勝地又回司空山隱於古廟中高士沈約過謁書石云寒風吹破故窗紙片片雪花落供臺添盡三衣仍似水拾薪深撥地爐灰師將約閲舒城拉三祖遊羅浮訪葛洪真人於梅花塢之洗耳泉師吟曰萬頃青山一分梅花三分竹行吟住宿只許仙郎獨葛亦和云禪翁來時恰好收碁局烹茶熟三祖撫掌曰稚川稚川莫辭忙碌钁筍燒青玉三人大笑聲震石落落石洞今在梅花村側唐運肇興復歸雙峯老祖寺有行盡支那八百洲此山偏稱道人遊之句與四祖信和尚盤桓遂請四祖住持老祖寺乃渡河至少林面壁崖復走幽州遊西山訪華嚴室利尊者於潭柘寺歷上方造真定禮大菩薩遇白足企都仙師與語彼所執遂𢹂歸黃梅訪五祖忍和尚於東禪往來莫逆者數十年蘄黃兵擾復隱於浦江赤巖之間時有淀溪朗聖僧者忍祖之法孫也獨居晏如師與之善嘗命白犬馳書朗亦以青猿致訊韋臯題朗壁有白犬馳書至青猿洗鉢回云云未幾朗公遷化師乃泛濤江挂笠會稽雲門時唐高宗顯慶二年歲在丁巳師已滿千歲又餘七十二年矣忽於七月七日示徒如光慧雲等偈曰本來無生死今亦示生死我得去住心他生復來此遂掩目趣寂七日復蘇囑曰吾滅度後宜塔於此後有迎吾骨西歸者慎毋拒之語訖長逝衆遵遺命遂塔全身於若耶溪南每值風雨塔光旭麗至壬戌夏五月五日適有梵僧至繞禮師塔塔戶自開舍利炳然光耀莫倫寶骨顒然杲杲赤文僧祝畢提頂骨振之節節連絡有緒浴於池裹之西去雲霄浮影隱隱樂聲彌日不絶洗骨池今在舍利塔左按師所歷數十餘處俱成招提惟黃梅雙峯老祖寺最都以在四祖五祖之前故稱老祖寺焉行森忝寓丈室瞻禮古儀若對風前瘦竹令人五內俱冷嗚呼數千年來名山大川新棟復灰者蓋不知其凡幾而此間之落然簷楹吐雲吞月曾無微損至於泉石松篁尚含餘韻得非師之高德所鍾烏能若是其神護耶森嘗閲五燈及祖傳其所記過略適以山居多暇故詳考夫古會稽記事唐彚搜奇白氏類林羅浮舊志天台會纂法苑珠林鴈宕集等敬述師平生行實俾道照高懸致後昆有所鑑云拜首謹贊懷悲願露古顏孤笻直過萬重關竿頭風月灘灘別足底煙霞處處閒稱幽興惟此山驚回龍夢出潺湲奇石蟠松無限意雙峰絶頂許誰攀示衆云一切衆生皆有佛性一切衆生皆無佛性諸禪者昂溪平生愚鄙無他好獨好五家語脈好明古人宗旨不好掩目害後賢而性復疏懶不能骫骳取名圜轉滑稽以遊市井苟非從佛法相視鮮不對面失之所以云流水韶華東山日上西溪月斜看彌勒樓閣壺中洞苑別有平沙惜於今紅塵白浪天涯回首處殘陽亂鴉歎溈山堂前穿簾燕子今在誰家示衆做知識當如將軍臨敵衲僧家當如處女防身將軍失機則一敗塗地處女失節則萬事瓦裂可不慎哉復友人書云參禪學佛祖不必言妙在學佛祖而宛然佛祖尤妙在不獨禪宛然佛祖而德品亦宛然佛祖蓋禪從德品中光揚惟德品去佛祖不遠故所謂禪與佛祖相近若學佛祖不知德品為何如動以狂放字句求佛祖胡可得耶比來老師大衲所謂欲進前而不御遙聞聲而相思麟鳳擬雞珠玉較礫石白日垂其照青眸寫其形故凡操千曲而後知聲觀萬尤而後識器知音同道歡然共懌流鄭眩人無或失聽聊舒鄙悃謹復答禪友書云接來翰知寶剎錢米山積院事川湧然而折腰趨豪門低眉見護法拱手道左望塵遙拜屏息車下不敢高聲泥沙在衣風塵掬面衲僧之志亦盡矣臨風念友中心若結先德云南陽忠國師三詔竟不赴遂使唐肅宗愈重於佛祖然我望南陽雲泥雖異路回首思古人愧汗下如雨豈可為一身法門同受汙萬古長江水惡名洗不去呵呵釣竿頭上容漁隱少風波處便安身還笑那著甚羊裘嚴子陵老祖峰頭雪霽清境但有荒崖怪石修竹古木日啜苦茗睡起曳杖放腳不知遠近亦曠然真趣與棒喝談禪未見議優劣也臨楮馳切不盡與友人書云年來萬慮灰冷唯說法結習頗以此自纍招言用是勇念書壁云老境病磨不弄拈頌佛前發願再不搖舌自今以始朝粥一盂夕燈一盞健即游山作老道人行徑唯持知足知止四字憶昔三十年前飽聞浙中山川奇勝壬辰春腰包䇿杖登天封步國清過石梁涉洗腸池宿赤城遍探寒明兩巖徘徊縱觀倚老松臥怪石往往摩腹大笑廢草鞋三十又乘潮二百里游鴈宕進老僧崖遇一怪物似人非人裸立水上風顛狂笑呼天絶呌曰天乎那羅波婆多行森不顧行數里山漸深石漸幽坐飯佛石少息又行石牙齒足皇皇巨松曲者如蓋直者如幢立者如人臥者如虬松下溪深有潭沮如伏見風輪井鏘然而鳴井上碧霄巖蘿蔓密布蜿蜒而入頂有䖞𧓁赤如鰸𩺵朱目長爪俯而㖃咮然長詠行森遂度夏於碧霄峒左右石筍高絶無數上有荼萎薋蕷仰不見日忽聞鵔䴊鳴樵子伐木谷響鋃如撫琴呼而與之語諤而顧如麋鹿不可接進靜明崖石屋數百曲折依巖壁為欄楯屋北羅漢三生石過大龍湫見瀑布千尋頂有浴鴈湖闊千頃瀑懸注潭變幻不一如飛雪如紫煙如團雲如水萡如翔禽如走獸如玉柱如珠簾或散或聚或現或隱時作雷聲時復寂然忽而彩耀祥光忽而黑霧閉潭觀之不足令人忘歸三宿巖下出潭游翠巖龍鼻泉石峰嶄碞崔搜若錦屏𡸤崒峉岶如蝸鼠繚繞乃得出路窗牖相值山風颯然堂殿鈴鐸皆鳴十數衲僧相顧而驚不知身之在何境也且莫皆宿於時仲秋望後天高露清山空月明仰視星斗皆光大如適在人上窗外怪松數百修竹千竿相摩戞聲切切不已崖前棕櫚如鬼魅離立突𩯭之狀十餘僧相顧魄動不得寐遲明各去既歸夢中猶恍惚若有遇今居老祖雙峰因追念之往往想見斯游特書寄同志老友則台宕勝境不動足而在蒲團前矣老祖監寺寫師真求讚行森最初行腳時倔強孤立不事衣履到處人多輕忽既而參雲門雪大師一見便許入室呼為嶺南長子乃題自真示云者漢古怪見不唧𠺕人毒罵若生冤家見有苦志學者歡喜猶甚今朝坐此奚為等者無鼻孔禪和宗風何曾寂寞及到大雄老人見讚笑曰大師一生口硬爭奈齒不關風遂命行森領衆以至開圓照住老祖不覺屈指便逾念載呵呵若論宗風便乃見笑三家村裏王大伯復居士書云行森和南聞風日久恨愚衲多病多故不得面晤請教承翰勤懇甚慰懷仰接示此公纂刻拈頌捧讀增歎然拈古者辨眼目頌古者顯法道拈而不正則眼亂於實頌而不切則道失其真道之失由於順情而害法眼之亂在乎棄目而信耳耳目雖異宗旨顯明顯明而拈妄不可以稱拈宗旨而頌迂未得以言頌頌迂拈妄則佛法亂矣是以先祖元要真旨不可雜以邪解料揀語脈不可欺以虗文賓主誠分不可罔以混統故眼正以擇法則真假易辨明眼以驗人則邪正難瞞若名實顛倒便可歎惜先宗大匠廓徹亮於聞前智鑑出於意表不被世情昡惑不以名色易眼不沒纖芥之善不掩螢𫋤之光呵呵黃河古道金堤阜青草新波水拍天社燕城烏渾不解飛鳴只在土塘邊茲因浙僧遊山故輒附奉答草率不盡答友人書行森和南寶山風物何如諸禪可與共林泉之樂否寒暄異候即日起居奚似伏惟萬福院事不至勞勤耶行森形影相弔日在枕席幸無俗擾承問古今宗旨快哉高論濟祖宗旨遞代深宏絶於溪徑比來俗禪喜習邇聽遐則偭焉有好盡其心於臨濟宗旨者大匠也人亦有好盡其心者未必臨濟的旨也捨斯辨亦小矣春木芚芚援我手鶉去諸千百歲祖師若存去祖日久呱呱世僧各識其類譊譊市禪各習其師惜哉近世不信真悟也曩者演祖出於白雲雪竇出於智門諸方美其語脈如泛浩浩滄溟而得樓航巨力也故曰眼明者後賢從真悟者後賢師若云因其俗禪盛而行之亦可以謂道譬諸琴瑟鄭衛調俾夔聞之必不可以謂簫韶若云知解邪禪擬古真悟如舉世盡寒𥀔裘不亦燠乎燠哉燠哉然而有寒者矣非其用而望諸非其道而行諸必不可以至矣適晤令弟喜其志於信道想令叔必少加餐也行森和南上復答禪者書云一報七尺軀天地委形耳終隨物盡奈何以熱緣為長物也衲僧家常空其心慈其容貌者不以世態莊嚴加乎道德之上觀衆猶賢自視猶不足故同道願諫而不倦事無大小咸明乎眼然後舉而行之己諸所明既不可昧而己諸所暗又取於衆言是以眼得先衆而衆後之矣故夫福緣過衆未足貴也勢位過衆未足貴也聲名過衆未足貴也衲僧所貴者道眼懼其不足不善恐其有餘不善未嘗不知知之未嘗復行夫不善猶疾病攻之則病去不攻則日甚故衲僧相求非特取樂也將以改不善也不善不去則道眼不明自然之理也樂改其不善者難以不善告衆者難夫惟衲僧能為人之所難能是故世所難及既能世之所難能又反覆鑽核然後人所諫者才竭盡知己迷昧之行矣倘知己迷昧之行而不能取人言又隱己過拒人之諫者細人也先德是以務鑒察於衆賢以觀得失俗世邪禪以為己既大矣福矣才矣滿矣是以辜罪昭著腥德穢揚識者傷心聖賢暗惜曾不自聞愈快如也是己之非遂初之謬至於身富道亡可悲矣上古宗匠非家饋而戶贈也僧俗莫不稱祖焉今世邪禪非家劫而戶奪也識者莫不指謫焉由此觀之衆無賢愚見善則揚譽見惡則指謫此衆情也未必有私愛也未必有私憎也衲僧立身不為識者揚譽而為後賢指謫者未盡為正法之行也盡為正法之行將若佛祖焉世人雖於佛祖難及其敢謗諸乎止謗莫如自悔療垢莫如親水謹復開堂領衆者當人書一通懸之座右答禪者書云不落古今句曷謂之好奇坐貽謗缺噫可怪矣然而虎豹之文不得不奇於犬羊鸞鳳之音不得不奇於烏鵲金玉之光不得不奇於瓦鐵自然之勢也夫佛法何物也籠天地於正眼挫品彚於指點若非謝去朝華振起宗旨不過一俗禪耳何用哉古宿示人活句先祖務去陳言殆有見於摸擬不無蹈襲為病故奇可也好奇不可也彼蠡測者正如嫫姆妒黛乞兒誚金其金黛固無恙也奚怪之有哉佛以正法眼藏囑付摩訶迦葉二十八傳而至中夏初無文字言句可傳可說真徹悟者即付即受必須徹證於契會初祖面壁九年獨有二祖得旨餘其根器稍劣者非正脈也今世衲僧雖學古人死格此旨不能得也縱具世間智文字通者閉關讀書十年刻菩提印自佩之耳故曰神而明之存乎其人苟非其人道不虗行邇來語録蘊藉風流倣古人意句出語雄渾俊豔固自不乏而求其眼目精明旨脈婉轉若演祖華祖保寧勇和尚者何可多得確有神化妙悟好奇二字不足盡之破戒居士心圓妄語第二頭第二頭第三首皆影出向上者一著子知有向上大法無不明矣大法既明斧柄在手於以芟除一切公案枝葉不難也語云龍門之桐高百尺而無枝文理且然何況禪理圓曾榜門云一不談佛法二不談世諦反手把籠頭背鞭打不著腳跟穩實者不吝辭通箇消息有禪者見乃擊戶三下秖有權並無實秖有照並無用圓曰我盡知你做處者箇都拈過一邊窮家私一抄便盡借一句子指月看者曰今日特來相看圓曰你者一句是指是月我不鑑你自道看步步登高易從空放下難者曰居士莫耳背圓曰向伊道我不鑑者無語良久云居士作門外人也圓曰你是門內人否者曰雖不居門內要且不在門外圓曰你在甚處者又無語圓曰法眼未明腳跟不實相見未得在者便去少選却回云我有語也圓曰月聻者扣門云第二頭來圓開門相見問云作麼生第是二頭事喫緊要問者曰鵝王擇乳素非鴨類揀去水耳若是乳無你擇處恁麼會去圓曰三世諸佛不出於此者曰某更有一問背鞭打不著時如何圓打云掉過來就與你一頓者呵呵大笑今將開示不本色鉗鎚故書此以為嚆矢示善信諸方知識踞曲彔牀扇兩片皮鼓粥飯氣抖擻屎腸搜尋佛法餿酸花鳥饐餲風雲嚼爛麻斤咬殘矢橛吐出半醉半醒句子文不通義不貫他既難明自亦不解喚作上堂法語學人念得𡎺向皮袋裏鳴腸胃呌做參禪參到彌勒下生還許夢見老婆汗臭氣麼及其魁者則按定死格順朱填墨步步摹倣將去印模互脫口耳遞傳抱不哭孩兒打潔淨毬子把索纜放船抱橋柱澡洗恁般見識饒伊十坐道場九開叢席語録塞破四天下也只是箇館驛裏撮馬糞漢有甚麼衲僧氣息有甚麼利益人天嗚呼佛法至今日而虀腐極矣心圓行業未純腳跟未實分宜緘口屏踪入山養拙其奈火蓮居士篤信此道大悲普願誓度方來命圓舉古糾今闡揚法要不敢任亦不忍辭只得不揣愚陋靦顏代庖效鼙一上更不之乎者也鐵餕餡木札羹向道打破鍋許喫飯運出自己家珍直下蓋天蓋地作麼生是自己家珍若要了知也極省力心圓不惜眉毛聊通一線會麼若不會自是你根性遲鈍莫怪他人喝一喝下座鵝王擇乳素非鴨類示善信逢佛殺佛逢祖殺祖逢羅漢殺羅漢逢父母殺父母逢親眷殺親眷始得解脫不與物拘透脫自在臨濟與麼道刀呢衆中莫有帶得者麼山僧要借看忽有箇見義勇為底丈夫踏步向前掀倒禪牀拂袖便出山僧呵呵大笑向伊道三箇未在何故幽州過得便新羅此去崖州十萬鵝王擇乳素非鴨類示善信訶佛罵祖不是不是行棒行喝不是不是向上向下不是不是全提半提不是不是佛慧祖燈不是不是麻斤矢橛不是不是忽有箇聽事不真喚鐘作甕底奴出來道長老恁麼舉不是不是直須打了趁出又有箇從苗辨地因語識人底漢出來道長老恁麼舉不是不是亦須打了趁出何故殺人不要見血為人須是為徹鵝王擇乳素非鴨類示善信成劫已前壞劫已後無佛無衆生一切語言文字身器世界何處去也正當恁麼時是汝諸人向甚處安身立命伶俐衲子杜撰禪和會得者不妨出來一喝會不得者亦不妨出來一喝心圓總不計較何故馬祖百丈臨濟未出世已前你那裏學得者虗頭來可謂咬人矢橛不是好狗直須還我空劫已前面目來始得有底道未審居士向甚麼處鑑向伊道徹骨徹髓看破了也有底道請居士向空劫已前問來向伊道且喜你會一喝不作一喝用鵝王擇乳素非鴨類示衆云撩起便行已遲八刻便下座以下第三首注明此條第三首第三首較第二頭況而愈下矣然此易入彼難入也麻谷接良遂睦州接雲門德山接高亭溈山接香嚴翠巖接雲峯皆向第二頭接今人視古人奚止日劫相倍哉仰山和尚云不思而知落第二頭思而知之作第三首心圓作第三首去也以筆畫相復抹去云是三是一乃擲筆呵呵大笑云正是第三首示衆古人云眨上眉毛早已蹉過了也又云如口銜樹枝答語則喪身失命又云待汝開口堪作甚麼又云要塔樣何不早說已被人借去了又云忘却了也又云適來猶記得又云賊過後張弓又云父母所生口終不為子說又云打即任打道即不道又云任從滄海變終不為君通又云佛法大有只是牙痛又云寧可截舌不犯國諱又云曹山解忌口又云要頭便斫去又云三世諸佛口挂壁上又云移取案山來即向汝道種種指示是甚麼物事直得如此隔礙難道心圓不惜口業一總為汝注破意根才動處子過新羅所以古人接引利根或以手掩口或以拂擊口或以拳打胸或以杖拄胸或開口便棒或擬議便掌直截提持全體作用教你立地休歇承當去有禪者出問曰恁麼則不許人動意根也佛告沙門慎毋信汝意汝意終不可信得阿羅漢道乃可信汝意耳曰不許斬釘截鐵第一義曰不動意根豈非同於木石圓曰據你者一問喚你作木石得麼曰無者一問時意根不動豈非木石圓曰你意根既不動憑何知是木石非木石不見古人道此皆是你情見者曰恁麼則不許人轉身通氣也圓曰你試轉身通氣看巖頭雪峯到者裏一箇伎倆作不得者便喝圓笑曰饒你千喝萬喝你且不知來處我舉箇公案問你當日藥山參石頭頭曰恁麼也不得不恁麼也不得恁麼不恁麼總不得子作麼生山無語繼參馬祖祖曰我有時教伊揚眉瞬目有時不教伊揚眉瞬目有時揚眉瞬目者是有時揚眉瞬目者不是子作麼生山大悟禮拜祖問見箇甚麼道理喫緊要問山曰某甲在石頭如蚊子上鐵牛返照入江穿石壁你且道他悟底是石頭語是馬祖語者曰是馬祖語圓曰大錯我不枉說你且不知者一喝來處道之不明也人皆逐末而遺本當日藥山不可不如你不會作一喝拂袖種種伎倆却被石頭徹底抄沒盡情把住藥山雖然口不能語其偷心未嘗死也彼時兩家門庭互相建立此既不投便往彼處馬祖善鑑元機來風深辨知他喫了石頭底真味醍醐來便與他輕輕著兩杓水千古之事如在目前非著草鞋在石頭馬祖藥山肚裏過者不辨諸公要識此兩杓惡水麼便是後來大機大用元要料揀兼到偏圓以及萬千門庭萬千施設把住放行皆從者兩杓惡水汪洋而成法海然皆末也非本也從來祖師指示人不許你向言下會何故從無實法死句與人也馬祖云云稍不唧便向言句下作道理死會去矣不但孤負馬祖抑且屈辱藥山直饒元會得也是眼中塵天下老和尚舌頭盡是打草驚蛇豈可言石頭無法與人馬祖有法與人埋沒先聖汩喪己靈自墮舌地獄哉心圓豈好辨哉實為佛祖慧命將絶不得不絮絮耳諒之後人泛海而迷源望洋向若窮極元微誤以此為本分事何異認驢鞍橇作阿爹下頷乎教海茫茫近來宗海亦復茫茫矣後之覽者悟此線索一鼻穿去目光如炬不受古人牢籠不被時師穿鑿省却磨裩擦褲十年二十年讀指月傳燈矣心圓功固有之罪亦不小呵呵藥山者漢才飲入口便悟得真味醍醐是從上來用不著底注云只可自怡悅不堪持贈君三世諸佛都是著水醍醐所以不足當衲僧一盼索喚則有交易不索喚則無我今已飲急須吐却於此見古人根器因見馬祖點醒石頭用處他是石頭嫡骨嫡髓兒子所以仍返石頭試看後來彼此提唱好證據頭曰我者裏針劄不入山曰我者裏如石上栽花到者裏真真實實完得蚊子上鐵牛一句公案皮膚脫落盡惟有一真實所以我尋常道石頭如繪日馬祖如繪空空際無日饒伊悟到語帶元而無路舌頭談而不談祇是箇不果之花遏捺意根鬼窟裏坐陰山下活計更不說他矣大機大用須從大休大歇中流出私通車馬祇通得箇官不容針底道理自餘有甚麼閒話諸仁者透得法身泥牛入海一擊忘所知更不假修持出得陰界石馬回途動容揚古路不墮悄然機恁麼不恁麼不恁麼恁麼處處沒蹤跡聲色外威儀一鏃破三關諸方達道者咸言上上機者箇猶是夙習記持若有正悟別更說看今年貧錐也無如來禪許你會祖師禪未夢見在我有一機瞬目視伊雲門顧鑒咦到者裏恁麼也不得不恁麼也不得恁麼不恁麼總不得電光石火眨上眉毛早蹉過了也參學人切須皮下有血拶著便知痛癢若是菽麥未分奴郎不辨莫向人前容易開口大難珍重心圓恁麼舉出學人恁麼會得句下精通觸途狂見正是第三首舉拳示衆云看看一句分賓主照用一時行會麼若不會聽心圓與汝一一下注解恁麼會得是賓中賓不恁麼會得是主中賓直饒恁麼却不恁麼不恁麼却恁麼恁麼不恁麼總不恁麼會得猶是賓中主在照也用也縱也奪也殺也活也都盧是箇大火聚也塗毒鼓也金剛圈也栗棘蓬也金剛王寶劒也踞地師子也探竿影草也一拳不作一拳用也者些祖師窮家當都被心圓和盤托出了也待你一一透得來到心圓門下正好從頭勘過了打何故譬如油蠟作燈燭不以火點終不明忽有箇從旁笑冷了齒底漢出來道點即不問如何是火拄杖不在手邊心圓且放過一著呵呵大笑便下座鯨吞海水盡露出珊瑚枝圖窮匕首見心圓之伎倆盡矣只是第三首偈曰滔天沃日西江浪吸盡方知徹底無此是遍行無相昧要須密用契真如頃與心圓語及近代禪和多儱侗支離二病若為藥之人根有利鈍道無南北祖五家宗旨不可偏廢舟行陸行同一到家不取途中強分難易若為一一指出心圓欣然握管書此良醫三折肱視疾見臟腑識者珍焉録之以當跋尾蓮再識
