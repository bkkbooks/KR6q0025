body:
  text: 心圓居士拈別火蓮居士集梓杭州仁和圓照䒢溪行森禪師惠州博羅黎氏子母夢白光入懷生師眉宇俊秀骨相清奇性情天放如鶴立雞羣草七歲棄家從宗寶獨公削染納戒往參雪嶠信問乳燕繞華屋梅子正香熟如何是西來祖意雪云未曾聞者師曰恰似錯問一日又問未離方丈句作麼生雪側耳師曰謝答話懶賓逢厭主窮漢遇慳兒然已是大段狼藉了也次參大覺琇於崇福覺令作本來面目頌師曰苕溪屈曲水潺湲萬疊關山一境閒乍雨乍晴雲散後滿天風月到人間覺云好與三十棒焦桐遇蔡方增價師云恩大難酬老驥逢孫始一鳴桐驥且置你道蔡邑孫陽是何面目一日覺垂問云僧問楊岐達磨面壁意旨如何岐云西天人不會唐言令師代僧進語師云謝答話別云有勞通事覺又云臨濟道大凡演唱宗乘一句語須具三元門一元門須具三要路且道楊岐者一轉語是那一元有照用也無師云袖裏金鎚當面擲別云和尚卻會一日覺垂問云僧問楊岐人法俱遣未是衲僧極則佛祖雙忘猶是學人疑處未審和尚如何為人岐曰你只要勘破長老令師代僧進語師代云學人禮拜謹退懺悔底懺悔慚愧底慚愧覺又云楊岐是臨濟兒孫為甚不行棒行喝却作恁麼語話師云前箭猶輕後箭深別云和尚須痛喫一頓始得若問喫後如何答云教伊認得臨濟若更問老僧喫棒了你又作麼生答云某甲不識臨濟若更問你既不識臨濟甚處學得棒來但向伊呵呵云仁義道中再放和尚三十棒覺命分座報恩崇福兩山師復手闢龍溪菴為禪悅晏休之所即圓照寺復應蘄之老祕乙卯秋衆請繼席崇福師遊牛首逢一道者者彈指一下問是何宗旨師云老鼠喫鹽者云如何是藏鋒句子師云東西南北者云如何是事藏鋒師云隔岸醉人多者云如何是理藏鋒師云滿江野鴨子者云如何是事理俱藏鋒師云水裏船船裏水者云如何是事理俱不藏鋒師云上底上下底下者便作禮師遊五臺宿顯通寺寺前見一婆頭纏紅布𩯭插山花身披雜襖左足花履右足黃鞋目光射人手𢹂竹籃籃內諸物俱有口食石子師問婆在此何為婆曰乞我一文錢何不與一掌且不負來機師云年多少婆云六十四師云有家主公麼婆云遍地都是是何言與師大笑放者臭老婆三十棒婆睜目視師師便打兔起鶻落箭鋒直注如大火聚婆喝師又打好手手中呈好手紅心心裏中紅心婆𢹂籃作舞而去文殊耶觀音耶可謂小出而大遇師遊中臺回婆仍在路啖石見師便笑口稱南無佛南無佛師問婆生緣何處婆云太原師云幾時到者裏婆云今日六月二十七師云識得你也在者裏婆合掌云大通佛大通佛便作禮提籃而去師云幾不問過上大人邱乙己化三千七十士爾小生八九子佳作仁可知禮也師於康熙丙辰六月草七示衆曰明年此日能見我於別峯乎衆罔測丁巳春師謝事崇福遊吳山見華嚴蘭若顧從者曰此中修篁奇石可以臥數江帆吾將老於此矣謂主人曰吾欲於此結一期緣可乎主人唯唯代呵呵手指云你者死無葬身之地漢休相帶纍至六月草四日謂主人曰明日吾行矣主人曰願留數日候集諸子師曰諾至草七諸子四集乃說偈曰慈翁老慈翁老六十四年七顛八倒開口便罵人無事尋煩惱呵呵總是一場好笑復書封龕語云䒢溪老䒢溪老到者裏有甚麼不了咄封却遂擲筆含笑而化時異香遠徹緇素競奔至七日掩龕餘香猶烈迎龕歸龍溪塔於圓照之右脅焉學士曹本榮曾問師如何是正法眼師曰煤塊子曹云宗門有五家是否師曰一亦不可得王熙問彼此燒作一堆灰向甚麼處相見師召熙熙應諾師云特地一場愁老祖開爐上堂僧問彤雲密布山坐高原截斷衆流請師別唱師云又是新聞進云祇如未出方丈法雨已降神通妙用耶法爾如然耶師云天不高地不遠進云一杖撥開千㵎月三盂收盡五湖煙師云近火先焦僧問老祖險峻關山難越實可悲哀乞慈方便師云者場大當貴憑人心所願進云一念休時事若何師云切忌進云彼丈夫兮我丈夫師云另是一條筋僧問千年爐鞴今始開人天共聽無生曲如何是無生曲師云當官莫近前僧問輕風拂月寶華開如何是寶華中事師云白馬紫金鞍進云打鼓集衆師登寶座意旨如何師云且莫顛倒亂僧禮拜師乃云適才新聞普告大衆誰道關山險峻截斷衆流天不高地不遠者場大富貴憑人心所願卓杖云切忌未生前你又如何看好笑顛倒者闖破餿粥罐且莫亂且莫悶白馬紫金鞍騎出萬人看咄現成公案下座臘八上堂僧問世尊不覆藏無端漏泄達磨不慎初九年面壁未審達磨底是世尊底是師云洞庭湖進云分明一點無餘缺不待明星已現前猶是者邊事如何是那邊事師曰鄱陽湖進云踏翻洞庭波底月萬重雲散月來新師云過渡莫爭先僧問掀翻窠臼無些子踏破元微向上關世尊睹明星悟道是否師云前山已解松根雪進云從前太煞郎當何故如今一毫不拔師云石臺又挂梅梢月進云恁麼恁麼山不是山水不是水不恁麼不恁麼山是山水是水師云姑蘇城外閶門市僧問梅花初放鴈聲孤鴈過梅落時如何師云惺惺著進云錦上添花因甚麼學人不會師云恰似九江客進云掀翻海嶽踢倒須彌時作麼生師云行堂須仔細進云好手手中呈好手師云熱粥熱飯僧問清淨比邱不上天堂破戒行者不入地獄因甚麼和尚與人說戒師云你為何夢裏推磨進云箇裏宗風分外別師云破草鞋僧禮拜師拈拄杖云前山才解松根雪石臺又挂梅梢月說向諸禪人惺惺開眼聽明星現時世尊悟道明星幾時不現一僧出師便打僧茫然師笑云世尊不覆藏達磨不慎初洞庭湖鄱陽湖說甚麼梅放鴈聲孤誰論錦上又花鋪呆禪客九江人愛學姑蘇姑蘇城外閶門市家家年到貼神符老祖山頭真好笑兩堂賢聖嘴蠻粗下座結制升座問答畢師云放下布袋快活無匹閒看猢猻偷喫生鐵阿呵呵的的的的在甚麼處問甚生前面目誰論梨花笑日齊堂有粥有飯禪和要喫便喫喫即不無飽後作麼生夜行莫踏白難難下座解制升座僧問正法眼藏即不問今朝解制句如何師云穿山鼻孔破僧禮拜師大笑云雖然和盤托出却是大段不同琅琊禪師道本來無一物壓殺天下人直饒便分明坐在糞坑裏作麼生是透脫一路妙音觀世音梵音海潮音衆兄弟朝看東南暮看西北近世雙笛從羌侊飯不及壺飱下座上堂問答畢師乃云行腳須具眼參禪要識句大衆識得句也未識又爭能識得適才答僧云是柱不見柱咦非柱亦不見柱既然是非都去了因甚又說是非裏薦取汝等諸人作麼生薦莫是雲日能催曉風光不惜年麼莫錯會好不錯會幸逢征客盡歸在落花前切忌顢頇儱侗去不顢頇儱侗息菴注云鵝王擇乳素非鴨類所以古德云至道無難惟嫌揀擇桃花紅李花白誰道融融只一色桃花紅裏紅李花白裏白一時說與君衲僧口門窄諸禪德瞥不瞥一夜東風吹落枝頭殘雪會麼老祖殿前梵王宮闕雙峯燈放九天風月燕子語黃鶯鳴誰道關關只一聲隔牆還有耳撐起眉毛子細聽不透祖師關棙子空認山河作眼睛咄冷底冷熱底熱粥鍋西邊底莓苔裹石碣良久喝一喝云歇如今是甚麼時節師大笑曳杖下座兩序請升座師豎拂云一羣子上來一羣子下去殘夢五更鐘落花三月雨合掌低頭換步時進前退後翻身處有利有害祇者舉足下步處迷之則生死始悟之則輪回息迷者如海中沙悟者如星邊月要且不是者箇道理人無遠慮歸到故鄉還似客不到故鄉爭知是客布穀催耕鳴別樹自無枝葉那不借棲叉手句可惜許一切數句非數句打一拂曰去問學人道眼不明未審甚麼礙師云幾時立春僧云昨日二十三師云怪我作麼別云聽事不真喚鐘作甕衆入室師拈杖云摩訶般若波羅蜜明如日黑如漆異解多途商量非一卓拄杖云急若人信受奉行一生參學事畢復舉殃崛産難因緣師云從古至今拈提者極多錯會者不少龍溪今晚索性與你點出天蒼蒼野茫茫風吹草見牛羊禪和子會也未不會再說一遍水溢天開隄花落滿龍溪鳧隨潮落去日上綺霞低呵呵龍溪亦未會得聽心圓與你點出鴝之鵒之公出辱之鴝鵒跦跦公在乾侯鴝鵒鴝鵒往歌來哭會麼不會再說一遍天津橋下陽春水天津橋上繁華子干場縱博家仍富幾處報仇身不死會麼不會再說一遍空手把鉏頭步行騎水牛人從橋上過橋流水不流事不過三會麼不會則諸公決定無耳既無耳還有鼻麼聽不見聞聞看屎臭氣也不知咄衆作禮師擲拄杖便起晚參師云萬法歸一一歸何處呵呵學人也有趣和尚也有趣拂一拂歸臥室眼似銅鈴口如木揬晚參師云山門前得底句禪堂裏商量去進到方丈不必再舉何也天溪不肯孤負汝晚參良久云諸大德我已說清淨法竟是中清淨否是中清淨否是事如是持餘紙半幅留與五百年後人跋尾如此說法捨四大為牀座不足以伸供養惟有一手裂破一火焚却億萬斯年永不回頭顧著稍可可恩耳僧出作禮畢擬歸位師連打三棒者箇棒粉骨碎身未足酬惟有一口濃涎劈面三唾維那問烏龜入水即不問相逢不相識時如何師云分明是箇駱駝進云但念水草餘無所知師云口裏氣聞不得進云拈却貓兒會上樹未審落花流水歸何處師云但聞人賣子不聞人賣爹重陽早參師云今朝九月九猢猻上樹賽筋斗右轉左左轉右好手手中呈好手呵呵天溪長老不唧𠺕呵呵山裏猢猻猶自可街頭猢猻愁殺人早參師云水中鹽味色裏膠青咄將謂明星是眼睛通身有口向誰說挽盡天河洗鐵丁室中晚參問答畢師乃云阿逸多笑甚麼蛇穿耗子窟普化搖鈴過嗚呼小子腳板踏破癢瘡近火血沾衣傷鹽傷醋陳年貨有人道慈翁老有茶請喫茶無茶滾水好咄漢仙琴高騎赤鯉羲之寫字換鵝兒良久云歸堂去六月十九早參路上紅塵起江中白浪飛卓拄杖云觀音菩薩來也有眼者近前無眼者退後一僧出作禮畢擬歸位師打云與麼不得得與麼良久卓拄杖云禮拜歸位見箇甚麼真堪笑與麼不得得與麼䒢溪口門窄曼拏羅指地為泉支吾不少胡大頭捶破鐵山一場敗闕若也知去龍行虎步如或懵懂世尊升座默然阿難遣出比邱左右顧云半山廟三天竺遂以拄杖一齊打散一場懡㦬雪夜晚參師云喫苦茶說淡話誰管佛法不佛法馮夷翦破龍溪練枯柳梅花處處春咦月下凍痕生緑井隔窗玉片飛無影樹枝風息轉迎寒寒人如鳥棲未安日短夜長誰先覺熒熒殘燭嗚嗚角咄咄黃龍三關香嚴獨腳冬至早參師云冷地裏夢見一呆和尚曰昨夜三更子癸時楓杉隔塢問松枝滿天飛雪來何處寒梅低首笑嘻嘻他又大呌云老祖老祖如今是甚麼時節大衆說看傍僧擬答師便打僧復出問生擒猛虎活捉獰龍人來時如何師云官法如爐進云忽遇透網金鱗又作麼生師云謹慎火燭進云驅耕夫牛奪飢人食未是向上鉗鎚如何是向上鉗鎚師叱云揚州客僧擬議師云大衆歸堂小年晚參衆集師舉拄杖云是我不是衆茫然師擲下歸臥室笑啼俱不敢始信做人難師見病人多逐苦境乃示云莫莫莫病是衆生之良藥我在俗時一病幾死正迷悶中忽聞鼓吹始知病源不從他有遂決志出家云鼓角分明破毒針驀然割斷愛情心死去活來真好笑石頭土塊盡知音語諸人識病因大家割捨夢中身咄咄不作維摩詰文殊何處尋只消五箇字割捨夢中身晚參云紅不成雪白不成血等閒一事不分明苦使從頭皆曲折別云紅不強雪白不計血尋常事事甚分明沾著己躬便曲折咦不曲折大黃體挂穿山甲天官之大者不名所生人官之大者不名所職禪和子喫喫晚參云僧家無纍以世界為影柱上觀先哲深原道