云青州人彈指又問曾將天補缺不禁他移陵棒喝交馳時作麼生會自代云出生臺石蓮花代語神似雲門晚參問答畢乃云縮却頸伸出手昔日世尊拈花今晚外揚家醜今年是壬寅去歲是辛丑天寒人寒時月下牛如狗老虎吼𭺗當走道甚麼雲綻綻路相同湖南有湖北有山東茄山西韭咄草裏猢猻打斤斗維那問學人大用現前時和尚作麼生師云一字不差進云莫是布袋裏猪頭也未師云為何喫者樣東西進云老人言盡龜哥眼赤師云黃梅縣地方四月八早參云今日聖誕良辰洛伽石呌曰黃鸝莫作藏身處一入柳絲遣不開漢陽江應曰楚雲一夜真堪賦華頂峯道佛國何年入望來泰安山問天下英雄今孰是陳摶谷答大聲空自聚如雷老祖各供白水一杯淡薄淡薄莫怪莫怪侍者出禮拜師便打早參云大衆道眼若明才脫窠臼接物應機如鐘待叩咦千萬關山道平分南與北觸目古人思時憑最高閣錯自知老祖癡見笑水潦鶴昔有牛頭會下僧參破竈墮和尚繞一匝出去公案會麼良久云新月娟娟夜寒風靜山銜斗起來搔首雪裏梅橫瘦好箇霜天閒却三臺手君知否古人去後思念濃如酒說與行腳人左掌中書右早參云大衆一左一右雖過於中而在中之庭一前一却雖不及於中而在中之皇世人好盡而遠於中遠於中則必窘於邊幅必觸於巖牆必墮於坑塹誰道本施土緣第一僧問和尚古人為甚麼走入水牯牛隊裏師云你眉動眼動作甚麼進云消得龍王多少風又作麼生師云審戒時你須盡情發露進云說夢老瞿曇何處覓蹤跡師云低頭持呪去晚參僧問各自檢點總成顛倒時如何師云上座不見甚麼進云十里大王五袴蘇途遠近如師云買賣不相當進云七佛已前事為甚麼學人不會師云第八句曲山第九林屋山進云因何三年不喫飯目前無饑人師云官吏有坐位進云眼不挂戶意不停元時如何趣向師云軍器局副使袁應華僧拂袖出師笑云大衆七佛已前事四顧何茫茫總成顛倒時禪客不見甚麼呵呵宗乘之建衲子惟智守位謹常非明正眼故先聖之行腳入則訊其旨出則承其法居則思其道你要知十里大王五袴蘇途遠近知麼買賣要相當眼不挂戶意不停元時苟利後賢不顧其身上下用成故昭祖德莫道三年不喫飯目前無饑人好見月十五圓見缺十六始誰云芝草無根醴泉無源矣如風之蓬蓬然而起如山之迤迤然而止晚參云誰令白日晚坐使遠山青山何為兮高高水奚為兮深深塢西泠垂虹亭龍拖急雨長橋過帶纍老祖聽事不真晚參云天之顯經隱權前德而後形好笑錯過溪邊日已斜人間五百年兜率一晝夜咦浮雲隨風凌亂四野諸禪子仰天悲歌罷罷提多迦尊者晚參云物扃於所甘人扃於所守為何盤龍明鏡餉秦嘉辟惡生香贈韓壽周脫邱遮莫牛正月初十夜如晝說甚麼蘇州有常州有早參云盡道今朝是冬至為甚麼須菩提涕淚悲泣迦葉尊者只管冷笑大衆記得麼孟子見梁惠王僧問易開終始口難保歲寒心和尚又作麼生師云千世不修生在貴州進云荊三汴四作麼生師云貞節祠南石判官進云舉則易答則難如何到得和尚田地師云麻城鹽客識闍黎晚參問異類中行紹隆聖種底向甚麼處行履師云那有此理進云耳聽不聞眼看不見七手八腳三頭兩面師云莫進當鋪進云香嚴悟處不在擊竹俱胝得處不在指頭未審在甚麼處師云快去呌菜頭來知藏問當初未欲成相別恐誤同參一首詩可是到家句否師云快快搶行李進云既是聖僧為何頭上有漏師云幾更時候起火進云碓嘴生花師云神明鑒察知藏擬議師喝云未明三八九難過祖師關好笑頭上日輪誰不見南無佛陀耶把臂上高山山頭妙竅往追不及來不有年老天誰言王野歸來晚今在羅浮作地仙打開布袋頭放出百千牛縱隨芳草去終不被人收君不見石頭路滑如油侍者問城中青史樓雲外高僧塔去此之外請師指示師云江西錫箔進云可是下文看注腳師云衢州阡張進云日出卯用處不須生善巧師云周腳夫發黃病晚參云今古應無墜分明在目前因甚又有客愁繁似雨鄉路草芊芊知道了回首壟頭樹似接古塘煙蛙鼓螢燈蚯蚓笛鶯歌蝶舞鷓鴣天蒼天蒼天因事晚參云今日得箇新聞有一怪猴求冥王轉人身王曰將毛盡去夜叉才下手怪猴呌苦跳去王笑曰如何做人這箇新聞可醒瞌睡今晚舉似大衆早參問赤土畫簸箕使米跳不出是也未師云闍黎生得好耳朵僧作禮師云何所見而來何所聞而去水底看紅輪清波無透路喝一喝云曲有誤周郎顧起三早參云今時禪者曰三元三要者不過因便回向耳咄咄你道回向後還有事也無審細審細天明時有人高吟云山閣行將近迂回又隔溪八窗中遠水萬柳外長堤鑿曲深魚舍芟枝減鶴棲好笑好笑爹爹低低早參云蘇子美讀漢書以此下酒百斗不足多老祖瞌睡似夢非夢忽聞云船上不漏針為何枕頭沒處尋茲請大衆判斷若道復讐者不折鏌干雖有忮心者不怨飄瓦不勞拈出向伊道和尚是甚麼心行元旦早參問答畢師打一拂云大樹大皮裹小樹小皮纏古往今來者歡喜成風顛喫飯湯燒速香開得眼來天大光咦俗氣不除呵呵不妨不妨有大神呪有大明呪有無上呪甚麼呪新年新歲而今而後入俗隨俗入鄉隨鄉一卷子程子曰一卷天地元黃一味順朱填墨不用向下向上所以問新年佛法答他紫雲瑞雪降重重問前三三後三三答他梵王宮殿隱晴空大衆玉童端拱雙尖上石船峯在碧波中年初一駕長虹任從天上醉春風知衆在否衆應在師云有功無功莫使肚空齊堂排齊佛殿上供早參云窮春秋演河圖不如載茗一車差差低枝窺簷似含笑臨水小村三四家舉頭紅日近回首白雲奢咄甚麼說話自己也覺不好意思中秋晚參云如何是般若體如何是般若用萬里關河遙北望無邊風趣入秋來說甚麼箭穿楊柳李廣陷番錯過雲峰悅和尚故人尺素年年隔薄暮清砧處處催大衆峩眉山腳下有件事極古怪晚參云悲歌久去耳風韻今何如荒院夕流盼古道行人疏大衆雲天一片高談抗冷氈笑寒暖世間人面且休分皂白儘隨他冷淡因緣因甚道杜蘭苦不長蕭艾苦不殘早參云見善修然必以自存見不善愀然必以自省善在身介然必以自好不善在身菑然必以自惡行森昨夜夢遇老演祖勝如得美官栖栖無聊中握手意便歡再三細問家風這樣清淡為何不學化緣香林禪師誕衆耆舊請上堂問答畢乃云九日雨微晴香風出桂林鐵樹開花時碧雲天黃花地金將火裏試還曾透出一字也無天寒日短一不得向二不得開白露收殘月霜風散曉霞一扠一搭時登高風落帽老祖能識人林坳多敗葉卓杖云千里何明又卓云清機歷掌去不到去來不到來誰不錯會黃鶴斷磯頭人多悲客路擲杖下座機鋒閃捷惟雲門聊可倣佛之晚參云癡不癡癖不癖擊節歌離騷湘靈招不得狂風吹落花花落風無跡大衆為甚麼石灰山上寫箇會衆拿賊早參云亂石堆頭泛破航急流溪畔柳初長歌欵乃濯滄浪四山繞座元章米雪居孫皆非妙筆一目連天蝦蟇埠狗兒堆盡是佳圖還有一般快活邇來公令嚴禁不許開場放賭知藏禮拜起喝一喝師大笑進云面前骨堆高三尺莫是三九二十七麼師云接客喜送官愁進云華光寺主手腳長師云你好似停喪赴考僧問如何是有相身中無相身師云費錢因事急進云入市能長笑歸家著短衣時作麼生師云郎中尋韭菜進云橋翁賽南神日午點金燈師云怪不得師叔賣茶地問學人肉有千斤智無銖兩時如何師云你生得好眼睛進云寧可截舌不犯國諱師云咄者樣種草進云忙中怎得作閒人師云正好沿街呌早參問古人為何道要真盡屬真要假全歸假九年面壁僧有口還如啞師云你臨財莫苟僧禮拜師云你到會湊趣僧問古人云總似今日老胡絶望意旨如何師云你幸得年老進云兩手扶犂水過膝初三十一日日是好日師云怪不得前日唐老兒說你進云堂堂密密處求和尚放一線師云昨夜何人呌喊僧茫然師大笑卓杖云衲僧家立言須自出一家機軸何必與俗同見解知客問不消一曲楊柳枝請問是三乘十二分教不是師云人搖財落進云因甚道福堂歸來還平善否師云你習氣太重進云一宿二宿程千山萬山月為何說黃泉無客舍師去咄偷狗橋邊喫僧飯落堂維那問昔日疏山造塔因甚道將三錢與匠人師云白身尊者戴方巾進云為何又道將兩錢與匠人師云鹽貴米如珍進云為何又道將一錢與匠人師云槐陰樹下楊柳精進云後來羅山因甚道若將三錢與匠人和尚今生決定不得塔意作麼生師云紙軸公公供熟鴨進云若將兩錢與匠人和尚與匠人共出一隻手是也未師云左底左右底右進云若將一錢與匠人纍他匠人眉鬚墮地意又作麼生師云雪壓蘆花驚白鶴僧茫然師云欲識羅山與疏山竹根煙冷鎖松關鑿渠引水俄成沼幾多迷鳥帶雲還不知今生決定不得塔麼紙馬店裏遭瘟殺不知和尚與匠人共出一隻手麼木柄斧頭石碓臼不知匠人眉鬚墮落麼煤炭門前畫木杓起七晚參云大衆木若稼才害怕何也不見楊岐會祖云百丈開田說大義是何言歟楊岐兩日種禾亦有奇特語達磨大師無當門齒且道意在甚麼處禪和子山頭日日風和雨行人歸來石應語情盡橋名折柳橋任多離恨絮條條良久云唐朝崔皓寫翎毛崔皓雖然不用他若無崔皓不能寫晚參云嘽嘽兮燭燼燈殘可笑夢去來不言行路難打一拂云丹書鐵券不能以救違約之弊五刑九伐不足以止覬覦之奸拋拂歸臥堂早參云佛祖以衆生之耳目為視聽衆生之心為心端坐而自化居成而不有斯可以謂得正法也諸賢契思於正法道不遠人念靜而衆生自清不疑而衆生自信不私而衆生自公賤珍則衆生去貪徹侈則衆生從儉用實則衆生不僞崇讓則衆生不爭始得人心和平衆生淳質樂其生保其道優游大德以慰老僧厚望知衆問發言必有後救學人不知落處乞師指示師云令祖甚麼年中歸世進云學人不會隨方斗稱師云是你眉粗眼大安居早參云大衆山高尋雲溪肆無景南無慈力王佛南無紅𦦨帝幢王佛南無善遊步功德佛小事之成不若大事之廢疄疄阡陌多農家無寸泥誰道秀木扶疏衆草齊妙妙叮的哩叮的哩早參云霽霞散曉雪猶明枯木挂殘星霜花重逼雲裘冷西望陽關誰故人咄貼稱麻三斤心共馬蹄輕打一拂云金剛腦後鐵釘深冬至晚參云大衆先德眼目越洪寧之蕩蕩追元漠之造化跨五三其無偶邈卓立而獨奇看却今時羽族盛興毛羣並起上蔽雲穹下被臯藪一塵才動大地全收咦晚來初雪霽煙火隔林微一徑牛羊入孤村桑柘稀元鳥冬至之日祀於高禖以請子諸禪者知也未知客出問道著不著孤雲野鶴是何語話師云你是那裏戶籍進云山舍一年冬事辦得閒誰管竹竿低師云有管隊在麼晚參云三腳驢兒弄蹄行導引頑儂上玉京咦古今往往向言有壇宇行有方表道有一隆處覓楊岐會祖好笑錯過也寧去纍世宅不去䱥魚額許村人賣磁州石晚參云生余人間世夫豈不猶人若少松柏共除非天地親良久云咄咄破衲數十年白髮四五寸經書不記卷熟睡不記頓早參云乾坤燈下彰魂魄枕邊書猗歟猗歟覺有八徵夢有六蘧賜玉車而下馳有那其居待漏殿前恐侏儒早參云夢覺朔風大落枝擊虗瓦鏗鏘玉磬音隱隱迭高下咄咄西來的旨是何語話罷罷大雅小雅之乎者也三千年前字經三寫三千年後烏焉成馬早參云一葉放春流孤窗來鳥語報道馬回子甕裏捉老鼠妙湛總持不動尊在那裏十字街四隅頭東西南北一年歷八箇節春夏秋冬大衆記得前歲黃州火發麼不知打破多少