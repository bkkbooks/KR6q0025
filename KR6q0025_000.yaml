body:
  text: 掩黑豆集序宗門中事明取腳跟下本無實法六祖云不思善不思惡巖頭云百不思時名為正句欲得識句向事上覷則疾向意根下摸索則遲但於機用上略露些子如同電拂如擊石火快便難逢豈容擬議所謂向上人活計者靈鷲拈花少林面壁至大鑑而法周沙界矣厥後五宗分派流出一源建化門庭盛衰各異濟下則宋元明賴虎邱一支流衍至今而正法眼藏指月録諸書無繼選者諸師語録機緣殘編賸帙日漸消亡後學無由考證此一線之傳所係為尤重也臺家本儒林幼沾墳籍釋褐後奔走風塵無裨身世每聞修多羅一言半偈輒有會於心謬疑一乘之道有路可通妄緣解路以求其合而名利中鈎鎖連環復不能自脫流浪天涯髮白齒落回思生死事大如燎眉剝膚之迫不容緩於是息影餘菴自謀活計閉關謝客鋭志參窮一日於信步經行次觸發元沙立地搆取語瞥然摸得娘生鼻孔踏著本地風光歡喜踴躍信知此道本來成現不屬語言不落知見然而遍閲古德機緣於差別機用末後牢關仍多疑義頃與心圓居士住菴結夏取指月録及諸家燈史所載應菴已下諸尊宿法語機緣一一拈提決擇始會得古人殺活機權無非洞明從上來事於是向之所疑渙焉冰釋腳跟下事洞徹無遺竊幸於垂暮之年而識還鄉之路自此歸家穩坐喘息方定回看同道諸君或沈淹於虀甕或躑躅於歧途求心未歇特地艱難正與臺昔日相似所謂曾為蕩子偏憐客者耿耿寸心不能自已此黑豆集之所以刻也蓋自應菴華祖振虎邱之緒綿延弗絶再盛於龍池其間龍象蹴踏如密雲天隱雪嶠湛然諸尊宿下師吼如林洪鐘遞響至䒢溪而萬派歸墟千峯到嶽美盛洋洋大哉觀止然而展卷則目迷五色沒量大人被黑豆換却眼睛其稍劣者即輾轉推尋愈尋愈遠世有靈根慧性之士肯於黑豆未生芽已前一肩擔荷得去便能拈一莖草現丈六金身拈丈六金身作一莖草咳唾掉臂殺活得人不犯鋒鋩不落擬議此古鏡未磨前一段光明乃人人腳跟下同具者也久參上士買石饒雲入道初心擔泉得月庶克紹隆祖位負荷正宗西來一線之傳永無失墜而五宗建立千波競湧一亙晴空之的旨又豈不人文殊而類普賢哉嗟乎如來以一大事因緣出興於世教外別傳語言道斷庸鈍者既苦拍盲之無路士君子幸具福慧兩足之緣能自拔於五欲而求免於輪回又以邪見稠林枉受辛勤歇心無日貺以是編夫亦中流之一壺千年之優鉢焉爾是為序乾隆五十九年甲寅夏火蓮居士平聖臺書觚語四則苕溪曰吾有大病非世所醫釋迦醫王也文殊醫相也降而歷代祖師古今善知識皆醫國手也然而自醫則可醫人則否故曰吾有大病非世所醫且既非世所醫彼醫者即病者既不自醫胡能醫人故無論言句是病揚眉瞬目亦是病擎拳豎拂亦是病行棒行喝亦是病既皆是病醫可廢乎廢醫則醫病敗種焦芽不廢醫則衆生病聲求色見且廢醫則醫先病而後衆生病不廢醫則醫不病而衆生有病有不病衆生有病有不病而醫仍病必也衆生皆無病無不病而醫乃不病降而論之等病也有已病之病有益病之病何謂已病之病著著向未舉以前打脫透過者是也何謂益病之病步步在既舉以後輾轉摸索者是也其服未舉以前藥者吾不能言其味瘳者自知之服既舉以後藥者譬猶調味之鹽適口之醬鹽為飯而醬為飲其與砒鴆相去幾何哉要之非醫咎也故衆生雖有病有不病而醫總不病醫不病信吾病苕溪一語洵久病之良醫也打相云已上病供心圓押字我宗止破法無成法破家散宅即作活計昔南泉住菴時有一僧至菴泉曰我上山作務待齋時作飯自喫了送一分上來其僧作飯自喫了却一時打破家事就牀臥泉待不見來便歸菴見僧臥泉亦就伊邊臥僧便起去諸公還識此僧喫南泉飯不孤負南泉底作用麼還見此僧送絶好一分飯與南泉南泉到口便吞麼譬如世尊出世四十九年拆一間屋拆梁拆椽拆柱拆礎拆成一片白地然後椽梁柱礎件件精嚴所以南泉一見便印可道汝既如是吾亦如是古人云若有一法過於涅槃我説亦如夢幻參學人具此眼目方始好看教辨別得諸方邪正不則到處墮坑落塹披枷帶鎖卒未有出頭日在南泉云此是風力所轉終成敗壞此老眼光觀千古事如掌中菴摩羅果今有孔被楔塞者巧匠乃以楔出之而無奈彼楔既出人即以此出楔之楔奉為至寶遂至彼楔既出此楔旋已牢著孔中更出一楔更填一楔如是輾轉經百千劫楔終不盡孔終不出又其甚者彼楔未出此楔羼入楔楔相並更無孔穴間有黠者視出楔已旋更添穴或吹一吹或拂一拂孔穴之中更安孔穴是又一楔也噫佛法大要一言以蔽之曰淨地上勿屙古德云修證即不無染汙即不得但形文彩即屬染汙佛見法見左降鐵圍才生便咬自然無事自然露倮倮地即是從緣薦得相應疾也雖然心圓恁麼道早已屙了一地更説誰屙伶俐學人向者裏著得一隻眼見人説禪説道説妙説元驀口便築教伊合取屎孔去却有些子氣息忽有箇咬人矢橛底惡狗奴出來道雖復不以言語見亦復不著無言説心圓不覺大怒跳下禪牀擒住此奴問伊有甚麼言説速道速道眼目定動奮金剛拳碎魔子首猶如微塵咄偶閲拂子源流舉此數語此圓操觚大意也居士選本成集為後人學佛津梁但使讀居士集者人人成佛作祖不必人人作唱導師庶幾不孤負居士一番選刻之意鄙見如此陳之執事他日書成以為跋也可以為序也亦可圓頓白掩黑豆集目次佛祖機用言句卷之首六祖下十七世至二十世卷之一應菴曇華簡堂行機慧通清旦大明詮靈巖仲安無著道間或菴師體濟顛錢端禮別峯寶印全菴齊己覺阿葛郯退菴休晦菴慧光且菴守仁心聞曇賁坦然卍菴道顏此菴守淨連雲道能最菴道印宗元菴主尼妙道尼妙總溈山法寶老訥祖證長翁如淨六祖下十八世密菴咸傑顏丙海門師齊鈍菴宗穎遁菴祖珠敬叟居簡六祖下十九世破菴祖先松源崇嶽隱靜致柔藏叟善珍友雲宗鍪偃溪廣聞東山道源無文燦吾捨從寬竹巖妙印六祖下二十世無準師範元叟行端栯堂益余放牛瞎驢無見中和璋臭菴宗六祖下二十一世至二十四世卷之二雪巖祖欽楚石梵琦愚菴智及無能教六祖下二十二世高峯原妙南石文琇間極雲虗谷希陵方山寶鐵山瓊淳拙文材六祖下二十三世中峯明本了菴清欲斷崖了義夢窗智曤碧峯寶金無聞思聰六祖下二十四世千巖元長天如惟則敬中普莊六祖下二十五世至三十二世卷之三萬峯時蔚唯菴德然宋濂俱空契斌六祖下二十六世六祖下二十七世寶藏普持田居士虗白慧旵荊璧紹琦六祖下二十八世六祖下二十九三十世海舟普慈翼善永慈寶峯明瑄天奇本瑞六祖下三十一世絶學明聰古巖大休實蘊空常忠六祖下三十二世笑巖德寶法舟道濟慈舟方念無明慧經六祖下三十三世卷之四幻有正傳幻也佛慧大覺圓無趣如空晦堂元鏡永覺元賢湛然圓澄六祖下三十四世卷之五密雲圓悟雪嶠圓信天隱圓修抱朴大蓮古湛性沖石雨明方三宜明盂葉曇茂余集生覺浪道盛六祖下三十五世卷之六玉林通琇林皋通豫箬菴通問山茨通際印中通授惟一潤破山海明木陳道忞牧雲通門六祖下三十六世卷之七不退行勇美發行淳蘊荊行璧骨巖行峰棲雲行嶽寂菴行洽全菴行進丈雪醉百城著沖然義芥菴大湛菴常宏遠詔岫雲行瑋石隱貞方居士蘧夫一天笠珍千仞岡鐵舟海雲外行澤湘翁沄六祖下三十六世卷之八䒢溪行森跋語掩黑豆集卷首拈頌佛祖機用言句世尊三升座第一點普第二點毒第三點急門庭施設入理深談一切備矣畢竟法王無一字增益人頌曰心如境如頭正尾正不解談元秖能識病是法無説是説無竟未白椎前法王正令無為真佛實在我身拈云昭昭靈靈不是我明暗色空不是我牆壁瓦礫不是我蚯蚓蝦蟇不是我我在甚處咄鵝王擇乳素非鴨類要識渠面孔麼三喚三應過新羅無喚無應驢年夢見所以道此箇門中事不得春風花不開及至花開風吹落且無陰陽地上一句作麼生道驀喝一喝頌曰佛下忉利一場鈍置三喚三應打鼓搖鈴無為真佛證龜成鱉實在我身眼裏瞳人咦一箇不會一箇會金剛摸索泥人背須菩提巖中宴坐却見吾法身拈云比邱尼瞞盡天下人瞞不過世尊世尊亦瞞盡天下人瞞過比邱尼瞞不過須菩提且道利害在甚麼處頌曰法身法身少米無薪油鹽醬醋東舍西鄰羊頭懸架狗肉橫砧三箇八兩元只半斤吾以真珠示之便總不知時五方天王悉自悟道五方天王悟道且置即今面目現在諸仁且作麼生悟不見道悟即不無落第二頭乃擡手云者箇亦是世珠且道真珠在甚麼處振威一喝無可捨處是汝放身命處無可捨處更須捨却普眼菩薩見普賢拈云雲居道普眼推倒世尊世尊推倒普眼你道普賢在甚處向伊云我識得你佛召五通仙人拈云探驪須得珠莫教魚目混治玉須治璵莫教碔砆亂藐姑仙子立雲端笑看猧兒爭飯碗如今莫有要問那一通者麼我也沒工夫召得伊但云今日不間頌曰海中三神山縹眇在天際舟欲近之風輒引之去百花洲上多少採蓮人滿把蓮花不識蓮生處那一通你問我拈云風頭稍硬水勢太急鐵作釣絲管下不得頌曰閃電光擊石火語招箭莫生垛剛回頭失却我劍去遠矣爾刻舟緑頭鴨子討甚卵莫惺惺轉見左解玉纏兮脫金鎖畢竟兩人都不會贏得一場空懡㦬世尊敕阿難持鉢拈云不經九折不知康莊之平坦歷盡蠶叢方信本來是地所以道臺山路向甚麼處去驀直去好箇師僧又恁麼去也驀直去頌曰七佛式出不得擬如何打破鉢七佛式道不得莫如何且持鉢世尊答比邱問拈云我於世尊法莫謗世尊見處即有眼花不少證處未是亂走作麼當何所示是汝此問來説是非者即是是非人頌曰老僧無舌不解講究老僧無手不解蓋覆不解如然亦不解謬掌孤不鳴足兩斯走是汝持來復汝何咎祖師活意心圓逗漏耆婆罔知生處莫道耆婆佛亦不知耆婆受瞞佛不受瞞耳七賢女遊尸陀林頌曰三般物我無有聽親言出親口要三般莫亂談你若有與我三世尊布髮掩泥拈云世尊和泥合水然燈移梁換柱賢于看孔著楔諸天醵金落成要見梵剎總且未在諸公要見梵剎麼退後退後頌曰好事不如無無事不如好欲識箇中意一老一不老是吾弟子吾是誰識得吾不但過去現在盡未來際一時收頌曰古佛古佛剔卵出骨弟子弟子無與倫比世尊世尊今古罕聞作禮作禮如斯而已迦葉擬擯文殊拈云不是迦葉擯文殊正是迦葉擯迦葉頌曰良馬顧影回旋不驚演若迷頭奔馳狂走才有是非紛然失心汝但息見其狂自歇莫自顛倒本來無物咄城東老母求見不得擯出不得回避不得一普賢二文殊三釋迦是甚麼驀喝一喝曰看腳下女子出定諸佛未離本處已前是箇甚麼何不與麼直截會去請別大愚芝二語曰寺中無宿處賊不打貧兒殃崛持鉢我作殃崛待長者問汝為至聖當有何法能免産難但向他道世出世間此為第一文殊不入門拈云一釣便上無邊身量世尊頌曰虗空尚有邊佛功德亦然惟有能量者窮劫不可盡乾闥獻樂拈云山河大地不如是法不如是迦葉不如是汝如是頌曰幻人取幻法幻幻轉相依祖若不入幻誰救幻中迷顧衆云咦説大集經拈云呵呵斷麼一箇殺人放火一箇阿彌陀佛不是曲直不分爭奈心圓事急且請老佛老魔各自歸家歇息頌曰二龍爭珠彼此俱失寧棄道旁一錢不值雖然不值尊貴無匹大地黃金買他不得雖然不買人人不缺何以驗之耳聲眼色雖然不缺爭奈不識瞥起微情珠沈光黑因緣到來好箇時節爆地一聲虗空迸裂大用現前頭頭物物揮劒當陽佛魔斂迹調達入地獄三箇畫師繪出地獄變相瞞看官不瞞畫師且道畫師是誰良久云頭長三尺頌曰清涼遍界大火燒空兩頭坐斷獄不通風二鐵圍山心圓今日起佛見法見被世尊威神鐵圍山瓦解冰消且道與文殊是同是別文殊持劒逼如來拈云能殺能活不妨文殊好手且道此劒甚處得來你若擬議即沒交涉不問有言不問無言拈云不問有言不問無言描也描不成畫也畫不就世尊良久老瞿曇被者一問直得口啞外道歎曰世尊大慈開我迷雲眼中見鬼令我得入三生六十劫作禮而去阿難白佛外道得何道理稱讚而去家貧更遭賊打世尊曰如世良馬見鞭影而行逐電追風只瞬息垂鞭已過萬重山又云不問有言不問無言那箇教你來世尊良久老僧耳背外道歎曰世尊大慈開我迷雲令我得入自誣誣人作禮而去納甚麼敗缺阿難白佛外道得何道理稱讚而去他送我紅爐雪片我贈他臘月蓮花世尊曰如世良馬見鞭影而行雕弓未動狼煙息歸馬華山賀太平頌曰三頓痛棒無領一箇指頭無薦香嚴擊竹無聞靈雲桃花無見莫將出岫微雲掩却廬山真面無説無聽是為一義二義拈云龍光佛時一箇疑團直至如今不得休歇更饒千佛出興亦去此疑團不得且道世尊有甚長處頌曰外不放入內不放出痛下一槌萬事了畢昨日定今日不定拈云上來把住水泄不通者回放行縱橫自在還識世尊落處麼頌曰汝定我亦定不定亦不定非定非不定是名曰正定答異學問盡道推過商量那識分明酬價異學若是箇皮下有血底管取立時桶脫答二商人問曰不見不見者在曰不聞不聞者在曰不禪定不禪定者在曰不睡眠不睡眠者在本自無失何得之有説覺不覺真為剩語諸仁者到者裏眼目定動即沒交涉你若擬議世尊在汝腳底頌曰去皮存淨貨師姑女人做會麼大象喫螺螄蜻蜓拽石磨梵志索論義呵呵破布袋裏盛錐子不出頭是好手梵志做盡伎倆爭奈柄在世尊手裏且道世尊有甚長處不見道你若無心我也休頌曰靈龜負圖受鑽梵志不唧漢項上脫却鐵枷者回死而無怨世尊問豬子者箇是甚麼向伊道合取口佛具一切智豬子也不識向伊道你秖識得豬子頌曰六度萬行與我無干也須驗過不得顢頇知是般事便識羞慚世尊拈花迦葉微笑兩箇老漢只解瞻前不解顧後人天百萬貪觀白浪失却手橈拈云拈花上薦不得拂子上薦不得拳頭上薦不得指頭上薦不得乃至一草一木一甎一瓦一雞一犬一蚓一蛙上薦不得乃至微塵大地剎那虗空賢聖仙佛魔外有情地獄天堂琳宮梵宇酒肆淫坊經營屠販喫飯穿衣舉足下步上薦不得若薦得去更有何事你若肯薦一場夢醒你若要薦正好做夢頌曰魔不能窺佛不能見掌不容擎室未曾現識不能知目不得眴界不安藏世不改變非凡夫法非摩訶衍非般若經非華嚴卷非大火聚非金剛劒非祖師印非仙人扇從未有傳亘無人薦掃却歸元剗除方便言思路絶不通一線當下休歇立時成辦示汝學人廬山真面文殊請佛再轉法輪拈云説也轉他不著不説説也轉他不著直饒千佛出興口如懸河亦轉他不著更饒山河大地草木叢林一一盡化微妙海口亦轉他不著會麼不是轉法輪盡是法轉輪若謂吾滅度若謂吾不滅度闍黎不是莫怪老僧諸行無常是生滅法生滅滅已寂滅為樂拈云無寂滅不生生滅無寂滅誰滅生滅恁麼道得猶成兩橛畢竟如何歇頌曰有時捨全身求半偈有時示半身説全偈有時捨全身入全偈正眼觀來一場鈍置伶俐兒孫不妨窺見他家半邊鼻此藥能殺人亦能活人殺活許你會如何是此藥文殊菴提遮女互相問答語拈云絶好兩則拈花公案頌曰你不敢向龍潭裏去喪生却願到虎穴中來納命直饒救得你上三十三天跌下來也秖是一箇臭肉餅文殊善住意天子互相問答語拈云以毒為藥則病受之以毒為飯則命受之祇説者箇法拈云不是説者箇法却是者箇説法且道者箇還解説法麼不見道秖是梵音清雅令人樂聞頌曰捏水成團畫空為界做盡伎倆法今何在驢鳴犬吠婦姑反脣彌勒打鼓築著天親無生法忍一時成就黑鬼呵呵波斯面皺乃至無有語言文字是菩薩真入不二法門呵呵善財參彌勒善財答無著頌曰富嫌千口少貧恨一身多勸君隨分過不用苦奔波須菩提宴坐諸天雨花須菩提説法帝釋雨花無一字熾然説熾然説無一字直饒拈却兩頭中間坐斷向衲僧門下正好喫棒何故不踏間花草安知大地春舍利弗見月上女舍利弗問彌勒舍利弗問天女拈云三箇鼻孔都被舍利弗穿却鴦崛棄刃拈云喚曰住住不是我喚更是阿誰頌曰我住汝不住九百九十九汝住我不住一指欲殺母鴦崛忽出家不住住已久千人拇指冠戴者華其首安得諸衆生棄之如敝帚賓頭盧赴齋拈云者不顧第一相為策起眉第二相為阿耨達池龍王曾請佛齋吾是時亦預其數記得盤陀山石上與君間坐聽流泉頌曰不取涅槃不了帳留與人間作榜樣引得人人盡致疑要使佛燈長雪亮長雪亮照見馬師三甕醬障蔽魔王隨金剛齊拈云刻刻不相離説甚麼一千年覓不得時時不相識作麼生忽一日得見障蔽魔王與金剛齊面目一般形容無二諸仁者還揀辨得麼揀辨不得聽下注腳乃彈指一下云者箇便是金剛齊又彈指一下云者箇便是障蔽魔王頌曰開眼也見合眼也見障蔽無頭金剛少面開眼也迷合眼也迷笑殺障蔽和金剛齊説起説住彼此密語六耳獼猴不可同謀那吒太子因緣拈云不可還者非汝而誰且道説底是甚麼法諦聽諦聽廣額屠兒成佛拈云放下屠刀太遲生自言是賢劫千佛一數小家樣子頌曰廣額廣額牛蹄馬脊屠刀屠刀鬼哭神號放下放下之乎者也涅槃涅槃甚麼相干咦楖栗橫肩不顧人直入千峯萬峯去迦葉踏泥拈云迦葉降尊就卑一期垂手則不無爭奈蹉過沙彌問意心圓與麼道蹉過迦葉亦不少樂人作舞拈云兩箇漢出出入入有甚了期心圓今日入城見一隊師子出城見一羣象王有人問心圓出出入入呢向伊道適才錯腳踏殺一箇貓兒倒却剎竿拈云早見恁麼免致魔王藉口四天王腥手汙腳雖然如是迦葉即易阿難却難達磨西來拈云天下衲僧盡道勘破阿師不知都被阿師勘破心圓與麼道是被勘破不是被勘破莫道三十年後窮未來際敢道無人説得何故金毛師子怕癩皮狗慧可禮拜依位而立自後便有一絡索曰莫妄想曰珍重曰秖者是曰呈似了也與夫叉手近前豎拳下喝打圓相作女人拜繞禪牀掀香几擲下拂子拂袖便出種種醜態可謂祖禰不了殃及兒孫不知弄到甚麼年代也呵呵頌曰阿奴姿貌本天然花燭紛紛客滿筵最苦洞房藏不住被人擁出畫堂前覓罪了不可得拈云覓心了不可得不是無心覓罪了不可得不是無罪且心作麼生安罪又作麼生懺須是舉頭天外看始得你若目中生刺我便腦後見腮你若眼裏無筋我便鼻頭有肉咄咄草鋪平野鷹逢兔逐此是誰作亦未見性可稱語意冥符彼此皆知指授即無惟論見性不論禪定解脫前四祖云一切諸法悉皆解脫此六祖云惟論見性不論禪定解脫大乘根熟漸開圓頓法門矣佛法是不二之法三祖云要急相應惟言不二諸仁者要明不二但識取二何謂二自心取自心者是取常是二取無常是二取非常非無常亦是二取善是二取不善是二取非善非不善亦是二乃至取界是二取蘊亦是二取禪定解脫是二取無念無為亦是二你若不取一在甚處是故佛法止言不二不言不一參學人到者裏須是親見親證始得戲論即不可今日若有人問如何是不二之法便與振威一喝六祖云我有一物無頭無尾無名無字無背無面諸人還識否拈云截斷天下人舌頭放出爍迦羅眼睛金剛圈你作麼生透栗棘蓬你作麼生吞吞得透得轉見禍事不透不吞萬劫不了思量擬議已隔千山直下承當白雲萬里宗門中千變萬化機用皆明此事心圓通身是手也拈不出但云賊賊有心人自看自悟去始得切勿學神會作斷佛種性人六祖云葉落歸根來時無口青原云不辭向汝道恐已後無人承當馬祖云我今日勞倦不能為汝説盤山云向上一路千聖不傳溈山云父母所生口終不為子説仰山云我若一向舉唱宗門中事身邊要一人為伴亦無有也長沙云我若一向舉揚宗乘法堂前草深一丈如是之類盡道官不容針豈知已是私通車馬了也六祖云不是風動不是幡動仁者心動馬祖云我有時教伊揚眉瞬目有時不教伊揚眉瞬目有時揚眉瞬目者是有時揚眉瞬目者不是子作麼生百丈野狐公案溈山云有句無句如藤倚樹子意何如雪峰云諸上座望州亭與汝相見了也烏石嶺與汝相見了也僧堂前與汝相見了也臨濟三度上堂云要識臨濟賓主句問取堂中二禪客巖頭至僧堂前拊掌大笑曰且喜堂頭老漢會末後句他後天下人不奈伊何如是之類看似擎頭戴角殊不知挂角羚羊早已絶氣息了也他如把住中有放行放行中有把住以至全身半身入就出就元要殺活賓主照用作家戰將掉鬪埋兵玉線金針明來暗去喜怒機權順逆轉換揚眉瞬目泥刺棉針雙放雙收同得同失觸著便轉轆轆地刺著便屙漉漉地盡情好與二十拄杖何故者箇所在賞罰分明六祖云我不會佛法石頭云恁麼也不得不恁麼也不得恁麼不恁麼總不得馬祖云不是心不是佛不是物藥山云不是不是南院云錯錯高峰云不得不得無門云不是不是萬峰云瞎瞎如是之類秖疑別有商量誰信和盤託出要會麼伸腳在縮腳裏六祖云汝當一念自知非自己靈光常顯現歸宗云一鏃破三關分明箭後路可憐大丈夫先天為心祖三角云若論此事眨上眉毛早已蹉過了也臨濟云若是過量人向未舉已前撩起便行猶較些子資福云隔江望見資福剎竿便回腳跟下好與三十棒僧參石樓問未識本來性乞師方便指拈云聚九州鐵鑄不成者一大錯樓曰石樓無耳朵拈云老僧年邁要且不負來機僧曰某甲自知非拈云靈龜曳尾拂迹迹生樓曰老僧還有過拈云禍入慎家門僧曰和尚過在甚麼處樓曰過在汝非處拈云洗耳汙牛口僧禮拜樓便打拈云直饒知知非非亦未在且道腳跟在甚麼處良遂參麻谷谷見來便將鋤頭去鉏草遂到鉏草處拈云箭過西天十萬里猶向大唐國裏擬議谷殊不顧便歸方丈閉却門拈云為得徹困遂次日復去谷又閉門拈云層層鈍置遂乃敲門谷問阿誰拈云水中洗水遂曰良遂拈云頭上安頭才稱名忽然契悟拈云不因楊得意爭見馬相如他如水潦法會石鞏大珠及五宗下尊宿悟緣甚夥馬祖云若是上根衆生忽遇善知識指示言下領會更不歷於階級地位頓悟本性其或未然且向古人汗臭氣處理會看南嶽云説似一物即不中藥山云千聖亦不識説已説了也識已識了也此後更增一絡索上拄天下拄地孤峯頂十字街有手腳無背面通身飯通身水塞虗空遍大地一味禪一句子以至頭頭物物渾無縫罅可謂字經三寫烏焉成馬類推可知歸宗云光不透脫祇為目前有物雲門云光不透脫有兩般病一切處不明面前有物是一如定山打椑樹省王常侍勘米胡保壽打胡釘鉸睦州勘僧正翠巖勘座主石霜勘裴相之類又透得一切法空隱隱地似有箇物相似亦是光不透脫如南泉勘菴主丹霞勘國師侍者之類又法身亦有兩般病得到法身為法執不忘己見猶存坐在法身遽是一如大覺打興化南院打風穴之類直饒透得法身去放過即不可子細檢點將來有甚麼氣息亦是病如定山勘首座化主勘興教明招勘保寧勘國泰之類俱可類推龐居士云各請自檢好臨濟云達磨西來秖覓箇不受惑底人神藏云知而無知不是無知而説無知香嚴云子啐母啄子啄母殼子母俱亡應緣不錯同道唱和妙云獨腳大陽云周旋往返全歸父繁興大用體無虧烏臼和尚元紹二上座參曰問二禪客發足甚麼處拈云箭無虗發元曰江西臼便打拈云棒頭有眼元曰久知和尚有此機要拈云你分上作麼生臼云汝既不會後面箇師僧秖對看拈云將謂有長處紹擬近前臼便打曰信知同坑無異土拈云孫臏開鋪並無主顧臨濟見僧來舉起拂子拈云勘破已遲僧禮拜拈云有甚麼氣息濟便打又有僧來濟舉拂子僧不顧拈云目前有物濟亦打又有僧來濟舉拂子僧曰謝和尚指示拈云屎臭也不知濟亦打拈云可惜三棒不曾打著半箇石臼參馬祖祖曰我有七棒寄打烏臼你還甘否石曰和尚先喫某甲後甘拈云癩兒牽伴德山示衆道得也三十棒道不得也三十棒濟聞謂洛浦曰汝去問他道得為甚麼也三十棒拈云須知遠煙浪別有好思量待伊打汝接住棒送一送拈云你也沒量罪過我也沒量罪過看伊作麼生浦如教山休去拈云作賊人心虗浦回舉似濟拈云身在帝鄉總不知濟曰我從來疑著者漢雖然如是你還識德山麼拈云蹉過多時了也浦擬議拈云答得一萬語有甚麼用處濟便打拈云正賊走却邏人喫棒老宿參便問禮拜即是不禮拜即是拈云賊濟便喝宿便拜拈云著濟曰好箇草賊宿曰賊賊便出去拈云同道方知濟曰莫道無事好拈云陳敗説兵書時首座侍立濟曰還有過也無拈云把髻自投衙座曰有據款聊結案濟曰賓家有過主家有過曰二俱有過拈云問官不了事好與三十棒濟曰過在甚麼處拈云勾賊入來座便出去拈云見機而作早遲八刻濟曰莫道無事好拈云兩重公案餘可類推百丈再參馬祖挂拂子於舊處祖振威一喝一聲塗毒佛魔皆死黃檗禮佛次沙彌問不著佛求不著法求不著僧求長老禮拜當何所求檗曰不著佛求不著法求不著僧求常禮如是事彌曰用禮何為檗便掌彌曰太粗生檗曰者裏是甚麼所在説粗説細隨後又掌知得馬祖一喝落處便知黃檗一掌落處乃吐舌云馬祖百丈黃檗臨濟是甚麼乾矢橛臨濟半夏上黃檗山住數日辭檗檗曰汝破夏來是何言與何不終夏去是何言與濟曰某甲暫來禮拜和尚是何言與檗便打好心無好報趁令去珊瑚枕上兩行淚半是思君半恨君濟行數里疑此事暫時不在如同死人却回終夏佛法大事顢頇不得後又辭檗檗曰甚處去是何言與濟曰不是河南便歸河北是何言與檗便打濟約住與一掌到者裏才不受瞞檗大笑乃喚侍者將百丈先師禪板几案來濟曰侍者將火來強軍無弱殿檗曰不然子但將去已後坐斷天下人舌頭去在知而無知臨濟到徑山德山參溈山巖頭參德山都親見得者箇道理參學人須證到者箇境界然後語知偏正理識倒邪為人不禍生也濟一日謂普化克符曰我欲於此建立黃檗宗旨弄險汝且成褫我明修棧道暗度陳倉二人珍重下去建宗旨竟三日後普化却上來問和尚三日前説甚麼子過新羅濟便打一噴一醒然三日後克符上來問和尚三日前打普化作麼若不重論蓋代功從前汗馬無人識濟亦打再接再厲乃假如問到窮未來際打亦不歇手濟臨滅謂衆曰吾滅後不得滅却吾正法眼藏未必心頭似口頭三聖曰爭敢滅却和尚正法眼藏眼觀東南意在西北濟曰已後有人問你向他道甚麼金將火裏試聖便喝入水見長人濟曰誰知吾正法眼藏向者瞎驢邊滅却兩箇駝子廝撞著世上由來無直人大覺臨終時謂衆曰我有一隻箭要付與人老漢面皮厚多少時有僧出曰請和尚箭是泥是刺覺曰汝喚甚麼作箭僧喝刀刁相似覺打數下雖然如是尚須再勘便歸方丈却喚其僧入來問曰汝適來會麼別緇素定龍蛇曰不會元來一喝秖作一喝用覺又打數下苦苦擲却拄杖曰已後遇明眼人分明舉似堪笑堪悲興化開堂日拈香云此一炷香本為三聖師兄三聖於我太孤本為大覺師兄大覺於我太賒不如供養臨濟先師此一炷香天上天下無人證明不如供養貍奴白牯免得瞎眼相爭興化示衆曰若是作家戰將便請單刀直入更莫如何若何旻德出衆禮拜起便喝化亦喝德又喝化亦喝德禮拜歸衆化曰適來若是別人三十棒一棒也較不得何故為他旻德會一喝不作一喝用兩箇老漢向十字街頭相逢却在千峯頂上握手千峯頂上相逢却在十字街頭握手雖然著著有出身之路其奈靴裏動指未免旁觀者醜南院云棒下無生忍臨機不見師拈云你一向作主底風穴上堂舉世尊以青蓮華目顧視大衆乃曰正當恁麼時且道説箇甚麼若道不説而説又是埋沒先聖且道説箇甚麼大似嚼飯餧嬰孩首山拂袖而出不受塗汙眼空佛祖懸崖撒手自肯承當穴擲下拄杖歸方丈付法已竟次日山上問訊穴曰作麼生是世尊不説説言下更搜看山曰動容揚古路不墮悄然機寒灰發焰枯木重花絶後再蘇欺君不得汾陽參老宿七十一人作五位偈呈石門徹説得道理好徹稱善有甚麼氣息最後見首山山問百丈捲席意旨如何對病藥又却是鉤頭餌陽曰龍袖拂開全體現呈甚麼見解因問山意如何山曰象王行處絶狐蹤如喪考妣陽大悟言下拜而起曰萬古碧潭空界月再三撈摝始應知衣錦繡入來一絲不挂直得琉璃殿上行撲倒也須粉碎要識汾陽老子麼見何道理便爾自肯慈明參汾陽二年未許入室每詣陽陽揣其志偷心不死學者大患必詬罵使令者或毀詆諸方及有所訓皆流俗鄙事只此一著千聖不傳一夕訴曰自至法席含血噴人已再夏不蒙指示瞎漢納敗缺好與痛棒但增世俗塵勞念歲月飄忽一肚皮帳在己事不明失出家之利令人噴飯語未卒陽熟視罵曰是惡知識深錐痛札敢裨販我尋腥逐臭見箇甚麼怒舉杖逐之萬仞崖頭垂手明擬伸救子過新羅陽急掩其口明忽大悟只此一著千聖不傳曰乃知臨濟道出常情楊岐問幽鳥語喃喃辭雲入亂峯時如何一向與麼去又爭得明曰我行荒草裏一向恁麼來成箇甚麼汝又入深村兩頭坐斷甚處出氣岐曰官不容針更借一問壁立千仞和泥合水和泥合水壁立千仞與麼與麼不與麼不與麼全與麼全不與麼一齊拈却然後三要印開朱點窄未容擬議主賓分明便喝猶生死句當天絶一喝滄溟徹底枯岐曰好喝昔年百丈耳聾今日楊岐眼瞎明又喝瞎岐亦喝瞎好手手中呈好手紅心心裏中紅心明連喝兩喝瞎瞎汝如是吾如是第一句下明宗旨岐禮拜依位得髓明曰此事是箇人方能擔荷你不是者箇人岐拂袖便行滅却臨濟一宗異日兒孫遍天下非偶然事也白雲端謁楊岐岐一日忽問受業師為誰端曰茶陵郁和尚一箭過頂岐曰吾聞伊過橋遭攧有省作偈甚奇再箭洞胸能記否楊岐却記得白雲忘却也端誦畢岐笑而趨起殺人刀活人劒端愕然通夕不寐黎明咨詢之白雲猶記得楊岐忘却也適歲暮岐曰汝見昨日打驅儺者麼烏頭方不驗籬根下再拾一莖草曰見心言直故中間永無委曲諸相岐曰汝一籌不及渠十載寒窗半生勤儉付與東流水端復駭曰何謂也岐曰渠愛人笑汝怕人笑心言直故中間永無委曲諸相端大悟者回塵盡光生照破山河萬朵且道伊悟箇甚麼一層兩層千萬層金剛寶塔矗瓏玲數到梵天不計層梵天倒數金剛際向下層名最上層層層層到無層處萬轉千回只一層一層兩層千萬層喝五祖演云吾因茲出一身白汗便明得下載清風陋巷不騎金色馬回途却著破襴衫且道下載後又如何瞎瞎圜悟云少年一段風流事祇許佳人獨自知始明得從前盡其機用祖皆不諾為不肯負心虎邱隆謁圜悟一日入堂悟問曰見見之時見非是見見猶離見見不能及那邊不能與汝道得舉拳曰還見麼者邊通箇消息隆曰見悟曰頭上安頭三世諸佛沒奈何隆聞脫然契證悟叱曰見箇甚麼隆曰竹密不妨流水過事與藥山在馬祖處悟得石頭語相似要見瞌睡虎麼直是針劄不入録中尊宿不妨盡拈篇幅狹姑止此如上所引管中窺豹未及一斑然已千變萬化不可端倪莫能測識子細檢點將來也秖到得者裏古人到者裏為甚麼不肯住為伊途路不得力如何是得力一句咄看腳下佛意難窺祖風無朕火蓮殷勤咨於不敏為迷源流略識標準撑月珊枝抽條石筍如筈拄空如牛脫紖不住無為有為不盡力用匪虧號無生忍舉一明三囊錐出頴齧鏃機先由基射窘智別權差千畦萬畛折合歸來付之一哂信具自心腳跟方穩勉勉同人弗替斯引甲寅夏杪破戒居士心圓氏識參學人磨裩擦褲踏破草鞋三二十年尋不著路頭一經層層指出左右逢原社火家依樣畫描承虗接響機關者回掌血棒痕洞筋擢髓然則疇非朗智珠在抱孰不秉慧劒當陽運出自己家珍方許千途合轍讀指月傳燈者一向迷悶至此豁然還獲本心心圓雖則費盡貍涎與杜口毗耶何異若其悟力未充知非不盡蓋覆靈光無從顯現僅資口耳記持遂成葛藤露布不獨孤負心圓自戕慧命不小普願讀此編者人人作難遭之想發慙愧之心也火蓮謹跋
