body:
  text: 心圓居士拈別火蓮居士集梓六祖下第三十六世南嶽高臺不退行勇禪師古杭錢塘韓氏子自幼好佛至年二十有一亟欲出塵父母不許遂夜遁至界山禮靜主衍雲披削偕全菴進公參大覺老人於報恩力究父母未生前話因同衆普請見僧荷空畚行有省一日侍覺次覺問僧轉山河大地歸自己則易轉自己歸山河大地則難如何會師從旁徹法源底時年二十有五後猶脅不至席朝夕參請日臻元奧覺謂師得地之後廢寢忘餐者吾所僅見屢命分座師力辭結茆大雄山之雲覆菴丙戌冬覺北游師於報恩綱維首衆三歷寒暑為人懇切接機迅利遐邇欽慕戊子春覺自荊山寄伽黎法偈與重豐峰三人同時記莂春季覺南回結夏大雄至冬過報恩特命師立僧秉拂己丑春覺退居大雄崇福師應請住吳興法海辛卯秋涉廬登衡衲子向風而往請開法於衡之天臺僧問如何是鐵蛇鑽入金剛眼師云墨池裏龍眠如何是崑崙騎象鷺鷥牽師云海上犀牛獨足立如何是海底泥牛銜月走師云露柱懷胎如何是巖前石虎抱兒眠師云平地起骨堆師隨示一偈云狗銜燈盞街前去老鼠偷鹽咳嗽歸露柱堂前驚破夢開門雪裏放烏龜我此四句內有一句有權有實有照有用能縱能奪能殺能活若簡得出許汝買草鞋行腳速道速道僧擬議師直打出二僧作禮師云你兩箇都是參無位真人的試道看二僧無語師云我昨日做箇夢夢一箇日本國人到江西出碗的所在請一尊磁器觀音把箇金漆桶裝了載到本國臨上岸忽然繩斷把船都打翻了連觀音大士也不見了乃隨聲推倒桌子觀音出現僧問如何是學人鼻孔師云你無鼻孔進云尋常向甚處出氣師掌云向你道無鼻孔又問甚處出氣居士請開示師云曾見甚麼人來士云曾見大雄和尚來師云那裏相見士云齊堂相見師拈棒直打出師召一僧云我不問你工夫與我請一尊佛來代僧劈面掌云南無鈍置佛僧請佛至師接縮手云道不得即與你待伊擬答劈面擲得吹兩吹僧擬議師便打僧送茶至師接得便掌何不回敬一拳云某甲過在甚麼處師豎起二指一案未銷又一案僧擬議師又掌師凡見僧入便搊住問云你有幾隻眼睛正好劈面掌僧擬議師便打出僧問泗洲大聖為甚麼在揚州出現師便打進云無師下手處好與打趁出師又打僧擬議師又打僧禮拜云更深漏盡請師尊重師以拄杖畫一畫云道道僧以袖抹之五更鼓拿犯夜師連棒打出問如何是本來面目師云連我也不識僧擬議師便喝問僧背後的是甚麼掌云且打面前底僧云那裏看他見師云無鬚鎖子兩頭搖僧擬議師便推出僧參師問那裏來進云下路師云下路不見你者僧進云請和尚高著眼師云何不禮拜僧便作禮代云禮拜不辭卻須道過師云喪我兒孫師問監院喚作竹篦則觸不喚作竹篦則背速道速道院喝師亦喝院又喝師以竹篦畫一畫院擬議師連棒打出問父母未生前如何是學人本來面目師云三家村裏牛只有一隻角結制小參問大開爐鞲煅凡成聖未離兜率未出母胎如何通信師云霜打芭蕉光碌禿進云已離兜率已出母胎又作麼生師云頭破作七分師乃云三間破屋通天眼七尺烏藤抹太虗要明臨濟三元旨荊棘林中舞柘枝昨夜無位真人倒騎三腳驢子直上萬仞峰頭欲與諸人通箇消息驀卓拄杖下座小參師云未離兜率已降王宮未出母胎度人已畢有瞥地的麼乃說頌云新羅國裏火灼吳越石人燒腳志公拋却杖頭剪刀打倒天台國清寺裏豐干住底牆壁汾陽太子院裏驀然聳出一隻匾嘴高郵野鴨逢人便低頭云師太師太乃左右顧視云會麼良久云元沙去後無消息紅白枝枝不著花小參師云即心即佛文殊著賊非心非佛普賢呌屈不是心不是佛不是物觀音菩薩摸著了一箇毛頭大結十字街頭驀然撞著了大肚子彌勒放下布袋呵呵大笑云青天白日為甚麼著賊入室小參師問僧雪峰輥毬道吾舞笏天龍豎指魯祖面壁還有優劣也無僧云師又作麼生師以手斫口作呱呱聲衆罔措師云一聲羌笛離亭晚君向瀟湘我向秦又僧問某甲與師燒作兩堆灰向那裏相見師云腳破草鞋穿小參師云南泉道昨夜三更失却牛天明起來失却火者老漢滿口道祇道得八成勇首座昨夜三文錢買箇黑老婆頭又匾眼又大欲與諸人相見恐諸人笑我乃作女人拜云大衆萬福入室小參師示偈云無蹤跡處著思惟極著思惟猛自疑驀拶髑髏俱粉碎鴉巢飛出鳳凰兒復云無蹤跡處莫錯過白鼻崑崙當路坐昨夜火燒四禪天四聖六凡無處軃軃得過髑髏缺半箇等閒一掣掣得開三箇老婆對面坐小參老鴉嘴上挂油瓶月落寒松著一驚失口一聲連嘴落逢人連呌兩三聲且道呌箇甚麼驀喝一喝小參僧問實無衆生可度和尚為甚麼有者許多師拈棒云你見箇甚麼進云實無衆生可度為甚麼用打師云情知你作打會乃云頻呼小玉元無事祇要檀郎認得聲昔日世尊初生一手指天一手指地云天上天下惟我獨尊此是世尊向威音那畔拈起寶刀瓜分天下令人返本還源無奈索訶世界都是認奴作郎喚鐘作甕賴有韶陽老漢云我當時若見一棒打殺與狗子喫貴圖天下太平韶陽老漢禁石女不生兒勇上座據欵結案通箇消息令諸人一飽便休衆佇立師遂說偈云甕裏烏龜變作雞啞子開門飛了去𭺗起跌倒握得來明明者是向誰說師落堂云眉與目相去甚近為甚麼不見莫非被鼻子礙了衆無語師云莫道無生死便出堂開爐小參銅頭鐵額諸禪客肘後橫懸奪命符尚有火爐吞不下氷霜肝膽細磋磨驀然南斗北翻身赤縣神州火裏坐擲拄杖召衆云看火便下座謝兩序小參少林面壁白玉琢成西子骨雪庭肘墮黃金鑄就伍員心六耳不同謀一華開五葉驀喝一喝高聲召新充兩序下座小參師云驀眼撒沙看不得栗蓬刺口吞不得連腮便掌擬議不得劈脊便棒回互不得臨濟未是白拈賊且道山僧具何眼目卓拄杖云有約不來過夜半閒敲棋子落燈花小參師豎左拳云奪人不奪境豎右拳云奪境不奪人握左腕云人境兩俱奪握右腕云人境俱不奪汝等諸人性命盡被拳頭一口吞却了也若向者裏轉得身吐得氣鯨吞海水盡露出珊瑚枝若轉不得身吐不得氣卓拄杖云來年更有新條在惱亂春風卒未休小參舉古人云山中何所有嶺上多白雲只可自怡悅不堪持贈君磬山師翁呵呵大笑云白雲是誰家私物以拂指空云看看師云二大老書雲畫空高臺即不然山中何所有惟有兩堆柴分付與火頭燒盡再安排其中有一句不恰意有人檢點得出分付拄杖子上大人收拾起爾小生可知禮僧出云一片柴也無師云夢裏惺惺又僧云用兩堆作甚麼師云韓獹逐塊又僧云山窮水盡安排箇甚麼師云凍殺餓殺乃顧視左右下座順治乙未春師志厭紛雜𢹂杖別峰掩關一室屏絶給侍效西峰死關遺意至五月六日師示疾初八酉刻召侍僧豎一指示之侍僧曰不會師復豎二指瞪目視之侍僧罔措乃跪求遺偈師接紙云信手拈來一筆寫盡都盧丟在大江東連畫數圓相擲去乃自起趺坐以兩手拭面泊然而逝師生於明萬歷丁巳九月十九日示寂於清順治十二年乙未正月初八春秋三十有九僧臘一十有七明年弟子超真等迎骨歸建塔於江陰敔山祖席之中灣峰公為之銘湖州武康縣報恩寺美發行淳禪師福建延平府將樂縣人俗姓熊十四而孤十八婚娶生一子年二十妻子相繼而歿畏身世無恆決出家之志投舅氏惺如公剃落首參壽昌閴然謐禪師閴即以大器期之一日見古德垂示云一口氣不來向甚麼處去疑情頓發不覺放聲痛哭乃奮臂揚言云一切是非莫管直趨無上菩提師亦不知李都尉有是語也浪杖人繼席壽昌遂納具自此工夫尤加精進冬夏惟一衲一苧布單衣祁寒之際編草裹腹絶不以淡泊攖懷癸未冬過博山入堂遂誓云大事不明不出此堂工夫逼拶至四十餘日如老鼠入牛角相似忽被面前堂磬一觸全身如在網羅中跳出年方二十有七遍歷閩中江右叢席俱信宿少留迤邐至金陵邂逅與然緯公時大覺老人道望高海內即日腰包同往值老人行腳歸大雄師乞單入堂老人懸牌垂問云佛未出世道將一句來有同堂僧某以叢林頭角自許謂師曰我與兄語當面呈之師即抱牌入方丈云和盤托出老人云山僧今日困師禮拜過一邊立某僧云蒼天蒼天老人云客作漢直打出復顧謂師云汝這一轉語可作我維那次日結夏即命師綱維首衆夏中受老人拳踢最多每謂人曰若不克意來參老人焉知有與麼事所謂悟了不見人十箇有五雙杜撰也至七月解夏與䒢溪森公等九人同受記莂處師為第二座自此執侍左右未嘗少間老人日以趙州勘婆白雲入磨房勘五祖話問師凡下語老人輒詬罵不已一日復舉問師曰既是拈也拈得頌也頌得悟也有悟處因甚却道未在師云粉牌不著白老人云說也說得是見也見得到祇是未在師參究纍日忽見白雲五祖面目遂舉似大覺老人曰這回謾某甲不得也覺云更與你三箇未在師云恩大難酬便禮拜而出次日侍老人喫粥次老人曰會得末後句底喫鐵棒有分師云這老漢腳跟未點地在老人云果然少不得師云且喜老漢腳跟點地覺云轉見不堪師便禮拜覺云粥後來領棒師云劒去久矣乙未冬游臺山掩關紫柏洞三閲寒暑戊戌重歸報恩一日覺謂師曰臺山婆子為汝勘破了也這裏合下得甚麼語師云作家宗師宛爾不同覺云那裏是趙州勘破婆子處師云明破即不堪師復呈勘婆頌云芻犬吠明全不露木雞子夜正明歌一曲兩曲無人會雨過夜塘秋水多覺撫几稱善辛丑春師乞假入閩葬親度夏蚌坑於經行次勿憶百丈囑溈山時節若至其理自彰之語驀然打失布袋始信大慧禪師云大悟十八遍小悟不記其數非欺人語時年四十五矣後出嶺舉似老人老人云茲與我江上水關契證處合所謂不住始覺冥合本覺參得涅槃堂裏禪未能透徹此關自利即得為人則禍生今時佛法虀腐極矣能透此關是不易得法道重任在子厚自愛遍謂入室弟子曰還西堂得中禪狀元汝輩落渠後也師愈自韜晦康熙乙巳夏侍老人入天目重開師子正宗禪寺老人舉師立僧示衆云旁知曲解豈堪論一悟為休眼正昏不負南詢趙州老無賓主句撼乾坤要知無賓主句麼問取堂中淳首座丁未秋奉老人命受息齊金太傅岵瞻戴京兆請住武康報恩法席入院上堂緗水龍淵浮玉山草年冰雪侍師顏無端推出成狼藉滿面慚惶何處安行淳雖親依老漢二十餘年並不參老漢禪亦不曾得老漢說話祇是被老漢罵得徹骨徹髓身心頑了一味瞌睡佛法總未夢見記得幾則古人因緣在肚皮裏安排今日寶華王座上闡揚佛祖宗猷開煥人天正眼不意來到野貓洞口打一箇噴嚏都忘却了一字也想不起來祇見金輪峻峭萬木森嚴山青水碧鵲噪蟲吟秋風颯颯秋雨蕭蕭緇是緇素是素鐘是鐘聲鼓是鼓響一一現成一一明妙一一為諸兄發向上機一一為諸兄轉大法輪一一從自己胸襟流出所謂我本無心有所希求今此無盡寶藏自然而至大衆前是山門佛殿後是方丈寢室左是齊堂右是禪堂且道無盡寶藏在甚麼處若無此語幾不成話驀卓拄杖下座示衆舉石門一喝分賓主師云醜舉止照用一時行師云轉見不堪會得箇中意日午打三更師云狗子尾巴書梵字野狐窟宅梵王宮冬至上堂萬疊山含荊岫玉宜黃人唱晉江曲冰河發焰梵天紅燕地冬生閩地竹咄是何物驀豎拂子云大衆衆舉頭擲下拂子云鶻兒已過琉球國便下座示衆春雲靄靄春雨濛濛開眼不見天地合眼不見虗空衲被蒙頭坐憨憨瞌睡濃通身黑漆漆正眼自光通三百六十骨節節節現無量聖身八萬四千毛孔孔孔出金聲玉振雖然猶是無風匝匝之波且道如何是出格一句雨散雲收後崔嵬數十峰可憐一句合頭語留為萬口繫驢橛晚參古佛心千萬世只如今祖師意針眼魚吞鱉鼻墻壁瓦礫放光明演說如來真妙諦驀拈拄杖卓一卓召大衆云現在買賣不離行市晚參對一說日可冷月可熱倒一說桃花紅李花白雲門不善諸佛機惹得旁人說是非且作麼生是諸佛機破蓑衣蘊荊行璧禪師楚人參大覺於崇福真切體究未嘗輕發躁露後坐精進三次日上方丈謂覺曰某有箇見處覺曰狗子因甚無佛性師拳覺肋下云一向在趙州處落節今日要和尚處拔本卻不道已是折本了也覺便推出次日復上方丈覺云盡大地火發得何三昧不被燒却師曰特來度夏覺便喝師呈偈云圓似滿月圓寬同太虗寬歷劫無姓字從來絶躋攀聖凡由此出剎海任伊安始終無變異觸處善隨緣覺云還會適來一喝麼師便出師土木形骸悟處頴脫後竟不知所終蓋西山之流亞歟武康報恩寺骨巖行峰禪師烏程溫氏子幼業儒尤信佛乘年二十一投舅氏陽山授和尚剃髮授示寂奉遺命參報恩大覺老人一日聞覺示衆云但向父母未生前薦取自然廣大圓滿師於言下有省是冬覺過宜興海會不退勇公在堂綱維一衆賴以提䇿退一日問師本來面目還喫飯麼師曰那一件不是箇中事退劈面便掌師曰師兄又作麼生退復掌云還你飽齁齁地師從此頓開生面密舉五宗綱要一千七百公案毫無疑慮乃舉似退退曰大修行人還落因果也無師云不落因果退曰恁麼則墮野狐身也師云賴遇是某甲退喜見顏色令師趨海會以所得呈覺覺詳悉勘驗乃書一偈云自慚福德真輕薄十載追隨有數人近日傳來消息好鼇山阻雪事如新鼎革後覺遠遊淮北師腰包尋訪年餘至鳳陽懷遠縣始遇侍覺荊山之普陀菴度歲一日覺問如何是日中浩浩時昨得主師云真不掩僞覺曰如何是夜間睡夢時作得主師云曲不藏直覺曰正睡著時無夢無想無見無聞主人公在甚麼處師連答數語覺俱不肯到此從前所得都用不著日日靠空棺材如有氣死人一日到老人前老人又問師云家無二主覺曰一箇驢子繫在橛上師即大豁所疑急趨前別前語云時值天寒請和尚保重覺曰此間難得禪和到與你一盞茶師云看者老漢今日一場敗闕覺曰何不早恁麼道師便禮拜檀越請升座舉千巖長祖頌文殊問維摩不二法門因緣云鐵笛橫吹宇宙清蝦蟇蚯蚓解翻身知音不在千杯酒一盞清茶也醉人師呵呵大笑云千巖老祖美則美矣若是如今叢林淡泊衲子饑餓如斯言句却不相當今日雲間衆信入山供衆山僧應時及節重頌此案舉似諸人文殊多口維摩默往古來今見不全却喜雲間居士會饅頭米飯飽鼾鼾喝一喝卓拄杖下座康熙丁丑六月二十六日遍至各寮從容談笑且誡曰老僧不復來矣宜自修省毋恣空過至次日酉刻吉祥面壁而逝世壽七十九僧臘五十五湖州武康報恩寺棲雲行嶽禪師烏程沈氏子世為望族少補廩庠始以居士身參大覺老人於報恩順治乙酉投覺披削丁亥秋事覺於淮北乞食炊給之餘覺力為錐劄一日問覺空索索地錦豔豔錦豔豔地空索索時如何覺云待你到此境界與你道師禮謝覺云者漢多時妄想今日始斷師有省庚子春侍覺應詔還山入天台桐柏宮草衣木食習頭陀行者三閲寒暑癸卯春覺命繼席報恩晚參師云彌勒真彌勒起模畫樣分身千百億揑目生花時時示時人郎當不少時人自不識略較些子召大衆云還有讚歎分也無將此深心奉塵剎是則名為報佛恩晚參師云入秋時節不相饒西風吹雨池塘暮古殿松陰宛轉開鐘聲透過山前路急回顧是甚麼解制後三日晚參僧問涅槃心易曉差別智難明如何是差別智師云春打六九頭春雨灑不歇進云如何是涅槃心師云百花枝未動今年信較遲乃云祖師心印非長非短能方能圓無相無貌有彩有文天下衲僧廝結眉毛結即印破盡山河大地日月星辰人物草木一破一切破天下衲僧解開布袋解即印住盡山河大地日月星辰人物草木一住一切住或有箇漢出來憤憤悱悱道說甚麼印破印住和者印子一擊百雜碎嶽上座不免呵呵大笑雙手作遞印子勢云請試下手看掌云不奈船何打破戽斗蓮云我當時若見但鳴指三下出去落堂師問東單衆云西單無為甚東單有問西單衆云東單有為甚西單無師呵呵大笑云誰家別館池塘裏一對鴛鴦畫不成康熙丙午冬十月某日示寂於報恩之西方丈世壽五十三僧臘二十二塔於寺之養親草堂左隴報恩西堂寂菴行洽禪師汝州光邑王氏子孤苦絶塵矢志萬行到處陸沈衆中尤行業純謹後參大覺老人於報恩覺示以未生前話每徵詰師無對覺云你恁麼參禪水也消不得師直得垂淚同衆坐不臥七覺問甚麼物恁麼坐師云總沒交涉覺便打師無語覺痛打一頓中夜釋然舉似覺覺頷之時年二十有三師因看病回覺問有氣死人是你救活了無氣死人作麼生救師指旁僧云何不祇對和尚覺云他已喫我三十棒了你自道師云和尚著甚死急覺云念汝看病辛苦一日覺指楊梅問一樣楊梅因甚有紅有青師云和尚合取口覺頷之覺垂問道通無礙因甚一片竹窗關斷月師云和尚道甚麼覺云須是他喫得棒覺問紫羅帳裏撒珍珠汝作麼生道師云拖泥帶水覺云向古廟裏軃得過時如何師云吹毛用了急須磨師問僧死了燒了你向那裏去僧云一念不生無來去師云向一念未生前道進云吞却須彌了也師云你試吞者火爐看僧無對師便打復顧旁僧云你與他代一語看進云喚作火爐那師便喝師一日同不退勇廊下行次退驀拈一毬擲師師云那裏得者箇來退以毬便打師大笑而去至晚入退寮於桌上畫云午後底午後底復作此相云作麼生作麼生遂將毬子收過退少間自外歸亦書此云賊賊把將來令行者送至師寮師將毬了付行者云也是雪峯道底退又書相云幾人於此茫然師云直饒恁麼也只是弄泥團漢雖然若人檢點得出直須僧問䇿杖理民時如何師云天下歸仁焉進云棒上成龍又作麼生師云終不貴僧問如何是三世諸佛不知有師云燈籠露柱長年困進云如何是貍奴白牯却知有師云脫殼烏龜飛上天杭天目山全菴行進禪師武林沈氏子生數月而孤至年十二母命投無諍寺隱松禪師出家後思求出世正因往參天童密老和尚遂進具嗣往報恩參大覺問某甲生死未明求和尚開示覺曰將生死來與汝開示師茫然是冬遇林叟指參金粟有同參問曰兄生緣何處師云瓶窑參曰到報恩多少師曰二十五里參云啐你處現有古佛善知識不參反來者裏正如瞎貓跳過魚盤喫豆腐也師唯唯一日因往若山訪同戒投林叟宿林云你去金粟住又來何幹師以前事實告叟作色曰我却瞎了眼將謂你是箇有志氣底人勸你去親近善知識你今破期出堂將來期期如此他日誑騙人我住若干叢林參若干知識者樣沒血氣底枉相為你師被呵直得慚悚無地遂回金粟滿期明年三月重至報恩師後嘗曰從此一住二十三年實賴林叟激發之力覺見師誠實痛下針錐師自恨障緣深厚不能一撥便轉或捐鉢資或賣衣物攢米打七徹夜參求不知其幾至年三十八歲時覺北行不退勇公綱維見師工夫得力當衆稱賞師七終不得透徹放聲大哭次早詣寮致謝仍流淚不已勇慰曰和尚不在家兄去親近理安和尚亦可師曰某在此親近和尚十來年如此不青不黃有何面目別去見人者樁大事必求吾兄為我了斷某已辦得石米欲上證果菴討箇分曉乞兄早晚提誨勇大喜即送師上山研究一七有餘忽地春風大作打開門戶師當下猛省喜躍無量時勇往雲覆菴師即星夜越嶺相見勇云全兄何得夜來師云某甲捉得賊特來出首勇云為甚文殊出女子定不得師云莫謗文殊好勇云為甚罔明出得師才擬議勇攙前云喂咍師茫然無對值覺回大雄趨往瞻禮一日覺垂語曰古人道休去歇去一念萬年去寒灰枯木去古廟香爐去一條白練去且道明甚麼邊事師同衆下語覺徵云龍得水時添意氣虎逢山勢長威獰是汝道底師云今日親見和尚又一日入室覺問萬法如何歸一師云海納百川覺云一歸何處師云波生浪湧覺曰腳跟下與你三十棒師掩耳而出自此投機命充副寺一日因禪者呈香巖上樹頌觸著向問勇公此話咬嚼不破自謂此話不透則從前發揮公案皆未穩當遂將拈頌稿一時焚却辛亥老人命師上天目一夕諸兄弟同在老人室中因舉上樹話至虎頭問處覺厲聲云甚麼虎頭上座狗頭上座師當下礙膺之物豁然蕩盡遂當衆頌上樹話覺大可之後出世住興化極樂院既而遷荊溪海會寺庚申仲夏應請主持天目辛未春復應請崇福僧問盡力道不得底句誰是得者師叉手云慚愧別云三千里外聽淆訛僧云得後何如師云兩粥一飯別云胡餅裏呷汁進云忽遇出格人來又如何相見師云打退鼓別云三十棒僧問大死底人却活時如何師云只得一橛別云你活看進云不許夜行投明須到時如何師云此夜一輪滿清光何處無別云念言語漢昭覺丈雪醉禪師內江李氏子襁褓時禮古字山清然師為徒性冲淡於世邈然入道之根因讀法華經乃至一舉手或復小低頭皆以成佛道默計曰成佛與麼易耶遂質本師師罔措圓具後遍參諸方至破山問僧問雲門如何是佛門云乾屎橛意旨如何山作臥勢云老僧不參禪祇愛伸腳眠師疑駭動靜如一箇有氣死人相似一夜因倒穿了鞋腳套不上擬伸手忽然有省參天童一日上太白頂拖柴因竹簽傷足血迸汙地忽聽梆鳴聲震山谷忽然大悟進方丈作禮云某甲有些暢快密作聽不清勢師便打噴嚏密打云那裏失利來者裏拔本師又兩喝密連打云翻不暢快了師拂袖便出復至蜀謁山山問你從南方走一回帶得甚麼寶物來師豎一拳山曰別我七八年一點氣息也沒有師曰若有氣息則不歸了山肯之後住成都府雪居禪院晚參山僧一夏已來妄談般若生身墮舌犁耕地獄正與麼時阿誰隨侍溪聲首座云自作自受師云我識得你復云既是無人替得冥應罪緣毫髮不來因甚三門廚庫被蠛蠓蟲吞却老僧於須臾頃遊遍一十八重地獄末後為衆兄弟撥轉今昔關頭去也拽杖打散歸方丈上堂物物有密語直捷直到底七佛祖師來兩眸擡不起林下人十中有九捕不及時大憨維那一喝師云好人不肯做又去屎裏臥示衆云靜明無隔夜禪與人參復拈拂子云而今有也拂一拂云到與麼也未居士問一口氣不來時向甚麼處安身立命師劈面一掌士擬開口師復掌士請開示師云待汝一口氣不來向汝道一日又問一口氣不來向甚麼處安身立命師打一拂士擬開口師復打士云弟子不會師云賴汝不會若會黃河水也須倒流三千里百城著禪師奉節縣沈氏子三歲解準提解結二呪其後博通五經天文地理諸般術數十四遊泮十六選拔身羈功名心嗜佛典偶見破山禪師語録偈云我為生死來出家何須更算海中沙無常煞鬼卒然至錦繡文章亂似麻遂棄官禮大年師披剃具足後遇竹帆禪師指參破山禪師相依有年總不得脫灑一日山喚師答話師才作禮山驀頭一踏師豁然大悟喝一喝山云再喝看師拂袖歸堂遂呈偈云本地風光處處知芒鞋筋斷絶纖疑幾回踏破山頭月帶露和煙憩隴西山肯之住順慶府渠縣興國寺上堂運水搬柴只自知神通妙用總由伊算來不費些兒力何必三三兩兩疑僧云不疑底人來也師云須彌山王在那一劫中與你說破僧沈吟師便打者僧未有喫棒分在上堂劈不成兩揑不成團是箇甚麼指足云一隻草履爛却半邊不得周全適才猶是好好底隨後咄云囈語作麼師因雪背師兄問道得一句是吾真弟師打一掌背休去師云不可向鬼窟裏作活計背呵呵大笑師云也未見得師入堂野湘驀抱云正恁麼時如何師打一掌湘沈吟師又打一掌師圍爐湘隨至問云畢竟如何師拈火示之湘後契悟師云你何不謝我湘拈一粒豆置師碗中師云今日收得一主冷帳黃州黃陂素山冲然義禪師於燕京西山一僧戴雲尖帽穿朱履著跨鶴衣拜曰和尚還識得否但向伊呵呵道有趣有趣師拈棒曰不是儒不是道俗人頭戴僧官帽連棒打趁其僧渾身脫却赤體問曰和尚今又如何識我好更向伊呵呵云也好也好師亦打曰脫却皮毛換却骨難逃法眼破重迷僧悲感禮謝而退康熙壬戌春師預期辭世至二月十八午時上堂訣衆叉手而逝塔建本山蔣山芥菴大禪師小參師云捲簾除却障閉戶成塞礙祇者障與癡古今無人會無人會三箇成羣四箇逐隊君不見臺山路上驀直婆明州市裏憨布袋曬藏上堂釋迦老子四十九年三百餘會口勞舌沸演出一大藏教天人龍鬼神無不頂戴奉行誰知落在我祖師門下被人喚作拭瘡瘤底故紙今朝六月六日諸檀攀條攀例來此翻曬若也彼既無瘡自勿傷之其或未然好將此故紙拭淨你底瘡瘤且那裏是你底瘡瘤故紙又作麼生拭你若生五戒十善底瘡瘤將人天故紙來拭你若生三途六趣底瘡瘤將輪回故紙來拭你若生無明煩惱底瘡瘤將真如解脫故紙拭你若生四果四向底瘡瘤將聲聞故紙拭你若生六度萬行底瘡瘤將菩薩故紙拭你若生火宅底瘡瘤將三車故紙拭你若生安養底瘡瘤將彌陀故紙拭此猶是已驗之方對症之藥未出教乘極則更有般蹊蹊蹺蹺古古怪怪底瘡瘤三種病二種光透之不脫明之不得惟我衲僧分上為害為冤所以道燈心刺著石人腳火速去請周醫博路逢龐公相借問六月日頭乾曬却大衆且道曬乾後又作麼生奉持山僧為說陀羅尼而守護之以兩手捻拳連叩齒云金吒金吒僧金吒護金吒吾今為汝解金吒終不為汝結金吒唵吽吽泮泮娑訶下座晚參云乾坤之內宇宙之間中有一寶祕在形山大衆如何是你形山底寶一僧云月色和雲白松聲帶露寒師云我不答對不吟詩只要問你形山底寶僧禮拜師云禮拜且置雲門道將山門來燈籠上又作麼生會僧擬議師便喝一僧拜云深領和尚者一問便出師復喚來云領後如何僧云密不通風師打云將謂是南番舶主元來販私鹽漢小參秋風清秋月明梧桐葉已落丹桂又香生長空歷歷鴈過高樹啾啾蟬鳴說甚西來祖意太煞十分現成楊美之郭君建不依本分錯路修行來我興善寺裏朝三暮四念他白雲老子底上大人乃呵呵大笑歸方丈楊美之一大藏郭君建千七百恁麼會得愜芥菴意未愜心圓意且道心圓意作麼生喂咍晚參入院以來一月人事奔忙不徹日日愁米愁柴佛法無暇打疊大衆一體人情苦苦煎逼要說大似缺他錢債還本還利無歇興善雖則臂長袖短今晚不免盡情抖擻了罷遂提起衣袖連抖數抖云大衆多得不如少得少得不如現得年窮歲畢以後再不要上門上戶來索取晚參若起紛飛之心即究紛飛之處究之無處則紛飛之念自除返究究心則能究之心安在正恁麼時如何抱石投江惟人自肯乃方親台州淨居湛菴常禪師四明鄞邑吳氏子依金粟悟得度圓具隨悟遷天童因陶瓦乏人命師執役五載每求進堂悟曰此事不拘內外貴在篤信師即矢志不進堂決於透徹以作堂外榜樣一夕閲悟語録曰何不向棒頭指處看忽然知得棒頭落處次早呈悟印可之示衆一言不相赴知君太罔措即此罔措時便是汝出路擬向別處討驢年不得了年老覺心孤誰知多落草明州雪竇宏遠詔禪師族姓王越之觀海衛世胄也母一夕夢老人送和尚入室而誕師總角脫白參念佛是誰依天童悟祖力究不契後謁石奇雲於靈鷲看雲門東海鯉魚話有疑一日侍雲次值旁僧舉問此話雲便打僧又問雲又打僧再問雲復打師見之忽然大悟乃曰可惜許三棒也無一點雲曰你又作麼生師拂袖曰大雨來也便出妙悟蘇州西華秀峰岫雲行瑋禪師長洲顧氏子年十二投虎邱西隱房本如披剃閩漳黃石齊太史寓西隱師出謁應對不落機復命為詩叉手而就史異之曰此沙彌他日肇興祖庭無疑也二十五從牧雲門謁天童悟命隨衆滌食器每進方丈參咨屢遭痛棒門呼之曰爾滌食器多時摸著碗底否師大疑猛力參究忽一夕捲簾頓豁亟趨見悟悟曰作麼便展拜曰謝和尚不通一線之恩悟微笑而頷之越三年隨門出天童居吳之銅井山及門開法古南命為第一座一夕晚參門曰心生大歡喜自知當作只是下面一字山僧續不來請大衆續看師出衆曰賊門可之南嶽法輪石隱貞禪師江西武寧劉氏子上堂法輪貞長老恰似打油匠不管菜子桐子山茶子一齊收拾榨牀上冷也一撞熱也一撞撞得一點氣息也無翻轉枯來還要加上兩撞且道為甚如此良久顧衆曰是則名為報佛恩明眼宗師須具此毒辣鉗錘如如懶人方為戒居士歙州人齠年即有志向道一夕夢輻巾道者引至揚州三叉河寶塔下視塔影欹斜命士將塔扶正士開塔門著力通身汗下忽然有省覺身心世界一空盡古今只是一箇自己并自己亦不可名狀述偈曰夢中作夢宛然真耳聽何如眼聽親泡影堆中拈寶具大千活句屬吾人自此遣妾茹素求道益切一日謁牧雲門於鶴林門曰不生不滅心聻士曰弟子今早渡江門曰江上風浪惡如何過得士曰柁柄在弟子手裏門曰即今登岸也柁柄聻何不便掌士曰本寺伽藍米公做門曰米公與你有甚涉士拱揖曰即刻拜別和尚門笑而頷之曰梅子熟矣乃付以偈曰靈山花下別京口渡頭逢君今如是去千載起吾宗後求剃度門曰可搆靜室不必出家便化同人堪稱希有潤州夾山蘧夫一禪師宜章李氏子年十八投萬松出家初謁憨山清於曹溪卓萬法歸一語三年不會次扣天童悟棒下有省後見夾山豫豫問甚處來師曰浙中豫豎起拂子曰還收得這箇麼師曰阿誰不具豫曰試呈似老僧看師拂袖便出杭州錢塘理安天笠珍禪師雲間陳氏子父仲雍母金氏十八出家行腳參南㵎㵎示父母未生前話疑不去心圓具後遍謁知識過紹興東郭門外逢殺犯人血濺衲衣打失本參偈曰活人頭落地血濺死人衣不知誰死活斬斷未生疑呈南㵎未獲許可後依南㵎過竹林因僧錯會趙州勘破婆子話南痛棒打出復喚回來云與你說箇譬喻你即是者僧老僧即是趙州拈起竹篦云者便是婆子那裏是勘破處眉毛拖地僧擬議南擲竹篦歸方丈師在旁不覺汗下洞徹古今公案師呈頌云幾人不戰便成功五字足足獨許南陽老臥龍何處見他自借東風鏖赤壁是非蜂起邪法難扶賺他血淚滿江紅認奴作郎如麻似粟南云那裏是趙州勘破婆子處師震威一喝南便打師禮拜云勘破了也便出後繼席南㵎上堂抱鈯斧居山聞名不如見面著草鞋住院見面不若聞名事到如今抑不獲已揚下鈯斧子脫却破草鞋展開驢腳伸出佛手菩提路上扶起剎竿廣濟道中重開飯店不蓄一粒米不栽一莖菜令一箇箇飽齁齁地拈却炙脂帽卸却鶻臭衫作赤灑灑淨倮倮漢若是具頂門眼懸肘後符呼喚不回頭羅籠不肯住望剎竿而走見鞭影而行山僧不妨瞻之仰之即今還有恁麼人麼驀卓拄杖云設有勘過了打上堂大通智勝佛稽首乾矢橛十劫坐道場猴子繫枯樁佛法不現前心肝樹上懸不得成佛道泥神撫掌笑此四句中一句殺人刀一句活人劒一句殺活同時一句殺活不同時若撿得出古佛在你腳底晚參大人峯頂無根樹却被賊子偷了去幾多癡漢守枯樁業識茫茫無本據以拄杖一齊趁退黃梅五祖千仞岡禪師明州王氏子弱冠禮雪嶠信斷髮受具天童看無字有省偈曰狗子無佛性莫道說得好閨女學做媒自身也難保後往夾山見箬菴問舉高峯枕子因緣言下大徹呈頌曰久憶并州是故鄉而今身已到咸陽若教忘却來時路不是愁人也斷腸問擊節稱賞命師分座出世潤之金山鄂之黃龍舒之浮度升座春色闌珊三月天數聲啼鳥落花前荷因有熱先擎蓋柳為無寒漸脫綿處處勸耕梅子熟家家繅繭竹籬煙分明好箇神仙訣父子雖親不可傳僧問牛頭未見四祖時如何師云花開蝶滿枝曰見後如何師云樹倒猢猻散黃梅祖殿拈香鉢衣漫與俗家兒骨董渾身欲付誰看取東山山上水承恩端在逆流時升座鴉鳴鴉鴉鵲噪鵲鵲婆餅鳴婆餅姑惡鳴姑惡記取枝頭一一鳥何聲不是自家音師於康熙丙午六月示疾乃貽書命大乾明公繼席再訂以次春二月行期至是月十七會晦山顯公問疾師囑以後事至二十未刻升座乃問衆集否曰集又問晦公在否曰在遂端坐而逝壽五十五臘二十四塔於東山演祖之右潤州金山鐵舟海禪師新安蔣氏子參南㵎問一日侍立次問謂師曰你試道一句看師曰父坐子立問曰如賓主相見如何酬酢師禮拜依位而立問曰你透得禮拜透不得禮拜師曰是甚麼所在說與麼話問曰如德山棒臨濟喝明甚麼邊事師擬進語問以茶鐘一擊粉碎師忽大悟潭州神鼎雲外行澤禪師婺源汪氏子年草五脫白黃山閲三載圓具參天童悟問如何用心得箇入處悟曰無心可用是汝入處師擬進語悟便打於是疑情頓發一夕不覺倚柱失睡忽聞開門聲有省呈悟悟為首肯後倚松際授於磬山機鋒迅捷應對無滯授曰汝進語都佳但桶底未脫在師發憤力究一日因風動簾幕墮地撲簌作聲忽然大悟授始印可出世蘄州老祖湘陰神鼎上堂會得也打不會得也打良久喝一喝曰姹女已歸霄漢去呆郎猶向火邊棲僧問文殊乃七佛之師為甚麼作釋迦弟子師曰鐘樓上走馬佛殿裏騎驢問和尚昔在磬山得箇甚麼師曰山僧愛瞋不愛喜曰如今以何為人師曰揑棒呼狗曰恁麼則圓滿菩提無所得也師曰百草頭上薦取老僧僧禮拜師接機峻邁手眼精明室中嘗舉狗子無佛性話驗人罕有契其機者順治甲午師書偈曰是非海內展全機多少時師盡皺眉此日一無言可付江南江北大家知投筆端然而逝全身塔於神鼎之右隴語録十六卷附楞嚴方冊藏流通龍華湘翁沄禪師小參僧問本是山中出來作山中主上下一和同春風滿寰宇如何是山中主師曰身上毛不出頭上角不全曰如何主中人師曰眼見如盲口說如啞曰掃盡諸方老婆禪傑出春山無二主師打曰你未有喫棒分在乃曰若說佛法供養大衆杜䳌聲裏春陰老若說世法供養大衆苕水環流波浪深罄情撥撒徹底剗除更須知拄杖頭一遂卓拄杖曰看看拄杖子惡發來也三十棒要打臨濟廝兒為他才住箇院子便乃教人成褫致令普化克符連日在屋角頭傾箱傾籠漏盡家私三十棒要打雪峯箇漢為他才得些須供養便對閩王道自從先德山石頭以來傳此祕密法門帶纍後世攙行奪市底把白馬老枕邊破木榍認作他先祖髑髏更三十棒要打古今知識為他噇却常住飯終日說大法小法向上向下山中主主中人賺引一隊伶俐後生怖鏡尋頭無有休歇諸兄弟山僧與麼提訓你道還有為人處也無擲拄杖曰一徑直二周遮好眼如何亂撒沙日勢已晚歸堂喫茶上堂竪拄杖曰拄杖子頭戴寶冠身披珍御先天地而不老後天地而常存有時突出人前便見千年一遇如今混俗和光共你八十三九十四教你修省當機覿面提與你饒益覿面當機捷你若不信驀呈起拄杖曰看看變作觀音大士走入西王母眉毛罅裏說阿字法輪去也卓一卓曰吽吽
